<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fafaf7">
<title>Hookathon Reader</title>
<style>
/* ---------- themes ---------- */
:root{
  --bg:#fafaf7; --fg:#1c1c1a; --muted:#8a8a84; --accent:#b3762f;
  --bar-bg:rgba(250,250,247,.96); --bar-fg:#1c1c1a; --line:rgba(0,0,0,.09);
  --card:#ffffff; --card-line:rgba(0,0,0,.07); --shadow:rgba(0,0,0,.10);
  --code-bg:rgba(0,0,0,.055);
}
html[data-theme="sepia"]{
  --bg:#f3ead7; --fg:#4b3a2a; --muted:#98866f; --accent:#8a5a20;
  --bar-bg:rgba(243,234,215,.96); --bar-fg:#4b3a2a; --line:rgba(75,58,42,.14);
  --card:#f9f2e2; --card-line:rgba(75,58,42,.10); --shadow:rgba(75,58,42,.12);
  --code-bg:rgba(75,58,42,.08);
}
html[data-theme="dark"]{
  --bg:#111113; --fg:#cfcfc9; --muted:#6e6e68; --accent:#d29a4f;
  --bar-bg:rgba(17,17,19,.96); --bar-fg:#cfcfc9; --line:rgba(255,255,255,.10);
  --card:#1a1a1d; --card-line:rgba(255,255,255,.07); --shadow:rgba(0,0,0,.5);
  --code-bg:rgba(255,255,255,.08);
}
/* ---------- base ---------- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%;}
body{
  background:var(--bg); color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none; touch-action:manipulation;
  transition:background .25s ease, color .25s ease;
}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
.hidden{display:none !important;}

/* ---------- library ---------- */
#library{min-height:100dvh; padding:max(20px,env(safe-area-inset-top)) 18px 60px;
  max-width:720px; margin:0 auto;}
#library h1{font-size:26px; margin:18px 4px 4px; letter-spacing:-.02em;}
#library .sub{color:var(--muted); font-size:14px; margin:0 4px 22px;}
.lib-top{display:flex; justify-content:space-between; align-items:center;}
.icon-btn{width:42px; height:42px; border-radius:12px; display:flex; align-items:center;
  justify-content:center; font-size:19px; border:1px solid var(--line);}
.icon-btn:active{transform:scale(.94);}
.continue{display:block; width:100%; text-align:left; background:var(--card);
  border:1px solid var(--card-line); border-radius:16px; padding:16px 18px; margin-bottom:26px;
  box-shadow:0 4px 18px var(--shadow);}
.continue .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); font-weight:600;}
.continue .t{font-size:17px; font-weight:600; margin:6px 0 4px;}
.continue .p{font-size:13px; color:var(--muted);}
.section-h{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
  color:var(--muted); margin:26px 4px 10px;}
.chap{display:flex; align-items:center; gap:14px; width:100%; text-align:left;
  background:var(--card); border:1px solid var(--card-line); border-radius:14px;
  padding:13px 16px; margin-bottom:8px;}
.chap:active{transform:scale(.985);}
.chap .n{font-size:12px; color:var(--muted); min-width:22px; font-variant-numeric:tabular-nums;}
.chap .t{flex:1; font-size:15px; font-weight:500; line-height:1.35;}
.chap .pct{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
.chap .pct.done{color:var(--accent);}

/* ---------- reader chrome ---------- */
#reader{position:fixed; inset:0; display:flex; flex-direction:column;}
.status{position:fixed; left:0; right:0; z-index:5; display:flex; justify-content:center;
  gap:14px; font-size:11.5px; color:var(--muted); pointer-events:none;
  padding:0 70px; white-space:nowrap; overflow:hidden;}
#statusTop{top:calc(6px + env(safe-area-inset-top));}
#statusBot{bottom:calc(8px + env(safe-area-inset-bottom));}
.status span{overflow:hidden; text-overflow:ellipsis;}

#pageArea{position:absolute; inset:0; margin:auto; width:100%; height:100%;
  max-width:var(--maxw,760px);
  padding:calc(30px + env(safe-area-inset-top)) var(--pad,24px) calc(34px + env(safe-area-inset-bottom));}
#pages{position:relative; width:100%; height:100%; overflow:hidden;}
#reader.mode-scroll #pages{overflow-y:auto; scrollbar-width:thin;}

#content{height:100%;
  column-width:var(--pw,320px); column-gap:var(--gap,60px); column-fill:auto;
  font-size:var(--fs,18px); line-height:var(--lh,1.7);}
#content.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;}
#content.anim-slide{transition:transform .3s cubic-bezier(.22,.61,.36,1);}
#content.anim-fade{transition:opacity .16s ease;}
#reader.mode-scroll #content{height:auto; column-width:auto; columns:auto;
  transform:none !important; padding-bottom:15vh;}

/* subtle book edge shading */
#pages::before,#pages::after{content:""; position:absolute; top:0; bottom:0; width:26px;
  z-index:2; pointer-events:none; opacity:.5;}
#pages::before{left:-1px; background:linear-gradient(90deg,var(--bg),transparent);}
#pages::after{right:-1px; background:linear-gradient(-90deg,var(--bg),transparent);}
#reader.mode-scroll #pages::before,#reader.mode-scroll #pages::after{display:none;}

/* ---------- markdown ---------- */
.md{text-rendering:optimizeLegibility;}
.md>*:first-child{margin-top:0;}
.md p{margin:0 0 1em; text-align:justify; hyphens:auto; -webkit-hyphens:auto;}
.md h1{font-size:1.5em; line-height:1.28; margin:0 0 .9em; letter-spacing:-.015em; text-align:left;}
.md h2{font-size:1.22em; line-height:1.3; margin:1.5em 0 .6em; letter-spacing:-.01em;}
.md h3{font-size:1.05em; margin:1.3em 0 .5em;}
.md a{color:var(--accent); text-decoration:none; border-bottom:1px solid color-mix(in srgb,var(--accent) 40%,transparent); overflow-wrap:anywhere;}
.md code{background:var(--code-bg); border-radius:5px; padding:.1em .35em; font-size:.85em;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; overflow-wrap:anywhere;}
.md pre{background:var(--code-bg); border-radius:10px; padding:12px 14px; overflow-x:auto;
  font-size:.8em; line-height:1.55; margin:0 0 1.1em;}
.md pre code{background:none; padding:0; font-size:inherit;}
.md ul,.md ol{margin:0 0 1em; padding-left:1.35em;}
.md li{margin:0 0 .45em;}
.md blockquote{border-left:3px solid var(--accent); margin:0 0 1em; padding:.1em 0 .1em 1em; color:var(--muted);}
.md hr{border:none; height:1px; background:var(--line); margin:1.6em auto; width:55%;}
.md .tblwrap{margin:0 0 1.2em; max-width:100%;}
#reader.mode-scroll .md .tblwrap{overflow-x:auto;}
.md table{border-collapse:collapse; width:100%; font-size:.78em; line-height:1.45;}
.md th,.md td{border:1px solid var(--line); padding:5px 8px; text-align:left; vertical-align:top;}
.md th{background:var(--code-bg); font-weight:600;}
.md strong{font-weight:650;}

/* ---------- bars ---------- */
.bar{position:fixed; left:0; right:0; z-index:20; background:var(--bar-bg); color:var(--bar-fg);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  display:flex; align-items:center; gap:8px;
  transition:transform .28s ease, opacity .28s ease;}
#topbar{top:0; padding:calc(8px + env(safe-area-inset-top)) 12px 8px;
  border-bottom:1px solid var(--line);}
#topbar.off{transform:translateY(-110%); opacity:0; pointer-events:none;}
#topbar .title{flex:1; font-size:14px; font-weight:600; text-align:center;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
#botbar{bottom:0; padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--line); flex-direction:column;}
#botbar.off{transform:translateY(110%); opacity:0; pointer-events:none;}
.slider-row{display:flex; align-items:center; gap:12px; width:100%; max-width:640px; margin:0 auto;}
.slider-row button{font-size:13px; color:var(--muted); padding:6px; flex-shrink:0;}
input[type=range]{flex:1; accent-color:var(--accent); height:26px;}
.slider-lbl{font-size:11px; color:var(--muted); text-align:center; margin-top:2px;}

/* ---------- Aa panel ---------- */
#scrim{position:fixed; inset:0; z-index:29; background:rgba(0,0,0,.25);}
#aaPanel{position:fixed; z-index:30; background:var(--card); border:1px solid var(--card-line);
  box-shadow:0 12px 40px var(--shadow); border-radius:18px; padding:18px;
  left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  width:min(420px, calc(100vw - 24px)); max-height:76dvh; overflow-y:auto;}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
.row:last-child{margin-bottom:0;}
.row .lbl{font-size:13px; color:var(--muted); min-width:74px;}
.seg{display:flex; flex:1; background:var(--code-bg); border-radius:10px; padding:3px; gap:3px;}
.seg button{flex:1; padding:7px 4px; border-radius:8px; font-size:13px; color:var(--muted); text-align:center;}
.seg button.on{background:var(--bg); color:var(--fg); font-weight:600; box-shadow:0 1px 4px var(--shadow);}
.stepper{display:flex; align-items:center; gap:4px; flex:1; justify-content:flex-end;}
.stepper button{width:44px; height:36px; border:1px solid var(--line); border-radius:10px; font-size:16px;}
.stepper .val{min-width:52px; text-align:center; font-size:14px; font-variant-numeric:tabular-nums;}
.theme-chips{display:flex; gap:8px; flex:1; justify-content:flex-end;}
.theme-chips button{width:44px; height:36px; border-radius:10px; border:2px solid var(--line); font-size:12px; font-weight:600;}
.theme-chips button.on{border-color:var(--accent);}
.chip-light{background:#fafaf7; color:#1c1c1a;}
.chip-sepia{background:#f3ead7; color:#4b3a2a;}
.chip-dark{background:#111113; color:#cfcfc9;}

/* ---------- desktop niceties ---------- */
@media (min-width:900px){
  #library{padding-top:48px;}
  .chap:hover{border-color:var(--accent);}
  .continue:hover{border-color:var(--accent);}
  .seg button:hover,.icon-btn:hover{color:var(--fg);}
}
.pagehint{position:fixed; top:50%; transform:translateY(-50%); z-index:3; font-size:22px;
  color:var(--muted); opacity:0; transition:opacity .2s; pointer-events:none;}
@media (hover:hover){ #pageArea:hover ~ .pagehint, .pagehint.show{opacity:.35;} }
#hintL{left:10px;} #hintR{right:10px;}
</style>
</head>
<body>

<div id="library"></div>

<div id="reader" class="hidden mode-page">
  <div id="statusTop" class="status"><span id="stTitle"></span></div>
  <div id="pageArea">
    <div id="pages"><div id="content" class="md serif anim-slide"></div></div>
  </div>
  <div id="hintL" class="pagehint">‹</div>
  <div id="hintR" class="pagehint">›</div>
  <div id="statusBot" class="status"><span id="stInfo"></span></div>

  <header id="topbar" class="bar off">
    <button class="icon-btn" id="btnLib" title="Library (Esc)">☰</button>
    <div class="title" id="barTitle"></div>
    <button class="icon-btn" id="btnTheme" title="Cycle theme (T)">◑</button>
    <button class="icon-btn" id="btnAa" title="Display settings">Aa</button>
  </header>

  <footer id="botbar" class="bar off">
    <div class="slider-row">
      <button id="btnPrevCh" title="Previous chapter">⏮ Prev</button>
      <input type="range" id="slider" min="1" max="1" value="1">
      <button id="btnNextCh" title="Next chapter">Next ⏭</button>
    </div>
    <div class="slider-lbl" id="sliderLbl"></div>
  </footer>

  <div id="scrim" class="hidden"></div>
  <div id="aaPanel" class="hidden">
    <div class="row"><span class="lbl">Font size</span>
      <div class="stepper"><button id="fsDown">A−</button><span class="val" id="fsVal">18px</span><button id="fsUp">A+</button></div></div>
    <div class="row"><span class="lbl">Font</span>
      <div class="seg" id="segFont"><button data-v="serif">Serif</button><button data-v="sans">Sans</button></div></div>
    <div class="row"><span class="lbl">Spacing</span>
      <div class="seg" id="segLh"><button data-v="1.5">Tight</button><button data-v="1.7">Normal</button><button data-v="1.95">Loose</button></div></div>
    <div class="row"><span class="lbl">Margins</span>
      <div class="seg" id="segMargin"><button data-v="s">Narrow</button><button data-v="m">Medium</button><button data-v="l">Wide</button></div></div>
    <div class="row"><span class="lbl">Theme</span>
      <div class="theme-chips" id="themeChips">
        <button class="chip-light" data-v="light">A</button>
        <button class="chip-sepia" data-v="sepia">A</button>
        <button class="chip-dark" data-v="dark">A</button></div></div>
    <div class="row"><span class="lbl">Page turn</span>
      <div class="seg" id="segAnim"><button data-v="slide">Slide</button><button data-v="fade">Fade</button><button data-v="none">None</button></div></div>
    <div class="row"><span class="lbl">Layout</span>
      <div class="seg" id="segMode"><button data-v="page">Pages</button><button data-v="scroll">Scroll</button></div></div>
  </div>
</div>

<script>
"use strict";
/* ================= data ================= */
const BOOK = [{"id": "research/00-START-HERE.md", "file": "00-START-HERE.md", "section": "Research — What To Build (2026)", "num": 1, "title": "Research Pack: What To Build Next (July 2026)", "md": "# Research Pack: What To Build Next (July 2026)\n\n**The question this folder answers:** *\"What is Uniswap struggling with that nobody has solved with a hook — and who would actually use the solution?\"*\n\nEverything here was researched from live 2025–2026 sources (news, whitepapers, protocol blogs, post-mortems) and cross-checked against your `hook-directory/` folder (556 past UHI hooks) so the ideas are genuinely new, not repeats of what previous cohorts built. Written in plain language — every term is explained or points to your `learn/` folder.\n\n## Read in this order\n\n| File | What it gives you | Time |\n|---|---|---|\n| `01-uniswap-unsolved-problems-2026.md` | The 8 real problems Uniswap has **right now**, why 556 hooks didn't fix them, and who the users would be | ~15 min |\n| `02-new-whitepapers-explained-simply.md` | The 9 research ideas everyone's talking about (Orbital, MEV taxes, pm-AMM, am-AMM, EulerSwap, Doppler, Angstrom…), each explained simply | ~15 min |\n| `03-defi-trends-2026.md` | Where DeFi's money and attention actually are in 2026 — and what's dead (don't build restaking or \"dynamic fees\") | ~10 min |\n| `04-hook-ideas-shortlist.md` | 8 concrete project ideas, honestly scored for novelty, users, and beginner-feasibility, with a ranked recommendation | ~15 min |\n\n## The TL;DR if you only read one paragraph\n\nUniswap's fight in 2026 is not about fee formulas (that's the most over-built idea in your entire directory — 218 of 556 hooks). The real gaps: (1) **nobody can tell a safe hook from a time bomb** since the Bunni hack, (2) **hooked pools are invisible to routers**, so they get no volume, (3) **Unichain's new Flashblocks made \"MEV taxes for LPs\" possible for the first time** and almost nobody has built on it, and (4) **new asset classes are arriving without market structure** — tokenized stocks that trade 24/7 while Wall Street sleeps, and prediction-market outcome tokens with no suitable AMM. Meanwhile LPs just took a pay cut from the fee switch, making anything that boosts LP income swim with the current. My top three picks, in order: the **Market-Hours Hook for tokenized stocks**, the **MEV-Tax-for-LPs Hook on Unichain**, and the **Guard Hook (circuit breaker for other hooks)** — reasoning and build sketches in file 04.\n\n## The single most important lesson from the research\n\nEvery v4 hook that actually succeeded (Doppler, Angstrom, EulerSwap, Flaunch) was an **invisible engine inside a product people already wanted**. Every hook that failed was a clever mechanism looking for users. Pick your user first, then your mechanism.\n"}, {"id": "research/01-uniswap-unsolved-problems-2026.md", "file": "01-uniswap-unsolved-problems-2026.md", "section": "Research — What To Build (2026)", "num": 2, "title": "What Uniswap Is Actually Struggling With (Mid-2026)", "md": "# What Uniswap Is Actually Struggling With (Mid-2026)\n\nThis file answers one question: **what hurts Uniswap right now that nobody has properly solved with a hook yet?**\n\nEach problem below follows the same format:\n- **What's going wrong** — in plain words\n- **Why 556 UHI hooks didn't solve it** — checked against your `hook-directory/` folder\n- **Who would use a solution** — the potential users\n- **The hook opportunity** — what you could actually build\n\nRead this together with `04-hook-ideas-shortlist.md`, which turns these problems into concrete project ideas.\n\n---\n\n## Problem 1: Most v4 hooks are ghost towns (the trust problem)\n\n**What's going wrong.**\nOver **1,300 hooks** have been deployed on Uniswap v4 (tracked on [HookRank](https://hookrank.io/)), but real trading volume is concentrated in a tiny handful. Even worse: v4 as a whole still does *less* daily volume than v3 (~$186M vs ~$427M on Ethereum at one recent snapshot). A year and a half after launch, most liquidity never migrated.\n\nThe single biggest reason is **trust**. In v3, you only had to trust Uniswap itself. In v4, every pool's safety depends on whatever custom hook is attached to it. Then in September 2025, **Bunni** — the most celebrated hook project, audited by top firms (Trail of Bits, Cyfrin) — got exploited for **$8.4M** through a math rounding bug and [shut down permanently](https://www.coindesk.com/business/2025/10/23/bunni-dex-shuts-down-cites-recovery-costs-after-usd8-4m-exploit). The message everyone took away: *even audited hooks can kill you.*\n\nRight now there is **no standard way** for a normal user, an LP, or an aggregator to answer: \"is this hook safe to touch?\"\n\n**Why the 556 UHI hooks didn't solve it.**\nYour directory has 63 \"security hooks,\" but almost all of them protect against *bad tokens* (rug pulls, scam coins) — not against *bad hooks*. Nobody built the meta-layer: safety infrastructure for the hooks themselves.\n\n**Who would use a solution.**\n- Every LP deciding whether to deposit into a hooked pool\n- Frontends and aggregators deciding whether to route through a hooked pool\n- Hook developers who want a way to *prove* they're safe (they'd pay for this)\n- Insurance protocols\n\n**The hook opportunity.**\n- A **\"guard\" wrapper hook**: sits around any other hook and enforces hard safety rules (e.g., \"pool balances can never drop more than X% in one block,\" \"withdrawals always get at least what the math says\"). If an inner hook misbehaves, the guard freezes the pool instead of letting it drain. Think of it as a circuit breaker *for hooks*, not for tokens.\n- A **hook safety registry / scoring system** that aggregators and wallets can read on-chain.\n- This is the \"picks and shovels\" play: you win whenever *anyone else's* hook succeeds or fails.\n\n---\n\n## Problem 2: Hooked pools don't get routed (the chicken-and-egg problem)\n\n**What's going wrong.**\nWhen you swap on Uniswap's website or through an aggregator (1inch, CoW Swap, etc.), a routing algorithm decides which pools your trade goes through. That algorithm needs to *simulate* each pool: \"if I put in X, how much do I get out?\"\n\nFor a plain pool, that's easy math. For a hooked pool, the hook can do *anything* — change the fee mid-trade, pull liquidity, add conditions. Routers can't safely predict that, so **they mostly skip hooked pools entirely**. Research confirms this is an open problem ([Optimal Routing in the Presence of Hooks](https://thogiti.github.io/2025/02/15/Understanding-Uniswap-v4-hooks-optimal-routing-AMM.html)).\n\nThe result is a death spiral: no routing → no volume → no fees → LPs leave → even less reason to route there. This, alongside trust, is *the* reason hooks haven't taken off.\n\nUniswap knows this — the [UNIfication proposal](https://blog.uniswap.org/unification) includes \"aggregator hooks\" and the Foundation started a [hook data standards](https://www.uniswapfoundation.org/blog/developer-guide-establishing-hook-data-standards-for-uniswap-v4) effort. But it's early and unsolved.\n\n**Why the 556 UHI hooks didn't solve it.**\nBecause it's not a hook — it's *infrastructure around hooks*. Everyone built pools; almost nobody built the plumbing that lets routers understand pools. (Your directory's \"order types & routing\" category — 74 hooks — is about limit orders and auctions, not about making hooks routable.)\n\n**Who would use a solution.**\n- Every hook developer (their pool finally gets traffic)\n- Aggregators and solvers (more liquidity sources = better prices)\n- Uniswap Labs/Foundation themselves (they're actively funding this area)\n\n**The hook opportunity.**\n- A **\"hook manifest\" standard**: a small on-chain declaration every hook can publish saying \"here is exactly how I change swap behavior, in a machine-readable way,\" plus a reference router that reads it. \n- A **\"router-safe\" hook template**: a base contract that guarantees predictable behavior so any pool built on it is automatically routable.\n- This is less flashy than a trading strategy, but it's what the ecosystem is visibly missing, and the Foundation gives grants for exactly this.\n\n---\n\n## Problem 3: LPs still lose money — and the fee switch just made it worse\n\n**What's going wrong.**\nThe oldest problem in AMMs is still unsolved at scale: passive LPs bleed money to arbitrage (LVR — see your `learn/08` file). Research keeps confirming that for volatile pairs, fees usually don't cover the loss.\n\nThen in December 2025, Uniswap governance passed **UNIfication**: the protocol now takes a cut of trading fees (roughly 1/4 to 1/6 of what LPs earn) and uses it to buy and burn UNI ([The Defiant](https://thedefiant.io/news/defi/uniswap-passes-unification-fee-switch-proposal)). Great for UNI holders — but it's a **direct pay cut for LPs** who were already barely breaking even. LPs are now the most squeezed group in the whole ecosystem, and they're the ones every pool depends on.\n\nMeanwhile, competitors attack exactly this weakness: **Fluid DEX** makes the *same capital* work as lending collateral AND trading liquidity at once (up to 39x efficiency, [OAK Research](https://oakresearch.io/en/reports/protocols/fluid-new-defi-standard-unify-dex-lending)), and **EulerSwap** does something similar with Uniswap v4 hooks + lending.\n\n**Why the 556 UHI hooks didn't solve it.**\nThis is the most-attacked problem in your whole directory (~40% of hooks touch dynamic fees, 126 touch MEV/LVR). But almost all of them are *simulations and demos* — none became a trusted product LPs actually use. The ideas that work in research (am-AMM, MEV taxes, batch auctions) need serious engineering + trust, which hackathon projects never got to.\n\n**Who would use a solution.**\n- Passive LPs (retail people who just want yield without babysitting positions)\n- DAO treasuries providing liquidity for their own token\n- Anyone who left after the fee switch cut their income\n\n**The hook opportunity.**\n- The freshest angle: **MEV-tax hooks on Unichain** (see Problem 4) — recapture arbitrage profit and give it back to LPs.\n- **Lending-integrated LPing** (EulerSwap-style but for multiple LPs — EulerSwap only supports ONE liquidity provider per pool instance; a multi-LP version is an open gap).\n- Honest warning: \"dynamic fees\" as a pitch is completely saturated. If you go here, your edge must be *distribution and trust*, not another fee formula.\n\n---\n\n## Problem 4: Unichain unlocked a brand-new MEV weapon — and almost nobody has used it yet\n\n**What's going wrong (actually: what's newly possible).**\nUnichain (Uniswap's own L2) now runs **Flashblocks**: blocks every ~200-250ms, built inside secure hardware (TEEs) that *provably* orders transactions by priority fee ([Uniswap blog](https://blog.uniswap.org/flashblocks-are-live), [Rollup-Boost](https://writings.flashbots.net/introducing-rollup-boost)).\n\nWhy this matters: there's a famous idea called the **MEV tax** (\"Priority Is All You Need\" by Paradigm, explained simply in `02-new-whitepapers-explained-simply.md`): if you can trust transaction ordering, a smart contract can automatically *charge arbitrage bots most of their profit* and hand it to LPs. On Ethereum mainnet this doesn't work (ordering isn't trustworthy). **On Unichain, since Flashblocks went live, it works.** Faster blocks alone also shrink LVR because arbitrageurs get smaller price gaps to exploit.\n\nUniswap Labs itself is building one version of this (the Protocol Fee Discount Auction in UNIfication — but that one burns UNI rather than paying LPs). The \"give it to LPs\" version is wide open.\n\n**Why the 556 UHI hooks didn't solve it.**\nTiming. Most cohorts built before Flashblocks + provable priority ordering existed. A few hooks played with \"MEV redistribution\" concepts, but building on the *live, real* mechanism is genuinely new territory.\n\n**Who would use a solution.**\n- LPs on Unichain (their returns directly improve)\n- Uniswap Foundation (UHI's biggest sponsor track is literally Unichain — 100 integrations in your tracker, 60% of UHI8 was cross-chain/Unichain)\n- Arbitrage bots would *pay* it (unwillingly, but by design)\n\n**The hook opportunity.**\n- An **LP-rebate MEV-tax hook**: in `beforeSwap`, read the transaction's priority fee; charge high-priority transactions (= arbitrage bots racing to be first) an extra fee proportional to their priority fee; donate it to the pool's LPs. Conceptually simple, very demo-able, and perfectly aligned with what the sponsor wants to see.\n\n---\n\n## Problem 5: The \"smart vault\" vacuum — Bunni is dead and the curator model blew up\n\n**What's going wrong.**\nNormal people can't manage concentrated liquidity (choosing price ranges, rebalancing — see your `learn/04`). They need vaults that do it for them. Two things just destroyed this market's supply side:\n\n1. **Bunni** (the best v4 auto-managing LP product) died from its exploit in late 2025.\n2. The **curator model** — \"deposit here, a professional manages your money\" — had a catastrophic 2025-26: Stream Finance lost **$93M** of user funds through an opaque off-chain manager, its stablecoin crashed 77%, and the contagion froze $160M+ and left Euler with $137M bad debt ([S&P Global](https://www.spglobal.com/ratings/en/regulatory/article/digital-assets-brief-stream-finances-collapse-highlights-defi-contagion-risks-s101661035), [Tiger Research](https://reports.tiger-research.com/p/collapse-of-the-defi-jenga-the-stream-eng)). Analysts warn ~$8B sits in similar structures.\n\nSo the demand (passive LP yield) is fully intact, but users no longer trust (a) clever hook math after Bunni, or (b) human managers after Stream. What's missing is a vault where **you don't have to trust anyone** — every rule is on-chain, verifiable, with hard limits.\n\n**Why the 556 UHI hooks didn't solve it.**\nLiquidity management is your directory's #2 category (153 hooks), but they're all *strategies*. The market gap isn't a smarter strategy — it's **provable safety of a simple strategy**. Nobody built \"the boring vault that mathematically cannot rug you.\"\n\n**Who would use a solution.**\n- Retail passive LPs (the biggest underserved group in DeFi)\n- DAO treasuries (they legally/socially can't hand funds to anonymous curators)\n- Ex-Bunni and ex-curator-vault users looking for a home\n\n**The hook opportunity.**\n- A **transparent, rules-only rebalancing hook**: dead-simple strategy (e.g., keep liquidity centered around the current price, rebalance at most once a day), zero human control, invariant checks on every action (inspired directly by how Bunni died: their withdrawal math could pay out more than it should — your hook re-verifies balances after every operation and reverts if anything is off).\n\n---\n\n## Problem 6: Tokenized stocks trade 24/7 — but the real market closes (the \"weekend problem\")\n\n**What's going wrong.**\nTokenized stocks are exploding: Kraken's xStocks, Robinhood's tokenized equities, and now the **NYSE itself is building a 24/7 tokenized stock venue** ([CoinDesk](https://www.coindesk.com/markets/2026/01/19/nyse-to-launch-24-7-blockchain-powered-tokenized-stock-and-etf-trading)). But there's a structural flaw nobody has solved for AMMs:\n\n**When the real stock market is closed (nights, weekends), a tokenized Tesla pool has no anchor price.** No oracle to arbitrage against. Regulators specifically flag this: thin weekend liquidity is easy to manipulate, and there are **no circuit breakers** on-chain like real markets have. And when the real market reopens Monday after weekend news, whoever trades first against the stale AMM price extracts money from LPs — it's LVR in its most brutal form.\n\nTraditional markets solved this a century ago with **opening auctions** and trading halts. On-chain AMMs have… nothing.\n\n**Why the 556 UHI hooks didn't solve it.**\nYour RWA category (102 hooks) is almost entirely *compliance* — KYC gates, whitelists. Market *microstructure* for assets-with-a-closing-bell (halts, reopening auctions, weekend fee curves) is essentially untouched. This is a real, growing, unsolved niche.\n\n**Who would use a solution.**\n- Tokenized equity issuers (Backed, Ondo, Securitize, Dinari — real companies with budgets)\n- Exchanges bringing stocks on-chain\n- LPs in RWA pools (they currently get destroyed every Monday morning)\n- This is also where all institutional interest in 2026 is pointed (see `03-defi-trends-2026.md`)\n\n**The hook opportunity.**\n- A **market-hours-aware hook**: knows the NYSE calendar; during closed hours it widens fees (compensating LPs for the extra risk) or restricts trade size; at Monday open it runs a short **reopening auction** (batch all pending trades, settle them at one fair clearing price) instead of letting the fastest bot eat the LPs. Novel, explainable in one sentence, and aimed at a market that's arriving *right now*.\n\n---\n\n## Problem 7: Prediction market outcome tokens are coming on-chain with no good AMM\n\n**What's going wrong.**\nPrediction markets went mainstream: from ~$1.2B/month in early 2025 to **$20B+/month in early 2026** ([TRM Labs](https://www.trmlabs.com/resources/blog/how-prediction-markets-scaled-to-usd-21b-in-monthly-volume-in-2026)). Kalshi and Polymarket own ~97% of it — using order books, not AMMs, because classic AMMs are *bad* at prediction markets (a \"share of YES\" behaves nothing like a token: its price lives between $0 and $1, it expires at a known date, and it jumps to exactly $0 or $1 at resolution).\n\nNow **Kalshi has started tokenizing outcomes on-chain** (starting with Solana), which means outcome tokens will need permissionless secondary liquidity everywhere — and Paradigm already published the math for a proper prediction-market AMM (**pm-AMM**, explained in file 02), which almost nobody has productionized as a Uniswap v4 hook.\n\n**Why the 556 UHI hooks didn't solve it.**\nPrediction markets barely appear in your directory at all — it's arguably the biggest 2026 consumer trend with the least UHI coverage.\n\n**Who would use a solution.**\n- Prediction market platforms extending on-chain\n- Market makers who want passive exposure to outcome-token spreads\n- Long-tail markets that order books can't serve (order books need active market makers; AMMs don't)\n\n**The hook opportunity.**\n- A **pm-AMM hook**: implement Paradigm's prediction-market curve as a v4 hook, with an expiry-aware liquidity schedule (concentrate liquidity more tightly as resolution approaches) and a freeze-at-resolution guard.\n\n---\n\n## Problem 8: Uniswap is spot-only in a perps world (know about it, probably don't build it)\n\n**What's going wrong.**\nHyperliquid runs ~**70% of all on-chain perpetual futures**, doing $180B+ monthly — more than every other venue combined ([CoinDesk](https://www.coindesk.com/markets/2026/01/19/hyperliquid-extends-lead-in-perp-dex-race-as-rivals-volumes-fade)). Perps are where crypto's real trading volume lives, and Uniswap has zero presence there. Meanwhile Solana DEXes flipped Ethereum DEXes in spot volume ($117B vs $52B in January 2026).\n\n**Why you probably shouldn't build this.**\nBuilding perps on an AMM via hooks means solving funding rates, liquidations, and margin — a quant-heavy, high-risk project (only 21 of 556 UHI hooks even attempted derivatives, and none stuck). Included here for completeness: it's Uniswap's biggest *strategic* gap, but it's a bad first project. If the leverage theme attracts you, EulerSwap-style lending integration (Problem 3) is the saner entry.\n\n---\n\n## The one-paragraph summary\n\nUniswap's 2026 problems are not \"we need a better fee formula\" — that race is over-crowded and mostly lost. The real gaps are: **trust** (nobody can tell a safe hook from a time bomb — Problem 1, 5), **plumbing** (hooked pools are invisible to routers — Problem 2), **a brand-new mechanism nobody has exploited** (provable priority ordering on Unichain enables MEV taxes for LPs — Problem 4), and **new asset classes arriving without market structure** (tokenized stocks with closing bells, prediction market outcome tokens — Problems 6, 7). The best opportunities are where a trend is arriving *right now* and the 556 previous hooks simply predate it.\n\n---\n\n## Sources\n\n- [Uniswap Review 2026: v4 Hooks, Fee Switch Economics](https://cryptoadventure.com/uniswap-review-2026-v4-hooks-fee-switch-economics-and-the-dex-reality/) · [HookRank](https://hookrank.io/)\n- [Bunni shutdown — CoinDesk](https://www.coindesk.com/business/2025/10/23/bunni-dex-shuts-down-cites-recovery-costs-after-usd8-4m-exploit) · [Bunni exploit analysis — QuillAudits](https://www.quillaudits.com/blog/hack-analysis/bunni-v2-exploit)\n- [UNIfication — Uniswap blog](https://blog.uniswap.org/unification) · [Fee switch passes — The Defiant](https://thedefiant.io/news/defi/uniswap-passes-unification-fee-switch-proposal)\n- [Optimal routing with hooks — paper review](https://thogiti.github.io/2025/02/15/Understanding-Uniswap-v4-hooks-optimal-routing-AMM.html) · [Hook data standards — Uniswap Foundation](https://www.uniswapfoundation.org/blog/developer-guide-establishing-hook-data-standards-for-uniswap-v4)\n- [Flashblocks live on Unichain](https://blog.uniswap.org/flashblocks-are-live) · [Rollup-Boost — Flashbots](https://writings.flashbots.net/introducing-rollup-boost)\n- [Stream Finance collapse — S&P Global](https://www.spglobal.com/ratings/en/regulatory/article/digital-assets-brief-stream-finances-collapse-highlights-defi-contagion-risks-s101661035) · [Tiger Research retrospective](https://reports.tiger-research.com/p/collapse-of-the-defi-jenga-the-stream-eng)\n- [NYSE 24/7 tokenized venue — CoinDesk](https://www.coindesk.com/markets/2026/01/19/nyse-to-launch-24-7-blockchain-powered-tokenized-stock-and-etf-trading) · [How tokenized stocks trade 24/7](https://www.tokenizedpod.com/learn/tokenized-stocks-24-7-trading)\n- [Prediction markets scale to $21B/mo — TRM Labs](https://www.trmlabs.com/resources/blog/how-prediction-markets-scaled-to-usd-21b-in-monthly-volume-in-2026)\n- [Hyperliquid dominance — CoinDesk](https://www.coindesk.com/markets/2026/01/19/hyperliquid-extends-lead-in-perp-dex-race-as-rivals-volumes-fade)\n- [Fluid DEX — OAK Research](https://oakresearch.io/en/reports/protocols/fluid-new-defi-standard-unify-dex-lending) · [EulerSwap](https://www.euler.finance/blog/introducing-eulerswap)\n"}, {"id": "research/02-new-whitepapers-explained-simply.md", "file": "02-new-whitepapers-explained-simply.md", "section": "Research — What To Build (2026)", "num": 3, "title": "New Whitepapers & Big Ideas, Explained Simply", "md": "# New Whitepapers & Big Ideas, Explained Simply\n\nThese are the research ideas people in DeFi are actually talking about in 2025–2026. Each one is explained the same way: **the problem → the idea in one sentence → how it works (simply) → status → what a hook builder can take from it.**\n\nYou already know the older foundations from your `learn/` folder (LVR = `learn/08`, MEV = `learn/07`, concentrated liquidity = `learn/04`). Everything below builds on those.\n\n---\n\n## 1. Orbital — concentrated liquidity for MANY stablecoins at once (Paradigm, June 2025)\n\n**The problem.** Uniswap v3/v4 pools hold exactly 2 tokens. But there are now dozens of major stablecoins (USDC, USDT, DAI, PYUSD, USDe…), and connecting them pairwise needs tons of separate pools with scattered liquidity. Curve can hold many tokens in one pool, but LPs can't concentrate their money the way Uniswap v3 lets them.\n\n**The idea in one sentence.** One pool holding *any number* of stablecoins, where LPs can still concentrate their liquidity around the $1 point — like Uniswap v3, but in many dimensions.\n\n**How it works, simply.** Imagine all possible price combinations of 5 stablecoins as points on a globe. \"Everything = $1\" is one specific spot on that globe. Orbital lets an LP say \"I'll provide liquidity only in a *ring* around that spot\" (prices near $1) instead of covering the whole globe. Tighter ring = more trading power per dollar. Clever bonus: if one stablecoin totally collapses to $0, the rest of the pool keeps trading the healthy coins at fair prices.\n\n**Status.** Published as a design/whitepaper ([paradigm.xyz/2025/06/orbital](https://www.paradigm.xyz/2025/06/orbital)); Paradigm explicitly invited developers to build it. Implementations are still rare — this is one of the most \"open for grabs\" pieces of serious math out there.\n\n**Takeaway for you.** Full Orbital is heavy math. But a simplified 3-stablecoin version as a v4 hook, or even just the \"depeg containment\" feature, would be a standout project. Stablecoins are the #1 growing asset class (see file 03) — the demand side is guaranteed.\n\n---\n\n## 2. am-AMM — auction off the right to run the pool (2024 paper; implemented by Bunni)\n\n**The problem.** Arbitrage bots extract value from LPs (LVR). Fees are a blunt tool: too low and LPs bleed, too high and traders leave.\n\n**The idea in one sentence.** Continuously auction off the role of \"pool manager\"; the winner pays rent to LPs and in exchange gets to set fees and collect them.\n\n**How it works, simply.** Whoever values controlling the pool the most is usually an arbitrageur — so instead of letting them extract value for free, make them *bid for the privilege*. Their winning bid (the rent) flows to LPs. The manager then sets fees smartly to make their money back. LPs get a steady rent income that automatically prices in how much extraction is happening.\n\n**Status.** Bunni v2 implemented it on Uniswap v4 — then Bunni died from an unrelated accounting bug. The *mechanism* was never disproven; its flagship implementation just disappeared. The [Bunni v2 code is now MIT-licensed / open source](https://github.com/Bunniapp/bunni-v2).\n\n**Takeaway for you.** The best-validated LP-protection mechanism is currently orphaned. Reviving a *minimal, simple* am-AMM hook (without Bunni's complex liquidity-shaping math that caused the hack) is a legitimate niche. Also a cautionary tale: complexity kills — Bunni's exploit was in its fancy extra features, not in am-AMM itself.\n\n---\n\n## 3. MEV Taxes / \"Priority Is All You Need\" (Paradigm, 2024 — newly practical in 2025-26)\n\n**The problem.** Arbitrage bots race to be first in the block to capture profit (that race's winnings mostly go to block builders/validators, not to the LPs being drained).\n\n**The idea in one sentence.** If transactions are provably ordered by how much priority fee they pay, an app can charge users an extra fee *proportional to their priority fee* — which almost perfectly taxes arbitrage bots (who pay high priority to be first) while barely touching normal users.\n\n**How it works, simply.** A bot that expects $100 profit from arbitraging your pool will pay up to ~$99 in priority fees to win the race. So the priority fee *reveals* how much MEV the transaction captures. A hook that reads it and says \"you must also pay the pool 90× your priority fee\" converts that hidden profit into LP income. Normal users pay tiny priority fees, so they barely notice.\n\n**Status.** This was theory until **Unichain shipped Flashblocks** (200-250ms blocks built in secure hardware that *provably* order by priority fee — [blog.uniswap.org/flashblocks-are-live](https://blog.uniswap.org/flashblocks-are-live)). Uniswap's own UNIfication proposal now includes a cousin of this (PFDA, below). The \"tax goes to LPs\" version as a public hook: still wide open.\n\n**Takeaway for you.** Probably the single freshest *mechanism* a beginner can build something real on: the hook logic itself is short (read priority fee in `beforeSwap`, charge extra, donate to LPs), and it only became possible recently, which is why your 556-hook directory barely touches it.\n\n---\n\n## 4. PFDA — Protocol Fee Discount Auctions (Uniswap Labs, part of UNIfication, late 2025)\n\n**The problem.** Same MEV leak, seen from Uniswap's perspective: arbitrage profit leaves the ecosystem.\n\n**The idea in one sentence.** Auction off a short time window during which one address can swap *without paying protocol fees* — arbitrage bots buy these windows, and their payments go to burning UNI.\n\n**How it works, simply.** If you're a bot doing constant arbitrage, protocol fees eat your margin. Uniswap sells you a \"fast pass\": bid in an auction, win the right to skip protocol fees for a few seconds. Bots' bids ≈ the MEV they expect. Uniswap's own analysis says this could improve effective LP economics by ~$0.06–$0.26 per $10k traded — significant when typical LP profit on $10k of volume is between –$1 and +$1 ([UNIfication](https://blog.uniswap.org/unification)).\n\n**Status.** Approved with UNIfication (passed Dec 2025), rolling out. Proceeds burn UNI rather than paying LPs.\n\n**Takeaway for you.** Understand it because it's the official direction — and notice the gap it leaves: it's tuned for *UNI holders*. An LP-first variant (auction proceeds → LPs) is a distinct, defensible idea.\n\n---\n\n## 5. pm-AMM — an AMM designed for prediction markets (Paradigm, late 2024)\n\n**The problem.** Normal AMM curves are wrong for prediction market shares. A \"YES\" share is always worth between $0 and $1, its value jumps to exactly $0 or $1 at a known resolution date, and uncertainty shrinks as that date approaches. Uniswap-style curves waste most liquidity at impossible prices and get destroyed near resolution.\n\n**The idea in one sentence.** A purpose-built curve for outcome tokens whose liquidity automatically adapts to the time remaining until the market resolves.\n\n**How it works, simply.** The paper models outcome prices the way finance models options (uncertainty shrinks as expiry nears) and derives the AMM shape that keeps LP losses *uniform over time* instead of exploding at the end. Practically: the pool automatically concentrates liquidity tighter and tighter as resolution approaches, then stops before the final jump.\n\n**Status.** Published at [paradigm.xyz/2024/11/pm-amm](https://www.paradigm.xyz/2024/11/pm-amm). Very few production implementations. Meanwhile prediction markets hit $20B+/month and Kalshi began tokenizing outcomes on-chain — outcome tokens are about to need AMM liquidity everywhere.\n\n**Takeaway for you.** Trend (file 03, prediction markets) + published math + no dominant implementation + near-zero UHI coverage = one of the clearest whitepaper-to-hook opportunities on this list.\n\n---\n\n## 6. EulerSwap — your LP position is also your lending position (Euler, 2025)\n\n**The problem.** Capital in DeFi is lazy: money in an AMM pool just sits waiting for trades; money in a lending market just sits earning interest. You have to choose.\n\n**The idea in one sentence.** An AMM built as a Uniswap v4 hook where the \"pool\" is actually a lending account — liquidity is borrowed on demand the moment a swap needs it.\n\n**How it works, simply.** When a trader wants to buy tokens the pool doesn't currently hold, the hook *borrows* them instantly from Euler's lending market, using the trader's incoming tokens as collateral. The same dollars earn lending interest AND trading fees, simulating up to ~50x the depth of a normal pool ([whitepaper](https://raw.githubusercontent.com/euler-xyz/euler-swap/7080c3fe0c9f935c05849a0756ed43d959130afd/docs/whitepaper/EulerSwap_White_Paper.pdf)). Fluid DEX proved the concept's power independently: it beat Uniswap's ETH/USDC pool volume with only $6M TVL.\n\n**Status.** Live and growing. Notable limitation: **each EulerSwap pool has exactly ONE liquidity provider** (an operator account). Passive multi-LP versions don't exist yet.\n\n**Takeaway for you.** \"Same capital, multiple jobs\" is where AMM design is clearly heading. The one-LP-only limitation is a visible open gap, though building on lending infrastructure is intermediate-to-advanced difficulty.\n\n---\n\n## 7. Doppler — fair token launches via built-in Dutch auction (Whetstone, 2024-25)\n\n**The problem.** New token launches get sniped: bots buy the first block, price pumps, retail buys the top, everyone gets dumped on.\n\n**The idea in one sentence.** A v4 hook that runs a *descending-price auction* for new tokens: the price starts high and drifts down until real buyers step in, making sniping pointless.\n\n**How it works, simply.** If the price starts artificially high and only moves down over time, there's no advantage to being the first bot in — buying instantly means overpaying. Buyers reveal genuine demand at their real price. The whole auction happens inside the hook; when it ends, the token graduates to a normal pool. ([Whitepaper](https://www.doppler.lol/whitepaper.pdf))\n\n**Status.** Live and successful — one of the few genuine v4 hook success stories, powering token launch platforms. Proof that the winning hook formula is \"hook as invisible engine behind a consumer product,\" not \"hook as standalone pool.\"\n\n**Takeaway for you.** Study it as the model for how hooks actually win adoption. The launch niche itself is now competitive (Doppler, Flaunch).\n\n---\n\n## 8. FM-AMM / CoW AMM — kill sandwiches with batch auctions (2023-24, relevant background)\n\n**The problem.** Anyone whose trade executes at a specific moment in a specific order can be sandwiched (see `learn/07`).\n\n**The idea in one sentence.** Collect all trades for a short interval, execute them together at ONE uniform clearing price — no ordering within the batch, nothing to sandwich.\n\n**How it works, simply.** If everyone in the batch gets the same price, being \"first\" means nothing, so front-running is structurally impossible rather than just harder. **Angstrom** (Sorella Labs, backed by $7.5M from Paradigm) shipped this as a Uniswap v4 hook in mid-2025: off-chain batch matching + encrypted orders + on-chain settlement at a uniform price, protecting both swappers and LPs ([launch coverage](https://crypto-economy.com/uniswap-presents-angstrom-new-dex-with-native-mev-protection-for-swappers-and-lps/)).\n\n**Takeaway for you.** This slot is taken by a well-funded team — don't compete head-on. But Angstrom validates that serious people believe hook-based MEV protection is a venture-scale business.\n\n---\n\n## 9. Flashblocks / Rollup-Boost — faster blocks quietly shrink LVR (Flashbots + Uniswap, 2025)\n\n**The problem.** LP losses to arbitrage (LVR) grow with the *time gap* between blocks: more time = bigger price moves = juicier arbitrage against stale AMM prices.\n\n**The idea in one sentence.** Cut block time to 200-250ms using secure hardware (TEEs), and enforce fair, provable transaction ordering while you're at it.\n\n**How it works, simply.** Research shows LVR scales with block time — roughly, 10x faster blocks ≈ ~3x less arbitrage loss. Unichain's Flashblocks deliver ~200ms effective confirmation with the ordering rules (highest priority fee first) enforced *inside tamper-proof hardware*, so contracts can finally trust the ordering ([blog.uniswap.org/flashblocks-are-live](https://blog.uniswap.org/flashblocks-are-live)).\n\n**Takeaway for you.** This is the *enabler* for idea #3 (MEV taxes). Infrastructure-level change → application-level opportunity that older hooks never had.\n\n---\n\n## 10. Honorable mentions (one line each)\n\n- **Fluid \"Smart Collateral / Smart Debt\"** — even your *debt* can be trading liquidity earning fees; the most capital-efficient DEX design live today ([Fluid docs](https://blog.instadapp.io/fluid-dex/)).\n- **Aggregator hooks (UNIfication)** — Uniswap plans to route through *external* liquidity sources via hooks and charge fees on it, turning v4 into an on-chain aggregator ([UNIfication](https://blog.uniswap.org/unification)).\n- **Hook data standards (Uniswap Foundation)** — early push to make hooks machine-readable for routers; directly related to Problem 2 in file 01 ([UF blog](https://www.uniswapfoundation.org/blog/developer-guide-establishing-hook-data-standards-for-uniswap-v4)).\n- **LVR paper (Milionis et al., 2022)** — the foundation under half this file; you already have it in `learn/08`.\n\n---\n\n## What all of this says, in one paragraph\n\nThe research frontier has moved past \"tweak the fee.\" The live ideas are **structural**: change *who gets to extract* (am-AMM, MEV taxes, PFDA), change *when trades settle* (batch auctions, Flashblocks), change *what the capital does while it waits* (EulerSwap, Fluid), and design *purpose-built curves for new asset types* (Orbital for stablecoins, pm-AMM for predictions, Doppler for launches). The pattern in every success story: the hook is an invisible engine inside a product people already want — never a standalone \"cool mechanism\" looking for users.\n"}, {"id": "research/03-defi-trends-2026.md", "file": "03-defi-trends-2026.md", "section": "Research — What To Build (2026)", "num": 4, "title": "What DeFi Actually Cares About in 2026 (Trends, Simply)", "md": "# What DeFi Actually Cares About in 2026 (Trends, Simply)\n\nThis file answers: **where is the attention, money, and growth in DeFi right now** — and what does each trend mean for someone building a Uniswap hook? Trends are ranked roughly by how real (money + users, not just hype) they are.\n\n---\n\n## 1. Stablecoins became the main product of crypto 🟢 (very real)\n\n**What's happening.** Stablecoins stopped being a \"tool for traders\" and became the industry's core product. The clearest proof: entire *blockchains* are being built just to move digital dollars — **Plasma** (Tether's chain, free USDT transfers), **Arc** (Circle's chain, mainnet expected 2026), and **Tempo** (Stripe + Paradigm, targeting 100,000 transactions/sec). These are backed by the biggest companies in the space ([Across: The Rise of Stablechains](https://across.to/blog/stablechains)).\n\n**Why it matters for you.** More stablecoins = more need to *swap between* stablecoins (USDC↔USDT↔PYUSD↔USDe…), cheaply and at massive scale. That's exactly what Paradigm's **Orbital** design targets (file 02, idea 1) — and it's still mostly unbuilt. Stablecoin-to-stablecoin is the least glamorous and most guaranteed-demand trading pair in existence.\n\n---\n\n## 2. Real-world assets (RWAs) & tokenized stocks 🟢 (very real, institution-driven)\n\n**What's happening.** 2026 is called the \"proof year\" for tokenization. Tokenized treasuries, credit, and now **stocks**: Kraken's xStocks, Robinhood's tokenized equities, and the **New York Stock Exchange building its own 24/7 tokenized trading venue** ([Bloomberg/CoinDesk, Jan 2026](https://www.coindesk.com/markets/2026/01/19/nyse-to-launch-24-7-blockchain-powered-tokenized-stock-and-etf-trading)). Institutions want in, but they need compliance (KYC-gated \"permissioned pools\" like Aave's Horizon) and they need market structure that handles assets whose \"real\" market closes at night and on weekends.\n\n**Why it matters for you.** Two hook-shaped gaps: (a) compliance gating — crowded, 60+ UHI hooks did KYC; (b) **market-hours microstructure** — circuit breakers, weekend fee curves, Monday reopening auctions — almost completely unbuilt (Problem 6 in file 01). The users here are companies with real budgets, not anonymous degens.\n\n---\n\n## 3. Prediction markets went mainstream 🟢 (very real, exploded fast)\n\n**What's happening.** From ~$1.2B/month (early 2025) to **$20B+/month (early 2026)**. Kalshi (regulated, US) actually *overtook* Polymarket. Both use order books; old AMM designs for predictions died because of liquidity problems. Kalshi has begun **tokenizing outcome shares on-chain** ([TRM Labs](https://www.trmlabs.com/resources/blog/how-prediction-markets-scaled-to-usd-21b-in-monthly-volume-in-2026)).\n\n**Why it matters for you.** Outcome tokens arriving on-chain will need permissionless liquidity, order books don't work for thousands of small markets, and the right math (pm-AMM) is already published but barely implemented (file 02, idea 5). Big trend + published solution + empty niche.\n\n---\n\n## 4. Perpetual futures are where the volume is 🟢 (real, but hostile territory)\n\n**What's happening.** Hyperliquid alone runs ~70% of on-chain perps, $180B+/month — more than everyone else combined. Several competitors (\"Aster\", \"Lighter\") are fighting for the rest. Spot DEXes — Uniswap's entire world — are the smaller pond now; Solana spot DEXes also flipped Ethereum's ($117B vs $52B in Jan 2026).\n\n**Why it matters for you.** Mostly as context: it explains Uniswap's urgency around Unichain, the fee switch, and hooks. Building perps yourself via hooks is a quant-heavy trap for a beginner (file 01, Problem 8). Skip, but understand it.\n\n---\n\n## 5. The \"real yield\" / fee switch era 🟡 (real, changes incentives)\n\n**What's happening.** Tokens must now *earn*. Uniswap's UNIfication (Dec 2025) turned on protocol fees and burned 100M UNI (~$596M) ([KuCoin explainer](https://www.kucoin.com/blog/en-uniswap-s-unification-upgrade-explained-how-the-596m-uni-burn-reshapes-token-value-in-2026)) — and UNI's price still fell with the market, showing burns alone don't save you. Hyperliquid's buyback model set the standard everyone copies.\n\n**Why it matters for you.** The protocol fee comes *out of LP income*. LPs are now the most squeezed and most underserved group — any hook that credibly improves LP take-home (MEV taxes, rent auctions, lending-integrated liquidity) is swimming with this current, not against it.\n\n---\n\n## 6. The trust reckoning: curator vaults blew up 🟡 (real, negative trend = opportunity)\n\n**What's happening.** The \"deposit and let a pro manage it\" model collapsed spectacularly: **Stream Finance** lost $93M via an opaque off-chain manager (Nov 2025), its stablecoin fell 77%, contagion hit Euler ($137M bad debt), Elixir, Morpho vaults; analysts flag ~$8B of similar risk ([Tiger Research](https://reports.tiger-research.com/p/collapse-of-the-defi-jenga-the-stream-eng)). Combined with the Bunni hack, 2025-26 taught DeFi users: *don't trust clever, don't trust humans, trust only what you can verify.*\n\n**Why it matters for you.** \"Boring but provably safe\" is now a feature people will choose over \"smart but opaque.\" A transparent, rules-only, invariant-checked LP vault hook (file 01, Problem 5) is directly aimed at this vacuum.\n\n---\n\n## 7. Privacy renaissance 🟡 (real momentum, harder to build on)\n\n**What's happening.** Zcash's shielded pool hit all-time highs, privacy coins outperformed the market, the Ethereum Foundation created a dedicated privacy unit, and the first US spot privacy-coin ETF was filed (Grayscale ZCSH, May 2026) ([Cointelegraph](https://cointelegraph.com/magazine/2026-pragmatic-privacy-crypto-canton-zcash-ethereum-foundation/)). The framing shifted from \"privacy = crime\" to \"privacy = normal financial hygiene,\" including for institutions.\n\n**Why it matters for you.** Your directory shows 24 privacy hooks (FHE/ZK encrypted orders, mostly Fhenix-based). The trend is real but building private *trading* requires heavy cryptography infrastructure — for a beginner it's better as an integration (use someone's FHE/ZK stack) than as your core innovation.\n\n---\n\n## 8. AI agents paying for things on-chain 🟠 (loud, promising, but shaky numbers)\n\n**What's happening.** Standards emerged for AI agents to pay per-use with stablecoins: Coinbase's **x402** (pay via HTTP request) and Google's **AP2** (60+ partners: PayPal, Mastercard, Amex). Solana reported 35M x402 transactions by March 2026. But honest caveat: x402 volume *collapsed ~77%* from its Nov 2025 hype peak before stabilizing ([MEXC](https://www.mexc.com/news/1115522)) — the infrastructure is real, the usage is still finding itself.\n\n**Why it matters for you.** Agents are a genuinely *new class of trader*: they need spending caps, guaranteed slippage bounds, and machine-readable pool behavior. An \"agent-safe execution\" hook is novel and demo-friendly — just know you're betting on a narrative that hasn't fully proven demand yet. Fun fact: this connects to Problem 2 (routing) — agents, like routers, need pools whose behavior is *predictable by machines*.\n\n---\n\n## 9. What's fading (know what NOT to build) 🔴\n\n- **Restaking / EigenLayer** — the star of 2024-25 UHI cohorts (111 integrations in your tracker!) fell to **0% of UHI8 submissions**. The narrative is over.\n- **Points / airdrop farming / gamification** — trading-rewards hooks fell from ~32% to 16% of submissions in UHI8; users are exhausted by points programs.\n- **\"Dynamic fees\" as the whole pitch** — 218 of 556 hooks. The most crowded, least differentiated idea in the entire ecosystem. Any new project needs a much sharper story than \"fees adjust with volatility.\"\n- **Memecoin launchpad froth** — launches still happen (Doppler, Flaunch are fine businesses) but the \"every week a new launchpad\" phase cooled.\n\n---\n\n## The cheat-sheet\n\n| Trend | How real? | Hook opportunity | Crowded? |\n|---|---|---|---|\n| Stablecoins & stablechains | 🟢🟢🟢 | Multi-stable pools (Orbital-style), depeg protection | Low |\n| RWA / tokenized stocks | 🟢🟢🟢 | Market-hours microstructure, reopening auctions | Very low |\n| Prediction markets | 🟢🟢 | pm-AMM hook for outcome tokens | Very low |\n| Perps | 🟢🟢🟢 | (avoid as a beginner) | Hostile |\n| Real yield / fee switch | 🟢🟢 | LP income recapture (MEV tax to LPs) | Low-medium |\n| Post-Stream trust crisis | 🟢🟢 | Provably-safe boring vaults, guard hooks | Low |\n| Privacy | 🟢 | Integrate others' ZK/FHE stacks | Medium |\n| AI agents / x402 | 🟠 | Agent-safe pools, machine-readable hooks | Low |\n| Restaking, points, dynamic fees | 🔴 | Don't | Extremely |\n\n---\n\n## Sources\n\n- [The Rise of Stablechains: Plasma, Arc, Tempo — Across](https://across.to/blog/stablechains) · [QuickNode on stablechains](https://blog.quicknode.com/stablechains-future-of-payments/)\n- [NYSE tokenized venue — CoinDesk](https://www.coindesk.com/markets/2026/01/19/nyse-to-launch-24-7-blockchain-powered-tokenized-stock-and-etf-trading) · [DWF Labs: 2026 RWA trends](https://www.dwf-labs.com/research/2026-rwa-tokenization-trends-the-path-toward-usable-market-infrastructure)\n- [Prediction markets to $21B/mo — TRM Labs](https://www.trmlabs.com/resources/blog/how-prediction-markets-scaled-to-usd-21b-in-monthly-volume-in-2026) · [Kalshi vs Polymarket volumes](https://news.bitcoin.com/prediction-market-traders-push-april-2026-volume-to-8-6b-kalshi-takes-the-lead/)\n- [Hyperliquid dominance — CoinDesk](https://www.coindesk.com/markets/2026/01/19/hyperliquid-extends-lead-in-perp-dex-race-as-rivals-volumes-fade)\n- [UNIfication burn explained — KuCoin](https://www.kucoin.com/blog/en-uniswap-s-unification-upgrade-explained-how-the-596m-uni-burn-reshapes-token-value-in-2026) · [UNI price reality check — Bitget](https://www.bitget.com/news/detail/12560605397905)\n- [Stream Finance retrospective — Tiger Research](https://reports.tiger-research.com/p/collapse-of-the-defi-jenga-the-stream-eng) · [$8B curator risk — PANews](https://www.panewslab.com/en/articles/25df9741-0cec-405a-9add-19e47c886faa)\n- [2026 pragmatic privacy — Cointelegraph](https://cointelegraph.com/magazine/2026-pragmatic-privacy-crypto-canton-zcash-ethereum-foundation/)\n- [x402 & agent payments in 2026 — VaaSBlock](https://www.vaasblock.com/news/crypto-ai-agents-onchain-x402-wallet-economy-2026/) · [x402 volume collapse — MEXC](https://www.mexc.com/news/1115522)\n"}, {"id": "research/04-hook-ideas-shortlist.md", "file": "04-hook-ideas-shortlist.md", "section": "Research — What To Build (2026)", "num": 5, "title": "The Shortlist: 8 Hook Ideas Worth Considering (Ranked)", "md": "# The Shortlist: 8 Hook Ideas Worth Considering (Ranked)\n\nThis turns the problems (file 01), the whitepapers (file 02), and the trends (file 03) into concrete project ideas. Each idea is scored honestly:\n\n- **Novelty** — how different is it from the 556 hooks already in your `hook-directory/`?\n- **User pull** — is there someone who clearly *wants* this today?\n- **Beginner-feasibility** — can you realistically build a credible version as your first serious hook?\n\nScores are ⭐ (weak) to ⭐⭐⭐ (strong). The top 3 are the ones I'd genuinely consider.\n\n---\n\n## 🥇 Idea 1: The \"Market Hours\" Hook — an AMM that knows when Wall Street is closed\n\n**One-liner.** A hook for tokenized stock pools that changes behavior based on whether the real market is open: normal trading during NYSE hours, wider fees + trade-size limits on nights/weekends, and a short **reopening auction** on Monday morning instead of letting the fastest bot eat the LPs.\n\n**Why now.** Tokenized stocks are arriving at full speed (xStocks, Robinhood, NYSE's own 24/7 venue), and the #1 unsolved structural issue is exactly this: when the reference market is closed, on-chain prices have no anchor, LPs carry all the risk, and Monday's open is a guaranteed arbitrage massacre. Regulators literally list \"no circuit breakers\" as a blocker.\n\n**Potential users.** Tokenized equity issuers (Backed, Ondo, Dinari, Securitize), RWA platforms, LPs in any stock/ETF pool. These are funded companies — the kind of \"user\" that can become a job, grant, or acquisition.\n\n**Why it's not in the 556.** Your RWA category (102 hooks) is compliance gating, not market microstructure. Nobody built the closing bell.\n\n**Build sketch (v1 can be small).**\n1. `beforeSwap`: check an on-chain market calendar (start with a simple owner-updated schedule; later, an oracle). \n2. Closed hours → apply a higher dynamic fee and per-block trade cap.\n3. First N minutes after open → collect swaps into a batch and clear them at one uniform price (or simplest v1: freeze swaps for 10 minutes while an auction determines the reopening price).\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐⭐⭐ · Feasibility ⭐⭐ (v1 with fee-widening + trade caps is very doable; the auction part can come later)\n\n---\n\n## 🥈 Idea 2: The MEV-Tax-for-LPs Hook (Unichain priority ordering)\n\n**One-liner.** On Unichain, read each swap's priority fee in `beforeSwap`; charge an extra fee proportional to it (arb bots pay high priority fees, normal users don't); donate the proceeds to the pool's LPs.\n\n**Why now.** This only became possible when Unichain shipped Flashblocks + provable priority ordering (2025). It's the freshest real mechanism in the ecosystem, the math is published (Paradigm's MEV taxes paper), and Uniswap's own version (PFDA) burns UNI instead of paying LPs — so \"the LP-first version\" is an obvious, ideologically popular counter-position. Post-fee-switch, LPs need every basis point.\n\n**Potential users.** Every LP on Unichain; pool deployers choosing between a plain pool and a \"+MEV rebate\" pool. Sponsor alignment is perfect: Unichain was UHI8's dominant track.\n\n**Why it's not in the 556.** Timing — most cohorts predate live Flashblocks. A few hooks gestured at \"MEV redistribution,\" but none could build on real provable priority ordering.\n\n**Build sketch.** Genuinely compact: `beforeSwap` → read `tx.gasprice - block.basefee` → compute `extraFee = k × priorityFee` → collect and donate to LPs via the PoolManager's donate mechanism. The subtlety is calibrating `k` and handling edge cases (contracts batching swaps, refund paths).\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐⭐ · Feasibility ⭐⭐⭐ (smallest core logic of any idea here)\n\n---\n\n## 🥉 Idea 3: The Guard Hook — a circuit breaker for other hooks\n\n**One-liner.** A wrapper that sits between the pool and any \"inner\" hook, enforcing hard safety invariants (balances never drop faster than X, withdrawals never exceed what the math allows, fees never exceed a cap) — if the inner hook misbehaves, the guard pauses the pool instead of letting it drain.\n\n**Why now.** Bunni died with $8.4M gone *despite audits from Trail of Bits and Cyfrin*. Stream Finance torched the \"trust the manager\" model. The entire hook ecosystem's growth is bottlenecked on one question — \"how can I trust a hook?\" — and no standard answer exists.\n\n**Potential users.** Hook developers (a \"wrapped in Guard\" badge helps them win users — they're your customer), LPs, frontends/aggregators deciding what's safe to route, insurance protocols pricing hook risk.\n\n**Why it's not in the 556.** The 63 \"security hooks\" defend against bad *tokens* (rugs, scams). Nobody built defenses against bad *hooks*. It's meta-infrastructure, and hackathons chronically underbuild infrastructure.\n\n**Build sketch.** A hook that composes another hook's address, forwards all callbacks, and after each one re-checks invariants (e.g., pool reserves vs. expected deltas; per-block outflow limit). v1 with 2-3 invariants + a pause switch is a complete story. Bonus: publish it as a base contract others inherit.\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐⭐ (developers, not end users — slower adoption but deeper moat) · Feasibility ⭐⭐\n\n---\n\n## Idea 4: pm-AMM Hook — liquidity for prediction market outcome tokens\n\n**One-liner.** Implement Paradigm's pm-AMM curve as a v4 hook: an AMM purpose-built for tokens whose price lives between $0 and $1 and expires at a known date, concentrating liquidity tighter as resolution approaches.\n\n**Why now.** Prediction markets went from $1.2B to $20B+/month; Kalshi is tokenizing outcomes on-chain; the math is published and almost nobody has shipped it. Long-tail markets can't support order books — AMMs are the only structure that works there.\n\n**Potential users.** Prediction platforms extending on-chain, passive LPs wanting outcome-token yield, long-tail market creators.\n\n**Why it's not in the 556.** Prediction markets are nearly absent from your directory — the trend exploded after most cohorts ended.\n\n**Watch out.** You need the custom-curve style of hook (override swap math, e.g. via `beforeSwap` return deltas / NoOp), which is more advanced than fee-tweaking. And testing needs simulated resolution scenarios.\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐⭐ · Feasibility ⭐ (hardest of the top group — real math implementation)\n\n---\n\n## Idea 5: The Boring Vault — provably-safe passive LP after Bunni & Stream\n\n**One-liner.** An auto-rebalancing LP vault hook with a deliberately dumb, fully on-chain strategy (recenter around price once per day, that's it), zero human keys, and invariant checks on every operation — marketed *on* its boringness.\n\n**Why now.** Demand for passive LP yield didn't die with Bunni and Stream — the *supply of trustworthy products* did. \"Nothing clever, everything verifiable\" is now a selling point.\n\n**Potential users.** Retail passive LPs, DAO treasuries (can't legally hand funds to anonymous curators), refugees from dead products.\n\n**Why it's cautioned.** The irony is brutal: a safety-first vault must itself be bulletproof, and vault accounting is exactly where Bunni died. As a beginner you'd be making a promise (\"cannot rug you\") that's hard to keep. Great second project after Idea 3 teaches you invariant thinking.\n\n**Scores.** Novelty ⭐⭐ · User pull ⭐⭐⭐ · Feasibility ⭐\n\n---\n\n## Idea 6: Orbital-Lite — a 3-stablecoin concentrated pool with depeg containment\n\n**One-liner.** A simplified version of Paradigm's Orbital: one pool for 3 stablecoins with liquidity concentrated near $1, designed so that if one coin depegs, the other two keep trading normally.\n\n**Why now.** Stablecoins are crypto's biggest product; stablechains (Plasma, Arc, Tempo) are launching; Paradigm published the math and openly invited builders; almost nobody has shipped it.\n\n**Potential users.** Stablecoin issuers seeking deep pools, payment apps, FX-style traders, and every yield strategy that rotates between stables.\n\n**Watch out.** This is the most mathematically demanding idea on the list (n-dimensional geometry → Solidity fixed-point code). Also v4's PoolManager is built around token *pairs* — a 3-asset pool needs creative architecture (e.g., hook-owned reserves with NoOp swaps). Choose this only if the math genuinely excites you.\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐⭐⭐ · Feasibility ⭐\n\n---\n\n## Idea 7: Agent-Safe Pools — execution rails for AI traders\n\n**One-liner.** A hook + small standard that makes a pool safe for AI agents: machine-readable behavior declaration, per-agent spending caps, hard slippage guarantees, and optionally x402-style pay-per-call access.\n\n**Why now.** AI agents are becoming a real trader class (x402, Google's AP2 with PayPal/Mastercard/Amex). Agents need what routers need: pools whose behavior is *predictable by machines* — which conveniently overlaps with Uniswap's own hook-data-standards push.\n\n**Potential users.** Agent framework developers, agent operators, and (indirectly) aggregators — anyone whose software signs transactions without a human watching.\n\n**Honest caveat.** The trend's usage numbers are still shaky (x402 volume fell ~77% from its hype peak before stabilizing). This is a bet on a narrative — great demo appeal, uncertain durable demand.\n\n**Scores.** Novelty ⭐⭐⭐ · User pull ⭐ (future users, few present ones) · Feasibility ⭐⭐\n\n---\n\n## Idea 8: Hook Manifest + Router Adapter — make hooked pools routable\n\n**One-liner.** A tiny on-chain standard where every hook declares \"here's exactly how I modify swaps\" in machine-readable form, plus a reference router that reads it — attacking the #1 reason hooked pools get no volume.\n\n**Why now.** It's the ecosystem's most load-bearing unsolved plumbing (file 01, Problem 2), and the Uniswap Foundation is actively funding this exact area (hook data standards, $10M grants round targeting protocol tooling).\n\n**Potential users.** Every hook developer, every aggregator, Uniswap Labs itself.\n\n**Honest caveat.** Standards win by adoption, not by code — a solo beginner is unlikely to get 1inch to integrate. Best pursued *through* the Foundation (grant application, collaboration with their standards effort) rather than as a lone hackathon project.\n\n**Scores.** Novelty ⭐⭐ (UF started already) · User pull ⭐⭐⭐ · Feasibility ⭐⭐ (code is easy; adoption is the hard part)\n\n---\n\n## How to choose (my honest take)\n\n- **Want the best story + biggest open field →** Idea 1 (Market Hours Hook). Real trend, funded users, nobody's built it, v1 is scoped small.\n- **Want the quickest path to a working, impressive demo →** Idea 2 (MEV Tax for LPs). Least code, newest mechanism, perfect sponsor alignment with Unichain.\n- **Want to build a reputation as \"the safety person\" →** Idea 3 (Guard Hook). The ecosystem's deepest wound (Bunni) with no bandage yet.\n- **Love math →** Idea 4 (pm-AMM) or Idea 6 (Orbital-Lite), accepting they're the hardest.\n- **A strong combo:** Ideas 1+2 share machinery (both are \"conditionally modify fees/behavior in `beforeSwap`\") — you could prototype both and keep whichever demos better.\n\nOne last pattern from everything researched: **every hook that succeeded (Doppler, Angstrom, EulerSwap, Flaunch) was an invisible engine inside a product someone already wanted** — a launchpad, MEV-free swaps, lending yield. None succeeded as \"a cool mechanism looking for users.\" Whatever you pick, name the user before you write the first line of Solidity.\n"}, {"id": "learn/01-what-is-an-amm.md", "file": "01-what-is-an-amm.md", "section": "Learn — The Basics", "num": 1, "title": "01 — What is an AMM", "md": "# 01 — What is an AMM\n\nGoal: understand, in one sitting, why decentralized exchanges don't use an order book, and what problem the \"constant product formula\" is actually solving. Everything in the Hookathon dataset (dynamic fees, MEV protection, LVR, all of it) is a modification bolted onto this one core idea — so if this doesn't click, nothing after it will either.\n\n## Start with the actual problem, not the formula\n\nOn a normal exchange (Binance, NYSE, whatever), when you want to buy something, the exchange matches you with someone who wants to sell it, at a price you both agree to. That's an **order book** — a big list of \"I'll sell at this price\" and \"I'll buy at this price,\" sorted, matched automatically.\n\nThis works great when there are lots of buyers and sellers constantly posting orders. It works terribly on a blockchain, because posting and canceling an order book entry costs gas (real money) every single time, and someone has to be running matching-engine software 24/7 that's fast enough to not get front-run. Nobody wants to be the market maker sitting there manually.\n\nSo Uniswap asked a different question: **what if there's no matching at all — what if you just trade against a pool of tokens, and a formula decides the price?**\n\n## The pool, and the formula\n\nPicture a box. Inside the box sits some amount of Token A and some amount of Token B — say, 10 ETH and 20,000 USDC. That's the entire \"market.\" No buyers, no sellers, no order book. Just this box, sitting there, and anyone can trade against it.\n\nNow: what price should the box charge you if you want to buy 1 ETH from it?\n\nUniswap's answer is the **constant product formula**:\n\n```\nx * y = k\n```\n\nWhere `x` is how much ETH is in the box, `y` is how much USDC is in the box, and `k` is a number that the box insists must never change, no matter what trade happens.\n\nSo if you put USDC into the box and take ETH out, the box will let you — but only exactly enough ETH so that `x * y` still equals the same `k` as before. Take out more ETH than that, and the box won't allow it, because `k` would drop.\n\nWalk through the actual numbers: 10 ETH * 20,000 USDC = 200,000 = `k`. You want to buy 1 ETH. The box now has 9 ETH left. For `k` to still be 200,000, `y` must become 200,000 / 9 = 22,222.22 USDC. So the box demands you deposit 2,222.22 USDC to get that 1 ETH out. Notice: that's a *worse* price per ETH (2,222 USDC) than the \"starting\" implied price (2,000 USDC per ETH). The box automatically charged you more because you're taking a meaningful chunk of its ETH.\n\nThat \"price gets worse the more you take\" behavior is called **slippage**, and it isn't a bug or a fee — it falls directly out of the formula. It's the formula's way of saying \"the more scarce something becomes in this box, the more expensive it gets to take more of it,\" which is a rough digital echo of real supply and demand, without anyone setting a price by hand.\n\n## Why \"constant\" product, specifically\n\nYou could imagine other rules — `x + y = k` (constant *sum*) would mean every trade happens at a perfectly flat 1:1 rate no matter how much you buy, with zero slippage. That sounds nicer, until you realize: it means the box will happily sell you *all* of its ETH for a fixed price, even down to zero ETH left, if you bring enough USDC. That box can be completely drained. (This constant-sum idea isn't useless, by the way — it's exactly what you want for two assets that truly should always be worth the same amount, like two stablecoins. More on that later.)\n\nThe constant-*product* curve, by contrast, is a curve that gets steeper and steeper as one side of the box gets thinner — mathematically, it can never fully run out of either token, because taking the last drop would require infinite payment. That self-protecting shape is the entire reason Uniswap chose it as the default: it can't be drained, no manual price-setting is required, and it works for any token pair on day one with zero configuration.\n\n## Where the \"market\" comes from at all\n\nHere's the part that trips people up: if the box just mechanically follows a formula, how does its price ever match the *real* price of ETH (what it's trading for on Binance, say)?\n\nAnswer: it doesn't, automatically — **arbitrageurs make it match**. If the box's formula says ETH is worth 2,100 USDC, but the real world says ETH is worth 2,000 USDC, then anyone can buy ETH for 2,000 USDC elsewhere and sell it into the box for 2,100 USDC, pocketing the 100 USDC difference — and doing that trade pushes the box's ratio back toward 2,000, because you're adding ETH and removing USDC from it. Bots do this within seconds, automatically, every time the box's implied price drifts from the outside world. That's the mechanism that keeps a completely dumb, formula-only box roughly honest.\n\nHold onto that last idea — it's the seed of almost every \"MEV\" and \"LVR\" problem you'll read about later in this directory. Arbitrage keeps the pool honest, but it does so *at the liquidity provider's expense* — every time an arbitrageur profits off the box, that profit came out of the box, which means it came out of whoever deposited tokens into it. That's article #2.\n\n## The one sentence to keep\n\n**An AMM is a box holding two tokens, governed by a formula that decides the exchange rate as a function of what's currently inside it — no order book, no market maker, and the \"market price\" only stays accurate because outside arbitrageurs are constantly nudging the box back into line, for a profit.**\n\nEverything else — concentrated liquidity, dynamic fees, hooks — is a modification to *how the box decides the rate*, or *what happens right before/after a trade touches the box*. The box itself, underneath it all, is still just holding two numbers and enforcing a formula.\n"}, {"id": "learn/02-liquidity-lp-tokens-impermanent-loss.md", "file": "02-liquidity-lp-tokens-impermanent-loss.md", "section": "Learn — The Basics", "num": 2, "title": "02 — Liquidity, LP Tokens, Fees & Impermanent Loss", "md": "# 02 — Liquidity, LP Tokens, Fees & Impermanent Loss\n\nGoal: understand what it actually feels like, financially, to be the person who fills the box from article 1. This is the article that explains why \"protect the LP\" is the single most repeated phrase in the entire hook directory.\n\n## Who fills the box, and why would they\n\nNobody trades against an empty box. Someone has to deposit the first ETH and the first USDC. That person (or,
