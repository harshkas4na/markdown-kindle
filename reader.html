in practice, thousands of different people over time) is a **Liquidity Provider (LP)**. They aren't trading — they're not trying to buy or sell ETH. They're providing the *inventory* that lets other people trade, and in exchange, the protocol pays them a cut of every trade that touches the box. On Uniswap that cut is the swap fee — historically a flat 0.30% of every trade, handed to the LPs in proportion to how much of the box they own.\n\nThink of it like being the person who owns the vending machine, not the person buying the snack. You don't care whether people buy Coke or Sprite today — you just want lots of purchases happening, because you get a slice of every purchase regardless of direction.\n\n## LP tokens: your receipt for \"I own X% of this box\"\n\nWhen you deposit into a pool, you don't get ETH-shaped or USDC-shaped tokens back — you get a completely different token, an **LP token**, which just represents \"I own this fraction of the box.\" If you deposited 10% of the box's total value, you get an LP token representing 10% ownership. As trading fees accumulate inside the box, the box grows, and your 10% is now worth more (in v2-style pools; v3/v4 track fees a bit differently, but the ownership-receipt idea is the same). When you're done, you burn your LP token and the contract hands you back your proportional share of *whatever is currently in the box* — which is the part that gets interesting.\n\n## Why \"whatever is currently in the box\" is the whole problem\n\nHere's the trap: you deposited 10 ETH and 20,000 USDC (50/50 in value, ETH at $2,000). Now imagine ETH's real-world price doubles to $4,000 while you're sitting in the pool, doing nothing.\n\nArbitrageurs (from article 1) will have already pushed the box's ratio to match — they buy the now-underpriced ETH out of the box until the box's implied price also says $4,000. Because the box always rebalances to keep `x * y = k` constant, and the price is now double, the math works out to the box holding *less ETH and more USDC* than it started with — roughly 7.07 ETH and 28,284 USDC in this example (still worth the same `k`, but a different mix).\n\nSo when you withdraw, you don't get your original 10 ETH + 20,000 USDC back. You get roughly 7.07 ETH + 28,284 USDC — total value about $56,568.\n\nNow compare: if you had just held the original 10 ETH + 20,000 USDC in your wallet and done absolutely nothing, that'd be worth 10 * $4,000 + $20,000 = $60,000.\n\nYou have less money than if you'd just held. That gap — $60,000 vs $56,568 — is called **impermanent loss (IL)**. It's called \"impermanent\" because if the price goes back down to where it started, the gap closes again (that's the \"rebalancing\" the arbitrageur did in reverse) — but if you withdraw while the price is still moved, the loss is very much permanent for you.\n\n**The vending machine analogy again**: imagine your vending machine automatically re-stocks itself by always selling off whichever snack becomes suddenly more popular, and buying more of whichever snack becomes unpopular. If Coke suddenly becomes twice as valuable on the outside market, your machine will have quietly sold off most of its Coke for Sprite by the time you check on it — even though you, the owner, never asked it to make that trade. You didn't choose to sell your Coke. The formula chose for you, automatically, because that's the only way it knows how to keep quoting a fair price to walk-up customers.\n\n## So why would anyone ever be an LP, then?\n\nBecause the fees you earn from all that trading volume can outweigh the impermanent loss — that's the entire bet an LP is making. If the pool sees enough trading volume, the 0.30% fee income adds up faster than the IL erodes your position. If the pool is quiet and the price is volatile, IL wins and you'd genuinely have been better off just holding the tokens.\n\nThis is the exact tension that almost every \"dynamic fee\" hook in the directory is trying to fix: **make the fee higher precisely when the price is moving a lot (when IL risk is highest), so LPs get compensated more exactly when they need it most, instead of a flat fee that doesn't know the difference between a calm day and a violent one.**\n\n## The one sentence to keep\n\n**Being an LP means constantly, automatically buying high and selling low relative to the outside market (because that's mechanically what keeping `x*y=k` requires as prices move), and you're betting that the fees you collect from traders outweigh that structural bleed — which is why almost every clever hook idea in this dataset is, underneath the branding, an attempt to tilt that bet back in the LP's favor.**\n"}, {"id": "learn/03-uniswap-v2-architecture.md", "file": "03-uniswap-v2-architecture.md", "section": "Learn — The Basics", "num": 3, "title": "03 — Uniswap v2 Architecture", "md": "# 03 — Uniswap v2 Architecture\n\nGoal: go from \"the box\" as a concept to the actual three-contract system Uniswap v2 shipped, so that when v3 and v4 change things, you know exactly what changed and why.\n\n## Three contracts, three jobs\n\nUniswap v2 is built from three kinds of smart contracts, each with one job:\n\n**1. The Pair contract — this is literally \"the box\" from article 1.** Every single token combination (ETH/USDC, DAI/USDC, whatever) gets its own, separate Pair contract deployed. Each Pair holds exactly two tokens, enforces `x*y=k`, mints/burns LP tokens, and takes the 0.30% fee. It has no idea any other pair exists. It's a dumb, self-contained box.\n\n**2. The Factory contract — the box-maker.** When someone wants to create a brand-new trading pair that doesn't exist yet (say, the first ever DOGE/SHIB pool), they call the Factory, which deploys a new Pair contract for that combination and keeps a registry — a lookup table — of \"which address is the DOGE/SHIB Pair contract.\" Think of the Factory as a landlord who builds a new vending machine on demand whenever someone asks for a snack combination that doesn't have one yet, and keeps the master list of \"machine #4 sells DOGE for SHIB, machine #7 sells ETH for USDC.\"\n\n**3. The Router contract — the front desk.** You, as a regular user, are not supposed to talk to a Pair contract directly — it's a low-level, minimal contract, and using it wrong can lose you money (e.g. it won't stop you from getting terrible slippage if you don't set limits yourself). The Router is a helper contract that does the safe, ergonomic version of \"swap my ETH for USDC\": it calculates the expected output, lets you set a minimum-acceptable-output as slippage protection, and — crucially — it can **chain multiple Pairs together**. If there's no direct DOGE/SHIB pool but there is a DOGE/ETH pool and an ETH/SHIB pool, the Router can silently route your trade through ETH as an intermediate hop, so it still looks to you like one simple swap.\n\n## Why this three-way split matters\n\nNotice what this buys Uniswap: the Pair contracts are as simple and minimal as possible (fewer lines of code = fewer bugs = safer to trust with your money), while all the user-friendly complexity (routing, slippage math, multi-hop paths) lives in the replaceable Router layer. If Uniswap wants to ship a smarter Router later with better routing logic, they can, *without touching a single already-deployed Pair contract holding real money.* Separation of \"the vault\" from \"the front desk\" is a recurring pattern you'll see reused, in spirit, all the way through v4's hook system.\n\n## A concrete walk-through\n\nSay you want to swap 1 ETH for USDC:\n\n1. You call the Router's `swapExactETHForTokens` function, specifying \"at least 1,950 USDC or revert the whole transaction\" (your slippage protection).\n2. The Router asks the Factory \"what's the address of the ETH/USDC Pair?\"\n3. The Router sends your ETH into that Pair contract.\n4. The Pair contract runs the `x*y=k` math, calculates your USDC output, and sends it back — not to the Router, but directly to your wallet.\n5. If the calculated output would have been less than 1,950 USDC, the entire transaction reverts (undoes itself) before any money moves, and you just lose a bit of gas, not your funds.\n\n## What v2 is missing (setting up v3 and v4)\n\nTwo real limitations of this design become the whole story of what comes next:\n\n- **Every Pair holds liquidity across the *entire* possible price range**, from 0 to infinity, even though realistically ETH/USDC is never going to trade near $0 or near $1,000,000. That means most of the capital sitting in the box is doing basically nothing, because trades only ever happen in a narrow price band anyway. This \"wasted capital\" problem is exactly what Uniswap v3's concentrated liquidity fixes (article 4).\n- **Every single Pair is a fully separate contract deployment.** A hundred different pools means a hundred different contract addresses, each with its own storage, each needing its own token transfers in and out for every trade — which is expensive in gas, and makes it structurally impossible to customize *how* an individual pool behaves beyond the one fixed formula every Pair shares. There's no way to say \"this one pool should have a custom fee rule\" — the code is identical for every pool. Fixing *that* limitation, years later, is the entire reason hooks (article 6) needed a rewritten core (article 5) to exist at all.\n\n## The one sentence to keep\n\n**Uniswap v2 is three contracts with clean separation of concerns — dumb, minimal Pair boxes holding the money; a Factory that deploys new boxes on demand; and a Router that gives users a friendly, safe, multi-hop interface — and its two big blind spots (capital spread across the whole price range, and identical unchangeable logic in every pool) are precisely the two problems v3 and v4 were each built, respectively, to solve.**\n"}, {"id": "learn/04-uniswap-v3-concentrated-liquidity.md", "file": "04-uniswap-v3-concentrated-liquidity.md", "section": "Learn — The Basics", "num": 4, "title": "04 — Uniswap v3: Concentrated Liquidity & Ticks", "md": "# 04 — Uniswap v3: Concentrated Liquidity & Ticks\n\nGoal: understand exactly what \"concentrated liquidity\" means, what a \"tick\" physically is, and why this upgrade is what made LPing feel like active portfolio management instead of \"deposit and forget.\"\n\n## The wasted-capital problem, made concrete\n\nRecall from article 3: a v2 Pair spreads your liquidity across the *entire* price curve, from 0 to infinity. But ETH/USDC has, in practice, traded somewhere between roughly $1,500 and $4,000 for most of the last couple of years. If your money is mathematically \"available\" to trade at $0.01 or $10,000,000 per ETH, but the price will realistically never go there, that portion of your capital is just sitting completely idle, earning zero fees, forever.\n\n**Analogy: imagine a toll booth operator who's required, by law, to also staff toll booths on every road in the country, including ones nobody has ever driven on.** Most of their staff sit in empty booths all day. Concentrated liquidity is the toll company realizing: \"let me only staff the three booths that actually see traffic, and put my best people there\" — same total staff (capital), way more toll collected per person, because it's all concentrated where the actual demand is.\n\n## What \"concentrated liquidity\" actually means\n\nIn v3, an LP doesn't just deposit into \"the ETH/USDC pool\" anymore — they choose a **price range**: \"I want my capital to be active only between $1,800 and $2,200 per ETH.\" Within that chosen range, their capital behaves like a much smaller, much deeper v2-style pool — meaning it earns a disproportionately larger share of the fees generated while the price is inside that band, because it's not diluted across the whole 0-to-infinity curve.\n\nThe tradeoff: the moment the real price of ETH moves outside your chosen range (say it drops to $1,700), your position stops earning any fees at all — it goes fully \"out of range,\" sitting idle, until either the price comes back in, or you manually withdraw and pick a new range. This exact \"out of range = idle\" state is the specific pain point behind most of the `liquidity-management-incentives.md` category in the hook directory — hooks that auto-rebalance your range, or auto-deploy your idle capital elsewhere while you're out of range, are directly patching this v3-introduced problem.\n\n## Ticks: the actual unit of price\n\nUniswap v3 doesn't let you pick literally any price as a range boundary — prices are quantized into discrete steps called **ticks**. Each tick represents a 0.01% (1 basis point) price change from the previous tick. So instead of a smooth, continuous price line, v3 works on a very fine-grained staircase of possible prices, and every LP position's range boundaries must land on a tick.\n\n**Analogy: think of ticks like the marks on a ruler.** You could, in theory, want to measure something at 4.5cm, but if your ruler only has marks every 0.01mm, you're still functionally continuous for any real-world purpose — the granularity is fine enough that it feels smooth, but under the hood it's actually a huge, finite list of discrete positions, not truly continuous. This matters practically because it's *why* the contract can track \"how much liquidity is active at this exact price\" efficiently — it just needs to track how much liquidity crosses in and out at each tick boundary, rather than doing continuous calculus.\n\nWhy quantize at all instead of using real numbers? Efficiency and predictability: fixed-point discrete math is cheaper and safer to run on a blockchain (where every computation costs real gas) than continuous floating-point-style math, and having a finite, well-defined set of boundaries makes it possible to efficiently track exactly how much liquidity is active at the current price without scanning every LP position in existence on every single trade.\n\n## What this buys you, and what it costs you\n\n**Capital efficiency**: the headline win. The same dollar amount of liquidity, concentrated in the range where trading actually happens, can provide vastly deeper liquidity (less slippage for traders) than the same dollar amount spread thin across all possible prices.\n\n**Active management burden**: the cost. In v2, you deposit once and you're done — impermanent loss still applies, but there's no \"range\" to babysit. In v3, choosing too narrow a range means you earn great fees while in-range but go idle constantly as price moves; choosing too wide a range gives you back something closer to v2's \"always active but diluted\" behavior. There's no free lunch — narrower ranges mean higher potential fee income *and* higher chance of going out-of-range and needing attention.\n\nThis exact tension — \"I want v3's capital efficiency but I don't want to babysit my range all day\" — is the single most common product idea in the entire hook directory: an \"auto-rebalancing\" or \"auto-compounding\" hook is, at its core, a piece of code that watches the price and moves your range for you, so a human doesn't have to.\n\n## The one sentence to keep\n\n**Concentrated liquidity lets an LP choose a price range to focus their capital on (measured in discrete steps called ticks) instead of spreading it across every possible price, which multiplies fee income while active — but turns LPing from a \"set and forget\" activity into something that needs active range management the instant the market moves, which is exactly the gap dozens of hooks in this directory are trying to automate away.**\n"}, {"id": "learn/05-uniswap-v4-singleton-flash-accounting.md", "file": "05-uniswap-v4-singleton-flash-accounting.md", "section": "Learn — The Basics", "num": 5, "title": "05 — Uniswap v4: The Singleton + Flash Accounting Rewrite", "md": "# 05 — Uniswap v4: The Singleton + Flash Accounting Rewrite\n\nGoal: understand the plumbing change v4 made *before* it added hooks — because hooks only became cheap and practical to use once this rewrite happened. This is the \"why did they even need a new version\" article.\n\n## Recall the v2/v3 problem: every pool is its own contract\n\nFrom article 3: in v2 (and v3 kept this pattern), every single trading pair — ETH/USDC, DAI/USDC, a hundred others — is deployed as its own, entirely separate smart contract. Separate contract means separate storage on the blockchain, and critically, it means every trade that touches that pool has to physically **transfer tokens in and out of that specific contract's balance.**\n\n**Analogy: imagine a mall where every single store is its own separate building, on its own separate plot of land, each with its own loading dock.** If you want to buy a shirt from Store A and then walk next door to buy shoes from Store B, in a normal mall you'd just walk between them. But in this weird version of the mall, every purchase requires a truck to drive your money from your house, into Store A's private loading dock, do the transaction, then a *separate* truck trip carries your remaining money to Store B's separate loading dock. Every hop between stores costs you a full truck trip (gas), even though logically you're just \"shopping in the mall.\"\n\nThat's what a multi-hop trade across several v2/v3 pools actually costs: real token transfers, in and out, at every single pool along the route, each one its own gas-costing operation.\n\n## The v4 fix: one giant contract for every pool (the \"Singleton\")\n\nUniswap v4 throws out \"one contract per pool\" entirely. Instead, there is **one single contract — called the PoolManager — that holds every single pool's liquidity inside it**, tracked as internal accounting entries (just numbers in a ledger), not as separate token balances scattered across a hundred different contract addresses.\n\n**Same mall analogy, fixed**: now imagine the mall is one single building. Store A and Store B are just different counters inside the same building, sharing one back-office ledger. When you buy a shirt then shoes, the mall's internal ledger just updates two line items — \"customer owes $20 less, has 1 shirt and 1 pair of shoes\" — no trucks required until you actually leave the building at the very end, at which point one single settlement happens.\n\nThis is the **singleton pattern**: one contract, tracking every pool's state as internal bookkeeping, instead of many separate contracts each managing their own physical token balances.\n\n## Flash accounting: why this saves so much gas\n\nBecause everything lives in one ledger, v4 can do something v2/v3 architecturally couldn't: let an entire multi-step trade happen as pure internal number-updates, and only move actual tokens once, right at the very end, to settle the net difference. This is called **flash accounting** (sometimes described via v4's internal concept of a running balance called a \"delta\").\n\nConcretely: if your trade route touches five different pools inside the PoolManager, v4 doesn't transfer tokens after each of the five hops — it just updates five internal ledger entries, then checks at the very end that everything nets out to zero (you can't walk away owing the contract money, or the transaction reverts), and only then does the *one* real token transfer that settles your final net position. Fewer real token transfers = dramatically less gas for anything that touches multiple pools, which turns out to be almost everything, once hooks are involved.\n\n## Why hooks specifically needed this rewrite\n\nHere's the connection that makes this article matter for the rest of the directory: a hook is code that runs *in addition to* a normal swap — checking a condition, updating some tracking variable, maybe even doing its own mini-trade before or after yours. Under the old \"every pool is a separate contract with real token transfers\" model, every one of those extra hook operations would mean *more real token transfers*, and gas costs would explode combinatorially with every hook you stacked on. Under the singleton + flash accounting model, a hook's extra logic can just add a few more lines to the same internal ledger and let it all net out in one final settlement — making hooks *actually affordable* to use in practice, not just theoretically possible.\n\n## The one sentence to keep\n\n**Uniswap v4 replaced \"one contract per pool, with real token transfers at every hop\" with \"one giant contract holding every pool as internal ledger entries, settling real tokens only once at the very end\" — and this single architectural change (not the hooks themselves) is what made it cheap enough to let arbitrary custom code run on every single swap, which is the precondition the entire hook ecosystem in this directory depends on.**\n"}, {"id": "learn/06-the-hook-system.md", "file": "06-the-hook-system.md", "section": "Learn — The Basics", "num": 6, "title": "06 — The Hook System Itself", "md": "# 06 — The Hook System Itself\n\nGoal: this is the article. Everything before this was scaffolding so this would actually make sense. By the end, you should understand exactly what a \"hook\" is as a piece of code, when it runs, how the pool knows to call it, and why hook contract *addresses* are weirdly meaningful.\n\n## What a hook actually is, mechanically\n\nA hook is just a normal smart contract — nothing magic about its type. What makes it \"a hook\" is that when a pool is created, you tell the PoolManager (from article 5) \"this pool has a hook, and its address is 0x1234...\". From then on, at specific defined moments during that pool's lifecycle, the PoolManager will pause what it's doing and call a specific function on your hook contract, wait for it to finish (and let it optionally change what happens next), then continue.\n\n**Analogy: think of a hook like a security checkpoint at specific doorways in a building, not a guard who watches everything all the time.** The building (PoolManager) has predefined doorways — \"someone is about to enter the swap room,\" \"someone just left the swap room,\" \"someone is about to add liquidity,\" etc. At each doorway, if you've registered a checkpoint (hook) for that specific doorway, the person gets stopped there, the checkpoint's logic runs (check ID, log something, maybe deny entry), and only then are they let through to continue.\n\n## The actual callback points\n\nUniswap v4 defines a fixed list of moments a hook can attach to. The main ones you'll see over and over in the directory:\n\n- `beforeInitialize` / `afterInitialize` — runs when a brand-new pool is being created, before/after its starting price is set. Useful for things like enforcing \"this pool may only be created with these specific parameters.\"\n- `beforeAddLiquidity` / `afterAddLiquidity` — runs when an LP deposits. Useful for things like KYC-gating who's allowed to become an LP, or tracking custom reward-eligibility data.\n- `beforeRemoveLiquidity` / `afterRemoveLiquidity` — runs when an LP withdraws. Useful for exit fees, or triggering a rebalance.\n- `beforeSwap` / `afterSwap` — by far the most used pair in the entire directory. `beforeSwap` runs right before a trade executes — this is where dynamic-fee hooks calculate and apply a custom fee, where compliance hooks block disallowed wallets, where anti-sandwich hooks inspect the transaction. `afterSwap` runs right after — this is where hooks update volatility trackers, distribute reward points, or trigger a rebalance now that the price has moved.\n- `beforeDonate` / `afterDonate` — runs around \"donate\" operations (directly gifting fees into a pool without swapping), a less common but real callback used by a handful of reward/insurance-style hooks.\n\nEvery single hook in the entire 556-project directory is built from some combination of these callback points — there is no other place custom logic can attach.\n\n## The genuinely clever part: permission flags baked into the address\n\nHere's the detail that surprises most people the first time they hear it: **a hook contract's own address encodes which callbacks it's allowed to use.**\n\nSpecifically, the *last few bits* of the hook's deployed address are read by the PoolManager as a set of yes/no flags — \"does this hook implement beforeSwap? afterSwap? beforeAddLiquidity?\" — one flag per callback type. Before a pool will even accept a hook, the PoolManager checks the hook's own address for these flag bits and only calls the callbacks that are flagged \"on.\"\n\nWhy do it this way, instead of just asking the hook contract \"which functions do you support\" at call time? Gas efficiency and safety: checking a few bits of an address you already have is essentially free, versus making an extra external call to ask \"do you support X?\" before every single swap, forever. Baking the permissions into the address means the PoolManager can decide, extremely cheaply, exactly which of the (up to) 10-ish possible callbacks it needs to bother calling for this specific pool, and skip the rest entirely.\n\n**Analogy: imagine everyone's ID badge color itself told the security system which doors they're allowed through, instead of the security system having to look each person up in a database every single time they approach a door.** Blue badge = swap-room doors only. The color is baked into the badge itself; there's no lookup, no waiting, no separate check — glance at the badge, know instantly what's permitted.\n\n## Why hook addresses have to be \"mined\"\n\nFollowing directly from the above: a hook developer doesn't get to just deploy their contract anywhere and have the right permission bits show up by luck — they need a deployed address whose specific trailing bits happen to match the exact set of callbacks their hook needs. Since you can't choose an Ethereum address directly (it's derived from deployment parameters like a nonce or salt), hook developers commonly use a **CREATE2 deployment** with a \"salt\" value they can freely choose, and then brute-force search — trying thousands or millions of possible salts — until they find one that produces a deployed address with exactly the right trailing bits set. This process is casually called **\"address mining,\"** and it's a genuinely distinctive, slightly weird piece of v4-hook-specific tooling you'll see referenced in some of the more technical project write-ups.\n\n## Putting it together: a minimal example\n\nSay you're building the simplest possible dynamic-fee hook. You'd: (1) write a hook contract that implements `beforeSwap`, containing logic like \"look at recent price volatility, compute a fee percentage, override the pool's fee for this trade\"; (2) mine a deployment address whose trailing bits flag \"beforeSwap: yes\" and everything else \"no\"; (3) deploy the pool itself via the PoolManager, pointing it at your hook's address. From that point on, every single swap against that pool automatically pauses right before executing, calls your `beforeSwap` function, applies whatever fee it decides, and only then continues with the trade — with zero further action needed from you, forever, for every future trade.\n\n## The one sentence to keep\n\n**A hook is a plain smart contract that the PoolManager calls at specific, fixed lifecycle moments (mainly before/after a swap or a liquidity change), which callbacks it's allowed to use are encoded directly into its own contract address as permission flags (requiring developers to \"mine\" an address with the right bits), and this is the entire mechanism — every single project in this 556-entry directory is just a different combination of \"what logic do I put inside beforeSwap/afterSwap.\"**\n"}, {"id": "learn/07-mev-sandwich-attacks.md", "file": "07-mev-sandwich-attacks.md", "section": "Learn — The Basics", "num": 7, "title": "07 — MEV & Sandwich Attacks", "md": "# 07 — MEV & Sandwich Attacks\n\nGoal: understand exactly, mechanically, how a sandwich attack works — not just \"bots are bad\" — because half the hooks in the MEV category are built to break one specific step in this sequence.\n\n## Where a transaction lives before it's confirmed\n\nWhen you submit a transaction (say, \"swap 1 ETH for USDC\"), it doesn't instantly happen. It first sits in a public waiting area called the **mempool** (\"memory pool\") — a holding area of pending transactions that every node on the network can see, waiting for a block producer to pick them up and include them in the next block.\n\n**Analogy: the mempool is like a glass box sitting in the middle of a room where everyone has dropped their sealed envelopes containing \"I want to make this trade,\" except the box is made of glass — anyone can read what's inside every envelope before it's opened.** Your trade intent is completely public for the (typically) 12-ish seconds before it's actually confirmed.\n\n## The sandwich, step by step\n\nSay the ETH/USDC pool currently sits at a price of $2,000/ETH. You submit a transaction to buy 5 ETH — a big enough trade that, per article 1's slippage logic, it'll noticeably move the pool's price upward as it executes (since you're pulling meaningful ETH out of the box).\n\nA bot watching the mempool sees your pending transaction before it's confirmed and does exactly three things, packaged so they all land in the same block, in this exact order:\n\n1. **Front-run**: the bot submits its own \"buy ETH\" transaction, paying a higher priority fee so it gets included *right before* yours in the same block. This buys ETH at the current $2,000 price, and — because it's also a real trade against the box — it pushes the price up a bit, say to $2,010.\n2. **Your trade executes**: your original \"buy 5 ETH\" transaction now executes against this bot-inflated price, pushing the price up further still, to maybe $2,050. You get a noticeably worse average price than you would have gotten if the bot hadn't traded first.\n3. **Back-run**: the bot immediately submits a \"sell ETH\" transaction, right after yours, which sells the ETH it just bought at $2,000 back into the now-inflated $2,050 pool — pocketing the difference as pure, essentially risk-free profit.\n\nYou are the \"meat\" and the bot's two trades are the \"bread\" — hence **sandwich attack**. You never see the bot. You just notice your trade executed at a worse price than the quote you were shown before submitting it, and you have no direct way of knowing whether that was normal slippage or a bot deliberately engineered it.\n\n## Why this is even possible — the two enabling conditions\n\nThis attack only works because of two structural facts, both worth naming explicitly since different hooks attack different links in this chain:\n\n1. **Transactions are visible before they're confirmed** (the mempool problem). If your trade's existence and direction were hidden until it was already final, a bot couldn't front-run something it can't see. This is exactly the gap that FHE- and ZK-based \"private trading\" hooks (see article 12) are aimed at closing.\n2. **Block producers/validators choose transaction ordering, and can be paid to prioritize certain transactions.** MEV — Maximal Extractable Value — is the general name for any profit a block producer (or someone paying them) can extract purely from *choosing what order transactions execute in*, beyond normal fees. Sandwich attacks are the most famous specific example, but MEV is a broader category (it also covers things like liquidation-sniping in lending protocols, and the arbitrage described in article 1 — which, notably, is a *benign* form of MEV that keeps prices honest, versus a sandwich attack, which is purely extractive and adds nothing useful).\n\n## How hooks try to fight back\n\nSince a `beforeSwap` hook (article 6) can inspect the incoming trade before it executes, several strategies show up repeatedly in the directory:\n\n- **Detect abnormally high priority fees** as a signal that a transaction is probably a bot racing to be first, and charge it a higher fee specifically (punishing the exact behavior that makes sandwiching profitable).\n- **Dynamic fees that widen during high-volatility windows** — since a wider effective spread makes the \"buy low inside the sandwich, sell high right after\" profit margin thinner or negative.\n- **Batch/match trades before they ever touch the pool** (the CoW — Coincidence of Wants — approach) so opposing trades cancel out privately instead of both hitting the public pool where they'd be sandwichable.\n- **Encrypt the trade's contents until after commitment** (FHE-based hooks) so there's simply nothing for a bot to read and act on in the mempool.\n\nNone of these fully \"solve\" MEV — it's a much-studied, unsolved-in-general problem across all of Ethereum, not just Uniswap — but each approach closes off a different specific step in the three-step sequence above.\n\n## The one sentence to keep\n\n**A sandwich attack works because your pending trade is publicly visible before it's confirmed and block ordering can be paid for, letting a bot buy right before you (pushing the price against you), let your trade execute at the worse price, then sell right after for a guaranteed profit — and every \"MEV protection\" hook in this directory is really just trying to break one specific link in that three-step chain: visibility, ordering, or the profitability of racing you.**\n"}, {"id": "learn/08-lvr-loss-versus-rebalancing.md", "file": "08-lvr-loss-versus-rebalancing.md", "section": "Learn — The Basics", "num": 8, "title": "08 — LVR (Loss-Versus-Rebalancing)", "md": "# 08 — LVR (Loss-Versus-Rebalancing)\n\nGoal: separate this cleanly from a sandwich attack (article 7) — LVR is a different, subtler, *structural* loss that happens even when there's no bot specifically targeting you, no malicious actor, nothing \"wrong\" happening at all. This is the one that has an actual named academic paper behind it, and it's worth being precise about.\n\n## Start from what you already know: arbitrage keeps the box honest\n\nRecall article 1: when the outside \"real\" price of ETH moves, arbitrageurs trade against the pool until the pool's implied price matches the outside price again. This is good — without it, the pool's price would just be wrong, permanently, and nobody could trust it.\n\nBut recall article 2: every one of those arbitrage trades is *profitable for the arbitrageur and a loss for the LP*, because the arbitrageur is, by construction, buying the pool's now-underpriced asset and selling the pool's now-overpriced asset — trading against the pool at a price that's stale relative to the new reality, and pocketing the gap.\n\n**LVR is the name for this specific, structural, unavoidable-by-default loss: the value that leaks from LPs to arbitrageurs, purely because the pool's price always updates a little bit *after* the real world's price already moved, and someone gets to trade in that gap before the LP's price catches up.**\n\n## Why this isn't the same thing as a sandwich attack\n\nA sandwich attack (article 7) requires your specific pending trade to exist and be visible, and a bot deliberately targeting it. LVR requires none of that — it happens purely from the passage of time and price movement in the outside world, even if literally nobody trades against the pool except the one arbitrageur closing the gap. You could be an LP who never trades, whose pool sees only arbitrage flow and zero organic user trades, and you would still bleed LVR every time the external price moves, because the arbitrageur is *always* first-to-react by definition — that's the entire economic function they're performing.\n\n**Analogy: imagine a currency-exchange kiosk at an airport that only updates its posted exchange rate once every hour, but the real global exchange rate is moving continuously.** In the 59 minutes between updates, anyone who happens to know the current real rate can walk up and trade against the kiosk's stale rate for a guaranteed profit — buying whichever currency the kiosk is currently under-pricing. The kiosk owner isn't being \"attacked\" by any one specific bad actor; they're just structurally always one step behind reality, and *someone* will always be there to collect that gap the instant it opens.\n\n## The formal version (Milionis, Moallemi, Roughgarden, Zhang, 2022)\n\nThis intuition was formalized into an actual academic paper — \"Automated Market Making and Loss-Versus-Rebalancing\" — which proved, mathematically, that an LP in a constant-product pool earns strictly less than they would have earned from simply holding a \"rebalancing portfolio\" that tracks the same 50/50 value split without ever touching an AMM. The gap between \"what the LP actually earned\" and \"what a hypothetical frictionless rebalancing strategy would have earned\" is LVR, and the paper showed the gap grows larger the more volatile the asset is — which is exactly why every dynamic-fee hook wants to charge *more* fee precisely when volatility is high: to try to make the fee income outrun the LVR bleed.\n\n## LVR vs. impermanent loss — aren't these the same thing?\n\nClosely related, easy to conflate, worth being precise about the difference: **impermanent loss (article 2)** is the simple, static comparison — \"what I'd have if I held my tokens\" vs. \"what I actually have in the pool right now,\" at any single point in time. **LVR** is a more refined, continuous-time framing that specifically isolates the piece of that loss caused by arbitrageurs reacting *faster* than the pool's own pricing can update — it's the \"rate at which value leaks to arbitrage\" rather than just the total loss snapshot. In practice, most people (including most hook project descriptions in this directory) use the two terms fairly loosely and interchangeably, but if you want to sound precise: IL is the symptom you can observe at withdrawal time, LVR is the mechanism/rate that causes it.\n\n## How the directory's hooks try to address it\n\nThe two dominant strategies you'll see, both already previewed in earlier articles:\n\n1. **Directional dynamic fees (Nezlobin-style)** — charge a higher fee specifically on trades that push the pool price *away* from a reference/oracle price (i.e., likely arbitrage trades), and a lower fee on trades that push it back toward the reference price (likely benign trades). This directly taxes the exact behavior that causes LVR, without needing to know in advance who's an arbitrageur and who isn't.\n2. **Auction-managed AMMs (am-AMM)** — instead of trying to detect and tax arbitrage trade-by-trade, auction off the *right* to be the one who arbitrages the pool for a fixed time window to a single \"manager,\" who pays rent for that privilege, and that rent gets distributed back to LPs. This effectively converts LVR from \"leaked to anonymous bots for free\" into \"sold to the highest bidder, with the proceeds returned to the people who were losing money in the first place.\"\n\n## The one sentence to keep\n\n**LVR is the structural, unavoidable-by-default value that leaks from LPs to arbitrageurs purely because a pool's price always updates slightly after the real world's price already moved — distinct from a sandwich attack because it requires no malicious targeting and would exist even with zero organic trading, and it's the specific, formally-proven loss that directional dynamic fees and auction-managed AMMs are both explicitly engineered to claw back for LPs.**\n"}, {"id": "learn/09-oracles-and-twap.md", "file": "09-oracles-and-twap.md", "section": "Learn — The Basics", "num": 9, "title": "09 — Oracles & TWAP", "md": "# 09 — Oracles & TWAP\n\nGoal: understand why \"just read the pool's current price\" is a trap, and what the two real fixes (time-averaging, and external oracles) actually do differently.\n\n## Why a smart contract can't just \"know\" a price\n\nA smart contract only knows what's inside the blockchain it lives on — it has no built-in ability to reach out to the internet and check Binance's ETH price. If a hook (or any DeFi contract) needs to know \"what is ETH actually worth right now,\" that information has to be brought on-chain by *something* — and the question of \"what is that something, and can it be trusted or manipulated\" is the entire oracle problem.\n\n## The naive, dangerous answer: just read the pool's current spot price\n\nThe simplest possible option is: look at the ratio of tokens currently sitting in the AMM pool itself (article 1's `x` and `y`), and treat that as \"the price.\" The problem: **this price can be manipulated within a single transaction, cheaply, using a flash loan.**\n\nHere's how that attack works: a flash loan lets you borrow an enormous amount of money with zero collateral, *as long as you pay it back within the same transaction*. An attacker can (1) flash-borrow a huge amount of USDC, (2) dump it all into a thin ETH/USDC pool in one trade, wildly distorting the pool's implied price for that single transaction, (3) trigger some *other* contract that naively reads this pool's current spot price as ground truth (e.g. a lending protocol deciding \"is this loan under-collateralized?\"), tricking it into a bad decision, (4) profit from that bad decision, and (5) pay back the flash loan — all inside one atomic transaction, leaving the pool's price back to normal a block later as if nothing happened, but with the attacker walking away with stolen funds.\n\n**Analogy: imagine a judge who determines the \"official\" price of a house purely by looking out the window at the very last house sale on the street — even if that sale happened five seconds ago and involved someone secretly overpaying on purpose, one time, specifically because they knew the judge was watching.** A single, recent, easily-staged data point is a terrible source of truth precisely because it's *cheap to fake, temporarily, on purpose.*\n\n## Fix #1: TWAP — Time-Weighted Average Price\n\nInstead of trusting the instantaneous, right-now price, a **TWAP** averages the pool's price *over a window of time* — say, the last 30 minutes. Uniswap v2 and v3 both maintain this kind of running average internally, as a built-in feature, specifically so other contracts can query \"give me the average price over the last N minutes\" instead of the manipulable spot price.\n\nWhy this defeats the flash-loan attack: a flash loan only lasts one transaction, one block. To meaningfully move a 30-minute average, an attacker would need to sustain a distorted price across many blocks — which costs real, ongoing capital at risk over that whole window (other arbitrageurs would also be trading against the distorted price the whole time, fighting the manipulation), rather than a free, single-block, no-risk trick. It doesn't make manipulation *impossible*, but it makes it expensive and risky enough that it's no longer a free lunch.\n\n**Same house-price analogy, fixed**: instead of trusting the single most recent sale, the judge now averages every sale on the street over the last month. Someone could still try to fake a high average by making several overpriced purchases over that whole month — but now it costs them real money for a sustained period, with real risk that someone else undercuts them along the way, instead of one clever five-second trick.\n\n## Fix #2: External oracles (Chainlink, Pyth)\n\nTWAP is good, but it's still only ever *this specific pool's* history — a thinly-traded pool's TWAP can still be nudged more easily than a deeply liquid one. The other major approach is to not rely on any single on-chain pool at all, and instead use a dedicated **oracle network** — a separate system whose entire job is to pull price data from many real-world exchanges, aggregate it, and publish a trusted value on-chain for other contracts to read.\n\n**Chainlink** is the most widely used example: an independent network of node operators, each fetching price data from multiple centralized and decentralized exchanges, whose individual reports get aggregated (typically via a median, to resist any single bad-actor node) into one published on-chain price, updated on a regular cadence or when the price moves past a threshold. **Pyth Network** is a newer, increasingly popular alternative with a different data-sourcing model (pulling directly from trading firms and exchanges as \"first-party\" data publishers) and generally faster/more frequent updates.\n\nThe tradeoff versus TWAP: external oracles add a dependency on a system outside the pool itself — you now have to trust that oracle network's own security model (how many node operators, how are they incentivized, can they be bribed or go offline), rather than trusting only the economics of the pool you're already using.\n\n## Why this shows up so often in the hook directory\n\nAny hook whose logic depends on knowing \"the real price\" for anything beyond the pool's own trade math — depeg detection for stablecoins, pricing an option, deciding whether a trade is \"informed\" (moving toward the real price) or \"arbitrage-y\" (moving away from it, per article 8's directional fees) — needs a reliable price source that isn't just the pool's own easily-nudged spot price. That's why Oracle appears as a tag on 75 different hooks across nearly every other category — it's not really its own separate product idea, it's a dependency almost every other category quietly needs.\n\n## The one sentence to keep\n\n**A smart contract has no native way to know a \"real\" price, so it must import one — the naive option (reading the pool's current spot price) is cheaply manipulable within a single transaction via flash loans, which is why serious hooks instead rely on either a time-averaged price (TWAP, built into Uniswap itself, which makes manipulation expensive and risky rather than free) or an external, independently-aggregated oracle network like Chainlink or Pyth.**\n"}, {"id": "learn/10-cross-chain-basics.md", "file": "10-cross-chain-basics.md", "section": "Learn — The Basics", "num": 10, "title": "10 — Cross-Chain Basics", "md": "# 10 — Cross-Chain Basics\n\nGoal: understand why liquidity being split across many blockchains is a real problem, what \"bridging\" actually does under the hood, and what CCIP/Unichain specifically are, since both show up constantly in the directory.\n\n## Why there are so many chains in the first place, in one paragraph\n\nEthereum mainnet can only process a limited number of transactions per block, which makes gas fees spike when demand is high. **Layer 2s** (Arbitrum, Optimism, Base, Unichain, and others) were built to solve this: they process transactions on their own, separate, cheaper chain, then periodically post a compressed summary of what happened back to Ethereum mainnet, inheriting Ethereum's security without needing every single transaction to be processed by Ethereum directly. This is a genuinely good tradeoff for cost and speed — but it means the *same* asset, say USDC, now technically exists as separate, non-interchangeable token deployments on Ethereum mainnet, Arbitrum, Optimism, Base, Unichain, and more, each with its own separate liquidity pools.\n\n## The fragmentation problem, concretely\n\n**Analogy: imagine the same currency existing as physically different-looking banknotes in ten different cities, none of which are automatically honored in any other city.** Your $100 bill from City A isn't spendable in City B's shops — someone has to physically carry it over, or exchange it locally, before you can use it there. Every city ends up with its own smaller, shallower pool of that currency, instead of one deep, unified pool.\n\nThis has two real costs: (1) **worse prices for traders** — a $10M trade against a $2M-deep pool on one chain will move the price far more than the same trade against a $50M-deep pool would, so fragmenting liquidity across ten chains means every individual pool is thinner and gives worse execution than if it were all combined; and (2) **it creates cross-chain arbitrage opportunities that are themselves a drag** — if ETH is priced slightly differently on Arbitrum than on Optimism, someone profits from that gap (similar in spirit to the arbitrage/LVR dynamic from article 8, just across chains instead of across time).\n\n## What a \"bridge\" actually does\n\nA bridge moves value from Chain A to Chain B. There are a few different underlying designs, but the two you'll encounter most:\n\n**Lock-and-mint**: you deposit your token into a bridge contract on Chain A (it gets locked there, not destroyed), and the bridge mints an equivalent \"wrapped\" representation of that token on Chain B. Going back requires burning the wrapped token on Chain B and unlocking the original on Chain A. The security question this raises: what guarantees that the bridge contract on Chain B only mints when a real deposit happened on Chain A? Answering that question badly is exactly how most of the largest DeFi hacks in history happened — bridge contracts holding huge locked balances are an extremely attractive, and historically frequent, attack target (Ronin, Wormhole, and others are the standard cautionary examples).\n\n**Liquidity-pool bridges**: instead of locking and minting, a bridge maintains its own liquidity pools of the *same* real, native asset on both Chain A and Chain B, and a cross-chain transfer is really just \"withdraw from the Chain A pool, deposit into the Chain B pool,\" settled by relayers/messengers coordinating between the two sides. This avoids some of the \"what backs this wrapped token\" risk, but requires the bridge to bootstrap and maintain real liquidity on every chain it supports.\n\n## CCIP: Chainlink's cross-chain messaging layer\n\n**CCIP (Cross-Chain Interoperability Protocol)** is Chainlink's standardized system for sending not just tokens, but arbitrary *messages and instructions* between chains, secured by the same decentralized oracle-network infrastructure Chainlink uses for price feeds (article 9). In the hook directory, CCIP shows up most often powering \"cross-chain limit orders\" — place an order on Chain A, and have the fill instruction and settlement carried over to Chain B via CCIP, without the user needing to manually bridge anything themselves.\n\n## Unichain: Uniswap's own L2\n\n**Unichain** is a Layer 2 built by Uniswap Labs itself, and it's the most-integrated single piece of infrastructure in the entire dataset (100 hooks list it as an integration, 60% of the most recent cohort). Its main pitches: fast block times (meaning transactions confirm quicker than on many other chains) and a design intended, over time, to make cross-chain liquidity movement more native and less reliant on third-party bridges. Because it's Uniswap's own chain, it's also the natural home for hooks that want tight integration with Uniswap-specific infrastructure and fast settlement, which is why you'll see it tagged across almost every category, not just \"cross-chain\" specifically.\n\n## The one sentence to keep\n\n**The same asset ends up fragmented into separate, non-interchangeable pools across many different chains because each Layer 2 processes its own transactions independently for cost/speed reasons, and \"bridging\" is the general term for moving value between those fragmented pools — either by locking-and-minting a wrapped representation (historically the most hacked pattern in DeFi) or by maintaining real liquidity on both sides — with Chainlink's CCIP and Uniswap's own Unichain being the two specific pieces of that puzzle referenced constantly throughout this directory.**\n"}, {"id": "learn/11-restaking-and-eigenlayer.md", "file": "11-restaking-and-eigenlayer.md", "section": "Learn — The Basics", "num": 11, "title": "11 — Restaking & EigenLayer AVS", "md": "# 11 — Restaking & EigenLayer AVS\n\nGoal: understand staking first, then why \"restaking\" is a genuinely clever idea, then what an AVS actually is — because \"EigenLayer AVS\" shows up as a black-box buzzword in a huge number of hooks, and it's worth actually knowing what it means.\n\n## Staking, in one paragraph\n\nEthereum today runs on **Proof of Stake**: instead of miners burning electricity to propose blocks (the old Proof of Work model), **validators** lock up (\"stake\") 32 ETH as collateral and are chosen to propose/verify blocks. If a validator behaves honestly, they earn rewards. If they behave dishonestly (e.g. try to approve two conflicting versions of history), a portion of their staked ETH is destroyed — this is called **slashing**. The entire security of the network rests on this simple idea: it's economically painful to misbehave, because you have real money locked up that gets taken away if you do.\n\n## Liquid staking: the token version of \"staked ETH\"\n\nNormally, staked ETH is locked and illiquid — you can't spend it or trade it while it's securing the network. **Liquid staking** protocols (Lido being the largest) solve this by pooling many people's ETH, staking it on their behalf, and giving each depositor a tradeable receipt token — **stETH**, in Lido's case — representing their staked ETH plus accumulating rewards. Now you can hold \"staked ETH\" and also use it elsewhere in DeFi (as collateral, in a liquidity pool, etc.) at the same time. This receipt-token category is called an **LST (Liquid Staking Token)**.\n\n## Restaking: the actual new idea EigenLayer introduced\n\nHere's the genuinely novel part. Ethereum's staking security only protects *Ethereum itself*. But there are lots of *other* systems in the crypto ecosystem that also need strong economic security — oracles, bridges, data availability layers, and other infrastructure — and historically, each of these had to bootstrap its *own*, entirely separate pool of staked collateral and validators from scratch, which is slow, expensive, and fragments security across dozens of smaller, individually-weaker networks.\n\n**EigenLayer's idea: let ETH that's already staked (or LSTs representing it) be \"re-pledged\" as collateral for one or more of these *other* systems too**, opting in voluntarily, earning *additional* yield on top of normal staking rewards — in exchange for taking on the additional risk that misbehaving in that other system can now also get your original stake slashed.\n\n**Analogy: imagine a security guard who's already been vetted, bonded, and posted collateral to guard Building A.** Instead of Building B down the street having to recruit, vet, and bond a completely separate set of guards from zero, the same guard can say \"I'll also guard Building B during my shift, using my *same* posted collateral as the guarantee — if I mess up at either building, I lose my bond.\" Building B gets instant access to a pool of already-trustworthy, already-collateralized guards, instead of bootstrapping trust from nothing.\n\nThis is why restaking is such a big deal: it lets brand-new infrastructure projects \"rent\" Ethereum's existing, deeply battle-tested economic security instead of building their own weaker version from scratch.\n\n## AVS: what these \"other systems\" are actually called\n\nAn **AVS (Actively Validated Service)** is the general name for any of these external systems that EigenLayer's restaked collateral can be used to secure. An AVS defines its own rules for what counts as \"good behavior\" and \"bad behavior\" (which gets slashed), and restakers who opt in to that specific AVS run software (an \"operator\" node) that actively participates in whatever that service does — validating data, signing off on computations, attesting to outcomes — earning extra yield for the work, at the risk of slashing if they cheat or go offline.\n\n## Why so many hooks in the directory namedrop \"EigenLayer AVS\"\n\nOnce you see it this way, the pattern in the directory clicks: **an AVS is a general-purpose way to get a decentralized network of economically-accountable operators to do some computation and report a trustworthy result on-chain** — which is exactly the primitive several hook categories need:\n\n- **Oracles (article 9)**: instead of trusting a fixed set of Chainlink nodes, some hooks spin up their own AVS specifically to attest to a volatility measurement or price feed, with EigenLayer-backed slashing as the trust mechanism.\n- **MEV auctions (article 8)**: EigenLVR and similar hooks use an AVS to run a sealed-bid auction off-chain (hiding bids from front-runners) and have operators attest to the honest winner on-chain, with slashing if they lie about the result.\n- **ML inference (learn category `ai-ml-hooks`)**: since running a real machine-learning model on-chain is expensive/impractical, several hooks have an AVS run the model off-chain and attest to the prediction on-chain instead.\n\nIn every one of these cases, the actual pattern is the same: *do the expensive or sensitive computation off-chain, and use a slashing-backed network of operators to make the on-chain-reported result trustworthy without a centralized single point of failure.* \"EigenLayer AVS\" is just the specific, currently-popular brand name for that pattern, not a fundamentally different idea each time it's mentioned.\n\n## The one sentence to keep\n\n**Restaking lets ETH that's already staked (and already has real, slashable collateral behind it) be re-pledged to secure additional external systems called AVSs, which is why \"EigenLayer AVS\" shows up constantly across totally different hook categories — it's not one specific product, it's a general-purpose way to get a decentralized, economically-accountable network to do off-chain computation (an oracle reading, an auction result, an ML prediction) and report it on-chain in a way you don't have to blindly trust.**\n"}, {"id": "learn/12-zk-vs-fhe-privacy.md", "file": "12-zk-vs-fhe-privacy.md", "section": "Learn — The Basics", "num": 12, "title": "12 — ZK vs FHE: The Two \"Privacy\" Tools", "md": "# 12 — ZK vs FHE: The Two \"Privacy\" Tools\n\nGoal: these two get lumped together constantly under \"privacy tech,\" but they solve genuinely different problems and work in completely different ways. By the end, you should be able to tell, from a hook's description, which one it should actually be using.\n\n## Two different questions\n\nBefore the tools, separate the *questions* each one answers:\n\n- **\"Can I prove something is true, without revealing the private information behind it?\"** — that's a **Zero-Knowledge proof (ZK)** question. Example: \"I have at least 5,000 USDC deposited in this pool\" — proven, without revealing your exact balance or wallet address.\n- **\"Can a computer compute on data it never gets to see in plain form?\"** — that's a **Fully Homomorphic Encryption (FHE)** question. Example: \"match these two encrypted trade orders against each other and tell me if they cancel out\" — computed, without the contract (or anyone watching it) ever seeing the actual order sizes or directions, even during the computation itself.\n\nThey're both \"privacy\" tools in a loose sense, but one is about *proving a fact*, the other is about *computing on secrets*.\n\n## Zero-Knowledge proofs (zk-SNARKs), with an analogy\n\n**Analogy: imagine you want to prove to a bouncer that you're over 21, without showing your ID (which also reveals your exact birthdate, address, and full legal name).** A ZK proof is like a magic slip of paper that the bouncer can verify says \"TRUE: this person is over 21\" — cryptographically guaranteed to be correct, generated using your real ID behind the scenes — but the slip of paper itself reveals nothing else about you. The bouncer can check the proof is valid extremely quickly, without ever needing to see your actual birthdate.\n\nThe specific flavor used most often in this directory is a **zk-SNARK** (Succinct Non-interactive ARgument of Knowledge) — \"succinct\" meaning the proof itself is small and fast to verify (important, since verification often happens inside a gas-costing smart contract), \"non-interactive\" meaning you generate the proof once and anyone can check it later without needing to have a back-and-forth conversation with you.\n\n**Where this shows up in the directory**: proving eligibility for a reward tier without revealing your full trading history (Liquidity Rewards, via a proof provider called Brevis), or proving you're a unique human without revealing your actual identity (Proof of Personhood-style compliance hooks). The common thread: *you have private data, you want to prove one true fact derived from it, and nothing more.*\n\n## Fully Homomorphic Encryption (FHE), with an analogy\n\n**Analogy: imagine a locked box with built-in gloves attached to the outside — like the boxes scientists use to handle dangerous materials.** You put your ingredients inside (encrypted data), and a worker outside the box can use the attached gloves to mix, measure, and combine those ingredients — performing real operations — without ever being able to open the box or directly touch the material inside. When the process is done, the box can hand you back an encrypted result, which only you (holding the key) can open and read.\n\nFHE lets a smart contract do this with *any* mathematical operation on encrypted numbers — add them, compare them, multiply them — while the actual values stay encrypted the entire time, including during the computation, not just during storage or transmission. This is a much heavier, more computationally expensive cryptographic tool than ZK proofs, which is why FHE-on-blockchain is a newer and less mature space (Fhenix, the provider referenced most often in this dataset, is essentially building an EVM-compatible chain specifically designed to make FHE computation practical).\n\n**Where this shows up in the directory**: encrypted order matching, where the direction and size of a trade needs to stay hidden not just from outside observers but *during the matching computation itself*, to prevent front-running (see article 7's sandwich-attack mempool problem) — this is what ShadowSwap, CipherFlow, and similar hooks are built around.\n\n## The key distinction, side by side\n\n| | ZK proof | FHE |\n|---|---|---|\n| Answers | \"Is this fact true?\" | \"What is the result of computing on this secret?\" |\n| Reveals | Nothing beyond the one proven fact | Nothing at all, even mid-computation |\n| Typical use here | Prove eligibility/identity without exposing details | Hide a trade's direction/size while it's being processed |\n| Maturity in this dataset | More established, faster, cheaper | Newer, heavier, still maturing |\n\n## Why it matters to keep them separate when reading the directory\n\nIf you see a hook described as \"provides privacy,\" check *which* problem it's actually solving before assuming it fixes MEV: a ZK-based \"prove I qualify for a reward without revealing my balance\" hook does nothing to stop a sandwich attack — it was never trying to. An FHE-based \"encrypt trade direction until execution\" hook, on the other hand, is directly attacking the mempool-visibility root cause from article 7. Same buzzword (\"privacy\"/\"zk\"), genuinely different problem being solved — worth checking which one you're actually looking at before judging whether it solves the problem you care about.\n\n## The one sentence to keep\n\n**ZK proofs let you prove a fact derived from private data without revealing the data itself (good for eligibility/identity checks), while FHE lets a contract actually compute on encrypted data without ever decrypting it (good for hiding a trade's contents during matching/execution) — they get bundled together as \"privacy tech\" in casual descriptions, but they answer different questions and you should check which one a given hook is actually using before assuming it solves MEV, or eligibility, or whichever problem you actually care about.**\n"}, {"id": "learn/13-stablecoins-and-rwa-compliance.md", "file": "13-stablecoins-and-rwa-compliance.md", "section": "Learn — The Basics", "num": 13, "title": "13 — Stablecoins & RWA Compliance Basics", "md": "# 13 — Stablecoins & RWA Compliance Basics\n\nGoal: the last article in the stack — tie together everything from articles 1-12 (curves, oracles, compliance-gating via hooks) into the two problem spaces (stablecoins, and real-world assets) that most directly determine whether DeFi ever connects to serious institutional money.\n\n## Stablecoins: what \"stable\" actually means, and how it's enforced\n\nA stablecoin is a token engineered to always be worth approximately $1.00 (or whatever it's pegged to). There are, broadly, three different ways this peg gets enforced, and it matters which one you're dealing with because they fail differently:\n\n- **Fiat-collateralized (USDC, USDT)**: a company holds $1 in a real bank account (or short-term treasury bonds) for every token in circulation, and promises to redeem 1 token for $1 on demand. The peg holds as long as people trust that redemption promise. This is the type that depegged briefly in March 2023, when USDC's issuer Circle had a portion of its reserves stuck at the failing Silicon Valley Bank — not a flaw in the token's code, a real-world counterparty risk showing up.\n- **Crypto-collateralized (DAI)**: backed by a surplus of *other* crypto assets locked in a smart contract (e.g. $150 of ETH locked to mint $100 of DAI), with automatic liquidation if the collateral value drops too close to the debt. The peg holds as long as the collateral liquidation mechanism works fast enough during a crash.\n- **Algorithmic (mostly discredited after Terra/UST's 2022 collapse)**: attempts to maintain the peg purely through supply-and-demand incentive mechanisms, without full collateral backing. Worth knowing this category exists and why it's viewed with much more skepticism today — UST's collapse wiped out tens of billions of dollars and is the canonical cautionary tale anytime someone pitches a new algorithmic stablecoin design.\n\n## Why a plain AMM pool is bad at stablecoin pairs\n\nRecall article 1: a plain constant-product pool applies the same slippage curve regardless of what the two assets are — it doesn't \"know\" that USDC and USDT are supposed to always be worth the same amount, so it gives you the same amount of slippage on a USDC/USDT trade as it would on a genuinely volatile pair, which is unnecessarily bad for traders and unnecessarily inefficient for LPs. This is exactly why specialized curves exist (article-adjacent to `amm-curve-design.md` in the category files) — a Constant Sum or StableSwap-style curve gives near-zero slippage specifically *because* it assumes the two assets should trade near 1:1, right up until a real depeg happens, at which point that assumption needs a safety valve (dynamic, depeg-aware fees, as covered in the stablecoin category file).\n\n## Real-World Assets (RWA): the other half of this category\n\nSeparately from stablecoins, **RWA tokenization** is the broader effort to represent things that exist outside crypto entirely — government bonds, private credit, real estate, company equity, carbon credits — as on-chain tokens, so they can be transferred, traded, and composed with other DeFi protocols the same way a crypto-native token can.\n\nThe appeal: real-world assets like government bonds already exist in enormous size (many trillions of dollars) compared to the crypto-native market, and getting even a small fraction on-chain means DeFi's tools (instant settlement, composability, 24/7 markets) become available for assets that have historically settled slowly, only during business hours, through many layers of intermediaries.\n\n## Why RWAs can't just plug into a normal, permissionless pool\n\nHere's the part where everything from article 6 (hooks) and this article's own compliance discussion connects: a tokenized government bond or company share is, legally, still the *same regulated instrument* it always was — securities law generally requires knowing who's allowed to buy/sell it (accredited investors only, in many jurisdictions, for certain instruments), tracking ownership for tax and reporting purposes, and sometimes restricting transfers entirely for a holding period. A standard, fully permissionless Uniswap pool has no way to enforce any of that — anyone with a wallet can trade in it, which is precisely the feature that makes it illegal to list an unrestricted security token on, in most jurisdictions.\n\nThis is exactly why RWA hooks in the directory are almost always paired with compliance mechanisms: a `beforeSwap` or `beforeAddLiquidity` hook (article 6) that checks the trading wallet against a whitelist, a KYC attestation, or a compliant-token-standard's own built-in transfer restrictions (like **ERC-3643**, a real, production token standard purpose-built for regulated/permissioned securities, referenced explicitly by several hooks in this dataset) before allowing the trade to proceed at all. Without that compliance layer bolted on, tokenizing a real security on a permissionless AMM isn't actually legally usable for its stated purpose — it's just a demo.\n\n## The one sentence to keep\n\n**Stablecoins need specialized, near-zero-slippage AMM curves (because they're supposed to always trade near 1:1, unlike genuinely volatile assets) plus depeg-aware safety mechanisms for when that assumption breaks; RWAs need the exact same specialized curve thinking plus a hard compliance layer bolted directly into the swap/liquidity hooks (whitelist checks, permissioned token standards like ERC-3643), because the legal reality of the underlying asset doesn't disappear just because it's now represented as a token on a permissionless exchange.**\n\n---\n\n## You've now covered the full stack\n\nArticles 1-6 gave you the core AMM/Uniswap architecture (box → LP economics → v2 contracts → v3 ranges → v4 rewrite → hooks themselves). Articles 7-13 gave you the seven problem-domains hooks are built to solve (MEV, LVR, oracles, cross-chain, restaking, privacy, stablecoins/RWA). Every one of the 17 category files in `hook-directory/categories/` should now read as \"a specific combination of these ideas,\" rather than a wall of unfamiliar jargon. That's the point where you're actually equipped to judge which hook ideas are genuinely interesting versus which ones are a familiar pattern with a new sponsor's logo slapped on — which is exactly the next step in your plan.\n"}, {"id": "learn/14-dev-environment-foundry-v4.md", "file": "14-dev-environment-foundry-v4.md", "section": "Learn — The Basics", "num": 14, "title": "14 — Dev Environment: Foundry + Uniswap v4", "md": "# 14 — Dev Environment: Foundry + Uniswap v4\n\nGoal: get from zero to \"I have a hook compiling and a test running\" — the actual mechanical setup, explained like you've never opened a terminal for a Solidity project before.\n\n**A note before we start**: Uniswap v4's exact function names and signatures have shifted a few times as it moved from testnet to mainnet (and will likely keep evolving). Every code snippet in this and the following lessons is written to match the *shape and intent* of the real v4-periphery/v4-core APIs as of writing — treat it as \"this is how the pattern works and roughly how it's written,\" and always cross-check exact current signatures against the live `Uniswap/v4-core` and `Uniswap/v4-periphery` GitHub repos before shipping real code. That habit — pattern-match from what you've learned, then verify exact syntax against current source — is how experienced Solidity devs actually work anyway, since the ecosystem moves fast.\n\n## What Foundry is, and why it's the standard for this\n\n**Foundry** is a Solidity development toolkit — think of it as the whole workbench: it compiles your contracts, runs your tests (written *in Solidity itself*, not JavaScript, which is the detail that makes it feel different from older tools like Hardhat), deploys contracts, and lets you fork mainnet state locally to test against real, live contracts. It's four command-line tools bundled together:\n\n- **`forge`** — compile, test, build, deploy. This is the one you'll type constantly.\n- **`cast`** — a Swiss-army-knife for making one-off calls: \"what's the current price in this pool,\" \"send this transaction,\" \"decode this calldata.\"\n- **`anvil`** — spins up a local, fake Ethereum node on your machine in one second, for fast local testing.\n- **`chisel`** — a Solidity REPL (a scratchpad where you can type a line of Solidity and immediately see the result), useful for quickly checking \"wait, what does this expression actually evaluate to.\"\n\n## Installing it\n\n```bash\ncurl -L https://foundry.paradigm.xyz | bash\nfoundryup\n```\n\nThat second command (`foundryup`) is also how you update Foundry later — re-run it any time.\n\n## Starting a hook project: use the official v4 template, don't start from a blank folder\n\nUniswap publishes a starter template specifically for hook development — `v4-template` — which already has the correct dependencies, remappings (explained below), and a working example hook wired up. Starting here saves you from hours of dependency-version mismatches, which are the single most common source of \"nothing compiles\" pain in this ecosystem.\n\n```bash\nforge init my-first-hook --template uniswapfoundation/v4-template\ncd my-first-hook\nforge install\n```\n\n## What's actually inside the project, and why\n\n```\nmy-first-hook/\n├── src/                  <- your hook contracts go here\n│   └── Counter.sol       <- the template's example hook (a good thing to read first)\n├── test/                 <- your Solidity tests go here\n│   └── Counter.t.sol\n├── lib/                  <- external dependencies, installed as git submodules\n│   ├── v4-core/          <- the actual Uniswap v4 PoolManager contracts (article 5's singleton)\n│   ├── v4-periphery/     <- helper contracts, including BaseHook (article 15)\n│   └── forge-std/        <- Foundry's own standard testing library\n├── foundry.toml          <- project configuration\n└── remappings.txt        <- import path shortcuts (explained below)\n```\n\nTwo ideas worth understanding, not just memorizing:\n\n**Dependencies are git submodules, not an `npm install`-style package manager.** When you see `lib/v4-core`, that's a literal clone of the Uniswap v4-core GitHub repo, pinned to a specific commit, sitting inside your project. This matters because it means \"what version of v4 am I building against\" is answered by \"what commit is checked out in `lib/v4-core`\" — if a tutorial's code doesn't compile against your setup, this is almost always why: they were pinned to a different commit of v4-core than you are.\n\n**Remappings let you write clean imports.** Solidity's `import` statement needs a real file path, but nobody wants to write `import \"../../lib/v4-core/src/interfaces/IPoolManager.sol\"`. A `remappings.txt` file lets you write `import \"v4-core/src/interfaces/IPoolManager.sol\"` instead, and Foundry silently translates it. When you open any hook's source code and see clean-looking imports like `import \"v4-periphery/src/utils/BaseHook.sol\"`, that cleanliness is remappings doing their job, not a different import system.\n\n## Confirming it actually works\n\n```bash\nforge build   # compiles everything\nforge test    # runs the template's example tests\n```\n\nIf `forge test` shows passing tests on the template's example `Counter.sol` hook (a trivially simple hook that just counts how many times it's been called), your environment is correctly set up and you're ready for lesson 15, where we actually read and understand what that Counter hook's code is doing.\n\n## The one sentence to keep\n\n**Foundry is a Solidity-native toolkit (compile/test/deploy all in one, tests written in Solidity itself), the official `v4-template` gives you a working project with the right dependency versions already wired up as git submodules under `lib/`, and `forge build` + `forge test` passing on the template's example hook is your signal that you're ready to start writing real hook code.**\n"}, {"id": "learn/15-anatomy-of-a-hook-contract.md", "file": "15-anatomy-of-a-hook-contract.md", "section": "Learn — The Basics", "num": 15, "title": "15 — Anatomy of a Hook Contract", "md": "# 15 — Anatomy of a Hook Contract\n\nGoal: read a genuinely minimal, real-shaped hook line by line, so every piece of boilerplate you'll see in every other hook (including the complex ones later in this series) is something you've already met and understood once, slowly.\n\n## The simplest possible hook: a swap counter\n\nThis hook does nothing clever — it just counts how many times `beforeSwap` and `afterSwap` have been called on it. That's the entire \"Counter.sol\" example from the v4-template, and it's the right first thing to read because there's zero business logic to distract you from the *shape* every hook shares.\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {BalanceDelta} from \"v4-core/src/types/BalanceDelta.sol\";\nimport {BeforeSwapDelta, BeforeSwapDeltaLibrary} from \"v4-core/src/types/BeforeSwapDelta.sol\";\n\ncontract Counter is BaseHook {\n    // --- state: this is YOUR hook's own storage, separate from the pool's ---\n    mapping(PoolId => uint256) public beforeSwapCount;\n    mapping(PoolId => uint256) public afterSwapCount;\n\n    // every hook's constructor just needs to know which PoolManager it belongs to\n    constructor(IPoolManager _poolManager) BaseHook(_poolManager) {}\n\n    // --- this is the part every hook MUST implement: declare which callbacks you use ---\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false,\n            afterInitialize: false,\n            beforeAddLiquidity: false,\n            afterAddLiquidity: false,\n            beforeRemoveLiquidity: false,\n            afterRemoveLiquidity: false,\n            beforeSwap: true,          // <- we're turning this ON\n            afterSwap: true,           // <- and this ON\n            beforeDonate: false,\n            afterDonate: false,\n            beforeSwapReturnDelta: false,\n            afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false,\n            afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    // --- the actual callback logic ---\n    function _beforeSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, bytes calldata)\n        internal\n        override\n        returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        beforeSwapCount[key.toId()]++;\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, 0);\n    }\n\n    function _afterSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, BalanceDelta, bytes calldata)\n        internal\n        override\n        returns (bytes4, int128)\n    {\n        afterSwapCount[key.toId()]++;\n        return (this.afterSwap.selector, 0);\n    }\n}\n```\n\nNow let's take this apart piece by piece — this is the part worth actually understanding, not memorizing.\n\n## `BaseHook` — why you extend it instead of writing raw `IHooks`\n\nRecall article 6: the PoolManager calls specific functions on your contract at specific lifecycle moments. In principle you could implement the raw `IHooks` interface yourself, but `BaseHook` (from v4-periphery) does two useful things for you: (1) it enforces, via the constructor, that only your declared PoolManager can call your callback functions (rejecting calls from anyone else — a real security concern, covered properly in lesson 25), and (2) it splits each public callback (`beforeSwap`) into a public wrapper plus an inte
