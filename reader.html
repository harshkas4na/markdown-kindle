rnal `_beforeSwap` you actually override, which is just a code-organization convenience. Nearly every real hook you'll ever read extends `BaseHook` rather than raw `IHooks`.\n\n## `getHookPermissions()` — this is article 6's \"address mining\" flags, made concrete\n\nRemember: a hook's deployed *address* has to have specific bits set, matching exactly which callbacks it uses. `getHookPermissions()` is where you, the developer, declare in code which callbacks you intend to use — and this declaration is what a deployment tool (lesson 16) reads to figure out which address bit-pattern to mine for. If you set `beforeSwap: true` here but deploy to an address whose bits don't match, the PoolManager will reject the pool creation outright — the two have to agree.\n\nNotice: even though this Counter hook implements `_beforeAddLiquidity` internally as inherited boilerplate from `BaseHook`, we declared `beforeAddLiquidity: false` here — meaning the PoolManager will simply never call it for this hook. Only flip a permission to `true` for callbacks you actually use; every `true` flag is a real callback the PoolManager will invoke on every relevant pool action, forever, which costs gas even if your logic inside is trivial.\n\n## `PoolKey` and `PoolId` — how a hook knows *which* pool is calling it\n\nA single hook contract can be attached to many different pools simultaneously (e.g. one dynamic-fee hook, reused across a hundred different token pairs). Every callback receives a `PoolKey` — a struct identifying exactly which pool this specific call is about:\n\n```solidity\nstruct PoolKey {\n    Currency currency0;   // the lower-sorted token address\n    Currency currency1;   // the higher-sorted token address\n    uint24 fee;           // the pool's fee (or a flag meaning \"dynamic, ask the hook\")\n    int24 tickSpacing;    // how fine-grained the pool's ticks are (article 4)\n    IHooks hooks;         // this pool's hook address\n}\n```\n\n`key.toId()` compresses that struct into a single `PoolId` (just a hash), which is the standard way hooks key their own per-pool storage — exactly how `Counter` above uses `mapping(PoolId => uint256)` to track a separate count for every pool that uses it, even though it's one single deployed hook contract.\n\n## The return values: how a hook actually changes behavior, not just observes it\n\nThis is the detail that trips people up most: `_beforeSwap` doesn't just run some logic and return — its return values can *actively change what happens next*.\n\n- The `bytes4` return (`this.beforeSwap.selector`) is a required \"yes, this call succeeded and was intentional\" signature the PoolManager checks — every hook callback must return its own function selector, or the whole transaction reverts. This exists as a safety check against hooks being called by accident or a broken implementation silently doing nothing.\n- The `BeforeSwapDelta` return is where a hook can inject its own token adjustments into the trade *before* it executes — this is the exact mechanism a fee-override hook (lesson 18) uses to change how much the trader actually pays, and how a JIT-liquidity hook (lesson 20) can add its own liquidity into the mix for this one swap.\n- The `uint24` return (in `_beforeSwap` specifically) is used to override the pool's fee for this specific swap, when the pool was configured for dynamic fees — the exact lever dynamic-fee hooks pull.\n\nThe `Counter` hook above returns \"zero, do nothing extra\" for all of these — it's a pure observer. Every code-pattern lesson from here on is really just \"what non-zero values do we return, and why.\"\n\n## The one sentence to keep\n\n**Every real hook extends `BaseHook` (which enforces that only the PoolManager can call you), declares which callbacks it uses via `getHookPermissions()` (which must match the bits mined into its deployment address), receives a `PoolKey`/`PoolId` on every call to know which specific pool triggered it, and expresses its actual effect on the trade not by changing global state alone but through the specific return values each callback demands — the difference between every \"boring\" hook and every \"clever\" hook in this entire directory is almost entirely about what non-zero values it chooses to return.**\n"}, {"id": "learn/16-address-mining-and-deployment.md", "file": "16-address-mining-and-deployment.md", "section": "Learn — The Basics", "num": 16, "title": "16 — Address Mining & Deployment", "md": "# 16 — Address Mining & Deployment\n\nGoal: actually do the thing article 6 described in the abstract — get a hook deployed to an address whose bits match its declared permissions, and get a pool created that uses it. This is the step that trips up almost every first-time hook builder, so we'll go slow.\n\n## Quick recap of the problem\n\nFrom article 6 and lesson 15: your hook's deployed *address* must have specific bits set (in its lowest bits) matching exactly the callbacks it declared `true` in `getHookPermissions()`. You don't get to choose your deployed address freely under a normal deployment — Ethereum derives it automatically from your deployer's address and a nonce. So how do you land on an address with a *specific* bit pattern?\n\n## `CREATE2`: the deployment opcode that makes this possible\n\nNormally (`CREATE`), a contract's deployed address is `hash(deployer_address, deployer's_transaction_count)` — you have no control over it beyond deploying at a different time.\n\n`CREATE2` is a different deployment opcode that computes the address differently: `hash(deployer_address, salt, contract_bytecode)`, where **`salt`** is an arbitrary 32-byte value *you* choose. Change the salt, get a completely different resulting address — deterministically, computable in advance, without actually deploying anything yet.\n\n**Analogy: imagine a vending machine that dispenses a uniquely-shaped keychain based on a code you type in before it makes anything.** Type in code \"4471\", get keychain shape A. Type in \"4472\", get a totally different shape B. You can compute in advance, on paper, exactly which shape any given code will produce, without spending a single token to actually manufacture it — you're just doing the math. \"Mining\" a hook address is exactly this: trying thousands of different salt values, computing (off-chain, for free) what address each one *would* produce, and stopping the instant you find one whose resulting address has the exact bit pattern your `getHookPermissions()` needs.\n\n## `HookMiner`: the actual tool that does this search for you\n\nUniswap provides a helper library, `HookMiner`, that does this brute-force search efficiently:\n\n```solidity\nimport {HookMiner} from \"v4-periphery/src/utils/HookMiner.sol\";\n\n// figure out which permission bits we need, based on our hook's declared permissions\nuint160 flags = uint160(\n    Hooks.BEFORE_SWAP_FLAG | Hooks.AFTER_SWAP_FLAG\n);\n\n// this searches (off-chain, in your deploy script) for a salt producing\n// a matching address, using CREATE2's deterministic address formula\n(address hookAddress, bytes32 salt) = HookMiner.find(\n    CREATE2_DEPLOYER,                          // the standard CREATE2 factory address\n    flags,                                     // the bit pattern we need\n    type(Counter).creationCode,                // our hook's compiled bytecode\n    abi.encode(poolManagerAddress)             // constructor arguments (encoded)\n);\n\n// now actually deploy, using that exact salt, through the CREATE2 factory\nCounter counter = new Counter{salt: salt}(IPoolManager(poolManagerAddress));\n\n// sanity check: the address we actually got had better match what we mined for\nrequire(address(counter) == hookAddress, \"address mismatch\");\n```\n\nNotice this whole process happens in your *deployment script*, not inside any on-chain contract — the \"mining\" (trying many salts) is just a local, off-chain loop searching for a match, which typically takes a fraction of a second to a few seconds depending on how many flag bits you need to match.\n\n## Doing this in a Foundry test/script, end to end\n\nIn practice, for local testing, Foundry's test utilities (from `v4-core`'s `Deployers.sol`, which the template already gives you) wrap most of this for you:\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {Test} from \"forge-std/Test.sol\";\nimport {Deployers} from \"v4-core/test/utils/Deployers.sol\";\nimport {Counter} from \"../src/Counter.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\n\ncontract CounterTest is Test, Deployers {\n    Counter hook;\n\n    function setUp() public {\n        // Deployers.sol spins up a real local PoolManager + standard test routers\n        deployFreshManagerAndRouters();\n        // it also deploys two test ERC20 tokens for us to use in a pool\n        deployMintAndApprove2Currencies();\n\n        // mine + deploy our hook to the correct flagged address\n        uint160 flags = uint160(Hooks.BEFORE_SWAP_FLAG | Hooks.AFTER_SWAP_FLAG);\n        (address hookAddress, bytes32 salt) =\n            HookMiner.find(address(this), flags, type(Counter).creationCode, abi.encode(manager));\n\n        hook = new Counter{salt: salt}(manager);\n        require(address(hook) == hookAddress, \"hook address mismatch\");\n\n        // NOW create an actual pool that uses this hook\n        (key, ) = initPool(\n            currency0,\n            currency1,\n            hook,\n            3000,          // 0.30% fee (or the dynamic-fee flag, see lesson 18)\n            SQRT_PRICE_1_1 // starting price = 1:1\n        );\n    }\n}\n```\n\nWalk through what just happened: we deployed a *real*, local copy of the PoolManager (article 5's singleton), mined and deployed our hook to a correctly-flagged address, and then created a brand-new pool whose `PoolKey.hooks` field points at our hook. From this point on, every swap or liquidity action against this specific pool will trigger our hook's callbacks — which is exactly what lesson 17 tests.\n\n## What actually happens if the address doesn't match\n\nIf you try to initialize a pool with a hook address whose bits *don't* match what the hook's own `getHookPermissions()` declares, the PoolManager reverts the pool creation transaction outright, with an error like `HookAddressNotValid`. This is a deliberate, hard guardrail — there's no way to accidentally end up with a hook silently not being called for a permission it claims to have, or being called for one it doesn't.\n\n## The one sentence to keep\n\n**`CREATE2` lets you choose a `salt` that determines your contract's deployed address in advance, `HookMiner` brute-forces (off-chain, for free) a salt that produces an address with the exact permission bits your hook declared, and Foundry's `Deployers.sol` test utilities wrap the whole \"deploy PoolManager, mine hook address, deploy hook, initialize pool\" sequence into a few lines you'll copy into essentially every hook test you ever write.**\n"}, {"id": "learn/17-testing-hooks-with-foundry.md", "file": "17-testing-hooks-with-foundry.md", "section": "Learn — The Basics", "num": 17, "title": "17 — Testing Hooks With Foundry", "md": "# 17 — Testing Hooks With Foundry\n\nGoal: write an actual passing test against the `Counter` hook from lessons 15-16, understand the test routers you're calling through, and learn the assertion patterns you'll reuse for every hook you ever build.\n\n## Why you can't \"just call the pool\" the way you'd call a normal contract\n\nRecall article 5: the PoolManager is a singleton, and it uses flash accounting — a swap isn't one simple external call, it's a sequence of internal ledger updates that must net out to zero by the end of the transaction, settled via a callback pattern (the caller has to implement an `unlockCallback` that the PoolManager calls back into, to actually perform the settlement). Writing that settlement logic by hand in every single test would be tedious and error-prone, so Uniswap ships **test router contracts** that already implement it correctly — you interact with the pool *through* these routers in tests, not directly against the raw PoolManager.\n\nThe two you'll use constantly: `PoolSwapTest` (for performing swaps) and `PoolModifyLiquidityTest` (for adding/removing liquidity) — both provided automatically once you call `deployFreshManagerAndRouters()` from lesson 16.\n\n## A full test: verifying our Counter hook actually counts\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {Test} from \"forge-std/Test.sol\";\nimport {Deployers} from \"v4-core/test/utils/Deployers.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolSwapTest} from \"v4-core/src/test/PoolSwapTest.sol\";\nimport {Counter} from \"../src/Counter.sol\";\n\ncontract CounterTest is Test, Deployers {\n    Counter hook;\n\n    function setUp() public {\n        // (same setup as lesson 16: deploy manager, tokens, mine+deploy hook, init pool)\n        // ...\n    }\n\n    function test_beforeSwapCountIncreases() public {\n        // sanity check: count starts at zero for this pool\n        assertEq(hook.beforeSwapCount(key.toId()), 0);\n\n        // build the parameters for a swap: sell some of currency0 for currency1\n        IPoolManager.SwapParams memory params = IPoolManager.SwapParams({\n            zeroForOne: true,              // trading currency0 -> currency1\n            amountSpecified: -1e18,        // negative = \"exact input\": sell exactly 1e18 of currency0\n            sqrtPriceLimitX96: MIN_PRICE_LIMIT  // no meaningful slippage guard for this test\n        });\n\n        // testSettings just controls how the test router handles native ETH / claim tokens —\n        // for a plain ERC20/ERC20 pool, this is boilerplate you'll copy every time\n        PoolSwapTest.TestSettings memory testSettings =\n            PoolSwapTest.TestSettings({takeClaims: false, settleUsingBurn: false});\n\n        swapRouter.swap(key, params, testSettings, ZERO_BYTES);\n\n        // now assert our hook actually got triggered exactly once\n        assertEq(hook.beforeSwapCount(key.toId()), 1);\n        assertEq(hook.afterSwapCount(key.toId()), 1);\n    }\n}\n```\n\nRun it:\n\n```bash\nforge test -vv\n```\n\n`-vv` (and `-vvv`, `-vvvv` for more detail) controls verbosity — worth cranking this up whenever a test fails and you need to see exactly what happened, including a full call trace at `-vvvv`.\n\n## Reading the `SwapParams` you'll write in every test\n\n- **`zeroForOne`**: which direction the trade goes. `PoolKey` sorts the two tokens by address (`currency0` is always the numerically lower address) — `true` means you're selling `currency0` for `currency1`.\n- **`amountSpecified`**: the trade size, with a sign that changes its meaning. Negative means \"exact input\" — \"I am selling exactly this much.\" Positive means \"exact output\" — \"I want to receive exactly this much, whatever the input cost turns out to be.\" This sign convention surprises almost everyone the first time; get used to double-checking it.\n- **`sqrtPriceLimitX96`**: a slippage guard — the trade will revert rather than push the price past this limit. In tests, you'll often just use the library's `MIN_PRICE_LIMIT`/`MAX_PRICE_LIMIT` constants to mean \"no meaningful limit for this test,\" but in production code this is exactly where real slippage protection lives.\n\n## Testing liquidity actions, the same pattern\n\n```solidity\nfunction test_addLiquidityTriggersHook() public {\n    IPoolManager.ModifyLiquidityParams memory params = IPoolManager.ModifyLiquidityParams({\n        tickLower: -600,\n        tickUpper: 600,\n        liquidityDelta: 1e18,\n        salt: 0\n    });\n\n    modifyLiquidityRouter.modifyLiquidity(key, params, ZERO_BYTES);\n    // then assert whatever your hook was supposed to do on liquidity add\n}\n```\n\nNotice `tickLower`/`tickUpper` here are article 4's concentrated-liquidity range, expressed directly in tick units — this is the actual low-level interface every \"auto-rebalancing\" hook you build will eventually call under the hood.\n\n## Reading pool state from inside a test (or from inside a hook)\n\nSometimes you need to check the pool's actual current state — its current price, current tick, current liquidity — not just your hook's own storage. The `StateLibrary` gives you read access to the PoolManager's internal state:\n\n```solidity\nimport {StateLibrary} from \"v4-core/src/libraries/StateLibrary.sol\";\n\nusing StateLibrary for IPoolManager;\n\n(uint160 sqrtPriceX96, int24 currentTick, , ) = manager.getSlot0(key.toId());\nuint128 currentLiquidity = manager.getLiquidity(key.toId());\n```\n\nThis is exactly the tool a dynamic-fee hook (lesson 18) or a limit-order hook (lesson 21) uses *inside its own callback* to check \"what tick did we just cross\" or \"what's the current price\" as part of its real logic — not just a testing convenience.\n\n## The general shape of every hook test you'll write\n\n1. `setUp()`: deploy manager + routers, mine + deploy your hook, initialize a pool using it.\n2. Build a `SwapParams` or `ModifyLiquidityParams` struct describing the action you want to test.\n3. Call it through `swapRouter`/`modifyLiquidityRouter`, never directly against the raw PoolManager.\n4. Assert on your hook's own state changes (its custom mappings/variables) and/or on the pool's resulting state via `StateLibrary`.\n\nEvery single hook lesson from here forward (18-23) will use exactly this test shape — only the business logic inside the hook itself changes.\n\n## The one sentence to keep\n\n**You never call the PoolManager directly in tests — you go through `PoolSwapTest`/`PoolModifyLiquidityTest` routers that correctly implement flash accounting's settlement callback for you, `SwapParams`'s sign-flipping `amountSpecified` (negative = exact input, positive = exact output) is the detail that trips people up first, and `StateLibrary` lets both your tests and your hook's own logic read the pool's real current price/tick/liquidity directly from the PoolManager's storage.**\n"}, {"id": "learn/18-pattern-dynamic-fee-hook.md", "file": "18-pattern-dynamic-fee-hook.md", "section": "Learn — The Basics", "num": 18, "title": "18 — Code Pattern: Dynamic Fee Hook", "md": "# 18 — Code Pattern: Dynamic Fee Hook\n\nGoal: build the #1 most-repeated idea in the entire directory (218 of 556 hooks touch this) — a hook that charges a different swap fee based on recent volatility. This is the pattern behind every \"protect the LP\" pitch from articles 1, 2, and 8.\n\n## The one extra setup step dynamic fees require: the dynamic-fee flag\n\nNormally a pool's fee is a fixed number baked into its `PoolKey.fee` field at creation (e.g. `3000` = 0.30%). To let a hook override the fee *per swap*, the pool must instead be initialized with a special sentinel value:\n\n```solidity\nimport {LPFeeLibrary} from \"v4-core/src/libraries/LPFeeLibrary.sol\";\n\n// instead of a fixed fee like 3000, pass this flag when initializing the pool:\nuint24 dynamicFeeFlag = LPFeeLibrary.DYNAMIC_FEE_FLAG; // = 0x800000\n```\n\nThis tells the PoolManager \"this pool's fee is not fixed — ask the hook, on every swap, what fee to charge.\" Without this flag, your hook's fee-override return value is simply ignored.\n\n## The hook itself\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {PoolId} from \"v4-core/src/types/PoolId.sol\";\nimport {BeforeSwapDelta, BeforeSwapDeltaLibrary} from \"v4-core/src/types/BeforeSwapDelta.sol\";\nimport {StateLibrary} from \"v4-core/src/libraries/StateLibrary.sol\";\n\ncontract VolatilityFeeHook is BaseHook {\n    using StateLibrary for IPoolManager;\n\n    // fee bounds, expressed in the same units as Uniswap fees (100 = 0.01%, i.e. hundredths of a bip... actually\n    // Uniswap fee units are hundredths of a basis point: 3000 = 0.30%, 500 = 0.05%)\n    uint24 public constant BASE_FEE = 3000;     // 0.30% during calm markets\n    uint24 public constant MAX_FEE = 10000;     // 1.00% cap during high volatility\n\n    // per-pool tracking of the last observed tick and last-seen timestamp,\n    // used as our (deliberately simple) volatility proxy\n    mapping(PoolId => int24) public lastTick;\n    mapping(PoolId => uint32) public lastUpdate;\n\n    constructor(IPoolManager _poolManager) BaseHook(_poolManager) {}\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: true,   // <- need this to seed lastTick on pool creation\n            beforeAddLiquidity: false, afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: true,   // <- this is where we override the fee\n            afterSwap: true,    // <- this is where we update our volatility tracker\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: false, afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    function _afterInitialize(address, PoolKey calldata key, uint160, int24 tick)\n        internal override returns (bytes4)\n    {\n        lastTick[key.toId()] = tick;\n        lastUpdate[key.toId()] = uint32(block.timestamp);\n        return this.afterInitialize.selector;\n    }\n\n    function _beforeSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, bytes calldata)\n        internal override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        PoolId id = key.toId();\n\n        // how far has the price moved (in ticks) since our last check?\n        (, int24 currentTick, , ) = poolManager.getSlot0(id);\n        int24 tickDelta = currentTick - lastTick[id];\n        if (tickDelta < 0) tickDelta = -tickDelta;\n\n        // simple linear scaling: more tick movement -> higher fee, capped at MAX_FEE\n        uint24 fee = BASE_FEE + uint24(uint256(int256(tickDelta)) * 50);\n        if (fee > MAX_FEE) fee = MAX_FEE;\n\n        // this is the actual \"override the fee for this swap\" mechanism:\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, fee | LPFeeLibrary.OVERRIDE_FEE_FLAG);\n    }\n\n    function _afterSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, /* delta */ , bytes calldata)\n        internal override returns (bytes4, int128)\n    {\n        PoolId id = key.toId();\n        (, int24 currentTick, , ) = poolManager.getSlot0(id);\n        lastTick[id] = currentTick;\n        lastUpdate[id] = uint32(block.timestamp);\n        return (this.afterSwap.selector, 0);\n    }\n}\n```\n\n## Walking through the actual logic decisions\n\n**Why track ticks instead of raw price?** Ticks (article 4) are already a log-scaled representation of price — a fixed tick movement represents a roughly fixed *percentage* price movement, regardless of whether the price is currently $2,000 or $200,000. That makes tick-delta a naturally reasonable, cheap-to-compute proxy for \"how much did the price move,\" without needing floating-point-style percentage math.\n\n**Why `afterInitialize` and `afterSwap` both update `lastTick`?** Because our fee formula in `_beforeSwap` needs a \"previous\" reference point to compare against — without seeding it at pool creation and updating it after every swap, `lastTick` would either be uninitialized or stale.\n\n**The `OVERRIDE_FEE_FLAG` bitwise-OR is the actual mechanism, not decoration.** The `uint24` return from `beforeSwap` isn't just \"the fee\" — the PoolManager needs to distinguish \"the hook wants to override the fee to X\" from \"the hook has no opinion, use the pool's default.\" That distinction is encoded by OR-ing a specific flag bit into the returned value, defined in `LPFeeLibrary`. Forgetting this flag is a common bug — you compute a perfectly reasonable fee value, return it, and the PoolManager silently ignores it because the override bit wasn't set.\n\n**This is deliberately the simplest possible volatility measure.** A real production hook (matching the \"Nezlobin directional fee\" pattern from articles 1 and 8) would likely also check *direction* — charging more specifically for trades that push the price further from a reference/oracle price (lesson 19), not just any movement — because undirected volatility-based fees tax honest traders exactly as much as arbitrageurs, whereas directional fees target arbitrage more precisely. Starting simple like this, and understanding exactly why it's simple, is a completely reasonable place to begin before adding that directional refinement.\n\n## The one sentence to keep\n\n**A dynamic-fee hook needs the pool initialized with `LPFeeLibrary.DYNAMIC_FEE_FLAG`, computes its own fee inside `_beforeSwap` using some volatility proxy (tick movement is the cheapest reasonable one), returns that fee OR'd with `LPFeeLibrary.OVERRIDE_FEE_FLAG` to actually make it take effect, and updates its own tracking state in `_afterSwap` so the next swap has a fresh reference point to compare against.**\n"}, {"id": "learn/19-pattern-oracle-twap-hook.md", "file": "19-pattern-oracle-twap-hook.md", "section": "Learn — The Basics", "num": 19, "title": "19 — Code Pattern: Oracle / TWAP Accumulator Hook", "md": "# 19 — Code Pattern: Oracle / TWAP Accumulator Hook\n\nGoal: build the pattern behind the 75 \"Oracle & Price Discovery\" hooks — a hook that maintains its own on-chain time-weighted average price, and a second version that reads an external oracle (Chainlink-style) instead. This is the building block almost every depeg-detection, directional-fee, and options-pricing hook depends on.\n\n## Pattern A: rolling your own TWAP inside a hook\n\nRecall article 9: a TWAP averages price over a time window specifically because it's expensive to manipulate versus a raw spot-price read. Here's the actual accumulator pattern:\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {PoolId} from \"v4-core/src/types/PoolId.sol\";\nimport {StateLibrary} from \"v4-core/src/libraries/StateLibrary.sol\";\n\ncontract TwapOracleHook is BaseHook {\n    using StateLibrary for IPoolManager;\n\n    struct Observation {\n        uint32 timestamp;\n        int56 tickCumulative;   // running sum of (tick * time-since-last-observation)\n    }\n\n    mapping(PoolId => Observation) public lastObservation;\n\n    constructor(IPoolManager _poolManager) BaseHook(_poolManager) {}\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: true,\n            beforeAddLiquidity: false, afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: false, afterSwap: true,   // <- we only need to observe AFTER price changes\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: false, afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    function _afterInitialize(address, PoolKey calldata key, uint160, int24 tick)\n        internal override returns (bytes4)\n    {\n        lastObservation[key.toId()] = Observation({\n            timestamp: uint32(block.timestamp),\n            tickCumulative: 0\n        });\n        return this.afterInitialize.selector;\n    }\n\n    function _afterSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, /* delta */ , bytes calldata)\n        internal override returns (bytes4, int128)\n    {\n        PoolId id = key.toId();\n        Observation memory last = lastObservation[id];\n\n        (, int24 currentTick, , ) = poolManager.getSlot0(id);\n        uint32 elapsed = uint32(block.timestamp) - last.timestamp;\n\n        // this is the core TWAP-accumulator trick: instead of storing every historical\n        // price point, we store a running SUM of (tick * time it was active for).\n        // any two snapshots of this running sum can reconstruct the average tick\n        // over that interval, without ever storing per-block history.\n        int56 newCumulative = last.tickCumulative + int56(currentTick) * int56(uint56(elapsed));\n\n        lastObservation[id] = Observation({\n            timestamp: uint32(block.timestamp),\n            tickCumulative: newCumulative\n        });\n\n        return (this.afterSwap.selector, 0);\n    }\n\n    // this is what another contract (or another hook) actually calls to GET a TWAP\n    function consultTwap(PoolKey calldata key, uint32 secondsAgoStart, uint32 secondsAgoEnd)\n        external view returns (int24 averageTick)\n    {\n        // in a real implementation you'd store a ring buffer of historical Observations\n        // and interpolate between the two snapshots bracketing your requested window;\n        // this simplified version illustrates the underlying math using only the latest one\n        Observation memory last = lastObservation[key.toId()];\n        // (production code: look up two Observations at the requested times, then)\n        // averageTick = (cumulativeAtEnd - cumulativeAtStart) / (secondsAgoEnd - secondsAgoStart)\n    }\n}\n```\n\n**Why a \"cumulative sum\" instead of just storing the last N prices?** Because storing and iterating over N historical data points on-chain is expensive (every stored value is a real, gas-costing storage slot). The cumulative-sum trick lets you compute the average over *any* window using just two snapshots — the value right now, and the value from however far back you want to average over — subtract them and divide by elapsed time. This is exactly the technique Uniswap v2/v3's own built-in oracle uses internally; you're not inventing a new idea here, you're reimplementing a well-established pattern by hand inside your own hook.\n\n## Pattern B: reading an external oracle instead (Chainlink-style)\n\nFor cases where you don't trust even a TWAP of this specific pool (maybe it's thin/new/easily manipulated), pull a price from outside entirely:\n\n```solidity\nimport {AggregatorV3Interface} from \"chainlink/interfaces/AggregatorV3Interface.sol\";\n\ncontract ExternalOracleHook is BaseHook {\n    AggregatorV3Interface public immutable priceFeed;\n\n    constructor(IPoolManager _poolManager, address _priceFeed) BaseHook(_poolManager) {\n        priceFeed = AggregatorV3Interface(_priceFeed);\n    }\n\n    function getExternalPrice() public view returns (int256 price, uint256 updatedAt) {\n        (, price, , updatedAt, ) = priceFeed.latestRoundData();\n\n        // ALWAYS check staleness — a feed that hasn't updated recently might be\n        // broken, and trusting a stale price is exactly the \"wrong reference price\"\n        // failure mode that makes a hook's logic dangerously wrong\n        require(block.timestamp - updatedAt < 1 hours, \"stale price feed\");\n        require(price > 0, \"invalid price\");\n    }\n\n    function _beforeSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, bytes calldata)\n        internal override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        (int256 externalPrice, ) = getExternalPrice();\n        // ... compare externalPrice against the pool's own current price,\n        // and use the deviation to drive a directional fee (article 8),\n        // or block/adjust the trade if it looks like a depeg (article 13)\n    }\n}\n```\n\n**The staleness check is not optional boilerplate — it's the whole point.** An oracle that silently returns a six-hour-old price during a network outage is worse than no oracle at all, because your hook will confidently act on wrong information instead of visibly failing. Every real integration of an external oracle needs this kind of \"is this data actually fresh\" guard.\n\n## When to use which pattern\n\nRolling your own TWAP (Pattern A) is cheap, requires no external dependency, and works for any pool — but it can only ever reflect *this specific pool's* trading activity, which is a weaker signal for a thin/new/low-volume pool. Reading an external oracle (Pattern B) gives you a signal aggregated across many venues, which is stronger for detecting things like stablecoin depegs — but it adds a dependency on that oracle network's own uptime and security, and it costs an external call (more gas) on every use.\n\n## The one sentence to keep\n\n**A self-rolled TWAP hook stores a running cumulative sum of `tick * time-elapsed` (not raw historical prices) so any two snapshots can reconstruct an average over any window cheaply, while an external-oracle hook instead calls out to a feed like Chainlink and must always check the returned data's staleness before trusting it — and most serious hooks that need \"the real price\" pick whichever tradeoff (self-contained but weaker vs. external but stronger) fits how thin or manipulable their specific pool is.**\n"}, {"id": "learn/20-pattern-jit-liquidity-hook.md", "file": "20-pattern-jit-liquidity-hook.md", "section": "Learn — The Basics", "num": 20, "title": "20 — Code Pattern: JIT & Idle-Liquidity Hook", "md": "# 20 — Code Pattern: JIT & Idle-Liquidity Hook\n\nGoal: build the pattern behind the 153-hook \"Liquidity Management & Incentives\" category — a hook that deploys liquidity from an external lending vault right before a swap and returns it right after (JIT), and the closely related pattern of parking idle capital in a yield source between swaps.\n\n## The core idea, restated as code intent\n\nFrom article 2/4: an LP's concentrated position only earns fees while the price is inside their chosen range. The \"idle liquidity\" pattern says: **don't let unused capital just sit there — deploy it into a lending protocol (earning interest) whenever it isn't actively needed for swaps, and pull it back the instant it is needed.**\n\nThis requires the hook to hold custody of (or have approval over) the LP's capital, moving it between \"sitting in the Uniswap pool\" and \"deposited in a lending vault\" automatically. This is exactly why so many of these hooks are `NoOp` hooks in the directory's tagging — \"NoOp\" here means the hook's `beforeAddLiquidity` intercepts a normal liquidity deposit and *redirects* it somewhere else entirely, rather than letting the PoolManager handle it as a standard, boring liquidity position.\n\n## A simplified version: route idle capital into an ERC-4626 vault\n\n**ERC-4626** is a standard interface for \"tokenized yield vaults\" — deposit an asset, receive a share token, the vault's underlying strategy (e.g. lending on Aave) earns yield, and your share token appreciates in value over time. Almost every \"park idle liquidity somewhere\" hook in the directory is really just \"call `deposit()`/`withdraw()` on an ERC-4626 vault at the right moments.\"\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {PoolId} from \"v4-core/src/types/PoolId.sol\";\nimport {IERC4626} from \"openzeppelin-contracts/interfaces/IERC4626.sol\";\nimport {IERC20} from \"openzeppelin-contracts/interfaces/IERC20.sol\";\n\ncontract IdleLiquidityHook is BaseHook {\n    IERC4626 public immutable yieldVault;   // e.g. an Aave-backed USDC vault\n    IERC20 public immutable underlying;     // the token this vault accepts (e.g. USDC)\n\n    // tracks how many vault shares this hook currently holds on behalf of the pool\n    mapping(PoolId => uint256) public vaultShares;\n\n    constructor(IPoolManager _poolManager, IERC4626 _vault) BaseHook(_poolManager) {\n        yieldVault = _vault;\n        underlying = IERC20(_vault.asset());\n        underlying.approve(address(_vault), type(uint256).max);\n    }\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: false,\n            beforeAddLiquidity: false, afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: true,   // <- pull capital OUT of the vault right before a swap needs it\n            afterSwap: true,    // <- push capital back INTO the vault once the swap is done\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: true,  // <- we need this because we're injecting our own liquidity into the swap\n            afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    function _beforeSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata params, bytes calldata)\n        internal override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        PoolId id = key.toId();\n        uint256 shares = vaultShares[id];\n\n        if (shares > 0) {\n            // pull our parked capital OUT of the yield vault, back into liquid form,\n            // so it's available to actually service this swap\n            uint256 withdrawn = yieldVault.redeem(shares, address(this), address(this));\n            vaultShares[id] = 0;\n\n            // ... here a real implementation would call poolManager.modifyLiquidity()\n            // to actually deposit `withdrawn` into the pool's active range for this\n            // one transaction (the \"just-in-time\" part), and construct a BeforeSwapDelta\n            // reflecting that injected liquidity. Simplified out here for clarity —\n            // this is the single most fiddly part of a real JIT hook to get right.\n        }\n\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, 0);\n    }\n\n    function _afterSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, /* delta */ , bytes calldata)\n        internal override returns (bytes4, int128)\n    {\n        PoolId id = key.toId();\n\n        // ... a real implementation would first call poolManager.modifyLiquidity()\n        // to WITHDRAW the just-added JIT position (now including earned swap fees)\n        // back out of the pool, then:\n        uint256 idleBalance = underlying.balanceOf(address(this));\n        if (idleBalance > 0) {\n            uint256 shares = yieldVault.deposit(idleBalance, address(this));\n            vaultShares[id] += shares;\n        }\n\n        return (this.afterSwap.selector, 0);\n    }\n}\n```\n\n## The part deliberately left as a comment, and why it's the hard part\n\nActually calling `poolManager.modifyLiquidity()` *from inside a hook callback, during someone else's swap transaction* is the genuinely tricky bit of a real JIT hook — you're adding/removing liquidity in the middle of an already-in-progress swap, which means carefully constructing the `BalanceDelta`/`BeforeSwapDelta` math so the PoolManager's final accounting still nets out to zero (recall article 5's flash accounting: everything must settle by the end of the transaction, or it reverts). This is exactly why `beforeSwapReturnDelta: true` is flagged in `getHookPermissions()` above — it tells the PoolManager \"expect this hook to be injecting its own balance changes into this swap, not just observing it.\" Getting this exactly right is genuinely one of the more advanced things you can do with a v4 hook, and it's worth building the simpler non-JIT version first (just parking/unparking capital between separate transactions, rather than mid-swap) before attempting true same-transaction JIT.\n\n## A simpler, safer starting point: park between transactions, not mid-swap\n\nIf true JIT (same-transaction inject/withdraw) feels like too much to start with, a legitimate simpler version of this exact idea: use `afterSwap` to notice \"the pool's active range now has more capital sitting idle than needed\" and deposit the surplus into the vault, then use `beforeSwap` (or a separate keeper-triggered function) to pull capital back only when the price is about to cross back into a range that needs it — accepting that you might miss capturing fees on the very first swap after a withdrawal, in exchange for a much simpler, safer implementation.\n\n## The one sentence to keep\n\n**An idle-liquidity hook holds shares in an ERC-4626 yield vault on behalf of the pool, redeeming them back to liquid tokens in `beforeSwap` and re-depositing surplus in `afterSwap`; true same-transaction JIT liquidity additionally requires calling `poolManager.modifyLiquidity()` mid-swap with `beforeSwapReturnDelta` flagged on, which is genuinely one of the harder patterns in this whole lesson series — start with the simpler \"park between transactions\" version before attempting real JIT.**\n"}, {"id": "learn/21-pattern-limit-order-hook.md", "file": "21-pattern-limit-order-hook.md", "section": "Learn — The Basics", "num": 21, "title": "21 — Code Pattern: On-Chain Limit Order Hook", "md": "# 21 — Code Pattern: On-Chain Limit Order Hook\n\nGoal: build the pattern behind the \"place a limit order, no external bot required\" idea from article `order-types-routing-auctions.md` — a hook that lets a user say \"execute my trade only once the price reaches tick X,\" implemented as single-sided liquidity that gets automatically consumed when the price crosses that tick.\n\n## The core trick: a limit order IS a single-sided liquidity position\n\nRecall article 4: a concentrated liquidity position only needs to hold *both* tokens if its range straddles the current price. If you place a position entirely *above* or entirely *below* the current price, it only needs to hold one of the two tokens — and here's the key insight: **as the price moves through that position's range, the position mechanically converts entirely from one token into the other.** That conversion, happening automatically as a side effect of normal AMM math, *is* the limit order executing. You don't need special \"order\" logic distinct from liquidity provision — you need a hook that (1) tracks which narrow ranges have pending single-sided positions, and (2) notices, after each swap, when the price has crossed through one, so it can let the user claim their now-converted tokens.\n\n## The hook\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {PoolId} from \"v4-core/src/types/PoolId.sol\";\nimport {StateLibrary} from \"v4-core/src/libraries/StateLibrary.sol\";\n\ncontract LimitOrderHook is BaseHook {\n    using StateLibrary for IPoolManager;\n\n    struct Order {\n        address owner;\n        int24 tick;\n        bool zeroForOne;   // which direction this order is selling\n        uint256 amount;\n        bool executed;\n    }\n\n    mapping(PoolId => mapping(int24 => Order[])) public ordersAtTick;\n    mapping(PoolId => int24) public lastCheckedTick;\n\n    constructor(IPoolManager _poolManager) BaseHook(_poolManager) {}\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: true,\n            beforeAddLiquidity: false, afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: false,\n            afterSwap: true,   // <- this is where we detect a crossed order and execute it\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: false, afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    // user-facing function: place a limit order at a specific tick\n    function placeOrder(PoolKey calldata key, int24 tick, bool zeroForOne, uint256 amount) external {\n        // (real implementation: pull `amount` of the correct token from msg.sender,\n        // then deposit it as single-sided liquidity via poolManager.modifyLiquidity()\n        // at [tick, tick + tickSpacing], recording it below for tracking)\n\n        ordersAtTick[key.toId()][tick].push(Order({\n            owner: msg.sender,\n            tick: tick,\n            zeroForOne: zeroForOne,\n            amount: amount,\n            executed: false\n        }));\n    }\n\n    function _afterInitialize(address, PoolKey calldata key, uint160, int24 tick)\n        internal override returns (bytes4)\n    {\n        lastCheckedTick[key.toId()] = tick;\n        return this.afterInitialize.selector;\n    }\n\n    function _afterSwap(address, PoolKey calldata key, IPoolManager.SwapParams calldata, /* delta */ , bytes calldata)\n        internal override returns (bytes4, int128)\n    {\n        PoolId id = key.toId();\n        (, int24 currentTick, , ) = poolManager.getSlot0(id);\n        int24 previousTick = lastCheckedTick[id];\n\n        // walk every tick between where we were and where we are now,\n        // checking for any pending orders that just got crossed\n        if (currentTick > previousTick) {\n            for (int24 t = previousTick; t <= currentTick; t++) {\n                _tryExecuteOrdersAtTick(key, id, t);\n            }\n        } else if (currentTick < previousTick) {\n            for (int24 t = previousTick; t >= currentTick; t--) {\n                _tryExecuteOrdersAtTick(key, id, t);\n            }\n        }\n\n        lastCheckedTick[id] = currentTick;\n        return (this.afterSwap.selector, 0);\n    }\n\n    function _tryExecuteOrdersAtTick(PoolKey calldata key, PoolId id, int24 tick) internal {\n        Order[] storage orders = ordersAtTick[id][tick];\n        for (uint256 i = 0; i < orders.length; i++) {\n            if (!orders[i].executed) {\n                orders[i].executed = true;\n                // (real implementation: call poolManager.modifyLiquidity() to remove\n                // this single-sided position, which by now holds the OTHER token,\n                // and credit it to orders[i].owner's claimable balance)\n            }\n        }\n    }\n\n    // user-facing function: withdraw tokens from a filled order\n    function claimOrder(PoolKey calldata key, int24 tick, uint256 orderIndex) external {\n        Order storage order = ordersAtTick[key.toId()][tick][orderIndex];\n        require(order.executed, \"not filled yet\");\n        require(order.owner == msg.sender, \"not your order\");\n        // (transfer the converted tokens to msg.sender, mark as claimed)\n    }\n}\n```\n\n## The part worth sitting with: why we loop over ticks, not just check \"did we cross\"\n\nNotice `_afterSwap` walks tick-by-tick between `previousTick` and `currentTick`, rather than just comparing the two endpoints. This matters because a single large swap can cross *many* ticks in one transaction — if three different users placed limit orders at three different ticks and one big trade blows through all three at once, all three need to be detected and executed within that same `afterSwap` call, not just the final resting tick. This is a real gas consideration in production: if `currentTick - previousTick` can be very large (a huge single swap), looping over every tick in between can get expensive — real implementations often use a more efficient bitmap-based structure (similar to how Uniswap's own core tracks \"which ticks have liquidity\" via a `TickBitmap`) to jump directly to only the ticks that actually have pending orders, rather than iterating over every possible tick number.\n\n## Why `claimOrder` is a separate function instead of auto-sending funds\n\nDeliberately splitting \"detect and execute\" (`afterSwap`) from \"claim your filled order\" (`claimOrder`) rather than automatically pushing tokens to the user the moment their order fills is a common, deliberate pattern: pushing tokens to an arbitrary external address as a side effect of *someone else's* swap transaction adds gas cost to that unrelated swap, and — more importantly — opens a reentrancy surface (sending tokens can trigger arbitrary code in the recipient) at a moment when the PoolManager's own accounting is still mid-settlement. Letting the order-filler claim their own tokens later, in their own separate transaction, is simpler and safer.\n\n## The one sentence to keep\n\n**An on-chain limit order is really just a single-sided liquidity position placed at a specific tick, which mechanically converts into the other token as the price crosses through it — the hook's real job is watching `afterSwap` for which ticks got crossed (potentially many in one swap) and marking those positions executed, while actually handing tokens back to the user happens in a separate, user-initiated `claimOrder` call rather than automatically, to avoid loading unrelated gas cost and reentrancy risk onto someone else's swap transaction.**\n"}, {"id": "learn/22-pattern-mev-protection-hook.md", "file": "22-pattern-mev-protection-hook.md", "section": "Learn — The Basics", "num": 22, "title": "22 — Code Pattern: MEV / Anti-Sandwich Hook", "md": "# 22 — Code Pattern: MEV / Anti-Sandwich Hook\n\nGoal: build two of the real approaches from article 7 as actual code — priority-fee-aware fee bumping (cheap, imperfect, honest about its limits) and a commit-reveal pattern (stronger, more involved). Understanding exactly what each one can and can't stop matters more than the code itself here.\n\n## Approach A: tax high priority fees (a real but limited heuristic)\n\nRecall article 7: a sandwiching bot needs its front-run transaction to land *before* yours in the same block, which it typically achieves by paying an unusually high priority fee (the tip that incentivizes a block builder to include and order it favorably). This gives us an imperfect but genuinely useful signal.\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {LPFeeLibrary} from \"v4-core/src/libraries/LPFeeLibrary.sol\";\n\ncontract PriorityFeeAwareHook is BaseHook {\n    uint24 public constant BASE_FEE = 3000;      // 0.30%\n    uint24 public constant PENALTY_FEE = 10000;  // 1.00%, applied to suspiciously high-priority swaps\n    uint256 public constant SUSPICIOUS_TIP_THRESHOLD = 5 gwei;\n\n    constructor(IPoolManager _poolManager) BaseHook(_poolManager) {}\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: false,\n            beforeAddLiquidity: false, afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: true, afterSwap: false,\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: false, afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    function _beforeSwap(address, PoolKey calldata, IPoolManager.SwapParams calldata, bytes calldata)\n        internal override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        // tx.gasprice includes the priority fee the caller chose to pay;\n        // block.basefee is the network-wide minimum required this block —\n        // the DIFFERENCE is roughly \"how much extra is this transaction paying to get prioritized\"\n        uint256 priorityTip = tx.gasprice > block.basefee ? tx.gasprice - block.basefee : 0;\n\n        uint24 fee = priorityTip > SUSPICIOUS_TIP_THRESHOLD ? PENALTY_FEE : BASE_FEE;\n\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, fee | LPFeeLibrary.OVERRIDE_FEE_FLAG);\n    }\n}\n```\n\n**Be honest with yourself about what this does and doesn't stop.** This penalizes *any* transaction with a high tip, including a legitimate trader who's simply in a hurry, or a sandwiching bot that's smart enough to use a moderate tip and win block placement through other means (private order-flow deals with a block builder, for instance, which bypass the public tip-auction entirely). This is a real, used technique, but it's a blunt heuristic, not a guarantee — worth stating plainly in your own project's docs rather than overselling it, and worth knowing this limitation before you build your pitch around it.\n\n## Approach B: commit-reveal (stronger, more machinery)\n\nThe more robust idea: don't let anyone see your trade's actual parameters *at all* until it's already too late to front-run. This requires two separate transactions instead of one.\n\n```solidity\ncontract CommitRevealHook is BaseHook {\n    struct Commitment {\n        bytes32 commitHash;\n        uint256 commitBlock;\n    }\n\n    mapping(address => Commitment) public commitments;\n    uint256 public constant REVEAL_DELAY_BLOCKS = 2;\n\n    // step 1: user submits ONLY a hash of their intended trade + a secret salt,\n    // revealing nothing about direction or size\n    function commitSwap(bytes32 commitHash) external {\n        commitments[msg.sender] = Commitment({\n            commitHash: commitHash,\n            commitBlock: block.number\n        });\n    }\n\n    // step 2: a few blocks later, user reveals the actual parameters, which\n    // must hash to exactly what they committed earlier\n    function revealAndSwap(\n        PoolKey calldata key,\n        IPoolManager.SwapParams calldata params,\n        bytes32 salt\n    ) external {\n        Commitment memory c = commitments[msg.sender];\n        require(block.number >= c.commitBlock + REVEAL_DELAY_BLOCKS, \"reveal too early\");\n        require(\n            keccak256(abi.encode(params, salt)) == c.commitHash,\n            \"revealed params don't match commitment\"\n        );\n\n        delete commitments[msg.sender];\n        // ... now actually execute the swap through the PoolManager\n    }\n}\n```\n\n**How this actually defeats front-running, and what it costs you.** During the \"commit\" transaction, a bot watching the mempool sees only a meaningless hash — no direction, no size, nothing actionable. By the time the real parameters are revealed (and could theoretically be front-run), the trade executes in the *same* revealing transaction, leaving no gap for a bot to react within. The cost: this requires two separate user transactions instead of one (worse UX, more gas overall), and a mandatory delay between them (worse latency) — which is exactly why commit-reveal shows up far less often in the directory than the cheaper, imperfect heuristics like priority-fee penalties. It's a real tradeoff between protection strength and usability, not a strictly-better option.\n\n## A third, cheaper mitigation worth knowing: slippage bounds as your own baseline defense\n\nBefore reaching for either hook pattern above, remember the simplest available defense already lives in `SwapParams.sqrtPriceLimitX96` (lesson 17) — a tight, correctly-set slippage limit already caps how much a sandwich attack can extract from any individual trade, because the trade simply reverts if the price has moved past what the user was willing to accept. Most real-world sandwich losses happen specifically because a wallet/frontend sets an overly loose default slippage tolerance (some interfaces default to 0.5%-1%, or worse, \"auto\" settings that pick something generous) — a huge amount of MEV-protection hook complexity in this directory is arguably compensating for that one upstream UX default, more than it's solving something unfixable at the protocol level.\n\n## The one sentence to keep\n\n**A priority-fee-penalty hook is cheap and easy to build but only a blunt heuristic (it can't distinguish an impatient honest trader from a bot, and doesn't stop private order-flow deals), a commit-reveal hook genuinely hides trade parameters until it's too late to front-run but costs two transactions and a mandatory delay, and neither replaces the far simpler, already-available defense of a correctly tight slippage bound — which is worth understanding before building something more elaborate to solve a problem tighter defaults would have mostly prevented.**\n"}, {"id": "learn/23-pattern-compliance-kyc-hook.md", "file": "23-pattern-compliance-kyc-hook.md", "section": "Learn — The Basics", "num": 23, "title": "23 — Code Pattern: Compliance / KYC-Gated Hook", "md": "# 23 — Code Pattern: Compliance / KYC-Gated Hook\n\nGoal: build the pattern behind the 60-hook \"Compliance, KYC & Identity\" category — a hook that only allows swaps and liquidity actions from wallets that have passed some verification, which is the prerequisite every RWA-tokenization hook (article 13) needs before it's legally usable for anything beyond a demo.\n\n## The simplest version: a whitelist mapping, gated in `beforeSwap`\n\n```solidity\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.24;\n\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";\nimport {IPoolManager} from \"v4-core/src/interfaces/IPoolManager.sol\";\nimport {PoolKey} from \"v4-core/src/types/PoolKey.sol\";\nimport {Ownable} from \"openzeppelin-contracts/access/Ownable.sol\";\n\ncontract WhitelistGatedHook is BaseHook, Ownable {\n    mapping(address => bool) public isVerified;\n\n    event WalletVerified(address indexed wallet);\n    event WalletRevoked(address indexed wallet);\n\n    constructor(IPoolManager _poolManager, address initialOwner)\n        BaseHook(_poolManager)\n        Ownable(initialOwner)\n    {}\n\n    // in practice, this would be called by a trusted off-chain KYC provider's\n    // relayer wallet, or by an on-chain attestation-checking function — see below\n    function setVerified(address wallet, bool verified) external onlyOwner {\n        isVerified[wallet] = verified;\n        if (verified) emit WalletVerified(wallet);\n        else emit WalletRevoked(wallet);\n    }\n\n    function getHookPermissions() public pure override returns (Hooks.Permissions memory) {\n        return Hooks.Permissions({\n            beforeInitialize: false, afterInitialize: false,\n            beforeAddLiquidity: true,   // <- gate who can become an LP\n            afterAddLiquidity: false,\n            beforeRemoveLiquidity: false, afterRemoveLiquidity: false,\n            beforeSwap: true,            // <- gate who can trade\n            afterSwap: false,\n            beforeDonate: false, afterDonate: false,\n            beforeSwapReturnDelta: false, afterSwapReturnDelta: false,\n            afterAddLiquidityReturnDelta: false, afterRemoveLiquidityReturnDelta: false\n        });\n    }\n\n    function _beforeSwap(address sender, PoolKey calldata, IPoolManager.SwapParams calldata, bytes calldata)\n        internal view override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        require(isVerified[sender], \"wallet not KYC-verified\");\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, 0);\n    }\n\n    function _beforeAddLiquidity(address sender, PoolKey calldata, IPoolManager.ModifyLiquidityParams calldata, bytes calldata)\n        internal view override returns (bytes4)\n    {\n        require(isVerified[sender], \"wallet not KYC-verified\");\n        return this.beforeAddLiquidity.selector;\n    }\n}\n```\n\n## The `sender` gotcha: whose address are you actually checking?\n\n**This is the single most important, most commonly-gotten-wrong detail in a compliance hook.** The `sender` parameter your hook receives is whoever called the PoolManager directly — which, if the user went through a router contract (very common — most frontends route swaps through an aggregator or Uniswap's own router, not raw), will be **the router's address, not the end user's wallet.** Naively checking `isVerified[sender]` in that setup checks whether the *router* is whitelisted, not whether the actual trader is — a real, easy-to-ship bug that completely defeats the compliance check's purpose.\n\nThe standard fix: require the real user's address to be passed explicitly through `hookData` (the arbitrary bytes parameter every callback receives, meant exactly for this kind of \"extra context the router needs to forward\"), and verify it there instead:\n\n```solidity\nfunction _beforeSwap(address sender, PoolKey calldata, IPoolManager.SwapParams calldata, bytes calldata hookData)\n    internal view override returns (bytes4, BeforeSwapDelta, uint24)\n{\n    address actualTrader = abi.decode(hookData, (address));\n    require(isVerified[actualTrader], \"wallet not KYC-verified\");\n    // NOTE: this alone doesn't prove `actualTrader` really is the one who\n    // initiated the call — a malicious router could lie about who's calling.\n    // A production system typically also requires a signature from `actualTrader`\n    // authorizing this specific trade, checked here via ecrecover, rather than\n    // trusting the caller's self-reported hookData at face value.\n    return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, 0);\n}\n```\n\n## A more realistic compliance flow: on-chain attestations instead of an owner-managed mapping\n\nA centrally-owned `setVerified()` mapping (the simple version above) is fine for a hackathon demo, but it means one admin key can arbitrarily add or remove anyone's trading rights — a real centralization/trust concern for anything claiming to be \"decentralized compliance.\" Production-grade approaches (referenced by ERC-3643-style hooks in article 13) typically instead check a *separate*, independent identity-registry contract:\n\n```solidity\ninterface IIdentityRegistry {\n    function isVerified(address wallet) external view returns (bool);\n}\n\ncontract AttestationGatedHook is BaseHook {\n    IIdentityRegistry public immutable identityRegistry;\n\n    constructor(IPoolManager _poolManager, IIdentityRegistry _registry) BaseHook(_poolManager) {\n        identityRegistry = _registry;\n    }\n\n    function _beforeSwap(address, PoolKey calldata, IPoolManager.SwapParams calldata, bytes calldata hookData)\n        internal view override returns (bytes4, BeforeSwapDelta, uint24)\n    {\n        address actualTrader = abi.decode(hookData, (address));\n        require(identityRegistry.isVerified(actualTrader), \"not KYC-verified\");\n        return (this.beforeSwap.selector, BeforeSwapDeltaLibrary.ZERO_DELTA, 0);\n    }\n}\n```\n\nThis separates \"who runs the KYC verification process\" (the identity registry, potentially run by a licensed, regulated third party) from \"who runs the trading pool\" (your hook) — the hook just *checks* a verification status, it doesn't own or manage the verification process itself. This division of responsibility is exactly how ERC-3643 and similar real production standards structure it.\n\n## The one sentence to keep\n\n**A compliance hook checks a caller's verification status in `beforeSwap`/`beforeAddLiquidity`, but naively checking `sender` is a common, serious bug because that's usually a router's address, not the actual trader's — the real trader's address needs to be passed through `hookData` (ideally with a signature proving they actually authorized the trade, not just a self-reported claim), and production systems typically check an independent identity-registry contract rather than an owner-controlled mapping baked into the hook itself.**\n"}, {"id": "learn/24-shared-libraries-and-building-blocks.md", "file": "24-shared-libraries-and-building-blocks.md", "section": "Learn — The Basics", "num": 24, "title": "24 — Shared Libraries & Building Blocks", "md": "# 24 — Shared Libraries & Building Blocks\n\nGoal: a reference sheet of the specific tools you'll see imported at the top of nearly every real hook, across every category — so when you read someone else's hook source code, the import list stops being unfamiliar noise.\n\n## Math libraries: why you almost never use plain `+`/`-`/`*`/`/` for prices\n\nSolidity has no native decimal/floating-point type — `5 / 2` in Solidity is `2`, not `2.5`, because integer division truncates. Financial math (prices, percentages, fees) needs precision that raw integer math can't give you, so real hooks use **fixed-point math libraries**, which represent fractional numbers as very large integers scaled by a fixed factor (commonly `1e18`, meaning \"1.0\" is stored as the number `1000000000000000000`), and provide safe multiply/divide operations that handle that scaling correctly without overflowing or silently losing precision.\n\n- **`FixedPointMathLib`** (from Solmate or Solady) — the most commonly used, lightweight fixed-point math helper: `mulDivDown`, `mulDivUp`, and similar functions that correctly handle \"multiply two big numbers, then divide, without overflowing partway through\" — a genuinely easy mistake to make by hand (`a * b / c` can overflow at the `a * b` step even when the final answer would have fit fine).\n- **`PRBMath`** — a more full-featured fixed-point and math library (natural log, exponentials, more exotic operations), reached for when a hook's logic needs something beyond basic multiply/divide (e.g. a hook computing implied volatility or an options-pricing curve).\n- **`TickMath`** (from `v4-core`) — converts between a tick (article 4's discrete price step) and the actual `sqrtPriceX96` representation Uniswap uses internally for price. You'll import this constantly any time your hook logic needs to reason about \"what price does tick X actually represent\" or vice versa.\n\n## Token-handling: why hooks don't just call `transfer()` directly\n\n- **`SafeERC20`** (OpenZeppelin) — wraps standard ERC20 `transfer`/`transferFrom` calls with extra checks, because a meaningful number of real-world tokens (most infamously USDT) don't strictly follow the ERC20 standard's return-value conventions, and a naive `transfer()` call can silently \"succeed\" against a broken token in a way that leaves your contract's accounting wrong. `SafeERC20`'s `safeTransfer`/`safeTransferFrom` handle these edge cases so your hook doesn't have to special-case every weird token it might ever touch.\n- **`CurrencyLibrary`** (from `v4-core`) — v4 represents both ERC20 tokens *and* native ETH under one unified `Currency` type (instead of the older pattern of wrapping ETH into WETH everywhere), and this library provides the helper functions (`transfer`, `balanceOf`) that work correctly across both cases. Any time you see a `Currency` type instead of a plain `address` in a hook's code, this is why.\n\n## Access control and safety\n\n- **`Ownable`** (OpenZeppelin) — the standard \"one address (the owner) can call certain admin functions\" pattern, used in lesson 23's whitelist example and in essentially any hook that needs *some* configurable parameter (fee bounds, an oracle address, pausing) without full decentralized governance.\n- **`ReentrancyGuard`** (OpenZeppelin) — a modifier (`nonReentrant`) that prevents a function from being re-entered (called again) before its first execution finishes, protecting against reentrancy attacks (a malicious token or contract calling back into your hook mid-execution to exploit inconsistent intermediate state). Worth knowing where this matters specifically for hooks: the PoolManager itself already has its own reentrancy protections around the core swap/liquidity flow, but *your hook's own* external calls (to a vault in lesson 20, to an oracle in lesson 19) can still open your own contract-level reentrancy surface if you're not careful — covered properly in lesson 25.\n- **`Pausable`** (OpenZeppelin) — a simple, commonly-added safety valve: an owner-controlled switch that can halt a hook's normal operation in an emergency (a discovered bug, an oracle malfunction) without needing to fully redeploy or migrate the pool. Cheap insurance to add to almost any hook holding real user funds.\n\n## Reading pool state from inside your own hook\n\n- **`StateLibrary`** (from `v4-core`, used constantly in lessons 17-22) — the standard way any hook reads the PoolManager's actual current state (price, tick, liquidity) for a given pool, since — recall article 5 — that state lives inside the singleton PoolManager's own storage, not inside your hook contract.\n\n## Vaults and yield\n\n- **`IERC4626`** (the \"Tokenized Vault Standard,\" used in lesson 20) — the standard interface almost every \"park idle capital somewhere to earn yield\" hook builds on. Worth knowing the two functions you'll call constantly: `deposit(assets, receiver)` (put tokens in, get vault shares back) and `redeem(shares, receiver, owner)` (burn shares, get the underlying tokens plus accrued yield back).\n\n## Oracles\n\n- **`AggregatorV3Interface`** (Chainlink, used in lesson 19) — the standard interface for reading a Chainlink price feed's `latestRoundData()`. Any hook reading an external price will import this (or Pyth's equivalent SDK interfaces, for hooks integrated with Pyth instead).\n\n## A realistic import block, now legible\n\nOnce you've met each of the above once, a real hook's import list — which looks like unreadable noise the first time you see it — becomes a straightforward checklist of \"which specific concerns does this hook need to handle\":\n\n```solidity\nimport {BaseHook} from \"v4-periphery/src/utils/BaseHook.sol\";                     // hook plumbing (lesson 15)\nimport {Hooks} from \"v4-core/src/libraries/Hooks.sol\";                            // permission flags (lesson 15)\nimport {StateLibrary} from \"v4-core/src/libraries/StateLibrary.sol\";              // read pool state (lesson 17)\nimport {LPFeeLibrary} from \"v4-core/src/libraries/LPFeeLibrary.sol\";              // dynamic fee override (lesson 18)\nimport {TickMath} from \"v4-core/src/libraries/TickMath.sol\";                      // tick <-> price conversion\nimport {FixedPointMathLib} from \"solmate/src/utils/FixedPointMathLib.sol\";        // safe fee/percentage math\nimport {SafeERC20} from \"openzeppelin-contracts/token/ERC20/utils/SafeERC20.sol\"; // safe token transfers\nimport {IERC4626} from \"openzeppelin-contracts/interfaces/IERC4626.sol\";          // yield vault integration (lesson 20)\nimport {AggregatorV3Interface} from \"chainlink/interfaces/AggregatorV3Interface.sol\"; // external oracle (lesson 19)\n```\n\nThat's a hook doing dynamic fees, idle-capital yield parking, *and* oracle-based safety checks all at once — a genuinely realistic, ambitious combination, and by this point in the lesson series you should be able to guess roughly what each import is there to do before even reading the contract body.\n\n## The one sentence to keep\n\n**Almost every real hook's import list draws from the same small toolbox — a fixed-point math library (for precision Solidity's native integers don't give you), `SafeERC20`/`CurrencyLibrary` (for tokens that don't perfectly follow the standard, and native ETH), `Ownable`/`ReentrancyGuard`/`Pausable` (for admin control and safety), `StateLibrary` (to read the PoolManager's real state), and whichever domain-specific interface (ERC-4626, Chainlink) its particular idea needs — and once you recognize each one on sight, no hook's import block will look like unfamiliar noise again.**\n"}, {"id": "learn/25-security-pitfalls-specific-to-hooks.md", "file": "25-security-pitfalls-specific-to-hooks.md", "section": "Learn — The Basics", "num": 25, "title": "25 — Security Pitfalls Specific to Hooks", "md": "# 25 — Security Pitfalls Specific to Hooks\n\nGoal: the closing lesson. A list of mistakes that are easy to make specifically *because* of how hooks work (not generic Solidity security 101, though that all still applies too) — each with a concrete failure scenario, so these stay memorable instead of abstract warnings.\n\n## 1. Forgetting `onlyPoolManager` — letting anyone trigger your callbacks\n\n**The mistake**: writing a `beforeSwap` function that anyone can call directly, not just the PoolManager during an actual swap.\n\n**Why it's dangerous**: if `_beforeSwap` updates state assuming it's only ever called in the middle of a real, PoolManager-orchestrated swap (e.g. lesson 18's fee tracker, lesson 21's tick-crossing detector), an attacker calling it directly, out of context, can desynchronize that state from reality — recording fake volatility data, marking limit orders as executed when no real swap happened, or worse.\n\n**The fix**: `BaseHook`'s constructor already sets this up for you correctly (lesson 15) — the public wrapper functions it provides (`beforeSwap`, `afterSwap`, etc.) already check `msg.sender == address(poolManager)` before calling into your `_beforeSwap`/`_afterSwap` internal functions. The mistake shows up specifically when someone bypasses `BaseHook` and implements `IHooks` raw, or adds a *new*, separate public function that touches the same sensitive state without the same guard. Rule of thumb: any function that reads or writes state your swap-callbacks depend on should be `internal`, `private`, or explicitly access-controlled — never assume \"only the PoolManager will realistically call this\" without actually enforcing it.\n\n## 2. Trusting `hookData` without verifying who actually sent it\n\n**The mistake**: lesson 23's compliance hook reads an \"actual trader\" address out of `hookData` and checks *that* address against a whitelist — but never verifies the caller genuinely represents that address.\n\n**Why it's dangerous**: `hookData` is just arbitrary bytes passed along by whoever calls the swap. A malicious or buggy router could pass `hookData` claiming to represent a verified, whitelisted wallet, while the trade is actually being executed on behalf of someone who was never verified at all — completely defeating the compliance check's entire purpose while looking, on the surface, like it's working correctly.\n\n**The fix**: for anything security-critical (compliance gating, reward eligibility, anything with real consequences), don't trust a bare address claim in `hookData` — require a signature (`ecrecover`) proving the claimed address actually authorized this specific trade, or restrict which router contracts are allowed to call your pool at all via a trusted-router allowlist.\n\n## 3. Reentrancy through your own external calls, not through the PoolManager\n\n**The mistake**: assuming that because the PoolManager has its own reentrancy protections around the core swap flow, your hook is automatically safe from reentrancy too.\n\n**Why it's dangerous**: the PoolManager's protections cover *its own* state. The instant your hook makes an external call — to an ERC-4626 vault (lesson 20), to an oracle, to *any* other contract — that external contract can, in principle, call back into your hook before your own function finishes executing, potentially re-entering while your hook's own state (not the PoolManager's) is in a partially-updated, inconsistent state. A vault-integrated hook that updates its own `vaultShares` mapping *after* an external `deposit()`/`redeem()` call, rather than before, is a classic version of this bug shape (the \"checks-effects-interactions\" ordering violation, just inside a hook instead of a typical DeFi contract).\n\n**The fix**: follow checks-effects-interactions rigorously inside your hook too — update your own internal state *before* making external calls, not after — and use `ReentrancyGuard`'s `nonReentrant` modifier on any hook function that both touches sensitive state and makes an external call, as defense in depth.\n\n## 4. Getting the hook address / permission flags out of sync\n\n**The mistake**: changing `getHookPermissions()` (e.g. adding `afterSwap: true` for a new feature) without re-mining and re-deploying to a matching address.\n\n**Why it's dangerous**: this one usually just fails loudly (pool initialization reverts with `HookAddressNotValid`, per lesson 16) rather than silently causing a security issue — but it's worth listing because it's the single most common \"why won't this deploy\" moment for anyone iterating on a hook, and it's easy to burn real time confused about it before recognizing the actual cause.\n\n**The fix**: any time you change which callbacks your hook uses, re-run the mining step (lesson 16) — there is no way around this, the address and the permissions are cryptographically tied together by design.\n\n## 5. Trusting your own pool's spot/TWAP price for something that needs a stronger guarantee\n\n**The mistake**: using a self-rolled TWAP (lesson 19, Pattern A) of a specific pool as the reference price for something with real financial stakes — e.g. deciding whether a stablecoin has depegged, or pricing an option — for a pool that's thin, new, or low-volume.\n\n**Why it's dangerous**: article 9's flash-loan manipulation risk doesn't disappear just because you're averaging over time instead of reading spot price — it just gets more expensive to pull off. For a thin enough pool, \"more expensive\" can still be cheap enough to be profitable for an attacker relative to what they can extract by fooling your hook's logic. A TWAP is a real improvement over spot price, not an absolute guarantee, and its manipulation-resistance scales with how deep and actively-traded the underlying pool actually is.\n\n**The fix**: for anything with serious financial consequences riding on the price being correct, prefer an external, independently-aggregated oracle (lesson 19, Pattern B) over a self-rolled TWAP of a single, possibly-thin pool — and even then, always check staleness (pitfall discussed in lesson 19) rather than trusting the last returned value blindly.\n\n## 6. Fee-override math that can exceed 100%, or underflow to something nonsensical\n\n**The mistake**: a dynamic-fee formula (lesson 18) that, under some extreme but reachable input (very large tick delta, a sudden price gap), computes a fee value larger than what the fee-encoding format can represent, or that silently wraps/underflows into a tiny or zero fee instead of a large one.\n\n**Why it's dangerous**: an unbounded or incorrectly-clamped fee formula can, at the extreme, either lock a pool (fee effectively 100%+, nobody can trade) or accidentally zero out your protection exactly during the highest-volatility moment — the one moment your dynamic fee was supposed to matter most.\n\n**The fix**: always explicitly clamp computed fees to a sane `[MIN_FEE, MAX_FEE]` range (as lesson 18's example does with `if (fee > MAX_FEE) fee = MAX_FEE;`) rather than trusting a formula to naturally stay in bounds under every possible market condition — and write a Foundry fuzz test (`forge test --fuzz`) specifically feeding your fee formula extreme tick-delta inputs to confirm the clamp actually holds.\n\n## The one sentence to keep\n\n**Most hook-specific security bugs come from one of three
