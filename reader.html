e wallet history — is public forever. This has two consequences that hooks in this category try to fix:\n\n1. **It enables MEV** (see `mev-lvr-protection.md`) — bots can see your pending trade before it's confirmed and act on that information against you.\n2. **It's simply bad for privacy** — institutions in particular don't want competitors seeing their trading strategy or position sizes, and individuals may not want their entire financial history permanently public.\n\nTwo different cryptographic tools are used to address this in the dataset:\n\n- **Zero-Knowledge proofs (zk-SNARKs)** — let you *prove* a statement is true (e.g. \"I have at least 5,000 USDC in this pool\" or \"I am a unique verified human\") without revealing the underlying data itself.\n- **Fully Homomorphic Encryption (FHE)** — lets a smart contract *compute directly on encrypted data* without ever decrypting it, so a hook can, for example, match or process trades whose direction and size stay encrypted the entire time, only becoming visible (if ever) after execution.\n\n## Why so many teams attack this\n\nFHE-on-EVM projects like Fhenix, and various zk-proof toolkits (e.g. Brevis), were actively promoted integrations within the UHI program, so builders had ready-made tools to plug into. Privacy is also a naturally compelling pitch because it directly counters the most commonly cited weakness of public blockchains.\n\n## Common approaches seen in this dataset\n\n1. **Encrypted order flow / confidential swaps** — hide the direction and/or size of a trade using FHE until after it's committed, denying front-runners the information they need (ShadowSwap, CipherFlow, Vaultage, ZK-JIT Liquidity Hook).\n2. **Zero-knowledge proof-of-contribution** — prove a wallet meets some threshold (e.g. minimum liquidity provided) without revealing exact balances, unlocking benefits elsewhere without full transparency (Liquidity Rewards via Brevis).\n3. **Mixer-style privacy** — directly adapt privacy-pool designs (like Tornado Cash) into an AMM context, breaking the on-chain link between depositor and withdrawer (Tornado Hook, Vortex Protocol).\n4. **Confidential attestations for gamified/loyalty systems** — combine privacy tech with the reward mechanisms discussed in `trading-rewards-gamification.md` so participation can be verified without exposing full activity history (StreakFi).\n\n## Prior art / reference material\n\n- Tornado Cash — the best-known zk-based mixer design; directly referenced/adapted by at least one project (Tornado Hook) in this dataset. (Note: Tornado Cash itself has faced significant regulatory/sanctions scrutiny in the US — a useful real-world caveat for anyone building in this space, referenced in the directory's own legal disclaimer.)\n- Fhenix — an FHE-enabled EVM-compatible chain, the most commonly integrated FHE provider across this dataset's \"encrypted trading\" hooks.\n- Brevis — a zk-coprocessor/proof infrastructure provider referenced for proof-of-liquidity-contribution use cases.\n- General zk-SNARK literature (e.g. Groth16, PLONK proof systems) — the underlying cryptographic primitives beneath any \"zk-SNARK\" tagged project, though most entries don't specify which proof system they use.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **Milady Pool** | UHI2 | A private platform where users trade crypto without disclosing intentions to a wider market. | Custom Routers, Custom hooks, DEX, EigenLayer, Order Type, zk-SNARK |\n| **Steelo.io** | UHI2 | Steelo is a web3 social media mobile app helping creators turn fans into investors through self-tokenisation, token-gated experiences and value-redistributing tokenomics. | Coincidence of Wants, DEX, DeFi, Dynamic Fee, ETH Staking, Governance, KYC, Order Type, Security, Tokenized Stocks, Trading Rewards, Trading Volume Rewards, base interest rate, zk-SNARK |\n| **Stormbit** | UHI2 | Stormbit is multichain p2p lending protocol trust based aiming to bring more access to loans. | DeFi, Donations, KYC, zk-SNARK |\n| **Unipay** | UHI2 | Use Ethereum to stake and get credit card's credit. | delegates, zk-SNARK |\n| **Lever** | UHI3 | Lever is a hook which aims to reduce LVR loss for LPs and provide better liquidity depth for traders. LVR for each block is auctioned and gains from LVR are distributed to LPs. | LVR, MEV, zk-SNARK |\n| **Liquidity Rewards** | UHI3 | This project uses Brevis to generate ZK-Proofs verifying that Liquidity Providers (LPs) have contributed at least 5000 USDC to a pool, unlocking cross-platform benefits in DeFi ecosystems. By integrating this with Unichain, it incentivizes liquidity contributions to the ecosystem. | DeFi, Dynamic Fee, LP Liquidity, zk-SNARK |\n| **UniStorm** | UHI3 | UniStorm is a privacy-preserving transaction mixer built on Uniswap v4 that incorporates zero-knowledge proofs from Tornado Cash to allow users to disassociate deposits and withdraws by making swaps. By combining Tornado Cash's zk technology with Uniswap v4's hook system, it enables users to sever the on-chain connection between the sender and recipient through a swap. | Constant Sum Market Maker (CSMM), DEX, DeFi, MEV, NoOp, zk-SNARK |\n| **ViFi** | UHI3 | Institutional stablecoin adoption in Africa and LATAM has soared to over $540bn annually but fragmented liquidity and FX price uncertainty drives this volume to P2P markets and OTC desks. ViFi is a decentralized stablecoin protocol that combines local stablecoins and deep DeFi liquidity to enable businesses realize the best FX rate, at any volume. | DeFi, Stablecoins, zk-SNARK |\n| **AlphaEngine** | UHI4 | Our project unlocks idle liquidity from Uniswap V4 stable pairs to securely fund profitable trading strategies created by global developers and quants. Through our permissionless alpha marketplace, strategy creators earn rewards by monetizing their expertise, while liquidity providers maximize yields from otherwise unused funds. | Custom hooks, LP Fees, LP Liquidity, Oracle, Stablecoins, Yield Farming, zk-SNARK |\n| **Toradle Synergy Bot** | UHI4 | A sophisticated bot-driven trading system for Uniswap V4 that uses ZK proofs through Brevis to validate trading conditions and enforce safety mechanisms, combining oracle price checks, liquidity impact limits, and time-window controls to ensure secure and controlled automated trading. | DEX, Oracle, zk-SNARK |\n| **Janus Protocol** | UHI6 | Janus(Susanoo) is a Uniswap V4 hook that implements fully private limit orders using Fully Homomorphic Encryption (FHE). An implementation of encrypted conditional trading logic that executes only when hidden conditions are met, without ever exposing those conditions to the public blockchain. | DEX, Order Type, zk-SNARK |\n| **Rayls Compliance & Privacy** | UHI6 | Rayls Uniswap V4 hook enables institutional-grade DeFi by combining regulatory compliance and privacy. | KYC, MEV, RWA, Regulation, zk-SNARK |\n| **Shredder** | UHI6 | Hook for privacy swaps using ZK | Security, zk-SNARK |\n| **Tornado Hook** | UHI6 | A Tornado Cash implementation as a Uniswap v4 hook. The project implements both the privacy-preserving mechanism of Tornado Cash and the AMM design of Uniswap v4. | Custom hooks, LP Fees, LP Liquidity, Other, Unichain, zk-SNARK |\n| **Vaultage** | UHI6 | Confidential DEX for Central Banks and Institutional FX. due to time constraints did it on USSD so it works completely offline in global south regions and not on web | Auctions, Constant Product Market Maker (CPMM), DEX, Dynamic Fee, Stablecoins, zk-SNARK |\n| **ZK-JIT Liquidity Hook** | UHI6 | The ZK-JIT Liquidity Hook enables multiple liquidity providers to coordinate Just-In-Time liquidity operations on Uniswap v4 while keeping their trading strategies completely private through Fully Homomorphic Encryption (FHE). It features automated risk management, dynamic fee pricing based on gas conditions, and multi-LP coordination that allows several providers to participate proportionally in a single JIT operation. | Constant Product Market Maker (CPMM), Custom hooks, DEX, Dynamic Fee, Dynamic Tick Adjustment, LP Fees, LP Liquidity, MEV, RWA, Reputation, Security, Trading Rewards, Trading Volume Rewards, zk-SNARK |\n| **AetherPool** | UHI7 | AetherPool enables multiple liquidity providers to coordinate Just-In-Time (JIT) liquidity operations while maintaining complete strategy privacy through Fully Homomorphic Encryption (FHE). | DEX, Dynamic Fee, LP Fees, RWA, Security, Trading Volume Rewards, zk-SNARK |\n| **AetherPool** | UHI7 | AetherPool enables multiple liquidity providers to coordinate Just-In-Time liquidity operations on Uniswap v4 while keeping their trading strategies completely private through Fully Homomorphic Encryption (FHE). It features automated risk management, dynamic fee pricing based on gas conditions, and multi-LP coordination that allows several providers to participate proportionally in a single JIT operation. | Compliance, Constant Product Market Maker (CPMM), Custom Routers, Custom hooks, DEX, Dynamic Fee, LP Fees, LP Liquidity, MEV, RWA, Security, Stablecoins, Trading Rewards, zk-SNARK |\n| **ZK Proof-of-Compliance Hook** | UHI7 | ZK Proof-of-Compliance Hook is a Uniswap v4 hook that restricts swaps and LP actions in selected pools to users who can provide a zero-knowledge compliance proof, without revealing any personal data on-chain. The hook integrates a ZK coprocessor (e.g. Brevis-style architecture) to verify that a user satisfies off-chain KYC/AML checks, jurisdiction rules, age thresholds, and sanctions screening, then exposes only a Boolean “compliant / not compliant” result to the pool. On-chain, the hook enforces this by gating beforeSwap and beforeAddLiquidity so that only addresses with a valid, recent ZK proof can trade or provide liquidity. Off-chain, a verifier backend or ZK coprocessor reads from KYC providers / identity systems, generates the proof, and submits it back for on-chain verification. This design lets RWA issuers, institutional LPs, and compliant frontends plug into Uniswap v4 while preserving user privacy and minimizing regulatory friction. It also keeps the hook modular: pools can configure which compliance profile they require (e.g. “KYC+sanctions only”, “EU-only”, “18+ only”), and the same hook can serve multiple pools with different rule-sets. The end goal is to make Uniswap v4 a first-class venue for regulated and permissioned capital flows, without sacrificing decentralization or composability. | Custom hooks, DEX, KYC, LP Liquidity, Security, zk-SNARK |\n| **ZK-Verified AI Market-Regime Oracle for Uniswap v4** | UHI7 | An EigenLayer-backed AI oracle classifies live market regimes (trending, volatile, mean-reverting, liquidity vacuum, high-manipulation) and feeds verifiable signals into a Uniswap v4 Hook that dynamically adjusts swap fees, tick bands, and anti-MEV controls to protect LPs and improve execution quality. | AI, DeFi Security, Dynamic Fees, Dynamic Tick Adjustment, EigenLayer, Liquidity Management, MEV, MEV Mitigation, Machine Learning, Mempool monitoring, Off-chain Oracle, Oracle, Uniswap v4, ZKML (optional), zk-SNARK |\n| **Arc Hook** | UHI8 | Private, compliance-ready whitelisting for Uniswap v4 pools using multilinear KZG commitments, unichain and the Reactive Network. | DEX, Governance, Security, Unichain, zk-SNARK |\n| **Invariant** | UHI8 | Invariant is a Uniswap v4 hook-native protocol that dynamically optimizes liquidity, fees, and risk using AI-driven strategies while enforcing onchain AMM invariants such as TWAP-based regimes, range constraints, and liquidity safety guards. | CoW, Compliance, Cross-Chain, Custom hooks, DEX, Governance, KYC, LP Fees, Pool Native Incentivization, Reputation, zk-SNARK |\n| **TWAMM-X** | UHI8 | TWAMM-X is a privacy-preserving Time-Weighted Average Market Maker hook for Uniswap v4 that uses  zero-knowledge proofs and on-chain FHE encryption to hide large orders until after execution,  eliminating MEV and front-running. It distributes the resulting LP fees as a continuous 24-hour  yield stream instead of unpredictable lump sums, giving liquidity providers stable, predictable  income from large order flow. | Auctions, Cross-Chain, Custom hooks, Donation, LP Fees, MEV, Order Type, Price Discovery, Security, Yield Farming, zk-SNARK |\n| **Voltaic Hook** | UHI8 | A hook that dynamically adjusts swap fees in real time based on recent pool volatility—automatically raising fees during sharp price swings to protect liquidity providers from impermanent loss and lowering them in calm, stable markets to attract more traders and increase trading volume | CFMM, Cross-Chain, Dynamic Fee, Dynamic Tick Adjustment, Unichain, zk-SNARK |"}, {"id": "hook-directory/categories/security-hooks.md", "file": "security-hooks.md", "section": "Hook Directory — 556 Past Projects", "num": 16, "title": "Security Hooks", "md": "# Security Hooks\n\n**63 hook projects.**\n\n## The problem, explained simply\n\nBecause Uniswap v4 pools are permissionless — anyone can create a pool for any token pair, and anyone can attach a hook — the platform inherits every scam and exploit pattern that already exists in permissionless token launches, plus new ones specific to programmable pools:\n\n- **Rug pulls** — a token creator seeds a pool with liquidity, waits for buyers, then pulls all the liquidity out (or dumps their own huge token holding), leaving buyers with a worthless token and no way to sell.\n- **Malicious or buggy hooks** — because a hook runs arbitrary code around every swap, a malicious hook author can, in principle, do things a normal AMM never could (e.g. trap funds, redirect fees, selectively block certain users).\n- **Sniping** — bots that detect a pool's exact creation or first-liquidity-add transaction and buy before real users can, then dump on them.\n- **Flash-loan-driven manipulation** — an attacker borrows a huge amount of capital for a single transaction to distort a pool's price or drain funds, then repays the loan in the same transaction, leaving no lasting trace besides the damage.\n\n## Why so many teams attack this\n\nSecurity incidents are the single biggest reputational and financial risk in DeFi, and are highly visible (rug pulls and exploits get widely reported), so building visible protective mechanisms is a natural, relatable hackathon pitch: \"trust me, my hook stops the bad thing that just happened to some other project.\"\n\n## Common approaches seen in this dataset\n\n1. **Circuit breakers** — inspired directly by traditional stock-exchange circuit breakers (which halt trading after an extreme price move to give the market time to reassess): pause or restrict trading in a pool if the price moves too far too fast in one block/transaction.\n2. **Anti-sniping protections** — detect and block or penalize transactions that try to buy immediately at pool creation, often by adding an initial cooldown or a minimum liquidity/lockup requirement before normal trading opens.\n3. **Insurance mechanisms** — collect a small insurance premium from swaps or LPs, and pay out compensation automatically if a defined bad event (a rug pull, a depeg, a hook exploit) is detected.\n4. **Liquidity locking / fair-launch enforcement** — require that a meaningful share of a new token's liquidity is locked for a minimum period before allowing trading, directly reducing rug-pull risk for meme/community tokens.\n5. **Hook auditing/composability safety** — frameworks or adapters meant to make it safer to combine multiple third-party hooks on one pool without one hook interfering with or exploiting another.\n\n## Prior art / reference material\n\n- NASDAQ and other traditional-market circuit-breaker rules — the explicit inspiration named by at least one project (uniguard.exchange) in this dataset for pausing pathological trading.\n- Historical rug pull and DeFi exploit case studies (widely documented across the industry, e.g. via RugDoc, DeFi Safety, and post-mortem write-ups) — the general threat model this whole category defends against.\n- Standard smart-contract security practices (reentrancy guards, flash-loan-resistant design) as codified in widely used references like the OpenZeppelin contracts library and Trail of Bits' smart contract security guidelines.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **DCLEX Hook** | UHI2 | A KYC Hook that can't be bypass by using ERC-6909 claim tokens. (modification in the token contract required) | AML, Compliance, KYC, Security, Tokenized Stocks |\n| **Dump No Fun** | UHI2 | We implement a hook and an interface that allows anyone to launch a standardized token with locked liquidity. This hook prevents arbitrary customization, and also prevents 3rd party pool creators to attach this hook (to steal credibility). | DEX, DeFi, Security |\n| **Gacha Hook** | UHI2 | The Gacha Hook addresses high entry barriers, illiquidity, and inefficient revenue models in the NFT market by enabling fractionalization and cross-chain support for a more accessible and dynamic trading experience. | CCIP, Cross-Chain, DEX, DeFi, Raffle, Security |\n| **Hedgehog ALM** | UHI2 | ALM is a Uniswap V4 NoOp hook that enhances LP performance by holding ETH as collateral on Morpho to earn interest. During price declines, it dynamically borrows USDC to acquire more ETH, offering a passive, \"set and forget\" strategy that provides enhanced returns compared to Uniswap V2. | DEX, DeFi, LP Fees, Security, base interest rate |\n| **Multihook** | UHI2 | Adapter for subhooks. Allows you to combine multiple hooks into one | DeFi, Donations, Dynamic Fee, KYC, Security |\n| **NFT Gated Pools** | UHI2 | Exclusive Pools only for the holders of certain NFTs | Compliance, DEX, DeFi, Governance, KYC, Security, Trading Volume Rewards, delegates |\n| **Range Orders Hook** | UHI2 | Automated range orders for LPs | DeFi, Order Type, Security |\n| **RugGuard** | U reening, then exposes only a Boolean “compliant / not compliant” result to the pool. On-chain, the hook enforces this by gating beforeSwap and beforeAddLiquidity so that only addresses with a valid, recent ZK proof can trade or provide liquidity. Off-chain, a verifier backend or ZK coprocessor reads from KYC providers / identity systems, generates the proof, and submits it back for on-chain verification. This design lets RWA issuers, institutional LPs, and compliant frontends plug into Uniswap v4 while preserving user privacy and minimizing regulatory friction. It also keeps the hook modular: pools can configure which compliance profile they require (e.g. “KYC+sanctions only”, “EU-only”, “18+ only”), and the same hook can serve multiple pools with different rule-sets. The end goal is to make Uniswap v4 a first-class venue for regulated and permissioned capital flows, without sacrificing decentralization or composability. | Custom hooks, DEX, KYC, LP Liquidity, Security, zk-SNARK |\n| **fheatherx** | UHI7 | FheatherX is a private decentralized exchange built as a Uniswap v4 Hook using Fhenix's Fully Homomorphic Encryption (FHE). FheatherXv6 combines a Hybrid Encrypted AMM with Private Limit Orders - supporting swaps and liquidity provision across ERC20 and FHERC20 token pairs | Custom hooks, DEX, LP Fees, LP Liquidity, MEV, Security |\n| **modl** | UHI7 | MODL is a modular hook aggregator for Uniswap v4 that lets pools combine multiple independent logic modules under a single hook address. It turns monolithic, fragile hooks into safe, composable building blocks that can evolve without redeploying the pool. | Compliance, Custom hooks, Dynamic Fee, Inter-Connected Pools, Oracle, Security |\n| **AegisHook ( Hook Safety as a Service Cross-chain )** | UHI8 | AegisHook is a Uniswap v4 security hook that monitors live pool behavior, detects suspicious swap patterns, and can automatically pause an      at-risk pool through Reactive callbacks. It turns DeFi security from pass ly\n\nTwo related but distinct problems live in this bucket:\n\n**1. Stablecoin depegs.** A stablecoin (USDC, USDT, DAI, etc.) is supposed to always trade at $1.00. A generic AMM pool doesn't know that — it treats a USDC/USDT pool the same way it treats an ETH/USDC pool, with the same fee curve and the same sensitivity to large trades. That's wasteful (stablecoin pairs should ideally trade near-flat, with minimal slippage) and also dangerous: if one stablecoin starts to \"depeg\" (its price genuinely drifts from $1.00, e.g. during a crisis like the USDC depeg in March 2023 after Silicon Valley Bank failed), a naive pool doesn't defend itself — it just lets arbitrageurs drain the pegged side.\n\n**2. Real-World Assets (RWA) and tokenized assets.** This is the broader effort to represent real-world things — government bonds, private credit, real estate, carbon credits, even stocks — as on-chain tokens that can then be traded via an AMM. The problem: these assets usually come with legal and regulatory requirements (only accredited investors can buy X, only KYC'd wallets can hold Y) that a plain, permissionless Uniswap pool has no way to enforce, plus they're often genuinely illiquid in a way crypto-native tokens aren't, so naive AMM math (designed for liquid, freely tradeable tokens) doesn't fit them well.\n\n## Why so many teams attack this\n\nStablecoins are the highest-volume, most \"boring but essential\" part of DeFi, so optimizing them has obvious real-world value. RWA tokenization is one of the most-hyped narratives in crypto over the last two years (BlackRock, Franklin Templeton and others tokenizing funds), so it's a natural target for builders trying to make something that looks institutionally relevant.\n\n## Common approaches seen in this dataset\n\n1. **Depeg-aware dynamic fees** — penalize trades that push a stablecoin pair further from 1:1 parity, and reward trades that restore parity (STAS Hook, SARM Protocol).\n2. **Depeg insurance** — automatically detect a depeg event via oracle and pay out insurance to affected LPs or holders (Bastion).\n3. **RWA pools with built-in compliance** — combine an RWA token with a hook that enforces KYC/whitelisting directly at the swap level, so a \"permissionless\" AMM can still legally gate who trades a regulated asset (Regulated DEX Hook, InfraFund, DebtSync Sentinel).\n4. **Tokenized real-world cash flows** — bonds, private debt, carbon credits, and renewable-energy assets represented as tokens with a purpose-built pool (Bond Marketplace AMM, Unicarbon, InfraFund).\n5. **Illiquid asset AMM math** — different curve or fee assumptions for assets that don't behave like liquid crypto tokens (real estate, private credit).\n\n## Prior art / reference material\n\n- The March 2023 USDC depeg (triggered by Silicon Valley Bank's collapse) — the real-world event most \"depeg-aware\" hooks implicitly design against.\n- Curve Finance's StableSwap invariant — the widely-cited AMM curve design specifically built for low-slippage stable-asset trading (a different curve than Uniswap's constant-product x*y=k), referenced conceptually even where not directly implemented.\n- ERC-3643 (T-REX) — a real, widely used token standard for permissioned/compliant security tokens, explicitly named by at least one project in this dataset (Regulated DEX Hook) as the compliance layer for RWA tokens.\n- Institutional RWA tokenization efforts (e.g. BlackRock's BUIDL fund, Franklin Templeton's on-chain fund) — the market backdrop motivating \"compliant liquidity for real-world assets\" as a category.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **DCLEX Hook** | UHI2 | A KYC Hook that can't be bypass by using ERC-6909 claim tokens. (modification in the token contract required) | AML, Compliance, KYC, Security, Tokenized Stocks |\n| **Steelo.io** | UHI2 | Steelo is a web3 social media mobile app helping creators turn fans into investors through self-tokeni rity as a building block for hooks generally** — separately from LST/LRT liquidity specifically, several hooks in *other* categories (oracles, MEV auctions) use EigenLayer's AVS model as a way to get a decentralized, economically-secured off-chain computation layer (e.g. a group of operators who stake collateral and get slashed if they misbehave) to do something a plain smart contract can't do alone, like verifying volatility data or auction winners.\n\n## Why so many teams attack this\n\nEigenLayer restaking was one of the most actively hyped and heavily sponsored/integrated technologies during the UHI program's run, so a large number of teams specifically built to showcase AVS integration, independent of whether restaking was strictly necessary for their idea. LST/LRT liquidity is also a genuinely large and growing pool of on-chain value, making \"better liquidity for staked assets\" an easy value proposition to pitch.\n\n## Common approaches seen in this dataset\n\n1. **Unified/aggregated LST liquidity pools** — let one pool represent liquidity across multiple LSTs rather than needing a separate pool per LST/ETH pair (UniStake, MultiSwap), similar in spirit to Sanctum's multi-LST model on Solana.\n2. **Idle-liquidity restaking** — automatically restake out-of-range or idle LP capital into EigenLayer to earn extra yield while it isn't earning swap fees (LightHook, see also `liquidity-management-incentives.md`).\n3. **AVS-secured oracles and auctions** — use EigenLayer operators as a trust-minimized data/verification layer for volatility feeds, MEV auction outcomes, or depeg detection (see `oracles-price-discovery.md` and `mev-lvr-protection.md` for the mechanisms this enables).\n4. **Staking-yield-aware dynamic fees** — set swap fees relative to the \"risk-free\" ETH staking rate as a benchmark, so LP returns are explicitly compared against the alternative of just staking (APR LinkHook).\n\n## Prior art / reference material\n\n- Lido and Rocket Pool documentation — the reference implementations of liquid staking tokens (LSTs) that most LST-liquidity hooks are built around.\n- EigenLayer whitepaper and documentation on restaking and Actively Validated Services (AVS) — the direct technical foundation for every \"AVS-secured\" hook in this dataset.\n- Sanctum (Solana) — explicitly cited by one project (MultiSwap) as the cross-ecosystem precedent for a unified multi-LST liquidity layer.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **APR LinkHook** | UHI2 | Dynamic fee hook that moves swap fees to outperform the 'risk-free' ETH Staking base interest rate | Dynamic Fee, ETH Staking, base interest rate |\n| **Milady Pool** | UHI2 | A private platform where users trade crypto without disclosing intentions to a wider market. | Custom Routers, Custom hooks, DEX, EigenLayer, Order Type, zk-SNARK |\n| **Steelo.io** | UHI2 | Steelo is a web3 social media mobile app helping creators turn fans into investors through self-tokenisation, token-gated experiences and value-redistributing tokenomics. | Coincidence of Wants, DEX, DeFi, Dynamic Fee, ETH Staking, Governance, KYC, Order Type, Security, Tokenized Stocks, Trading Rewards, Trading Volume Rewards, base interest rate, zk-SNARK |\n| **UniCow** | UHI2 | An actively validated service to enable Coincidence of Wants matching on any Uniswap v4 pool through v4 Hooks | CoW, Coincidence of Wants, EigenLayer |\n| **CowDEX Arena** | UHI3 | We set out to solve Coincidence of Wants matching of the orders and include incentives for the users getting CoW matched frequently. | CoW, Coincidence of Wants, DEX, DeFi, EigenLayer, NoOp |\n| **DynamicShield Hook** | UHI3 | DynamicShield Hook, built for Uniswap V4, protects liquidity providers by reducing impermanent loss (IL) and mitigating asset devaluation outside the range. It dynamically adjusts fees to balance pools, converts inactive assets into safe tokens, and reinvests during market recoveri siphoning value away from users. • Protocol Silos: Juggling isolated protocols, making it difficult to execute complex, multi-platform strategies seamlessly.  The Solution: The ShadowBrain Engine  ShadowBrain is a decentralized automation hub designed to execute complex DeFi strategies with unparalleled precision and security. We solve the core problems of on-chain automation by integrating three technological breakthroughs: 1. Uniswap V4 Hooks: We use these hooks to enable programmable, swap-triggered execution. This allows your strategies to be activated directly within the flow of market activity. 2. Dutch Auctions: These serve as a natural, market-driven profitability signal. ShadowBrain automatically triggers your registered function calls at the exact moment an auction becomes profitable, ensuring optimal timing. 3. Fhenix FHE Encryption: We use Fully Homomorphic Encryption (FHE) to conceal your transaction parameters and execution logic. This shields your strategies from MEV bots, preventing front-running and other forms of exploitation.  Core Features  • Automated Strategy Execution: Define your strategy once, and let ShadowBrain handle the rest. Your actions are executed automatically when the precise market conditions are met. • Split-Second Precision: Our Dutch auction triggers ensure your strategies execute at the most profitable moment, capturing opportunities that are impossible to seize manually. • Inherent MEV Resistance: With FHE-encrypted parameters, your automation's timing and intent are completely private, making it invisible to predatory bots. • Unified Automation Hub: Seamlessly coordinate and execute complex strategies across multiple DeFi protocols from a single, powerful engine. ShadowBrain is building the intelligent trigger layer that DeFi has been missing, paving the way for a more efficient, secure, and truly autonomous on-chain world. | Auctions, Custom hooks, DEX, Dynamic Fee, ETH Staking, LP Fees, MEV, Other, Trading Rewards, Trading  no trading activity to earn fees from. This is the **cold-start problem** in DeFi, and it's been \"solved\" for years the crude way: token projects hand out extra reward tokens (liquidity mining / \"yield farming\") to anyone who trades or provides liquidity, hoping the activity becomes self-sustaining before the reward budget runs out.\n\nThis category is the hook-native version of that same instinct, expanded with game-design techniques (points, tiers, streaks, leaderboards, referrals, lotteries) borrowed from consumer apps to make participating in a pool feel more like a game with a payoff, rather than a plain financial decision. A separate but related idea in this bucket is **copy trading** — letting less experienced users automatically mirror a successful trader's moves — which is a reward/engagement mechanism aimed at attracting less sophisticated capital into a pool.\n\n## Why so many teams attack this\n\nIt's a \"growth marketing\" problem more than a pure technical problem, so it's approachable for any skill level, extremely visible/demoable (leaderboards and badges make for a good hackathon demo), and directly ties into a metric every project cares about: getting people to actually use what you built.\n\n## Common approaches seen in this dataset\n\n1. **Points / tiers / badges for trading volume** — track a wallet's cumulative volume or LP contribution on-chain and unlock tiers, discounts, or token rewards as thresholds are crossed.\n2. **Referral programs** — reward both a user and whoever referred them for trading activity, ported from classic Web2 growth loops.\n3. **Gamefi mechanics: streaks, lotteries, tournaments** — daily check-in streaks, raffle draws funded by pool fees, or PnL-based trading tournaments (PoolArena, TradeBattle, HooLotto, StreakFi).\n4. **Copy trading** — let a wallet subscribe to mirror another wallet's swaps automatically (Mirror, LP Hub's copy-trading feature).\n5. **Fee discounts as loyalty rewards** — instead of a separate reward token, simply reduce the swap fee for high-volume or loyal traders directly inside the hook.\n6. **Social/creator-economy token launches** — several entries (Blueprint, Steelo.io, Fanio) tie trading rewards to creator/fan economies, letting a creator's community trade a personal or event token with built-in incentive loops.\n\n## Prior art / reference material\n\n- \"Liquidity mining\" / \"yield farming,\" first popularized broadly by Compound's COMP distribution and Synthetix in 2020 — the foundational Web3 pattern nearly every reward hook here is a variant of.\n- Standard Web2 growth-hacking mechanics (referral loops, streaks, tiers) — borrowed wholesale from consumer mobile-app design, not DeFi-specific research.\n- Copy-trading platforms in TradFi/crypto (eToro, and various on-chain copy-trading protocols) — the general precedent for \"mirror another trader's positions automatically.\"\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **Degen Options** | UHI1 | Reward your traders like the good ol' days of DeFi Summer | Trading Volume Rewards |\n| **AntiSnipingHook** | UHI2 | The AntiSnipingHook is a Uniswap V4 hook designed to enhance the security and fairness of liquidity provision. It prevents MEV sniping attacks by preventing swap fee sniping and donation sniping. | Donations, LP Fees, MEV |\n| **DAMM (dynamic amm)** | UHI2 | Charge dynamic pool fees based on swappers preferences of what they are willing to pay in the next block & charge higher fees for txs identified as MEV. | DEX, Dynamic Fee, LP Fees, MEV, Trading Rewards |\n| **Gacha Hook** | UHI2 | The Gacha Hook addresses high entry barriers, illiquidity, and inefficient revenue models in the NFT market by enabling fractionalization and cross-chain support for a more accessible and dynamic trading experience. | CCIP, Cross-Chain, DEX, DeFi, Raffle, Security |\n| **JIT Rebalancer** | UHI2 | Liquidity rebalancing strategy that automatically adju /* ================= tiny markdown renderer ================= */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){
  const codes=[];
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return "\uE000"+(codes.length-1)+"\uE001";});
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>{
    if(/^https?:/i.test(u)) return `<a href="${u}" target="_blank" rel="noopener">${t}</a>`;
    return `<a href="${u}" data-int="1">${t}</a>`;});
  s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/(^|[\s(])\*([^*\n]+)\*/g,"$1<em>$2</em>");
  s=s.replace(/\uE000(\d+)\uE001/g,(m,i)=>`<code>${codes[+i]}</code>`);
  return s;
}
function mdToHtml(md){
  const lines=md.replace(/\r/g,"").split("\n");
  let out=[],i=0;
  const flushP=(buf)=>{if(buf.length){out.push("<p>"+inline(buf.join(" "))+"</p>");buf.length=0;}};
  let pbuf=[];
  while(i<lines.length){
    let ln=lines[i];
    if(/^```/.test(ln)){flushP(pbuf);let code=[];i++;
      while(i<lines.length&&!/^```/.test(lines[i])){code.push(lines[i]);i++;}
      i++;out.push("<pre><code>"+esc(code.join("\n"))+"</code></pre>");continue;}
    let t=ln.trim();
    if(t===""){flushP(pbuf);i++;continue;}
    if(/^(-{3,}|\*{3,}|_{3,})$/.test(t)){flushP(pbuf);out.push("<hr>");i++;continue;}
    let h=t.match(/^(#{1,6})\s+(.*)/);
    if(h){flushP(pbuf);const l=h[1].length;out.push(`<h${l}>`+inline(h[2])+`</h${l}>`);i++;continue;}
    if(/^>/.test(t)){flushP(pbuf);let q=[];
      while(i<lines.length&&/^\s*>/.test(lines[i])){q.push(lines[i].replace(/^\s*>\s?/,""));i++;}
      out.push("<blockquote>"+mdToHtml(q.join("\n"))+"</blockquote>");continue;}
    if(/^\|/.test(t)){flushP(pbuf);let rows=[];
      while(i<lines.length&&/^\s*\|/.test(lines[i])){rows.push(lines[i].trim());i++;}
      out.push(renderTable(rows));continue;}
    if(/^([-*+]|\d+[.)])\s+/.test(t)){flushP(pbuf);
      const res=parseList(lines,i);out.push(res.html);i=res.i;continue;}
    pbuf.push(t);i++;
  }
  flushP(pbuf);
  return out.join("\n");
}
function splitRow(r){
  r=r.replace(/^\|/,"").replace(/\|\s*$/,"");
  return r.split("|").map(c=>c.trim());
}
function renderTable(rows){
  if(rows.length<2) return "<p>"+inline(rows.join(" "))+"</p>";
  const head=splitRow(rows[0]);
  let body=rows.slice(/^\s*\|?[\s:|-]+\|?\s*$/.test(rows[1])?2:1);
  let h="<div class='tblwrap'><table><thead><tr>";
  head.forEach(c=>h+="<th>"+inline(c)+"</th>");h+="</tr></thead><tbody>";
  body.forEach(r=>{h+="<tr>";splitRow(r).forEach(c=>h+="<td>"+inline(c)+"</td>");h+="</tr>";});
  return h+"</tbody></table></div>";
}
function parseList(lines,i){
  // returns {html, i}; supports one nesting level by indent
  let html="",stack=[];
  const itemRe=/^(\s*)([-*+]|\d+[.)])\s+(.*)$/;
  const open=(ord)=>{html+=ord?"<ol>":"<ul>";stack.push(ord?"ol":"ul");};
  const close=()=>{html+="</"+stack.pop()+">";};
  let prevIndent=-1;
  while(i<lines.length){
    const m=lines[i].match(itemRe);
    if(!m){ // continuation line (indented, non-empty)?
      if(lines[i].trim()!==""&&/^\s{2,}/.test(lines[i])&&stack.length){
        html=html.replace(/<\/li>$/,"")+" "+inline(lines[i].trim())+"</li>";i++;continue;}
      break;}
    const indent=Math.floor(m[1].replace(/\t/g,"  ").length/2);
    const ord=/^\d/.test(m[2]);
    if(stack.length===0){open(ord);prevIndent=indent;}
    else if(indent>prevIndent){html=html.replace(/<\/li>$/,"");open(ord);prevIndent=indent;}
    else if(indent<prevIndent&&stack.length>1){close();html+="</li>";prevIndent=indent;}
    html+="<li>"+inline(m[3])+"</li>";
    i++;
  }
  while(stack.length)close();
  return {html,i};
}

/* ================= settings & state ================= */
const $=id=>document.getElementById(id);
const store={
  get(k,d){try{const v=localStorage.getItem("hkr."+k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set(k,v){try{localStorage.setItem("hkr."+k,JSON.stringify(v));}catch(e){}}
};
const prefersDark=matchMedia("(prefers-color-scheme: dark)").matches;
let S=Object.assign({theme:prefersDark?"dark":"light",font:"serif",fs:18,lh:"1.7",
  margin:"m",anim:"slide",mode:"page"},store.get("settings",{}));
let progress=store.get("progress",{});   // {chapterId:{pct,done}}
let last=store.get("last",null);         // {id}
let cur=-1, page=0, pageCount=1;
const htmlCache={};

const content=$("content"),pages=$("pages"),reader=$("reader"),library=$("library");

/* ================= settings application ================= */
const MARGINS={s:{pad:16,maxw:920},m:{pad:26,maxw:760},l:{pad:40,maxw:620}};
function applySettings(){
  document.documentElement.dataset.theme=S.theme;
  document.querySelector('meta[name="theme-color"]').content=
    S.theme==="dark"?"#111113":S.theme==="sepia"?"#f3ead7":"#fafaf7";
  content.classList.toggle("serif",S.font==="serif");
  content.style.setProperty("--fs",S.fs+"px");
  content.style.setProperty("--lh",S.lh);
  const m=MARGINS[S.margin];
  $("pageArea").style.setProperty("--pad",m.pad+"px");
  $("pageArea").style.setProperty("--maxw",m.maxw+"px");
  content.classList.remove("anim-slide","anim-fade");
  if(S.anim==="slide")content.classList.add("anim-slide");
  if(S.anim==="fade")content.classList.add("anim-fade");
  reader.className=reader.className.replace(/mode-\w+/,"mode-"+S.mode);
  syncPanel();
  store.set("settings",S);
}
function syncPanel(){
  $("fsVal").textContent=S.fs+"px";
  const sync=(id,val)=>{[...$(id).children].forEach(b=>b.classList.toggle("on",b.dataset.v===String(val)));};
  sync("segFont",S.font);sync("segLh",S.lh);sync("segMargin",S.margin);
  sync("segAnim",S.anim);sync("segMode",S.mode);sync("themeChips",S.theme);
}

/* ================= library ================= */
function pctOf(id){const p=progress[id];return p?Math.round(p.pct*100):0;}
function renderLibrary(){
  let h=`<div class="lib-top"><div><h1>Hookathon Library</h1>
    <p class="sub">${BOOK.length} chapters · tap page center for controls · swipe or tap edges to turn pages (←/→ on laptop)</p></div>
    <button class="icon-btn" id="libTheme" title="Cycle theme">◑</button></div>`;
  if(last&&BOOK.some(c=>c.id===last.id)){
    const c=BOOK.find(x=>x.id===last.id);
    h+=`<button class="continue" data-open="${c.id}"><span class="lbl">Continue reading</span>
      <div class="t">${esc(c.title)}</div><div class="p">${pctOf(c.id)}% read · ${c.section}</div></button>`;
  }
  let sec="";
  BOOK.forEach((c,idx)=>{
    if(c.section!==sec){sec=c.section;h+=`<div class="section-h">${esc(sec)}</div>`;}
    const p=pctOf(c.id);
    h+=`<button class="chap" data-open="${c.id}"><span class="n">${String(c.num).padStart(2,"0")}</span>
      <span class="t">${esc(c.title)}</span>
      <span class="pct ${p>=95?"done":""}">${p>=95?"✓":(p>0?p+"%":"")}</span></button>`;
  });
  library.innerHTML=h;
  library.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",
    ()=>openChapter(BOOK.findIndex(c=>c.id===b.dataset.open))));
  $("libTheme").addEventListener("click",cycleTheme);
}

/* ================= reader core ================= */
function openChapter(i,fromEnd){
  if(i<0||i>=BOOK.length)return;
  cur=i;const c=BOOK[i];
  library.classList.add("hidden");reader.classList.remove("hidden");
  if(!htmlCache[c.id])htmlCache[c.id]=mdToHtml(c.md);
  content.style.transition="none";content.innerHTML=htmlCache[c.id];
  content.querySelectorAll("a[data-int]").forEach(a=>a.addEventListener("click",e=>{
    e.preventDefault();
    const f=a.getAttribute("href").split("/").pop();
    const j=BOOK.findIndex(x=>x.file===f);
    if(j>=0)openChapter(j);
  }));
  $("stTitle").textContent=c.title;
  $("barTitle").textContent=c.title;
  last={id:c.id};store.set("last",last);
  requestAnimationFrame(()=>{
    const saved=progress[c.id];
    const pct=fromEnd?1:(saved?saved.pct:0);
    paginate();
    goToPct(pct,false);
    restoreAnim();
  });
}
function restoreAnim(){requestAnimationFrame(()=>{content.style.transition="";});}
function paginate(){
  if(S.mode==="scroll"){pageCount=1;updateStatus();return;}
  const w=pages.clientWidth;
  content.style.setProperty("--pw",w+"px");
  const gap=Math.max(40,Math.round(w*0.12));
  content.style.setProperty("--gap",gap+"px");
  // force reflow then measure
  const step=w+gap;
  pageCount=Math.max(1,Math.ceil(pages.scrollWidth/step));
  $("slider").max=pageCount;
  updateStatus();
}
function step(){const w=pages.clientWidth;const gap=Math.max(40,Math.round(w*0.12));return w+gap;}
function goTo(p,animate=true){
  if(S.mode==="scroll")return;
  p=Math.max(0,Math.min(pageCount-1,p));
  const move=()=>{content.style.transform=`translateX(${-p*step()}px)`;};
  if(!animate||S.anim==="none"){
    content.style.transition="none";move();void content.offsetWidth;content.style.transition="";
  }else if(S.anim==="fade"&&p!==page){
    content.style.opacity=0;
    setTimeout(()=>{content.style.transition="none";move();void content.offsetWidth;
      content.style.transition="";content.style.opacity=1;},160);
  }else{move();}
  page=p;saveProgress();updateStatus();
}
function goToPct(pct,animate){
  if(S.mode==="scroll"){
    requestAnimationFrame(()=>{pages.scrollTop=pct*(pages.scrollHeight-pages.clientHeight);updateStatus();});
    page=0;return;
  }
  goTo(Math.round(pct*(pageCount-1)),animate);
}
function curPct(){
  if(S.mode==="scroll"){
    const m=pages.scrollHeight-pages.clientHeight;
    return m>0?pages.scrollTop/m:1;
  }
  return pageCount>1?page/(pageCount-1):1;
}
function saveProgress(){
  if(cur<0)return;
  progress[BOOK[cur].id]={pct:curPct()};
  store.set("progress",progress);
}
function updateStatus(){
  const c=BOOK[cur];if(!c)return;
  const pct=curPct();
  const minsLeft=Math.max(0,Math.ceil(c.words*(1-pct)/230));
  if(S.mode==="scroll"){
    $("stInfo").textContent=`${Math.round(pct*100)}% · ${minsLeft} min left`;
  }else{
    $("stInfo").textContent=`Page ${page+1} of ${pageCount} · ${Math.round(pct*100)}% · ${minsLeft} min left`;
    $("slider").value=page+1;
  }
  $("sliderLbl").textContent=`${c.section} — chapter ${c.num} of ${BOOK.filter(x=>x.section===c.section).length}`;
}
function next(){
  if(S.mode==="scroll"){pages.scrollBy({top:pages.clientHeight*.9,behavior:"smooth"});return;}
  if(page<pageCount-1)goTo(page+1);
  else if(cur<BOOK.length-1)openChapter(cur+1);
}
function prev(){
  if(S.mode==="scroll"){pages.scrollBy({top:-pages.clientHeight*.9,behavior:"smooth"});return;}
  if(page>0)goTo(page-1);
  else if(cur>0)openChapter(cur-1,true);
}
function backToLibrary(){
  saveProgress();reader.classList.add("hidden");library.classList.remove("hidden");
  hideBars();hidePanel();renderLibrary();window.scrollTo(0,0);
}

/* ================= chrome (bars / panel / theme) ================= */
let barsOn=false;
function showBars(){barsOn=true;$("topbar").classList.remove("off");$("botbar").classList.remove("off");}
function hideBars(){barsOn=false;$("topbar").classList.add("off");$("botbar").classList.add("off");}
function toggleBars(){barsOn?hideBars():showBars();}
function showPanel(){$("aaPanel").classList.remove("hidden");$("scrim").classList.remove("hidden");}
function hidePanel(){$("aaPanel").classList.add("hidden");$("scrim").classList.add("hidden");}
function cycleTheme(){
  S.theme=S.theme==="light"?"sepia":S.theme==="sepia"?"dark":"light";
  applySettings();
}
function reflowKeepingPct(fn){
  const pct=curPct();fn();
  content.style.transition="none";
  requestAnimationFrame(()=>{paginate();goToPct(pct,false);restoreAnim();});
}

/* ================= events ================= */
$("btnLib").addEventListener("click",backToLibrary);
$("btnAa").addEventListener("click",showPanel);
$("btnTheme").addEventListener("click",cycleTheme);
$("scrim").addEventListener("click",hidePanel);
$("btnPrevCh").addEventListener("click",()=>openChapter(cur-1));
$("btnNextCh").addEventListener("click",()=>openChapter(cur+1));
$("slider").addEventListener("input",e=>goTo(e.target.value-1,false));

$("fsUp").addEventListener("click",()=>{if(S.fs<26){S.fs++;reflowKeepingPct(applySettings);}});
$("fsDown").addEventListener("click",()=>{if(S.fs>13){S.fs--;reflowKeepingPct(applySettings);}});
[["segFont","font"],["segLh","lh"],["segMargin","margin"],["segAnim","anim"],["themeChips","theme"]]
.forEach(([id,key])=>{
  $(id).addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    S[key]=b.dataset.v;reflowKeepingPct(applySettings);
  });
});
$("segMode").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  const pct=curPct();S.mode=b.dataset.v;applySettings();
  content.style.transition="none";
  requestAnimationFrame(()=>{paginate();goToPct(pct,false);restoreAnim();});
});

/* click zones (no overlays, so links stay clickable) */
function guardClick(e){
  if(e.target.closest("a"))return false;
  const sel=window.getSelection();
  if(sel&&sel.toString().length>0)return false;
  return true;
}
$("pageArea").addEventListener("click",e=>{
  if(!guardClick(e))return;
  if(!$("aaPanel").classList.contains("hidden")){hidePanel();return;}
  const r=$("pageArea").getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width;
  if(S.mode!=="scroll"&&x<0.3){if(barsOn){hideBars();return;}prev();}
  else if(S.mode!=="scroll"&&x>0.7){if(barsOn){hideBars();return;}next();}
  else toggleBars();
});

/* swipe */
let tx=0,ty=0,tt=0;
$("pageArea").addEventListener("touchstart",e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();},{passive:true});
$("pageArea").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Date.now()-tt<600&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){
    if(S.mode!=="scroll"){dx<0?next():prev();}
  }},{passive:true});

/* keyboard */
document.addEventListener("keydown",e=>{
  if(reader.classList.contains("hidden"))return;
  if(e.target.tagName==="INPUT")return;
  switch(e.key){
    case "ArrowRight":case "PageDown":next();break;
    case "ArrowLeft":case "PageUp":prev();break;
    case " ":e.preventDefault();e.shiftKey?prev():next();break;
    case "Home":goTo(0);break;
    case "End":goTo(pageCount-1);break;
    case "m":case "M":toggleBars();break;
    case "t":case "T":cycleTheme();break;
    case "+":case "=":$("fsUp").click();break;
    case "-":$("fsDown").click();break;
    case "Escape":
      if(!$("aaPanel").classList.contains("hidden"))hidePanel();
      else if(barsOn)hideBars();
      else backToLibrary();
      break;
  }
});

/* mouse wheel (page mode) */
let wheelLock=0;
document.addEventListener("wheel",e=>{
  if(reader.classList.contains("hidden")||S.mode==="scroll")return;
  if(e.target.closest("#aaPanel")||e.target.closest(".tblwrap"))return;
  const now=Date.now();if(now-wheelLock<380)return;
  const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
  if(Math.abs(d)<12)return;
  wheelLock=now;d>0?next():prev();
},{passive:true});

/* scroll-mode progress */
let scrollT;
pages.addEventListener("scroll",()=>{
  if(S.mode!=="scroll")return;
  clearTimeout(scrollT);scrollT=setTimeout(()=>{saveProgress();updateStatus();},120);
},{passive:true});

/* resize / rotate */
let rz;
window.addEventListener("resize",()=>{
  if(reader.classList.contains("hidden"))return;
  clearTimeout(rz);
  rz=setTimeout(()=>{reflowKeepingPct(()=>{});},160);
});

/* ================= boot ================= */
applySettings();
renderLibrary();
</script>
</body>
</html>
