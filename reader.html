sources — trusting a caller or a piece of passed-in data (`hookData`, an unverified `sender`) that looks legitimate but isn't verified, making an external call without protecting your own hook's state the way `ReentrancyGuard`/checks-effects-interactions would, or trusting a price signal (self-rolled TWAP, an unbounded fee formula) that's a real improvement over the naive version but still has a breaking point under extreme or adversarial conditions — and the fix in every case is the same instinct: verify explicitly, don't assume the PoolManager's own protections automatically extend to your hook's separate state and logic.**\n\n---\n\n## You've now covered the full build stack\n\nLessons 14-17 got you from zero to a working, tested hook. Lessons 18-23 gave you real code for the six most common problem patterns in the entire 556-hook directory — dynamic fees, oracles/TWAP, idle liquidity/JIT, limit orders, MEV protection, and compliance gating. Lesson 24 turned every unfamiliar import into a recognizable tool, and this lesson gave you the specific ways these patterns break if built carelessly. Between this stack and the conceptual lessons (1-13), you should now be able to read almost any hook in `hook-directory/categories/`, guess roughly how it's implemented before checking, and start sketching your own idea with a real sense of which building blocks it needs.\n"}, {"id": "hook-directory/00-README.md", "file": "00-README.md", "section": "Hook Directory — 556 Past Projects", "num": 1, "title": "UHI Hook Directory — Explained", "md": "# UHI Hook Directory — Explained\n\n## What this is\n\nThis is a plain-language, organized explainer of the **Uniswap Hook Incubator (UHI) Hook Directory** — a public showcase of **556 projects** built by developers across 8 cohorts (UHI1 through UHI8, roughly mid-2024 through mid-2026) at [Atrium Academy](https://atrium.academy)'s Uniswap Hook Incubator program.\n\nIf you don't know what a \"hook\" is: **Uniswap v4 lets developers attach custom code to a liquidity pool's core actions** (before/after a swap, before/after adding or removing liquidity, before/after initializing a pool). That custom code is called a \"hook.\" It's a plugin system for a decentralized exchange (DEX). Before v4, if you wanted an AMM (Automated Market Maker — the algorithm that sets prices and lets people trade against a pool of tokens instead of an order book) to behave differently — say, charge fees that change with volatility, or block a specific class of trader — you had to fork the entire Uniswap codebase. Hooks mean you can now write a small, focused smart contract that plugs into the standard pool and only overrides the behavior you care about.\n\nThis directory is essentially a giant \"what did people try to build with this plugin system\" showcase. Reading through it, you see the same handful of real, hard problems in decentralized exchanges being attacked over and over by different teams with different tools. That repetition is the interesting part — it tells you what actually hurts in DeFi trading today.\n\n## Source of truth\n\n- Original Notion directory: https://atriumacademy.notion.site/hook-directory\n- Raw data export (CSV + Markdown, updated periodically by Atrium Academy): https://github.com/AtriumAcademy/UHI-Hook-Data\n- This folder was generated from that export on 2026-07-02. The export contains 556 structured rows (name, cohort, description, tags, integrations, prize track) and a companion Markdown file with fuller subpage content (problem statements, demo links, etc.) for ~562 entries.\n\n## How this folder is organized\n\n- **`00-README.md`** — this file.\n- **`01-TRACKER.md`** — the \"big picture\" dashboard: which problems get attacked the most, cohort-over-cohort trends, and where the genuinely novel ideas are hiding versus where everyone converges on the same pattern.\n- **`categories/*.md`** — one file per problem-space (not per hook — see note below). Each file explains: what the underlying problem is, why it's a real problem (in plain language, with the mechanics), what prior art / whitepapers / concepts the solutions in this space typically draw on, and then a table of every hook project in the dataset tagged into that space (name, cohort, one-line description, other tags).\n\n### Why grouped by problem-space instead of one file per hook\n\nThe original ask was one file per hook. With 556 entries, most of which are single-paragraph hackathon submissions, that would produce hundreds of near-duplicate files (e.g. dozens of \"dynamic fee based on volatility\" hooks that differ only in which oracle or ML model they plug in) and no real whitepaper trail — most of these are student/hackathon projects, not published research, so inventing a \"reference paper\" per project would be fabrication, not documentation.\n\nGrouping by problem gives you the same information with real signal: you can see instantly that ~40% of all submissions touch \"dynamic fees,\" which tells you that's the single most obvious pain point people perceive in AMM design, while things like on-chain options or governance hooks are rare (niche, harder, or just less understood).\n\nA hook can appear in more than one category file if it's tagged with multiple concerns (e.g. a hook that does both dynamic fees AND cross-chain settlement appears in both).\n\n## Categories\n\n| File | Problem space | # Hooks |\n|---|---|---|\n| `categories/dynamic-fees-lp-optimization.md` | Dynamic/adaptive swap fees, LP fee optimization | 218 |\n| `categories/liquidity-management-incentives.md` | Idle capital, JIT liquidity, liquidity mining | 153 |\n| `categories/cross-chain-hooks.md` | Cross-chain liquidity & settlement | 150 |\n| `categories/mev-lvr-protection.md` | MEV, sandwich attacks, Loss-Versus-Rebalancing | 126 |\n| `categories/trading-rewards-gamification.md` | Trading incentives, points, gamification | 131 |\n| `categories/stablecoins-rwa-tokenized-assets.md` | Stablecoins, RWA, tokenized assets | 102 |\n| `categories/misc-other.md` | Doesn't fit cleanly elsewhere / generic tooling | 75 |\n| `categories/oracles-price-discovery.md` | Price oracles & price discovery | 75 |\n| `categories/order-types-routing-auctions.md` | Limit orders, custom routing, on-chain auctions | 74 |\n| `categories/security-hooks.md` | Rug-pull/exploit protection, circuit breakers | 63 |\n| `categories/compliance-kyc-identity.md` | KYC/AML, regulation, identity | 60 |\n| `categories/amm-curve-design.md` | Alternative AMM curve math (CFMM/CPMM/CSMM) | 35 |\n| `categories/staking-restaking.md` | LST/LRT liquidity, EigenLayer restaking | 33 |\n| `categories/privacy-zk-hooks.md` | Trade privacy via ZK / FHE | 24 |\n| `categories/governance-hooks.md` | Pool/protocol governance | 21 |\n| `categories/ai-ml-hooks.md` | Machine-learning-driven hook logic | 21 |\n| `categories/options-derivatives-structured-products.md` | On-chain options, futures, structured yield | 21 |\n\n(Totals sum to more than 556 because most hooks carry multiple tags and appear in multiple categories.)\n\n## A note on the \"whitepaper reference\" ask\n\nWhere a category draws on real, citable prior art (e.g. the Loss-Versus-Rebalancing paper, am-AMM, TWAMM, Nezlobin's directional fee formula, CoW Protocol, EigenLayer's restaking model), that's named at the top of the category file with enough description to look it up. Individual student hooks are **not** each attributed a specific whitepaper unless their own description explicitly names one — most don't, and guessing would be misleading.\n"}, {"id": "hook-directory/01-TRACKER.md", "file": "01-TRACKER.md", "section": "Hook Directory — 556 Past Projects", "num": 2, "title": "The Big Picture: What Problems Are People Actually Working On", "md": "# The Big Picture: What Problems Are People Actually Working On\n\nThis is the \"zoom out\" view across all 556 hooks in the directory (cohorts UHI1–UHI8, roughly mid-2024 to mid-2026). It's meant to answer: *which problems get attacked over and over, which ideas are one-offs, and how has the focus shifted over time?*\n\n## 1. Category size — the repetition ranking\n\nRanked by how many of the 556 hooks touch each problem space (a hook can be tagged into more than one):\n\n| Rank | Category | # Hooks | Share of all submissions |\n|---|---|---|---|\n| 1 | Dynamic Fees & LP Fee Optimization | 218 | ~39% |\n| 2 | Liquidity Management & Incentives | 153 | ~28% |\n| 3 | Cross-Chain Hooks | 150 | ~27% |\n| 4 | MEV & LVR Protection | 126 | ~23% |\n| 5 | Trading Rewards & Gamification | 131 | ~24% |\n| 6 | Stablecoins, RWA & Tokenized Assets | 102 | ~18% |\n| 7 | Misc / Other (generic or long-tail) | 75 | ~13% |\n| 7 | Oracles & Price Discovery | 75 | ~13% |\n| 9 | Order Types, Routing & Auctions | 74 | ~13% |\n| 10 | Security Hooks | 63 | ~11% |\n| 11 | Compliance, KYC & Identity | 60 | ~11% |\n| 12 | AMM Curve Design | 35 | ~6% |\n| 13 | Staking & Restaking | 33 | ~6% |\n| 14 | Privacy & ZK Hooks | 24 | ~4% |\n| 15 | Governance Hooks | 21 | ~4% |\n| 15 | AI/ML Hooks | 21 | ~4% |\n| 15 | Options, Derivatives & Structured Products | 21 | ~4% |\n\n**Reading this:** the top four categories (dynamic fees, liquidity management, cross-chain, MEV/LVR) are all attacking essentially the same underlying complaint from different angles — *\"AMM design, as Uniswap ships it out of the box, leaves money on the table for LPs and is easy to exploit for value extraction.\"* If you collapse \"dynamic fees\" + \"MEV/LVR protection\" + \"liquidity management\" into one meta-category (\"make LPs whole\"), it covers a clear majority of all 556 submissions. That is the single dominant theme of the entire UHI hook ecosystem: **hooks are overwhelmingly about protecting and better-compensating liquidity providers**, not about novel trading products for end users. Options/derivatives, governance, and AI/ML are all rare — these require either niche quant skill (derivatives) or don't produce an exciting demo (governance), or make claims that are hard to substantiate in a hackathon timeframe (AI/ML).\n\n## 2. Cohort-over-cohort trend — is a topic growing or fading?\n\nEach cell shows count and % of that cohort's submissions tagged into the category. Cohort sizes: UHI1=36, UHI2=61, UHI3=61, UHI4=54, UHI5=57, UHI6=71, UHI7=76, UHI8=139.\n\n| Category | UHI1 | UHI2 | UHI3 | UHI4 | UHI5 | UHI6 | UHI7 | UHI8 | Trend |\n|---|---|---|---|---|---|---|---|---|---|\n| Dynamic Fees & LP Optimization | 0% | 41% | 46% | 46% | 49% | 32% | 40% | 42% | Consistently the #1 topic every cohort since UHI2 |\n| Liquidity Mgmt & Incentives | 3% | 2% | 33% | 50% | 30% | 30% | 28% | 32% | Rising — jumped hard from UHI2→UHI3, now a permanent fixture |\n| Cross-Chain | 0% | 7% | 13% | 20% | 32% | 18% | 15% | **60%** | Sharp, sudden rise in UHI8 |\n| MEV & LVR Protection | 0% | 21% | 16% | 19% | 32% | 30% | **38%** | 18% | Peaked UHI7, dipped UHI8 (crowded out by cross-chain surge) |\n| Trading Rewards/Gamification | 3% | 28% | 31% | 22% | 35% | 23% | 32% | 16% | Was a steady ~25-35%, fell off sharply in UHI8 |\n| Stablecoins/RWA/Tokenized | 0% | 3% | 15% | 17% | 23% | 14% | 22% | 30% | Rising — RWA narrative gaining share cohort over cohort |\n| Staking/Restaking | 0% | 7% | 18% | 7% | 5% | 6% | 9% | **0%** | Fell to zero in UHI8 — EigenLayer restaking hype has cooled |\n| AI/ML | 0% | 0% | 8% | 7% | 4% | 1% | 3% | 5% | Small and inconsistent — no sustained trend |\n| Oracles & Price Discovery | 0% | 0% | 10% | 20% | 23% | 11% | 18% | 17% | Rising then plateaued |\n\n**What this tells you:** UHI1 (36 hooks) predates most of these tags entirely — it looks like an early, exploratory cohort before dynamic fees became the \"obvious\" hook idea. From UHI2 onward, dynamic fees is essentially the baseline everyone starts from. The most dramatic single-cohort shift in the whole dataset is **cross-chain jumping to 60% of UHI8** — almost certainly tracking Unichain's growing prominence as a sponsor/integration target (see integrations below) as it matured. Staking/restaking dropping to 0% in UHI8 is the clearest sign of a narrative that has fully faded — EigenLayer restaking was a big theme UHI2–UHI7 and essentially disappeared by UHI8.\n\n## 3. What sponsor technology actually got used\n\nCounting the `Integrations` field across all 556 rows (a hook can integrate more than one):\n\n| Integration | # Hooks using it |\n|---|---|\n| EigenLayer | 111 |\n| Unichain | 100 |\n| Reactive Network | 76 |\n| Fhenix | 59 |\n| Chainlink | 45 |\n| Brevis | 23 |\n| Arbitrum (Stylus) | 19 |\n| Circle | 14 |\n| Flaunch | 10 |\n| Ink | 10 |\n| Across | 11 |\n\n**Reading this:** these numbers roughly explain the category-trend spikes above. EigenLayer's dominance (111 integrations) explains why \"AVS-secured X\" shows up across oracles, MEV auctions, and staking categories simultaneously — it's infrastructure, not a single product category. Fhenix's 59 integrations mostly map onto the Privacy/ZK and MEV-protection categories (encrypted order flow). Reactive Network (76 integrations, a cross-chain automation/event-driven execution protocol) is a major, easy-to-miss driver of the \"cross-chain\" category surge — it doesn't show up as its own tag/category above because tags didn't consistently include it, but the raw integration count says it was heavily used, especially in later cohorts.\n\n## 4. Prize tracks (what sponsors explicitly incentivized)\n\n| Prize track | # entries targeting it |\n|---|---|\n| Uniswap Prize (general) | 54 |\n| EigenLayer Prize | 16 (+4 combined with Uniswap) |\n| Brevis Prize | 10 (+2 combined) |\n| Fhenix Prize | 5 |\n| Reactive Network Prize | 5 |\n| Arbitrum Prize | 4 |\n| Flaunch Prize | 4 (+2 combined) |\n| Unichain Prize | 4 |\n| Across Prize | 3 |\n| Chainlink Prize | 2 (+3 combined) |\n| Circle Prize | 1 (+2 combined) |\n\nThis mostly confirms the integrations data: prize-track participation is a direct incentive for using a particular sponsor's technology, and it correlates cleanly with which categories are inflated by infrastructure availability (EigenLayer, Fhenix, Brevis) rather than pure organic demand.\n\n## 5. The overall picture, in one paragraph\n\nThe UHI Hook Directory is best read not as 556 independent ideas but as **iterative attempts at solving roughly six real, recurring problems**: (1) static AMM fees are inefficient and unfair to LPs, (2) MEV/LVR structurally taxes LPs and traders, (3) concentrated liquidity often sits idle out-of-range, (4) liquidity is fragmented across chains, (5) bringing regulated/real-world assets on-chain needs compliance tooling a plain pool can't provide, and (6) new pools/tokens need a cold-start incentive mechanism. Everything else — governance, AI-driven fees, options, privacy tech — is either an enabling technology applied to one of those six problems, or a genuinely niche, less-repeated idea. Cohort-over-cohort, the *problems* people care about have stayed remarkably stable (fees, MEV, liquidity efficiency are constants from UHI2 onward); what changes fastest is *which sponsor infrastructure* is fashionable to build the solution with — EigenLayer and Fhenix dominated the middle cohorts, while Unichain and cross-chain tooling dominate the most recent one (UHI8).\n\n## 6. Data caveats\n\n- Tags in the source data are free-text and inconsistent (e.g. \"Donation\" vs \"Donations\", \"base interest rate\" vs \"Basic Interest Rate\" appear as separate tags for the same concept) — counts above are best-effort de-duplication at the category level, not exact.\n- Cohort field is missing/blank for a small number of rows (1 row had no cohort at all) and is excluded from the cohort trend table.\n- \"Active?\" field is blank for 546/556 rows and marked \"Active\" for only 10 — most of these are historical hackathon submissions, not maintained production protocols. Treat descriptions as a snapshot of intent at submission time, not a claim that the project is live today.\n"}, {"id": "hook-directory/categories/ai-ml-hooks.md", "file": "ai-ml-hooks.md", "section": "Hook Directory — 556 Past Projects", "num": 3, "title": "AI / ML Hooks", "md": "# AI / ML Hooks\n\n**21 hook projects.**\n\n## The problem, explained simply\n\nMost dynamic-fee designs (see `dynamic-fees-lp-optimization.md`) are *reactive* — they measure volatility that has already happened and adjust the fee afterward. By the time the fee changes, some of the damage (LVR, a bad trade for LPs) may already be done. The pitch of this category is to be *predictive* instead: use a machine-learning model to forecast near-term volatility or market conditions, and set the fee (or another pool parameter) ahead of time, in principle capturing more value for LPs than a purely reactive formula could.\n\nA second thread in this bucket uses ML/AI not for pricing but for pattern detection — e.g. training a model to recognize the on-chain signature of an MEV bot or a specific trading pattern, then having the hook react accordingly.\n\n## Why fewer teams attack this, and a caution about these claims\n\nGenuinely training, validating, and deploying a useful ML model that outperforms a simple volatility formula is hard, and doing it *on-chain* (where compute is expensive) is harder still — most of these projects run inference off-chain and feed a prediction on-chain via an oracle-like mechanism (sometimes explicitly via an EigenLayer AVS operator running the model, see `staking-restaking.md`). Readers should treat \"AI-powered\" claims in a hackathon-scale project with healthy skepticism: predicting short-term volatility better than well-known statistical baselines (like GARCH models used in traditional finance) is a genuinely hard, well-studied problem — nobody has reliably solved it, in TradFi or DeFi.\n\n## Common approaches seen in this dataset\n\n1. **Volatility-forecasting dynamic fees** — a model predicts upcoming volatility and sets the fee preemptively rather than reactively (Autopilot Hook, Pooka Valuation Warchest Hook, xtreamly hook).\n2. **AI-powered hedging** — combine a volatility/price prediction with an automated hedge (e.g. via perpetual futures) to reduce impermanent loss for LPs.\n3. **Sentiment/pattern-based signals** — feed non-price data (social sentiment, on-chain behavior patterns) into a model whose output adjusts pool behavior (SocialPool, Sentiment).\n\n## Prior art / reference material\n\n- GARCH and other classical econometric volatility-forecasting models — the traditional-finance baseline any ML-based volatility prediction should reasonably be compared against.\n- EigenLayer AVS model — the common infrastructure pattern for running off-chain ML inference and delivering its output on-chain in a way that's at least partially trust-minimized (see `staking-restaking.md`).\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **Autopilot Hook** | UHI3 | Autopilot Hook is a Uniswap V4 hook designed to dynamically adjust fees based on market volatility using Machine Learning. By forecasting periods of high volatility, the system helps protect liquidity providers from impermanent loss. During low volatility, it lowers fees to incentivize trading activity. | Arbitrum Stylus, Dynamic Fee, Machine Learning |\n| **Brain.fun** | UHI3 | Launch sentient tokens with cash flows and ability to manage treasuries. | Machine Learning, NoOp |\n| **GridHook Agent** | UHI3 | An AI-powered DeFi agent that leverages LLMs to execute sophisticated grid trading strategies on Uniswap v4 hooks enabling autonomous market making and arbitrage through natural language interactions while maintaining delta-neutral positions across configurable price ranges | Custom hooks, DeFi, Machine Learning, Meme, Order Type |\n| **Silicon Vision Fund** | UHI3 | Silicon Vision Fund is a V4 hook for launching AI-managed hedge funds. We make the hedge fund fun, flexible, and transparent by allowing users to suggest portfolio compositions to the AI fund manager. | Custom hooks, DEX, DeFi, LP Liquidity, Machine Learning |\n| **SocialPool** | UHI3 | SocialPool enables markets to leverage social data for price forecasts, volatility metrics and asset automation using curated public data from tens of thousands of crypto Telegram groups. | DEX, DeFi, EigenLayer, LP Fees, LP Liquidity, Liquidity Mining, MEV, Machine Learning, Security, Trading Volume Rewards |\n| **HookGPT** | UHI4 | HookGPT is a production-ready AI-powered conversational AI agent and generator for Uniswap v4 hooks that transforms natural language prompts into optimized smart contract code. It leverages large language models with specialized knowledge of Uniswap protocols to help developers create custom hooks without needing deep expertise in DeFi programming. | Custom hooks, Machine Learning, Other |\n| **Pooka Valuation Warchest Hook** | UHI4 | POOKA is an AI agent, a UniswapV4 Hook and an ERC-20 Token and a trading dApp. The Pooka Hook manages swap charges based on role and POOKA position size. | Custom hooks, Dynamic Fee, LP Liquidity, Machine Learning |\n| **vista labs** | UHI4 | prediction market protocol with dynamic AMM liquidity and AI based oracle | Custom hooks, LVR, Machine Learning, NoOp, Unichain |\n| **xtreamly hook** | UHI4 | AI-powered smart hedging for Uniswap V3/V4 LPs—leveraging volatility predictions and perpetual futures to minimize impermanent loss and maximize risk-adjusted returns. The ultimate DeFi capital efficiency engine. | CFMM, Constant Product Market Maker (CPMM), Custom hooks, Dynamic Fee, LP Fees, LP Liquidity, LVR, Machine Learning |\n| **InfraFund** | UHI5 | InfraFund bridges the NetZero investment gap by tokenizing real-world renewable energy assets, creating liquid, transparent markets for developers and investors. We are building a custom Uniswap v4 hook to create the first regulatory-compliant liquidity pools for these RWA tokens, enabling features like on-chain identity verification and dynamic fees to accelerate green capital formation. | CCIP, DEX, Donation, Governance, ICO, KYC, LP Fees, LP Liquidity, Machine Learning, Oracle, RWA, Regulation, Security, Tokenized Stocks, Trading Rewards |\n| **SmartHook** | UHI5 | A Uniswap V4 hook that automatically detects and executes profitable cross-chain arbitrage opportunities using on-chain machine learning models and Across Protocol for bridging. The system passively monitors swaps, identifies price discrepancies across multiple chains, and autonomously captures arbitrage profits while users trade normally without any additional steps or deposits required. | Cross-Chain, Custom hooks, Machine Learning |\n| **UNIPOOL** | UHI6 | Unipool is a fully autonomous, AI-driven investment fund designed for managing crypto assets with maximum efficiency and transparency. At its core, intelligent agents collaborate to handle portfolio strategy, market research, risk management, and trade execution—while all assets remain securely held in a decentralized smart contract. | Copy Trading, DEX, Machine Learning, Stablecoins, Unichain |\n| **ZK-Verified AI Market-Regime Oracle for Uniswap v4** | UHI7 | An EigenLayer-backed AI oracle classifies live market regimes (trending, volatile, mean-reverting, liquidity vacuum, high-manipulation) and feeds verifiable signals into a Uniswap v4 Hook that dynamically adjusts swap fees, tick bands, and anti-MEV controls to protect LPs and improve execution quality. | AI, DeFi Security, Dynamic Fees, Dynamic Tick Adjustment, EigenLayer, Liquidity Management, MEV, MEV Mitigation, Machine Learning, Mempool monitoring, Off-chain Oracle, Oracle, Uniswap v4, ZKML (optional), zk-SNARK |\n| **spectraQ** | UHI7 | SPECTRAQ is a hedging engine that enables users to trade or hedge open positions in traditional markets through prediction markets, utilizing EigenLayer AVS and Uniswap V4 Hooks to dynamically adjust fees based on real-time volatility. This architecture protects liquidity providers while offering a precise, capital-efficient mechanism for cross-market risk management. | Custom hooks, Dynamic Fee, LP Fees, Machine Learning, Oracle |\n| **Astrasend** | UHI8 | AstraSend is a cross-border remittance protocol built as a Uniswap v4 hook that enables low-cost, escrow-based stablecoin    payments — supporting group contributions, phone-number recipients, and swappable compliance modules for KYC and World     ID biometric verification. | Illiquid Assets, LP Liquidity, Machine Learning, Price Discovery, RWA, Stablecoins, Unichain, compliance modules, group funding, phone resolver |\n| **DeLi Protocol** | UHI8 | Decentralized patent licensing infrastructure that transforms intellectual property into a programmable, liquid asset class using tokenized rights and Uniswap V4 markets. It enables transparent pricing, permissionless access to licenses, and verifiable on-chain usage while maintaining real-world legal enforceability. | AMM Pricing, Compliance, DEX, Dynamic Pricing, Governance, KYC, LP Liquidity, Licensing Markets, Liquidity Mining, Machine Learning, Oracle, Permit2, RWA, Real World Assets, Reputation, Security, Smart Contract Infrastructure, Specialized Markets, Stablecoins, Tokenized IP, Tokenized Stocks, Uniswap v4 Hooks, Yield Farming |\n| **DobDex** | UHI8 | A Liquid Real World Asset DEX where anyone can provide instant exit liquidity, allowing investors to sell their shares of an asset at any time. All assets are regulated at the moment of registration through a decentralized validation procedure. | LP Fees, Machine Learning, Oracle, RWA, Unichain |\n| **FoodySwap** | UHI8 | FoodySwap is a Uniswap v4 Hook that turns AI payment intent into enforceable real-world commerce. It enforces merchant rules, dynamic pricing, settlement, and on-chain loyalty directly in the swap lifecycle. | Custom hooks, Dynamic Fee, Machine Learning, Trading Rewards, Unichain |\n| **HookMind Protocol** | UHI8 | HookMind is an autonomous AI middleware for Uniswap v4 that transforms passive erge in value, which is a real risk (see depegs, `stablecoins-rwa-tokenized-assets.md`).\n- For **value-weighted baskets of multiple assets** (like an index fund), neither pure formula is right — you want a curve that maintains fixed value-weight ratios across more than two assets.\n- For **volatility-targeting or leveraged exposure**, you might want a curve whose behavior tracks an entirely different mathematical target (like a targeted implied volatility) rather than a fixed product/sum relationship.\n\nHooks let developers override the pool's pricing behavior enough to approximate these alternative curve shapes on top of Uniswap v4's infrastructure, instead of needing an entirely separate AMM codebase (as Curve Finance, Balancer, and others built pre-v4).\n\n## Why so many teams attack this\n\nThis is one of the more academically \"pure\" areas of AMM design — it's well-studied in DeFi research (Curve, Balancer, and Uniswap itself all publish math-heavy documentation on their respective curve choices), so it attracts more technically-inclined builders who want to implement known curve math as a hook rather than invent a new financial product from scratch.\n\n## Common approaches seen in this dataset\n\n1. **Constant Sum Market Maker (CSMM) hooks** — approximate a 1:1, zero-slippage curve for pegged-asset pairs, generally combined with safeguards for when the peg breaks.\n2. **Hybrid/blended curves** — combine constant-product behavior for normal conditions with constant-sum-like behavior near the peg, switching dynamically (similar in spirit to Curve Finance's StableSwap invariant, though not always implemented identically).\n3. **Value-weighted/index-style pools** — maintain a fixed value-weight ratio across a basket, roughly analogous to Balancer's weighted-pool design, rebuilt as a v4 hook.\n4. **Volatility-targeting curves** — instead of pricing purely off supply ratios, target a specific implied volatility level and adjust accordingly (Implied Volatility Targeting AMM).\n\n## Prior art / reference material\n\n- Uniswap v2 whitepaper — the original constant-product (x*y=k) formula that is the default and reference point for every alternative curve in this category.\n- Curve Finance's StableSwap whitepaper — the widely cited hybrid curve design purpose-built for low-slippage stable-asset trading.\n- Balancer's weighted-pool math (from the Balancer whitepaper) — the reference design for multi-asset, value-weighted pools.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **DiamondX** | UHI1 | Innovative Liquidity Solutions for Precious Gems | Constant Product Market Maker (CPMM), Constant Sum Market Maker (CSMM), LAMMBert |\n| **Squared** | UHI1 | Access leverage on any token. | CFMM, NoOp |\n| **Vortex Protocol** | UHI1 | Mixer using Uniswap V4 Hooks + Legal Compliance | CFMM |\n| **Deterministic Uniswap Hook (Duh!)** | UHI2 | Unlocking Bond Trading in DeFi | CFMM, DeFi |\n| **UniStorm** | UHI3 | UniStorm is a privacy-preserving transaction mixer built on Uniswap v4 that incorporates zero-knowledge proofs from Tornado Cash to allow users to disassociate deposits and withdraws by making swaps. By combining Tornado Cash's zk technology with Uniswap v4's hook system, it enables users to sever the on-chain connection between the sender and recipient through a swap. | Constant Sum Market Maker (CSMM), DEX, DeFi, MEV, NoOp, zk-SNARK |\n| **Implied Volatility Targeting AMM (IVTAMM)** | UHI4 | A Constant Volatility AMM w/ daily target IV updates. | CFMM, DEX, Dynamic Fee, LP Fees |\n| **VixDex: On-Chain Volatility Trading Protocol** | UHI4 | VixDex is a decentralized volatility trading protocol that enables traders to speculate on crypto’s implied volatility (IV)—similar to VIX options but fully on-chain, using a bonding curve pricing mechanism powered by Uniswap V4 hooks | Constant Product Market Maker (CPMM), Constant Sum Market Maker (CSMM), Custom hooks, DEX, NoOp, Other no extra steps needed. | Constant Product Market Maker (CPMM), Custom hooks, DEX, LP Fees, LP Liquidity, RWA, Stablecoins, Yield Farming |\n| **JIT Liquidity & Issuance Hook — Launch-Phase Price Discovery & Slippage Reduction for New Assets (Deterministic, No Keepers)** | UHI8 | JIT Liquidity Hooks is a launch-phase primitive for Uniswap v4 that activates deterministic JIT liquidity at swap time and enforces anti-sniping guardrails during discovery, then transitions pools to steady state. It uses a block-based phase machine (PreLaunch → LaunchDiscovery → SteadyState), bounded vault inventory, and optional capped issuance—all without keepers or bots. | CFMM, DEX, Liquidity Mining, Unichain |\n| **MEGA QUANT** | UHI8 | MEGA QUANT is a cross-platform quantitative trading desktop app that leverages custom Uniswap V4 hooks to enable on-chain      limit orders, stop-loss orders, bracket (OCO) orders, and EWMA-based dynamic fee adjustment — all executing atomically without keepers. It provides a sandboxed JavaScript strategy engine with a unified API spanning Uniswap V4, V3, 1inch, Aave   V3, and Binance, alongside 5-source price aggregation and unified PnL tracking across spot, perps, options, and lending. | CFMM, Custom Routers, Custom hooks, Dynamic Fee, Order Type |\n| **MEVengers** | UHI8 | MEVengers is an autonomous, community-driven MEV protection system for Uniswap V4. It leverages Reactive Network sentinels and ERC-8004 smart agent reputation to automatically detect, lock, and auction off predatory MEV opportunities, redistributing value to LPs and victims. | Auctions, CFMM, ERC-8004 (Agent reputation registry), LVR, MEV, Unichain |\n| **PEGKEEPER** | UHI8 | PegKeeper is a Uniswap v4 hook that protects stablecoin LPs from depeg events by monitoring prices across multiple chains via Reactive Network and automatically escalating swap fees and pausing deposits before losses occur. | CFMM, Cross-Chain, Dynamic Fee, LP Fees, Price Discovery, Security, Unichain |\n| **S kyc-identity.md", "file": "compliance-kyc-identity.md", "section": "Hook Directory — 556 Past Projects", "num": 5, "title": "Compliance, KYC & Identity", "md": "# Compliance, KYC & Identity\n\n**60 hook projects.**\n\n## The problem, explained simply\n\nUniswap pools are, by default, permissionless — literally anyone with a wallet can trade in them, no questions asked. That's a core value proposition of DeFi, but it's also a legal problem for anyone who wants to bring regulated activity on-chain: banks, funds managing real-world assets, and any token that's legally classified as a security typically must, by law, verify who they're transacting with (KYC — Know Your Customer) and screen for banned counterparties (AML — Anti-Money Laundering). A standard Uniswap pool has no way to enforce \"only verified/whitelisted wallets can trade this.\"\n\nA related but distinct idea is **identity/reputation without necessarily involving a legal KYC process** — proving a wallet is controlled by a unique human (Proof of Personhood/Humanity), to prevent bots or a single actor from creating many wallets to game a system (e.g. an airdrop, a governance vote, or a \"one discount per person\" rule).\n\n## Why so many teams attack this\n\nRegulatory compliance is widely seen as the single biggest blocker to institutional and traditional-finance money entering DeFi at scale, so \"compliant DEX infrastructure\" is a perennially attractive pitch. It's also directly tied to the RWA narrative (see `stablecoins-rwa-tokenized-assets.md`) — you can't legally trade a tokenized bond or equity on a fully permissionless pool in most jurisdictions, so compliance hooks are a prerequisite for that whole category to work in the real world, not just as a hackathon demo.\n\n## Common approaches seen in this dataset\n\n1. **Whitelist/KYC-gated pools** — only wallets that have completed an off-chain or on-chain identity check (often via a third-party KYC provider or an attestation) can swap in the pool.\n2. **On-chain compliant DEX infrastructure for institutions** — let banks/financial institutions spin up their own regulated DEX instance built on Uniswap v4 primitives (Levery).\n3. **Proof of Personhood/Humanity integration** — combine a hook with an external identity-proof system to ensure one human = one set of trading privileges, reducing Sybil attacks (multiple fake identities controlled by one actor).\n4. **Regulation-aware fee/discount structures** — apply different fees or access rules depending on a wallet's verified jurisdiction or accreditation status, mirroring real securities-law distinctions (e.g. accredited vs. non-accredited investors).\n5. **On-/off-ramp compliance** — hooks positioned at the boundary between fiat and crypto (p2p fiat exchange, on-ramping services) where compliance obligations are typically strictest.\n\n## Prior art / reference material\n\n- ERC-3643 (T-REX) permissioned token standard — explicitly named in this dataset (also referenced in the RWA category) as a real, production compliance standard for security tokens.\n- Traditional KYC/AML regulatory frameworks (e.g. the Bank Secrecy Act in the US, FATF's Travel Rule internationally) — the real-world legal backdrop nearly every hook in this category is implicitly designing against.\n- Proof of Humanity / Worldcoin-style proof-of-personhood systems — the general category of \"unique human verification\" infrastructure several hooks integrate with or reference conceptually.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **uniguard.exchange** |  | Empowering Uniswap V4 with NASDAQ-Inspired Circuit Breaker Solutions for DeFi Safe Trade | Custom hooks, DeFi, Dynamic Fee, LP Liquidity, Regulation, Unichain |\n| **Compliant DEX** | UHI2 | A decentralised exchange built over the Uniswap V4 protocol and enhanced with PureFi’s compliance hooks | AML, Compliance, DEX, DeFi, KYC |\n| **DCLEX Hook** | UHI2 | A KYC Hook that can't be bypass by using ERC-6909 claim tokens. (modification in the token contract required) | AML, Compliance, KYC, Security, Tokenized Stocks |\n| **KYC Hook** | UHI2 | We develop a hook providing KYC controls on access to UniswapV4 liquidity pools. | AML, Compliance, DEX, DeFi, KYC, Regulation |\n| **Levery** | UHI2 | Levery is an infrastructure that allows banks and financial institutions to create their own regulated DEX. | AML, Compliance, Dynamic Fee, KYC, LP Fees |\n| **Multihook** | UHI2 | Adapter for subhooks. Allows you to combine multiple hooks into one | DeFi, Donations, Dynamic Fee, KYC, Security |\n| **NFT Gated Pools** | UHI2 | Exclusive Pools only for the holders of certain NFTs | Compliance, DEX, DeFi, Governance, KYC, Security, Trading Volume Rewards, delegates |\n| **Reputation Hook - MetaPools** | UHI2 | Reputation Hook project is where giving identities to traders globally | Custom hooks, Inter-Connected Pools, MetaPools, Reputation |\n| **Steelo.io** | UHI2 | Steelo is a web3 social media mobile app helping creators turn fans into investors through self-tokenisation, token-gated experiences and value-redistributing tokenomics. | Coincidence of Wants, DEX, DeFi, Dynamic Fee, ETH Staking, Governance, KYC, Order Type, Security, Tokenized Stocks, Trading Rewards, Trading Volume Rewards, base interest rate, zk-SNARK |\n| **Stormbit** | UHI2 | Stormbit is multichain p2p lending protocol trust based aiming to bring more access to loans. | DeFi, Donations, KYC, zk-SNARK |\n| **Nevo.network** | UHI3 | Decentralized p2p fiat exchange on hooks | AML, Custom Routers, Custom hooks, DEX, DeFi, Donation, Donations, Dynamic Fee, Governance, KYC, LP Fees, LP Liquidity, Liquidity Mining, Oracle, Security, Tokenized Stocks, Trading Rewards, Trading Volume Rewards |\n| **Regulated DEX Hook** | UHI3 | RWA Hook with built-in compliance and discounts based on real world facts | Compliance, DeFi, Dynamic Fee, ERC-3643, Illiquid Assets, KYC, LP Fees, Price Discovery, Private Debt, Proof Of Humanity, Proptech, RWA, Regulation, Reputation, Tokenized Stocks, Trading Rewards, Trading Volume Rewards, Unichain |\n| **Risk Management Hook** | UHI3 | The risk management hook created is intended to check the change in volatility on the user's portfolio based on the BalanceDelta returned on afterswap. In case of a delta volatility outside of compliant limits, the transaction is reverted. | Compliance, Security |\n| **UniGuard** | UHI3 | Risk management and Insurance mechanisms for Uniswap hooks | Compliance, EigenLayer, Governance, Reputation, Security |\n| **Whitelist Access Hook** | UHI3 | A hook designed to restrict pool access exclusively to pre-approved users who have successfully completed a verification process. Using a “whitelist” mechanism, the system ensures that only verified users are granted access, enhancing security and ensuring controlled participation. | Compliance, KYC, Regulation, Security |\n| **Loan-FI** | UHI4 | Platform for creating under-undercoleterized loans | DEX, KYC, LP Liquidity, LVR, Private Debt, Reputation |\n| **POH Aggregator Hook** | UHI4 | This hook aims to aggregate different web3 Proof of Humanity (POH) services in one place. It allows the liquidity pool position initializer to select which POH service to use and what customized verification setting should be considered for the swapper. | KYC, Proof Of Humanity |\n| **PumpUp** | UHI4 | PumpUp is a specialized marketplace where memecoin creators can deploy their tokens on custom-designed bonding curves built by expert curators, enabling more efficient trading with transparent scoring systems with AVS and seamless liquidity management across multiple trading strategies. | Meme, NoOp, Reputation, Security |\n| **Tick Range and Allowlist hooks** | UHI4 | This project is composed of two hooks. One to restrict swapping and liquidity provision to a specific tick range. The other one to restrict addresses that can swap and provide liquidity via two allowlists. | Compli ocol) and Unichain were both frequently promoted/sponsored integrations across UHI cohorts, so a large share of submissions specifically target \"how do I make swaps/orders/liquidity work across more than one chain\" as a way to use those sponsor technologies.\n\n## Common approaches seen in this dataset\n\n1. **Cross-chain limit orders / order redemption** — place an order on one chain, have it executed and settled on another, using a messaging layer like Chainlink CCIP to carry the instruction and proof across chains.\n2. **Unichain-native hooks** — hooks specifically designed around Unichain's fast-finality properties to make cross-chain-ish behavior (e.g. instant redemption, tight cross-chain arbitrage) more practical than on general-purpose L1/L2s.\n3. **Omni-liquidity / liquidity aggregation across pools and chains** — dynamically allocate a single logical liquidity position across multiple chains to minimize slippage and maximize fee capture wherever demand currently is.\n4. **Cross-chain arbitrage/bridging toolkits** — instead of hiding cross-chain price differences, some hooks explicitly build tools to find and execute on them (turning fragmentation into a feature for the operator, though this is really just professionalized arbitrage).\n5. **LST/LRT cross-chain unification** — liquid staking and restaking tokens (see `staking-restaking.md`) are especially fragmented since almost every L2 has its own wrapped version; several hooks specifically try to unify liquidity for these.\n\n## Prior art / reference material\n\n- Chainlink CCIP (Cross-Chain Interoperability Protocol) documentation — the standard messaging layer most cross-chain hooks in this dataset build on.\n- Unichain documentation (Uniswap Labs) — the L2 whose fast-finality and native cross-chain design several hooks are built specifically for.\n- General cross-chain bridge security research (e.g. post-mortems of major bridge hacks like Wormhole, Ronin) — the implicit risk backdrop that motivates \ # The problem, explained simply\n\nOn Uniswap v2/v3, every pool has one fixed swap fee (e.g. 0.30%), set once when the pool is created and never changing no matter what's happening in the market. This creates a mismatch:\n\n- **When the market is calm**, a 0.30% fee is often *too high* — it discourages ordinary trading, so the pool does less volume than it could, and liquidity providers (LPs — the people who deposit token pairs into the pool so others can trade against them) earn less than if fees were lower and volume higher.\n- **When the market is volatile** (prices moving fast), a 0.30% fee is often *too low*. Here's why that matters: when the external \"true\" price of an asset (on Binance, Coinbase, etc.) moves faster than the Uniswap pool's price, an arbitrageur can trade against the pool to pull its price back in line — and pockets the difference as pure profit. That profit comes directly out of the LPs' pocket in the form of giving up tokens at a stale, no-longer-fair price. This specific loss has a name: **Loss-Versus-Rebalancing (LVR)**, formalized in the 2022 paper *\"Automated Market Making and Loss-Versus-Rebalancing\"* by Milionis, Moallemi, Roughgarden, and Zhang. It shows mathematically that LPs are structurally worse off than if they had just rebalanced their portfolio directly, and that the gap widens with volatility.\n\nA static fee can't adapt to either situation. So a fixed-fee pool is always leaving money on the table for LPs in one direction or another.\n\n## Why so many teams attack this exact problem\n\nBecause it's the most legible, most measurable pain point in the entire AMM design space — you can literally back-test \"would a dynamic fee formula have earned LPs more money than the static 0.30% fee over this historical price data,\" and get a number. It's also the *headline feature* Uniswap v4 hooks were built to unlock (dynamic fees were explicitly cited by the Uniswap Foundation as a flagship hook use case), so nearly every cohort tries a version of it.\n\n## Common approaches seen in this dataset\n\n1. **Volatility-based fees** — raise the fee when recent price volatility (measured via rolling standard deviation, ATR, or an oracle feed) is high, lower it when calm. Simple, but many entries are near-identical implementations of this idea.\n2. **Directional / asymmetric fees (Nezlobin's formula)** — named after a formula popularized by Dan Robinson/Alex Nezlobin's public research on Uniswap v4 hook design: charge a *higher* fee on trades that push the pool price further from a reference price (likely informed/arbitrage flow) and a *lower* fee on trades that push it back toward the reference price (likely \"helpful,\" uninformed flow). This directly targets LVR rather than just volatility in general.\n3. **Auction-managed AMMs (am-AMM)** — based on the academic \"am-AMM\" (auction-managed AMM) design: instead of a fixed formula, the right to set the pool's fee (and often capture MEV) for a time window is auctioned off to a \"strategist\" or \"manager,\" who competes with others and pays rent back to LPs. Several entries (Auction Managed AMM, Chronus, AuctionPool, EigenLVR) build on this model.\n4. **Oracle-referenced fees** — use an external price feed (Chainlink, Pyth, or a custom oracle) as the \"true price\" reference, and price the fee based on deviation between pool price and oracle price.\n5. **ML/volatility-forecasting fees** — instead of reacting to volatility that already happened, some hooks try to *predict* near-term volatility with a model and set fees ahead of time (see also `ai-ml-hooks.md`).\n6. **Idle-capital yield stacking** — a related but distinct idea: rather than (or in addition to) changing the fee, redeploy liquidity that's sitting \"out of range\" (not currently earning fees because the price moved outside the LP's chosen band) into a lending protocol like Aave or Morpho so it earns interest even when it isn't earning swap fees.\n\n## Prior art / reference material\n\n- Milionis, Moallemi, Roughgarden, Zhang — *\"Automated Market Making and Loss-Versus-Rebalancing\"* (2022) — the formal LVR framework nearly every \"dynamic fee to protect LPs\" hook is implicitly trying to reduce.\n- am-AMM (auction-managed AMM) research popularized in the Uniswap v4 hook community, e.g. work referenced by Uniswap Labs / Paradigm on auction-based fee-setting.\n- Nezlobin's directional fee concept — informal but widely cited within the Uniswap hook-builder community as a simple heuristic for approximating LVR-aware fees without a full auction mechanism.\n- Uniswap v4 core docs on hooks and dynamic fees (`beforeSwap`/`afterSwap` fee override mechanism).\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **uniguard.exchange** |  | Empowering Uniswap V4 with NASDAQ-Inspired Circuit Breaker Solutions for DeFi Safe Trade | Custom hooks, DeFi, Dynamic Fee, LP Liquidity, Regulation, Unichain |\n| **APR LinkHook** | UHI2 | Dynamic fee hook that moves swap fees to outperform the 'risk-free' ETH Staking base interest rate | Dynamic Fee, ETH Staking, base interest rate |\n| **AntiSnipingHook** | UHI2 | The AntiSnipingHook is a Uniswap V4 hook designed to enhance the security and fairness of liquidity provision. It prevents MEV sniping attacks by preventing swap fee sniping and donation sniping. | Donations, LP Fees, MEV |\n| **Auction Managed AMM** | UHI2 | am-AMM is an AMM model that utilizes Uniswap v4 hooks to introduce an auction-based pool manager system, reducing losses from informed orderflow and maximizing revenue from uninformed orderflow. It aims to enhance AMM efficiency and profitability by combining dynamic fee setting with internalized arbitrage. | DeFi, Dynamic Fee, MEV |\n| **Chronus** | UHI2 | Auction managed AMM allowing to strategists compete by predicting onchain volatility | DEX, DeFi, Dynamic Fee, LP Fees, MEV |\n| **CrossLink** | UHI2 | Dynamic fee calculation using the Nezlobin formula, a n## Common approaches seen in this dataset\n\n1. **DAO treasury-aware pools** — give a DAO's own members preferential fees or access when trading through a pool tied to their treasury, and use governance-controlled rebalancing to keep the pool healthy (DAO Treasury Hook).\n2. **Governance-gated insurance/security features** — let token holders or a DAO vote on parameters of a security mechanism (e.g. what counts as a rug-pull trigger) rather than hard-coding it (Safu Hook).\n3. **Auction-rights allocation with governance oversight** — combine the am-AMM auction pattern (see `dynamic-fees-lp-optimization.md`) with a governance layer that can intervene or set bounds on the auction (AuctionPool).\n\n## Prior art / reference material\n\n- Standard on-chain DAO governance frameworks (e.g. OpenZeppelin Governor, Compound's Governor Bravo) — the general pattern most \"governance hook\" entries adapt to a pool-specific context, though few entries specify which exact framework they build on.\n- am-AMM (auction-managed AMM) research — relevant where governance and auction-based rights allocation intersect.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **Dynamic Governance Liquidator** | UHI2 | Hook is a TWAMM extended with onchain governance that can be used to update or cancel the TWAMM order if a proposal is passed. | DeFi, Governance, delegates |\n| **NFT Gated Pools** | UHI2 | Exclusive Pools only for the holders of certain NFTs | Compliance, DEX, DeFi, Governance, KYC, Security, Trading Volume Rewards, delegates |\n| **Steelo.io** | UHI2 | Steelo is a web3 social media mobile app helping creators turn fans into investors through self-tokenisation, token-gated experiences and value-redistributing tokenomics. | Coincidence of Wants, DEX, DeFi, Dynamic Fee, ETH Staking, Governance, KYC, Order Type, Security, Tokenized Stocks, Trading Rewards, Trading Volume Rewards, base interest rate, zk-SNARK |\n| **Nevo.network** onstant Product Market Maker (CPMM), Constant Sum Market Maker (CSMM), Copy Trading, Custom hooks, DEX, Dynamic Fee, Governance, Illiquid Assets, KYC, LP Fees, LP Liquidity, Liquidity Mining, MEV, Order Type, Price Discovery, Proof Of Humanity, Stablecoins, Trading Rewards, Trading Volume Rewards, Unichain, Yield Farming |"}, {"id": "hook-directory/categories/liquidity-management-incentives.md", "file": "liquidity-management-incentives.md", "section": "Hook Directory — 556 Past Projects", "num": 9, "title": "Liquidity Management & Incentives", "md": "# Liquidity Management & Incentives\n\n**153 hook projects.**\n\n## The problem, explained simply\n\nOn Uniswap v3/v4, liquidity providers don't just deposit tokens into one giant pool — they choose a **price range** (\"I'll provide liquidity only between $1,800 and $2,200 per ETH\"). This is called **concentrated liquidity**, and it lets LPs earn more fees per dollar deposited *while the price stays in their chosen range*. But the moment the price moves outside that range, two bad things happen at once:\n\n1. Their liquidity stops earning any swap fees at all — it just sits there, doing nothing, while still being 100% exposed to price risk. This is \"idle\" or \"out-of-range\" capital.\n2. Getting back \"in range\" requires either the market moving back, or the LP manually withdrawing and re-depositing at a new range (paying gas, and needing to actively watch the market).\n\nMost LPs are not full-time traders. They can't babysit a position all day, so a large fraction of liquidity deposited into Uniswap sits out of range, earning nothing, at any given time. Separately, protocols and token projects that *want* deep liquidity for their token (so people can trade it without huge price impact) have to design an incentive program from scratch to attract LPs — there's no standard, plug-and-play answer to \"how do I bootstrap liquidity for a new pool.\"\n\n## Why so many teams attack this\n\nIdle/out-of-range capital is one of the most quantifiable inefficiencies in DeFi — you can literally measure the dollar-hours of liquidity sitting unused. It's also a problem every single new token/pool launch faces (the \"cold start\" liquidity bootstrapping problem), so it recurs across almost every cohort in a slightly different flavor.\n\n## Common approaches seen in this dataset\n\n1. **Auto-rebalancing / auto-compounding vaults** — a hook (often combined with an ERC-4626 vault) that automatically moves an LP's range back to where the price currently is, and/or reinvests earned fees, without the LP doing anything manually.\n2. **Route idle liquidity into lending markets** — when a position goes out of range, automatically deposit that idle capital into a lending protocol (Aave, Morpho) so it earns interest instead of sitting idle, and pull it back when the price re-enters range. (Idle Liquidity Yield Earning Hook, Hedgehog ALM, Unicord, AlphaEngine, and many \"NoOp\" hooks.)\n3. **Just-In-Time (JIT) liquidity** — instead of sitting in the pool permanently, liquidity is deployed *only* for the instant a large trade executes (to capture the fee) and withdrawn immediately after, maximizing capital efficiency for sophisticated LPs.\n4. **Liquidity mining / points programs** — reward LPs with extra tokens or points for depositing, often tiered by amount or duration, to bootstrap a new pool's depth (a mechanism as old as \"yield farming\" from DeFi Summer 2020, now rebuilt as a hook rather than a separate rewards contract).\n5. **Native, protocol-level incentive layers** — instead of every project building its own rewards contract, provide a general-purpose \"incentive campaign\" hook that any pool can plug into.\n\n## Prior art / reference material\n\n- Uniswap v3 whitepaper — introduced concentrated liquidity and the range-based LP model that creates the \"out of range\" problem in the first place.\n- ERC-4626 (\"Tokenized Vault Standard\") — the standard interface many \"auto-deploy idle liquidity to a lender\" hooks build their vault logic on top of.\n- Yearn Finance / auto-compounding vault designs — the general pattern (\"deposit once, let a strategy contract manage it\") that many rebalancer/vault hooks borrow from, applied specifically to concentrated liquidity ranges.\n- \"Liquidity mining\" as popularized by Compound/Synthetix in 2020 DeFi Summer — the incentive-token-for-deposits pattern reused here as a hook-native feature.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **uniguard.exchange** |  | Empowering Uniswap V4 with NASDAQ-Inspired Circuit Breaker Solutions for DeFi Safe Trade | Custom hooks, DeFi, Dynamic Fee, LP Liquidity, Regulation, Unichain |\n| **Oolong.xyz** | UHI1 | Trade on Uniswap V4 with up to 5x leverage. For LP, earn extra yield from lending and liquidation fees. Built on Uniswap V4 Hooks. The fastest way to 5x any token. | LP Liquidity |\n| **Omni Incentive Hook** | UHI2 | All-in-one incentivization for a balanced ecosystem | Liquidity Mining, Pool Native Incentivization, Trading Volume Rewards |\n| **Auction Managed AMM & Active Range Incentives in Any Currency** | UHI3 | An Auction Managed AMM & An Active Range Incentives in Any Currency | Auctions, Custom hooks, DEX, DeFi, Donation, Donations, Dynamic Fee, LP Fees, MEV, Pool Native Incentivization, Trading Rewards |\n| **Dynamic LP Assurance Hook** | UHI3 | The Dynamic LP Assurance Hook is a Uniswap V4 hook designed to protect liquidity providers (LPs) by dynamically collecting insurance fees and enabling flash loan functionalities. | Arbitrum Stylus, Dynamic Fee, LP Liquidity |\n| **DynamicShield Hook** | UHI3 | DynamicShield Hook, built for Uniswap V4, protects liquidity providers by reducing impermanent loss (IL) and mitigating asset devaluation outside the range. It dynamically adjusts fees to balance pools, converts inactive assets into safe tokens, and reinvests during market recoveries to maximize returns. | Arb ginate, monitor, and recover loans backed by tokenized gold collateral. When a borrower defaults, a cross-chain relayer activates a Uniswap v4 liquidation hook on EVM to control who can liquidate, how much collateral can be sold, and how recovery is split between treasury and lenders. | Cross-Chain, LP Liquidity, Machine Learning |"}, {"id": "hook-directory/categories/mev-lvr-protection.md", "file": "mev-lvr-protection.md", "section": "Hook Directory — 556 Past Projects", "num": 10, "title": "MEV & LVR Protection", "md": "# MEV & LVR Protection\n\n**126 hook projects.**\n\n## The problem, explained simply\n\nMEV stands for **Maximal Extractable Value** — the profit a block producer (or a bot that pays the block producer) can extract by choosing *which* transactions go in a block and in *what order*, beyond just the normal transaction fee. On a DEX like Uniswap, the classic version of this is the **sandwich attack**: a bot sees your pending \"buy\" transaction in the public mempool, buys the same asset right before you (pushing the price up), lets your trade execute at the now-worse price, then immediately sells (pocketing the difference). You end up with a worse price than you should have gotten, and you never even know a bot was involved.\n\nA related but distinct problem is **LVR (Loss-Versus-Rebalancing)** — see `dynamic-fees-lp-optimization.md` for the full explanation. In short: whenever the external market price moves, arbitrage bots race to correct the AMM's price and pocket the gap, and that gap is money that would otherwise have stayed with liquidity providers. LVR is really \"structural, unavoidable MEV that LPs bleed to arbitrageurs by design,\" as opposed to sandwich attacks which target traders directly.\n\nBoth problems exist because Ethereum (and most EVM chains) have a **public mempool** — pending transactions are visible to everyone before they're confirmed, so anyone running a bot can see your trade coming and act on it first.\n\n## Why so many teams attack this\n\nMEV extraction from Uniswap has historically been worth hundreds of millions of dollars, is well documented (Flashbots' MEV-explore, and academic literature), and is *the* most-cited weakness of AMMs. Hooks are a natural place to add MEV mitigation because `beforeSwap`/`afterSwap` hooks can inspect the transaction and react before value is extracted, whereas in v2/v3 the only tools available were external (private mempools/relays like Flashbots Protect).\n\n## Common approaches seen in this dataset\n\n1. **Dynamic/directional fees that tax likely-arbitrage flow** — see the dynamic fees category; the same lever that improves LP yield in calm-vs-volatile markets can also be aimed specifically at making sandwich attacks and arbitrage less profitable.\n2. **Auction-based MEV redistribution (am-AMM style)** — instead of trying to *prevent* MEV, let a \"manager\" bid for the right to arbitrage the pool, and give that bid revenue back to LPs (EigenLVR, LVR Auction Hook, Shield-Auction-Hook, AuctionPool). This is directly inspired by the am-AMM literature and by \"MEV redistribution\" experiments like MEV-Share/MEV-Boost in the broader Ethereum ecosystem.\n3. **Encrypted/private order flow (FHE)** — use Fully Homomorphic Encryption (FHE, via providers like Fhenix) so the contents or direction of a trade stay hidden until after it's committed, denying bots the information they need to sandwich you (ShadowSwap, CipherFlow, ZK-JIT Liquidity Hook, ShadowBrain).\n4. **Coincidence of Wants (CoW) / order batching** — instead of routing every trade individually through the AMM (where it's visible and attackable), match opposing trades against each other first (\"Alice wants to sell X for Y, Bob wants to buy X with Y — just match them directly\") and only send the unmatched remainder to the pool. This is the same idea behind CoW Protocol / CoW Swap in mainstream DeFi. (EigenMatch CoW Hook, RecorrHook, CoW-tagged entries.)\n5. **Priority-fee-aware fees** — detect when a transaction is paying an unusually high priority fee (a signal that it's probably a bot racing to be first, i.e. probably MEV) and charge it more.\n6. **TWAMM (Time-Weighted Average Market Maker)** — break a large trade into many small pieces executed gradually over time rather than as one big transaction, which reduces both price impact and the incentive to snipe it.\n\n## Prior art / reference material\n\n- Milionis, Moallemi, Roughgarden, Zhang — *\"Automated Market Making and Loss-Versus-Rebalancing\"* (2022).\n- Flashbots research on MEV, MEV-Boost, and MEV-Share — the primary applied research body documenting sandwich attacks and MEV markets on Ethereum.\n- am-AMM (auction-managed AMM) design for redistributing MEV/arbitrage rent to LPs.\n- CoW Protocol / CoW Swap — batch auction and \"coincidence of wants\" matching as an MEV-resistant trading design.\n- Paradigm's public research and blog posts on TWAMM (time-weighted average market maker), which originated as a Paradigm research concept before v4 hooks made it directly implementable.\n- Fhenix and other FHE-on-EVM projects — the encryption layer several \"private trading\" hooks build on top of.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **AntiSnipingHook** | UHI2 | The AntiSnipingHook is a Uniswap V4 hook designed to enhance the security and fairness of liquidity provision. It prevents MEV sniping attacks by preventing swap fee sniping and donation sniping. | Donations, LP Fees, MEV |\n| **Auction Managed AMM** | UHI2 | am-AMM is an AMM model that utilizes Uniswap v4 hooks to introduce an auction-based pool manager system, reducing losses from informed orderflow and maximizing revenue from uninformed orderflow. It aims to enhance AMM efficiency and profitability by combining dynamic fee setting with internalized arbitrage. | DeFi, Dynamic Fee, MEV |\n| **Chronus** | UHI2 | Auction managed AMM allowing to strategists compete by predicting on acks. | Cross-Chain, DEX, LP Fees, MEV |\n| **Shadowbrain** | UHI6 | ShadowBrain: Autonomous, MEV-Resistant DeFi Automation  The Vision: Truly Automated DeFi  Imagine a world where your most profitable on-chain strategies execute themselves at the perfect moment, without any manual intervention. This is the future of truly automated Decentralized Finance (DeFi) , a world where efficiency, precision, and security are built-in. ShadowBrain is making this vision a reality.  The Problem: DeFi's Automation Gap  Today's DeFi is powerful but inefficient. Users are burdened by: • Manual Execution: Constantly monitoring markets and manually triggering time-sensitive actions across different platforms. • Imperfect Timing: Missing out on profits because the most lucrative opportunities require split-second reactions that are beyond human capability. • MEV Exploitation: Predatory MEV (Maximal Extractable Value) bots detect and front-run automated transactions, siphoning value away from users. • Protocol Silos: Juggling isolated protocols, making it difficult to execute complex, multi-platform strategies seamlessly.  The Solution: The ShadowBrain Engine  ShadowBrain is a decentralized automation hub designed to execute complex DeFi strategies with unparalleled precision and security. We solve the core problems of on-chain automation by integrating three technological breakthroughs: 1. Uniswap V4 Hooks: We use these hooks to enable programmable, swap-triggered execution. This allows your strategies to be activated directly within the flow of market activity. 2. Dutch Auctions: These serve as a natural, market-driven profitability signal. ShadowBrain automatically triggers your registered function calls at the exact moment an auction becomes profitable, ensuring optimal timing. 3. Fhenix FHE Encryption: We use Fully Homomorphic Encryption (FHE) to conceal your transaction parameters and execution logic. This shields your strategies from MEV bots, preventing front-running and other cross-cutting concern rather than a trading-strategy idea.\n5. **TEE (Trusted Execution Environment) execution** — an alternative to the FHE/ZK privacy approaches seen in `privacy-zk-hooks.md`, using secure hardware enclaves instead of cryptography to hide computation.\n\n## Why this bucket is large\n\nTwo forces inflate it: (1) many submissions used only broad, non-descriptive tags, so automatic categorization by tag genuinely can't place them more precisely without reading each description individually, and (2) some entries are one-off, genuinely novel ideas that don't repeat elsewhere in the dataset — which is worth knowing in its own right (see `01-TRACKER.md` for which ideas are common versus rare).\n\n## Prior art / reference material\n\nBecause this bucket spans unrelated ideas, there's no single reference body — see the relevant category file (e.g. `privacy-zk-hooks.md` for TEE/FHE-adjacent entries, `liquidity-management-incentives.md` for NFT-position entries) for closer prior art where applicable.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **Advanced Orders** | UHI1 | Advanced Orders Hook to create Stop Loss, Buy Stop, Buy Limit and Take Profit Orders |  |\n| **Ampli** | UHI1 | A permissionless, self-custodial margin protocol with protocol provided liquidity built on top of Uniswap v4 | DeFi |\n| **Auction-managed perpetual options** | UHI1 | Perpetual options offering leverage on any token |  |\n| **Auto Compound** | UHI1 | Auto Compound is a hook which is designed to reinvest the earned fee back to LP position using uniswap's v4 hooks. This allows LP providers to increase the yield depending on their LP positions. |  |\n| **AutoMate** | UHI1 | Foodpanda for your on-chain tasks | NoOp |\n| **Catapoolt** | UHI1 | Gamified Liquidity Mining |  |\n| **Concentrated Incentives Hook** | UHI1 | Transparent & Optimal Incentives in V4 by incentivizing only the active tick |  |\n| **Dortfolio** | UHI1 | T ptions, Derivatives & Structured Products\n\n**21 hook projects** — one of the smaller, more technically demanding categories.\n\n## The problem, explained simply\n\nIn traditional finance, **derivatives** (options, futures, structured products) let you gain exposure to an asset's price movement, hedge risk, or bet on volatility itself, without holding the underlying asset directly. On-chain, building these has historically required an entirely separate protocol (dYdX, GMX, Opyn, and others each built bespoke infrastructure) because a plain spot AMM has no built-in concept of \"expiration date,\" \"strike price,\" or \"leverage.\" Hooks change the economics of this: because a hook can intercept every swap and liquidity event, some derivative-like payoffs can be approximated *using Uniswap's own concentrated liquidity positions as building blocks*, rather than writing an entirely new options-pricing engine from scratch.\n\nA related idea in this bucket is turning impermanent loss itself into a tradeable risk — instead of treating IL purely as something to minimize (see `dynamic-fees-lp-optimization.md`), some projects let one party effectively \"short\" IL, transforming it into a hedgeable, tradeable exposure.\n\n## Why fewer teams attack this\n\nThis is one of the more mathematically demanding categories — correctly pricing an option or building a safe leveraged position requires real quantitative finance knowledge, not just Solidity skill, so it naturally has fewer entries than more \"pattern-following\" categories like dynamic fees.\n\n## Common approaches seen in this dataset\n\n1. **Perpetual/leveraged trading built on top of AMM liquidity** — let traders \"rent\" a pool's underlying liquidity to take a leveraged directional position, effectively turning any Uniswap v4 pool into a mini perpetual-futures exchange (PerpDexHook, Swappy, Shinrai).\n2. **Options built from concentrated liquidity positions** — since a concentrated liquidity position already has option-like payoff characteristics (it's exposed to price within a range, flat outside it), some hooks formalize this into an actual options product (Gainswap, UniLaas).\n3. **Interest-rate benchmarking** — define an on-chain \"basic interest rate\" or \"risk-free rate\" (often referencing ETH staking yield) as a pricing input for other structured products.\n4. **Stablecoin-adjacent structured yield** — combine stablecoin mechanics with yield-generating structured payoffs (unipeg).\n\n## Prior art / reference material\n\n- Black-Scholes / options-pricing theory (traditional finance) — the classical foundation for any legitimate options-pricing logic, though most hackathon-scale entries use simplified heuristics rather than a full options-pricing model.\n- Uniswap v3's concentrated liquidity design — explicitly noted in DeFi research (e.g. by Guillaume Lambert and others) to be mathematically equivalent to a covered-call-like options payoff, which is the direct inspiration for \"options from LP positions\" hooks.\n- GMX v2's architecture — explicitly cited as the inspiration for at least one project (Swappy) building a perpetual-exchange hook.\n- Opyn/Squeeth and other on-chain options/power-perpetual protocols — general prior art for the \"on-chain derivatives without a centralized order book\" design space.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **APR LinkHook** | UHI2 | Dynamic fee hook that moves swap fees to outperform the 'risk-free' ETH Staking base interest rate | Dynamic Fee, ETH Staking, base interest rate |\n| **Hedgehog ALM** | UHI2 | ALM is a Uniswap V4 NoOp hook that enhances LP performance by holding ETH as collateral on Morpho to earn interest. During price declines, it dynamically borrows USDC to acquire more ETH, offering a passive, \"set and forget\" strategy that provides enhanced returns compared to Uniswap V2. | DEX, DeFi, LP Fees, Security, base interest rate |\n| **Steelo.io** | UHI2 ice Discovery", "md": "# Oracles & Price Discovery\n\n**75 hook projects.**\n\n## The problem, explained simply\n\nAn AMM pool only knows one thing directly: the ratio of the two tokens sitting inside it right now. It has no built-in concept of the \"real\" external market price. That's normally fine — arbitrageurs keep the pool price roughly in line with the outside world by trading against it whenever it drifts (see `mev-lvr-protection.md` for why that's a double-edged sword for LPs). But plenty of hook designs *need* to know the outside \"true\" price directly, for example to:\n\n- Detect that a stablecoin has depegged (you need an external reference for \"$1.00\").\n- Price a dynamic fee based on how far the pool has drifted from the market (Nezlobin-style directional fees).\n- Price an option or leveraged position fairly.\n- Prevent a low-liquidity pool from being trivially manipulated — an attacker with enough capital can push a thin pool's *own* price wherever they want for one transaction (a \"flash loan price manipulation\" attack), so anything that reads the pool's instantaneous price as ground truth is exploitable.\n\n**Oracles** are the systems that bring external, trust-minimized price data on-chain. Getting this right is hard: a naive oracle (just reading the pool's current spot price) is trivially manipulable; a good oracle needs to resist manipulation while still being reasonably fast to update.\n\n## Why so many teams attack this\n\nPrice oracles are one of the most historically exploited components in all of DeFi — most large DeFi hacks (Mango Markets, Cream Finance, and many others) trace back to oracle manipulation, not a flaw in the core lending/trading logic. So it's a well-known, well-documented risk that any serious hook builder has to think about, and building a *better* oracle is a common differentiator.\n\n## Common approaches seen in this dataset\n\n1. **TWAP (Time-Weighted Average Price)** — instead of reading the instantaneous spot price (easy to manipulate for one block), average the price over a window of time, making a manipulation attack much more expensive since an attacker has to sustain the fake price over many blocks. This is the same core idea Uniswap v2/v3 already use internally for their built-in oracle.\n2. **External oracle integration (Chainlink, Pyth)** — pull a price from an established, decentralized off-chain data network rather than trusting the pool's own recent trades at all.\n3. **Reflexive / self-referential oracles with insurance** — combine an oracle with an insurance mechanism that compensates users if the oracle is later found to have been wrong or manipulated (ROSIP).\n4. **AVS-based (Actively Validated Service) oracles** — use EigenLayer restaking operators (see `staking-restaking.md`) as a decentralized network specifically tasked with attesting to volatility or price data, adding cryptoeconomic security on top of the raw data feed.\n5. **Social/sentiment-based price signals** — a less conventional approach: derive trading signals from public social data (e.g. crypto Telegram groups) rather than purely price-based oracles (SocialPool, Sentiment).\n\n## Prior art / reference material\n\n- Uniswap v2/v3 built-in TWAP oracle design — the baseline manipulation-resistant pricing mechanism most \"oracle hook\" projects are extending or replacing.\n- Chainlink price feeds and Pyth Network — the two most commonly integrated third-party oracle providers referenced across this dataset.\n- Post-mortems of oracle-manipulation DeFi hacks (e.g. Mango Markets 2022, Cream Finance 2021) — the applied \"why this matters\" case studies behind manipulation-resistant oracle design.\n- EigenLayer AVS (Actively Validated Services) model — the restaking-secured oracle/data-attestation pattern several hooks build on (see also `staking-restaking.md`).\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **DynamicShield Hook** | UHI3 | Dynamic rket efficiency** — a trade doesn't always get the best execution just because it went through \"a\" Uniswap pool; there might be a better price via a different path, a different fee tier, or by having someone else with an opposing trade matched against you directly instead of going through the pool at all. And a third, related idea is **auctions** as a fairer/more efficient way to decide *who* gets to do something advantageous (like set the pool fee, or capture arbitrage) rather than a fixed rule — see also the am-AMM discussion in `dynamic-fees-lp-optimization.md` and `mev-lvr-protection.md`.\n\n## Why so many teams attack this\n\nLimit orders are one of the most-requested, most obviously \"missing\" features compared to centralized exchanges, and hooks are a natural place to implement them because a `beforeSwap`/`afterSwap` hook can hold a pending order and only let it execute when a price condition is met — no external bot required. Auction mechanisms are attractive to more advanced teams because they connect to the well-developed am-AMM/MEV-redistribution research already popular in the Uniswap v4 hook community.\n\n## Common approaches seen in this dataset\n\n1. **On-chain limit orders as single-sided liquidity** — place a limit order by depositing a single-sided liquidity position at the target price tick; when a swap moves the price through that tick, the position is consumed, effectively executing the \"order,\" and the depositor earns LP fees on top.\n2. **Cross-chain limit orders** — same idea, but the order is placed on one chain and redeemed/settled on another via a cross-chain messaging layer (see `cross-chain-hooks.md`).\n3. **Custom routers** — an alternate entry point for swaps that adds logic (fee routing, compliance checks, batching) before or after handing the trade to the core pool, without modifying the pool itself.\n4. **Auction-based rights allocation (am-AMM pattern)** — auction off a temporary right (e.g. first-in-block execution priority, or the right to set the pool fee) rather than giving it out by a fixed rule, letting the market price that right and pay the proceeds to LPs.\n5. **Dutch auctions for execution timing** — let a price/premium decay over time until someone finds it profitable to act, a common mechanism for triggering automated strategies at the \"right\" moment without needing a centralized keeper.\n\n## Prior art / reference material\n\n- Standard limit-order-book exchange design (TradFi and CEXs) — the baseline feature set these hooks are trying to replicate in a fully on-chain, non-custodial way.\n- am-AMM (auction-managed AMM) research — the same auction-based-fee-and-rights framework referenced in `dynamic-fees-lp-optimization.md` and `mev-lvr-protection.md`, applied here to order execution rights specifically.\n- CoW Protocol's batch auction design — a precedent for \"auction as a trade-matching mechanism\" rather than continuous order matching.\n- Gnosis's original Dutch auction mechanism (used historically for token distribution) — the general pattern several \"Dutch auction trigger\" hooks borrow.\n\n## Projects in this category\n\n| Project | Cohort | Description | Other Tags |\n|---|---|---|---|\n| **V4-orderbook** | UHI1 | Limit order hook for Uniswap with intent-based orderbook. | DEX, Order Type |\n| **AutoDCASwapHook** | UHI2 | This is a hook that enables DCA for cryptocurrency trading. It allows users to set up recurring trades at specified intervals, with customizable parameters such as frequency, duration, and price limits. | DEX, DeFi, Order Type |\n| **FWB TWAMM Hook** | UHI2 | We're building a Time-Weighted Average Market Maker (TWAMM) that will allow DAOs, specifically FWB, to execute large purchases or sales of tokens with limited to no slippage | Order Type |\n| **Gasless Swaps** | UHI2 | This hook offers gasless swaps to traders by having them executed by a non-toxic MEV executor. Users only need to sign a EIP-712 like signature to send their order | DEX, DeFi
