<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Library</title>
<style>
/* ---------- themes ---------- */
:root{
  --bg:#fafaf7; --fg:#1c1c1a; --muted:#8a8a84; --accent:#b3762f;
  --bar-bg:rgba(250,250,247,.96); --bar-fg:#1c1c1a; --line:rgba(0,0,0,.09);
  --card:#ffffff; --card-line:rgba(0,0,0,.07); --shadow:rgba(0,0,0,.10);
  --code-bg:rgba(0,0,0,.055);
}
html[data-theme="sepia"]{
  --bg:#f3ead7; --fg:#4b3a2a; --muted:#98866f; --accent:#8a5a20;
  --bar-bg:rgba(243,234,215,.96); --bar-fg:#4b3a2a; --line:rgba(75,58,42,.14);
  --card:#f9f2e2; --card-line:rgba(75,58,42,.10); --shadow:rgba(75,58,42,.12);
  --code-bg:rgba(75,58,42,.08);
}
html[data-theme="dark"]{
  --bg:#111113; --fg:#cfcfc9; --muted:#6e6e68; --accent:#d29a4f;
  --bar-bg:rgba(17,17,19,.96); --bar-fg:#cfcfc9; --line:rgba(255,255,255,.10);
  --card:#1a1a1d; --card-line:rgba(255,255,255,.07); --shadow:rgba(0,0,0,.5);
  --code-bg:rgba(255,255,255,.08);
}
/* ---------- base ---------- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%;}
body.reader-open{overflow:hidden;}
body{
  background:var(--bg); color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none; touch-action:manipulation;
  transition:background .25s ease, color .25s ease;
}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
.hidden{display:none !important;}
.view{min-height:100dvh; padding:max(20px,env(safe-area-inset-top)) 18px 60px;
  max-width:860px; margin:0 auto;}
.icon-btn{width:42px; height:42px; border-radius:12px; display:flex; align-items:center;
  justify-content:center; font-size:19px; border:1px solid var(--line); flex-shrink:0;}
.icon-btn:active{transform:scale(.94);}

/* ---------- home (shelves) ---------- */
.lib-top{display:flex; justify-content:space-between; align-items:center; gap:10px;}
#home h1{font-size:26px; margin:18px 4px 4px; letter-spacing:-.02em;}
#home .sub{color:var(--muted); font-size:14px; margin:0 4px 22px;}
.offbar{display:inline-flex; align-items:center; gap:8px; margin:0 4px 24px; padding:9px 14px;
  border-radius:11px; border:1px solid var(--card-line); background:var(--card); color:var(--muted);
  font:500 13px inherit; font-family:inherit; cursor:pointer; -webkit-appearance:none;
  transition:border-color .15s, color .15s;}
.offbar:active{transform:scale(.98);}
.offbar .dot{font-size:14px; line-height:1;}
.offbar.ready{color:var(--accent); border-color:var(--accent);}
.offbar.busy{cursor:default;}
.offbar .spin{width:13px; height:13px; border-radius:50%; border:2px solid var(--card-line);
  border-top-color:var(--accent); display:inline-block; animation:offspin .7s linear infinite;}
@keyframes offspin{to{transform:rotate(360deg);}}
.continue{display:block; width:100%; text-align:left; background:var(--card);
  border:1px solid var(--card-line); border-radius:16px; padding:16px 18px; margin-bottom:26px;
  box-shadow:0 4px 18px var(--shadow);}
.continue .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); font-weight:600;}
.continue .t{font-size:17px; font-weight:600; margin:6px 0 4px;}
.continue .p{font-size:13px; color:var(--muted);}
.section-h{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
  color:var(--muted); margin:26px 4px 12px;}
.shelf{display:grid; grid-template-columns:repeat(auto-fill,minmax(138px,1fr)); gap:16px 14px;}
.bookcard{text-align:left; display:flex; flex-direction:column; gap:7px;}
.bookcard:active .cover{transform:scale(.97);}
.cover{position:relative; aspect-ratio:2/3; border-radius:10px; padding:14px 12px 18px 16px;
  display:flex; flex-direction:column; overflow:hidden; color:#f5f1e8;
  box-shadow:0 5px 16px var(--shadow); transition:transform .15s ease;}
.cover::before{content:""; position:absolute; top:0; bottom:0; left:0; width:7px;
  background:rgba(255,255,255,.16); border-right:1px solid rgba(0,0,0,.15);}
.cover .bt{font-size:14.5px; font-weight:700; line-height:1.3; letter-spacing:-.01em;
  display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden;
  text-shadow:0 1px 2px rgba(0,0,0,.25);}
.cover .ba{margin-top:auto; font-size:11px; opacity:.85; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;}
.cover .bar{position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(0,0,0,.25);}
.cover .bar i{display:block; height:100%; background:#fff; opacity:.9;}
.bookcard .cap{font-size:11.5px; color:var(--muted); padding:0 2px;}
.bookcard .cap.done{color:var(--accent);}

/* ---------- search ---------- */
.searchbox{width:100%; padding:11px 14px; border-radius:12px; border:1px solid var(--card-line);
  background:var(--card); color:var(--fg); font:inherit; font-size:14px; outline:none;
  -webkit-appearance:none; transition:border-color .15s;}
.searchbox:focus{border-color:var(--accent);}
.searchwrap{margin:0 4px 20px;}
.sres{display:block; width:100%; text-align:left; background:var(--card);
  border:1px solid var(--card-line); border-radius:12px; padding:12px 14px; margin-bottom:8px;}
.sres:active{transform:scale(.99);}
.sres .b{font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; font-weight:600;}
.sres .t{font-size:15px; font-weight:600; margin:3px 0 4px;}
.sres .s{font-size:13px; color:var(--muted); line-height:1.5;}
.sres mark,.md mark{background:color-mix(in srgb,var(--accent) 30%,transparent);
  color:inherit; border-radius:3px; padding:0 1px;}
.md mark.hl.noted{border-bottom:2px dotted var(--accent); cursor:pointer;}
.md mark.hl{cursor:pointer;}
.snone{color:var(--muted); font-size:14px; margin:8px 4px;}

/* ---------- home tools row (export / import) ---------- */
.tools-row{display:flex; gap:8px; margin:34px 4px 0; flex-wrap:wrap;}
.tools-row button{font-size:12px; color:var(--muted); border:1px solid var(--card-line);
  border-radius:9px; padding:6px 10px; background:var(--card);}
.tools-row button:active{transform:scale(.97);}

/* ---------- highlight popup ---------- */
#hlPop{position:fixed; z-index:40; background:var(--card); border:1px solid var(--card-line);
  border-radius:12px; box-shadow:0 8px 30px var(--shadow); display:flex; gap:2px; padding:4px;}
#hlPop button{padding:8px 12px; font-size:13px; border-radius:9px; white-space:nowrap;}
#hlPop button:active{background:var(--code-bg);}

/* ---------- highlights & bookmarks lists ---------- */
.hlcard{display:block; width:100%; text-align:left; background:var(--card); border:1px solid var(--card-line);
  border-radius:12px; padding:12px 14px; margin-bottom:8px;}
.hlcard .q{font-size:14px; line-height:1.55; border-left:3px solid var(--accent); padding-left:10px;}
.hlcard .note{font-size:13px; color:var(--muted); margin-top:6px; font-style:italic;}
.hlcard .meta{display:flex; justify-content:space-between; align-items:center; margin-top:8px;
  font-size:12px; color:var(--muted);}
.hlcard .del{color:var(--muted); font-size:12px; padding:4px 8px; border-radius:7px; border:1px solid var(--card-line);}
.linkrow{display:block; width:100%; text-align:left; font-size:13.5px; color:var(--accent);
  padding:4px; margin:-10px 0 18px;}

/* ---------- book TOC ---------- */
#toc .hero{display:flex; gap:18px; margin:18px 0 6px;}
#toc .hero .cover{width:104px; flex-shrink:0;}
#toc .hero .bt{font-size:11px; -webkit-line-clamp:6;}
#toc .hero .ba{font-size:8.5px;}
#toc .hero h1{font-size:22px; margin:2px 0 4px; letter-spacing:-.02em; line-height:1.25;}
#toc .hero .author{font-size:14px; color:var(--muted); margin:0 0 8px;}
#toc .hero .meta{font-size:12.5px; color:var(--muted);}
#toc .desc{font-size:14px; line-height:1.55; color:var(--muted); margin:14px 4px 18px;}
.primary{display:block; width:100%; text-align:center; background:var(--accent); color:#fff;
  border-radius:14px; padding:14px; font-size:15px; font-weight:600; margin-bottom:24px;
  box-shadow:0 4px 14px var(--shadow);}
.primary:active{transform:scale(.985);}
.lockbox{max-width:360px; margin:min(30vh,220px) auto 0; text-align:center;}
.lockmark{font-size:34px; margin-bottom:14px;}
.lockbox .sub{color:var(--muted); font-size:13.5px; line-height:1.5; margin:0 0 18px;}
.lockbox .searchbox{text-align:center; margin-bottom:14px;}
.lockbox #lockErr{min-height:16px; color:var(--accent); margin-top:12px;}
.chap{display:flex; align-items:center; gap:14px; width:100%; text-align:left;
  background:var(--card); border:1px solid var(--card-line); border-radius:14px;
  padding:13px 16px; margin-bottom:8px;}
.chap:active{transform:scale(.985);}
.chap .n{font-size:12px; color:var(--muted); min-width:22px; font-variant-numeric:tabular-nums;}
.chap .t{flex:1; font-size:15px; font-weight:500; line-height:1.35;}
.chap .pct{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
.chap .pct.done{color:var(--accent);}

/* ---------- reader chrome ---------- */
#reader{position:fixed; inset:0; display:flex; flex-direction:column;}
.status{position:fixed; left:0; right:0; z-index:5; display:flex; justify-content:center;
  gap:14px; font-size:11.5px; color:var(--muted); pointer-events:none;
  padding:0 70px; white-space:nowrap; overflow:hidden;}
#statusTop{top:calc(6px + env(safe-area-inset-top));}
#statusBot{bottom:calc(8px + env(safe-area-inset-bottom));}
.status span{overflow:hidden; text-overflow:ellipsis;}

#pageArea{position:absolute; inset:0; margin:auto; width:100%; height:100%;
  max-width:var(--maxw,760px);
  padding:calc(30px + env(safe-area-inset-top)) var(--pad,24px) calc(34px + env(safe-area-inset-bottom));}
#pages{position:relative; width:100%; height:100%; overflow:hidden;}
#reader.mode-scroll #pages{overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none;}
#reader.mode-scroll #pages::-webkit-scrollbar{display:none;}

#content{height:100%;
  column-width:var(--pw,320px); column-gap:var(--gap,60px); column-fill:auto;
  font-size:var(--fs,18px); line-height:var(--lh,1.7);}
#content.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;}
#content.anim-slide{transition:transform .3s cubic-bezier(.22,.61,.36,1);}
#content.anim-fade{transition:opacity .16s ease;}
#reader.mode-scroll #content{height:auto; column-width:auto; columns:auto;
  transform:none !important; padding-bottom:15vh;}


/* ---------- markdown ---------- */
.md{text-rendering:optimizeLegibility;}
.md>*:first-child{margin-top:0;}
.md p{margin:0 0 1em; text-align:justify; hyphens:auto; -webkit-hyphens:auto;}
.md h1{font-size:1.5em; line-height:1.28; margin:0 0 .9em; letter-spacing:-.015em; text-align:left;}
.md h2{font-size:1.22em; line-height:1.3; margin:1.5em 0 .6em; letter-spacing:-.01em;}
.md h3{font-size:1.05em; margin:1.3em 0 .5em;}
.md a{color:var(--accent); text-decoration:none; border-bottom:1px solid color-mix(in srgb,var(--accent) 40%,transparent); overflow-wrap:anywhere;}
.md code{background:var(--code-bg); border-radius:5px; padding:.1em .35em; font-size:.85em;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; overflow-wrap:anywhere;}
.md pre{background:var(--code-bg); border-radius:10px; padding:12px 14px; overflow-x:auto;
  font-size:.8em; line-height:1.55; margin:0 0 1.1em;}
.md pre code{background:none; padding:0; font-size:inherit;}
.md ul,.md ol{margin:0 0 1em; padding-left:1.35em;}
.md li{margin:0 0 .45em;}
.md blockquote{border-left:3px solid var(--accent); margin:0 0 1em; padding:.1em 0 .1em 1em; color:var(--muted);}
.md hr{border:none; height:1px; background:var(--line); margin:1.6em auto; width:55%;}
.md .tblwrap{margin:0 0 1.2em; max-width:100%;}
#reader.mode-scroll .md .tblwrap{overflow-x:auto;}
.md table{border-collapse:collapse; width:100%; font-size:.78em; line-height:1.45;}
.md th,.md td{border:1px solid var(--line); padding:5px 8px; text-align:left; vertical-align:top;}
.md th{background:var(--code-bg); font-weight:600;}
.md strong{font-weight:650;}

/* ---------- bars ---------- */
.bar{position:fixed; left:0; right:0; z-index:20; background:var(--bar-bg); color:var(--bar-fg);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  display:flex; align-items:center; gap:8px;
  transition:transform .28s ease, opacity .28s ease;}
#topbar{top:0; padding:calc(8px + env(safe-area-inset-top)) 12px 8px;
  border-bottom:1px solid var(--line);}
#topbar.off{transform:translateY(-110%); opacity:0; pointer-events:none;}
#topbar .title{flex:1; font-size:14px; font-weight:600; text-align:center;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
#botbar{bottom:0; padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--line); flex-direction:column;}
#botbar.off{transform:translateY(110%); opacity:0; pointer-events:none;}
.slider-row{display:flex; align-items:center; gap:12px; width:100%; max-width:640px; margin:0 auto;}
.slider-row button{font-size:13px; color:var(--muted); padding:6px; flex-shrink:0;}
input[type=range]{flex:1; accent-color:var(--accent); height:26px;}
.slider-lbl{font-size:11px; color:var(--muted); text-align:center; margin-top:2px;}

/* ---------- text-to-speech (Listen) ---------- */
#ttsBar{bottom:0; flex-direction:column; padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--line);}
#ttsBar select{flex:1; min-width:0; background:var(--card); color:var(--fg);
  border:1px solid var(--line); border-radius:9px; padding:7px 8px;
  font:inherit; font-size:13px; -webkit-appearance:none; appearance:none;}
#btnListen.on{color:var(--accent);}
.tts-w.tts-cur{background:color-mix(in srgb,var(--accent) 32%,transparent); border-radius:3px;}
#content.tts-mode .tts-w:hover{background:var(--code-bg); cursor:pointer; border-radius:3px;}

/* ---------- Aa panel ---------- */
#scrim{position:fixed; inset:0; z-index:29; background:rgba(0,0,0,.25);}
#aaPanel{position:fixed; z-index:30; background:var(--card); border:1px solid var(--card-line);
  box-shadow:0 12px 40px var(--shadow); border-radius:18px; padding:18px;
  left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  width:min(420px, calc(100vw - 24px)); max-height:76dvh; overflow-y:auto;}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
.row:last-child{margin-bottom:0;}
.row .lbl{font-size:13px; color:var(--muted); min-width:74px;}
.seg{display:flex; flex:1; background:var(--code-bg); border-radius:10px; padding:3px; gap:3px;}
.seg button{flex:1; padding:7px 4px; border-radius:8px; font-size:13px; color:var(--muted); text-align:center;}
.seg button.on{background:var(--bg); color:var(--fg); font-weight:600; box-shadow:0 1px 4px var(--shadow);}
.stepper{display:flex; align-items:center; gap:4px; flex:1; justify-content:flex-end;}
.stepper button{width:44px; height:36px; border:1px solid var(--line); border-radius:10px; font-size:16px;}
.stepper .val{min-width:52px; text-align:center; font-size:14px; font-variant-numeric:tabular-nums;}
.theme-chips{display:flex; gap:8px; flex:1; justify-content:flex-end;}
.theme-chips button{width:44px; height:36px; border-radius:10px; border:2px solid var(--line); font-size:12px; font-weight:600;}
.theme-chips button.on{border-color:var(--accent);}
.chip-light{background:#fafaf7; color:#1c1c1a;}
.chip-sepia{background:#f3ead7; color:#4b3a2a;}
.chip-dark{background:#111113; color:#cfcfc9;}

/* ---------- desktop niceties ---------- */
@media (min-width:900px){
  .view{padding-top:48px;}
  .chap:hover{border-color:var(--accent);}
  .continue:hover{border-color:var(--accent);}
  .bookcard:hover .cover{transform:translateY(-3px);}
  .seg button:hover,.icon-btn:hover{color:var(--fg);}
}
.pagehint{position:fixed; top:50%; transform:translateY(-50%); z-index:3; font-size:22px;
  color:var(--muted); opacity:0; transition:opacity .2s; pointer-events:none;}
@media (hover:hover){ #pageArea:hover ~ .pagehint, .pagehint.show{opacity:.35;} }
#hintL{left:10px;} #hintR{right:10px;}
</style>
</head>
<body>

<div id="locked" class="view hidden">
  <div class="lockbox">
    <div class="lockmark">🔒</div>
    <p class="sub">This library is private. Open it with a link that includes the key, or enter it below.</p>
    <input type="password" id="lockInput" class="searchbox" placeholder="Key" autocomplete="off">
    <button class="primary" id="lockBtn">Unlock</button>
    <p class="sub" id="lockErr"></p>
  </div>
</div>
<div id="home" class="view hidden"></div>
<div id="toc" class="view hidden"></div>

<div id="reader" class="hidden mode-page">
  <div id="statusTop" class="status"><span id="stTitle"></span></div>
  <div id="pageArea">
    <div id="pages"><div id="content" class="md serif anim-slide"></div></div>
  </div>
  <div id="hintL" class="pagehint">‹</div>
  <div id="hintR" class="pagehint">›</div>
  <div id="statusBot" class="status"><span id="stInfo"></span></div>

  <header id="topbar" class="bar off">
    <button class="icon-btn" id="btnToc" title="Contents (Esc)">☰</button>
    <div class="title" id="barTitle"></div>
    <button class="icon-btn" id="btnBkm" title="Bookmark this page (B)">⚐</button>
    <button class="icon-btn" id="btnShare" title="Copy a link that shares just this chapter">⤴</button>
    <button class="icon-btn" id="btnTheme" title="Cycle theme (T)">◑</button>
    <button class="icon-btn" id="btnListen" title="Listen — read this chapter aloud">🔊</button>
    <button class="icon-btn" id="btnAa" title="Display settings">Aa</button>
  </header>

  <div id="hlPop" class="hidden"></div>

  <footer id="botbar" class="bar off">
    <div class="slider-row">
      <button id="btnPrevCh" title="Previous chapter">⏮ Prev</button>
      <input type="range" id="slider" min="1" max="1" value="1">
      <button id="btnNextCh" title="Next chapter">Next ⏭</button>
    </div>
    <div class="slider-lbl" id="sliderLbl"></div>
  </footer>

  <footer id="ttsBar" class="bar hidden">
    <div class="slider-row">
      <button class="icon-btn" id="ttsPlay" title="Play / pause reading">▶</button>
      <input type="range" id="ttsSeek" min="0" max="0" value="0" title="Reading position — drag to jump">
      <button class="icon-btn" id="ttsClose" title="Stop listening">✕</button>
    </div>
    <div class="slider-row" style="margin-top:10px">
      <span style="font-size:13px;color:var(--muted);min-width:56px">Speed</span>
      <input type="range" id="ttsRateSlider" min="0.5" max="2.5" step="0.1" value="1" title="Voice speed">
      <span id="ttsRateVal" style="font-size:13px;color:var(--muted);min-width:40px;text-align:right">1.0×</span>
    </div>
    <div class="slider-row" style="margin-top:10px">
      <span style="font-size:13px;color:var(--muted);min-width:56px">Voice</span>
      <select id="ttsVoice" title="Choose a voice (☁ = online voice, tracker is estimated)"></select>
      <button class="icon-btn" id="ttsDictBtn" title="Fix how a word is pronounced">🗣</button>
    </div>
  </footer>

  <div id="scrim" class="hidden"></div>
  <div id="aaPanel" class="hidden">
    <div class="row"><span class="lbl">Font size</span>
      <div class="stepper"><button id="fsDown">A−</button><span class="val" id="fsVal">18px</span><button id="fsUp">A+</button></div></div>

      <div class="seg" id="segFont"><button data-v="serif">Serif</button><button data-v="sans">Sans</button></div></div>
    <div class="row"><span class="lbl">Spacing</span>
      <div class="seg" id="segLh"><button data-v="1.5">Tight</button><button data-v="1.7">Normal</button><button data-v="1.95">Loose</button></div></div>
    <div class="row"><span class="lbl">Margins</span>
      <div class="seg" id="segMargin"><button data-v="s">Narrow</button><button data-v="m">Medium</button><button data-v="l">Wide</button></div></div>
    <div class="row"><span class="lbl">Theme</span>
      <div class="theme-chips" id="themeChips">
        <button class="chip-light" data-v="light">A</button>
        <button class="chip-sepia" data-v="sepia">A</button>
        <button class="chip-dark" data-v="dark">A</button></div></div>
    <div class="row"><span class="lbl">Page turn</span>
      <div class="seg" id="segAnim"><button data-v="slide">Slide</button><button data-v="fade">Fade</button><button data-v="none">None</button></div></div>
    <div class="row"><span class="lbl">Layout</span>
      <div class="seg" id="segMode"><button data-v="page">Pages</button><button data-v="scroll">Scroll</button></div></div>
  </div>
</div>

<script>
"use strict";
/* ================= data =================
   LIB      = [{id, title, books:[{id, title, author, description, chapters:[chIdx…]}]}]
   CHAPTERS = [{id, file, book, part, num, title, md}]  (flat, global indices)   */
const LIB = __LIB_DATA__;
const CHAPTERS = __CHAPTER_DATA__;
const ACCESS_TOKEN = __ACCESS_TOKEN__; // null = site is open to everyone (default)
const BOOKS = {};
LIB.forEach(s => s.books.forEach(b => {
  BOOKS[b.id] = b;
  b.section = s.title;
  b.words = 0;
}));
CHAPTERS.forEach(c => {
  c.words = c.md.split(/\s+/).length;
  BOOKS[c.book].words += c.words;
});

/* ================= tiny markdown renderer ================= */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){
  const codes=[];
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return ""+(codes.length-1)+"";});
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>{
    if(/^https?:/i.test(u)) return `<a href="${u}" target="_blank" rel="noopener">${t}</a>`;
    return `<a href="${u}" data-int="1">${t}</a>`;});
  s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/(^|[\s(])\*([^*\n]+)\*/g,"$1<em>$2</em>");
  s=s.replace(/(\d+)/g,(m,i)=>`<code>${codes[+i]}</code>`);
  return s;
}
function mdToHtml(md){
  const lines=md.replace(/\r/g,"").split("\n");
  let out=[],i=0;
  const flushP=(buf)=>{if(buf.length){out.push("<p>"+inline(buf.join(" "))+"</p>");buf.length=0;}};
  let pbuf=[];
  while(i<lines.length){
    let ln=lines[i];
    if(/^```/.test(ln)){flushP(pbuf);let code=[];i++;
      while(i<lines.length&&!/^```/.test(lines[i])){code.push(lines[i]);i++;}
      i++;out.push("<pre><code>"+esc(code.join("\n"))+"</code></pre>");continue;}
    let t=ln.trim();
    if(t===""){flushP(pbuf);i++;continue;}
    if(/^(-{3,}|\*{3,}|_{3,})$/.test(t)){flushP(pbuf);out.push("<hr>");i++;continue;}
    let h=t.match(/^(#{1,6})\s+(.*)/);
    if(h){flushP(pbuf);const l=h[1].length;out.push(`<h${l}>`+inline(h[2])+`</h${l}>`);i++;continue;}
    if(/^>/.test(t)){flushP(pbuf);let q=[];
      while(i<lines.length&&/^\s*>/.test(lines[i])){q.push(lines[i].replace(/^\s*>\s?/,""));i++;}
      out.push("<blockquote>"+mdToHtml(q.join("\n"))+"</blockquote>");continue;}
    if(/^\|/.test(t)){flushP(pbuf);let rows=[];
      while(i<lines.length&&/^\s*\|/.test(lines[i])){rows.push(lines[i].trim());i++;}
      out.push(renderTable(rows));continue;}
    if(/^([-*+]|\d+[.)])\s+/.test(t)){flushP(pbuf);
      const res=parseList(lines,i);out.push(res.html);i=res.i;continue;}
    pbuf.push(t);i++;
  }
  flushP(pbuf);
  return out.join("\n");
}
function splitRow(r){
  r=r.replace(/^\|/,"").replace(/\|\s*$/,"");
  return r.split("|").map(c=>c.trim());
}
function renderTable(rows){
  if(rows.length<2) return "<p>"+inline(rows.join(" "))+"</p>";
  const head=splitRow(rows[0]);
  let body=rows.slice(/^\s*\|?[\s:|-]+\|?\s*$/.test(rows[1])?2:1);
  let h="<div class='tblwrap'><table><thead><tr>";
  head.forEach(c=>h+="<th>"+inline(c)+"</th>");h+="</tr></thead><tbody>";
  body.forEach(r=>{h+="<tr>";splitRow(r).forEach(c=>h+="<td>"+inline(c)+"</td>");h+="</tr>";});
  return h+"</tbody></table></div>";
}
function parseList(lines,i){
  // returns {html, i}; supports one nesting level by indent
  let html="",stack=[];
  const itemRe=/^(\s*)([-*+]|\d+[.)])\s+(.*)$/;
  const open=(ord)=>{html+=ord?"<ol>":"<ul>";stack.push(ord?"ol":"ul");};
  const close=()=>{html+="</"+stack.pop()+">";};
  let prevIndent=-1;
  while(i<lines.length){
    const m=lines[i].match(itemRe);
    if(!m){ // continuation line (indented, non-empty)?
      if(lines[i].trim()!==""&&/^\s{2,}/.test(lines[i])&&stack.length){
        html=html.replace(/<\/li>$/,"")+" "+inline(lines[i].trim())+"</li>";i++;continue;}
      break;}
    const indent=Math.floor(m[1].replace(/\t/g,"  ").length/2);
    const ord=/^\d/.test(m[2]);
    if(stack.length===0){open(ord);prevIndent=indent;}
    else if(indent>prevIndent){html=html.replace(/<\/li>$/,"");open(ord);prevIndent=indent;}
    else if(indent<prevIndent&&stack.length>1){close();html+="</li>";prevIndent=indent;}
    html+="<li>"+inline(m[3])+"</li>";
    i++;
  }
  while(stack.length)close();
  return {html,i};
}

/* ================= settings & state ================= */
const $=id=>document.getElementById(id);
const store={
  get(k,d){try{const v=localStorage.getItem("hkr."+k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set(k,v){try{localStorage.setItem("hkr."+k,JSON.stringify(v));}catch(e){}}
};
const prefersDark=matchMedia("(prefers-color-scheme: dark)").matches;
let S=Object.assign({theme:prefersDark?"dark":"light",font:"serif",fs:18,lh:"1.7",
  margin:"m",anim:"slide",mode:"page",ttsRate:1},store.get("settings",{}));
let progress=store.get("progress",{});   // {chapterId:{pct}}
let last=store.get("last",null);         // {id: chapterId}
let lastByBook=store.get("lastBook",{}); // {bookId: chapterId} — per-book resume point
let highlights=store.get("highlights",{});// {chapterId:[{text, note?}]}
let bookmarks=store.get("bookmarks",[]); // [{ch: chapterId, pct}]
let cur=-1, page=0, pageCount=1, pendingPct=null;
const htmlCache={};

const content=$("content"),pages=$("pages"),reader=$("reader"),
      home=$("home"),toc=$("toc"),locked=$("locked");

/* ================= settings application ================= */
const MARGINS={s:{pad:16,maxw:920},m:{pad:26,maxw:760},l:{pad:40,maxw:620}};
function applySettings(){
  document.documentElement.dataset.theme=S.theme;
  document.querySelector('meta[name="theme-color"]').content=
    S.theme==="dark"?"#111113":S.theme==="sepia"?"#f3ead7":"#fafaf7";
  content.classList.toggle("serif",S.font==="serif");
  content.style.setProperty("--fs",S.fs+"px");
  content.style.setProperty("--lh",S.lh);
  const m=MARGINS[S.margin];
  $("pageArea").style.setProperty("--pad",m.pad+"px");
  $("pageArea").style.setProperty("--maxw",m.maxw+"px");
  content.classList.remove("anim-slide","anim-fade");
  if(S.anim==="slide")content.classList.add("anim-slide");
  if(S.anim==="fade")content.classList.add("anim-fade");
  reader.className=reader.className.replace(/mode-\w+/,"mode-"+S.mode);
  syncPanel();
  store.set("settings",S);
}
function syncPanel(){
  $("fsVal").textContent=S.fs+"px";
  const sync=(id,val)=>{[...$(id).children].forEach(b=>b.classList.toggle("on",b.dataset.v===String(val)));};
  sync("segFont",S.font);sync("segLh",S.lh);sync("segMargin",S.margin);
  sync("segAnim",S.anim);sync("segMode",S.mode);sync("themeChips",S.theme);
}

/* ================= routing =================
   ""              -> home (shelves)
   #b/<bookId>     -> book table of contents
   #c/<chapterId>  -> reader
   share links (locked-down views for sending to other people):
   #s/b/<bookId>   -> shared book: its TOC + chapters only, no way out
   #s/bc/<chapterId> -> a chapter inside a shared book (book derived from chapter)
   #s/c/<chapterId>  -> shared single chapter: reader only, no TOC/siblings     */
let share=null; // null | {type:"book"|"chapter", id}
function parseShare(h){
  if(h.startsWith("#s/c/"))share={type:"chapter",id:h.slice(5)};
  else if(h.startsWith("#s/bc/")){
    const c=CHAPTERS.find(x=>x.id===h.slice(6));
    share=c?{type:"book",id:c.book}:null;
  }
  else if(h.startsWith("#s/b/"))share={type:"book",id:h.slice(5)};
  else share=null;
}
function chapterIdFromHash(h){
  if(h.startsWith("#c/"))return h.slice(3);
  if(h.startsWith("#s/bc/"))return h.slice(6);
  if(h.startsWith("#s/c/"))return h.slice(5);
  return null;
}
function nav(h){ if(location.hash===h){route();} else {location.hash=h;} }
function chHash(id){
  return share?(share.type==="book"?"#s/bc/":"#s/c/")+encodeURIComponent(id)
              :"#c/"+encodeURIComponent(id);
}
function chapterHash(c){return chHash(c.id);}
function bookHash(b){return (share&&share.type==="book"?"#s/b/":"#b/")+encodeURIComponent(b.id);}
function route(){
  const h=decodeURIComponent(location.hash);
  if(cur>=0&&!reader.classList.contains("hidden"))saveProgress();
  if(ttsActive){ if(ttsAutoNav)ttsAutoNav=false; else ttsClose(); }
  hideBars();hidePanel();hideHlPop();
  parseShare(h);
  const chId=chapterIdFromHash(h);
  if(chId!=null){
    const i=CHAPTERS.findIndex(c=>c.id===chId);
    if(i>=0){showView("reader");renderChapter(i);return;}
  }
  if(h.startsWith("#b/")||h.startsWith("#s/b/")){
    const b=BOOKS[h.startsWith("#s/")?h.slice(5):h.slice(3)];
    if(b){showView("toc");renderToc(b);window.scrollTo(0,0);return;}
  }
  if(h.startsWith("#h/")){
    const b=BOOKS[h.slice(3)];
    if(b){showView("toc");renderHighlightsPage(b);window.scrollTo(0,0);return;}
  }
  share=null; // a broken/unknown share link falls back to the full library
  showView("home");renderHome();window.scrollTo(0,0);
}
/* copy a share link to the clipboard, with a brief ✓ on the button.
   When the site is locked, every generated link carries ?k=<token> so it
   opens standalone for whoever receives it — they don't need the token
   separately, and (unless hash is empty, i.e. a full-home link) unlocking
   via a scoped link does NOT remember the device, so a shared book/chapter
   link only ever grants that one view, never the whole library. */
function copyShare(hash,btn){
  const base=location.href.split("#")[0].split("?")[0];
  const tokenQS=ACCESS_TOKEN?("?k="+encodeURIComponent(ACCESS_TOKEN)):"";
  const url=base+tokenQS+hash;
  if(location.protocol==="file:"){
    prompt("You're viewing a local file, so this link only works on this computer. "+
      "Open your live (GitHub Pages) URL and copy the share link from there:",url);
    return;
  }
  const done=()=>{
    if(!btn)return;
    const t=btn.textContent;btn.textContent="✓";
    setTimeout(()=>{btn.textContent=t;},1200);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(url).then(done,()=>prompt("Copy this link:",url));
  else prompt("Copy this link:",url);
}

/* ================= site lock =================
   ACCESS_TOKEN null -> gating disabled, everyone in (unchanged behavior).
   Otherwise the bare URL shows the #locked screen. Getting in requires
   either ?k=<token> in the URL (auto, from a shared/master link) or typing
   the token into the lock screen. A plain full-home unlock (no #s/... share
   scope active) is remembered on that device via localStorage; a scoped
   share link (?k=...#s/b/<id> etc.) is checked fresh every load and never
   remembered, so it only ever opens the one thing it points to. */
function unlockedOnThisDevice(){return localStorage.getItem("hkr.unlocked")==="1";}
function showLocked(msg){
  locked.classList.remove("hidden");
  home.classList.add("hidden");toc.classList.add("hidden");reader.classList.add("hidden");
  document.body.classList.remove("reader-open");
  if(msg)$("lockErr").textContent=msg;
}
function tryEnter(){
  if(!ACCESS_TOKEN)return true; // gating off
  if(unlockedOnThisDevice())return true;
  const params=new URLSearchParams(location.search);
  return params.get("k")===ACCESS_TOKEN;
}
function attemptUnlock(){
  const val=$("lockInput").value.trim();
  if(!val){showLocked("Enter the key first.");return;}
  if(val!==ACCESS_TOKEN){showLocked("That's not it.");$("lockInput").value="";return;}
  localStorage.setItem("hkr.unlocked","1");
  locked.classList.add("hidden");
  boot();
}
function boot(){
  if(!tryEnter()){showLocked();return;}
  const h=decodeURIComponent(location.hash);
  parseShare(h);
  const params=new URLSearchParams(location.search);
  // remember this device only for a plain (unscoped) unlock — a shared
  // book/chapter link should never leave the recipient's browser able to
  // browse the rest of the library afterward.
  if(ACCESS_TOKEN&&params.get("k")===ACCESS_TOKEN&&!share&&!unlockedOnThisDevice())
    localStorage.setItem("hkr.unlocked","1");
  locked.classList.add("hidden");
  applySettings();
  route();
  registerServiceWorker();
}
function showView(v){
  home.classList.toggle("hidden",v!=="home");
  toc.classList.toggle("hidden",v!=="toc");
  reader.classList.toggle("hidden",v!=="reader");
  document.body.classList.toggle("reader-open",v==="reader");
  if(v!=="reader")cur=-1;
}

/* ================= progress helpers ================= */
function chPct(id){const p=progress[id];return p?p.pct:0;}
function bookPct(b){
  if(!b.chapters.length)return 0;
  return b.chapters.reduce((a,i)=>a+chPct(CHAPTERS[i].id),0)/b.chapters.length;
}
function pctLabel(p){return p>=.95?"✓":(p>0?Math.round(p*100)+"%":"");}

/* ================= covers ================= */
function coverStyle(title){
  let h=0;for(const ch of title)h=(h*31+ch.codePointAt(0))>>>0;
  const hue=h%360, hue2=(hue+46)%360;
  return `background:linear-gradient(148deg,hsl(${hue},44%,40%),hsl(${hue2},52%,24%))`;
}
function coverHtml(b){
  const p=bookPct(b);
  return `<div class="cover" style="${coverStyle(b.title)}">
    <span class="bt">${esc(b.title)}</span>
    <span class="ba">${esc(b.author||"")}</span>
    <span class="bar"><i style="width:${Math.round(p*100)}%"></i></span></div>`;
}

/* ================= home (shelves) ================= */
function renderHome(){
  const nBooks=Object.keys(BOOKS).length;
  let h=`<div class="lib-top"><div><h1>Library</h1>
    <p class="sub">${nBooks} books · ${CHAPTERS.length} chapters</p></div>
    <div style="display:flex;gap:8px;">
    ${ACCESS_TOKEN?'<button class="icon-btn" id="homeLink" title="Copy a link to the whole library">🔗</button>':''}
    <button class="icon-btn" id="homeTheme" title="Cycle theme">◑</button></div></div>
    <div class="searchwrap"><input type="search" class="searchbox" id="searchBox"
      placeholder="Search every book…  ( / )" autocomplete="off"></div>
    <div id="sresults" class="hidden"></div>
    <div id="shelves">
    <div id="offlineBar"></div>`;
  if(last){
    const c=CHAPTERS.find(x=>x.id===last.id);
    if(c){const b=BOOKS[c.book];
      h+=`<button class="continue" data-ch="${esc(c.id)}"><span class="lbl">Continue reading</span>
        <div class="t">${esc(c.title)}</div>
        <div class="p">${esc(b.title)} · ${Math.round(chPct(c.id)*100)}% of chapter</div></button>`;}
  }
  LIB.forEach(s=>{
    h+=`<div class="section-h">${esc(s.title)}</div><div class="shelf">`;
    s.books.forEach(b=>{
      const p=bookPct(b);
      const cap=p>=.95?"✓ Finished":(p>0?Math.round(p*100)+"% read":b.chapters.length+" chapters");
      h+=`<button class="bookcard" data-book="${esc(b.id)}">${coverHtml(b)}
        <span class="cap ${p>=.95?"done":""}">${cap}</span></button>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="tools-row">
    <button id="btnExport" title="Download progress, highlights & bookmarks as JSON">⬇ Back up my data</button>
    <button id="btnImport" title="Restore a previously downloaded backup">⬆ Restore backup</button>
    <input type="file" id="importFile" accept="application/json" class="hidden">
  </div></div>`;
  home.innerHTML=h;
  home.querySelectorAll("[data-book]").forEach(el=>el.addEventListener("click",
    ()=>nav(bookHash(BOOKS[el.dataset.book]))));
  home.querySelectorAll("[data-ch]").forEach(el=>el.addEventListener("click",
    ()=>nav("#c/"+encodeURIComponent(el.dataset.ch))));
  $("homeTheme").addEventListener("click",()=>{cycleTheme();});
  if($("homeLink"))$("homeLink").addEventListener("click",()=>copyShare("",$("homeLink")));
  $("btnExport").addEventListener("click",exportData);
  $("btnImport").addEventListener("click",()=>$("importFile").click());
  $("importFile").addEventListener("change",importData);
  const sb=$("searchBox");
  let sT;
  sb.addEventListener("input",()=>{clearTimeout(sT);sT=setTimeout(()=>renderSearch(sb.value),120);});
  paintOffline();
}

/* ================= full-text search ================= */
function stripMd(s){
  return s.replace(/```[\s\S]*?```/g," ").replace(/[#>*_`|-]+/g," ")
          .replace(/\[([^\]]*)\]\([^)]*\)/g,"$1").replace(/\s+/g," ").trim();
}
function renderSearch(q){
  const box=$("sresults"),shelves=$("shelves");
  q=q.trim();
  if(q.length<2){box.classList.add("hidden");shelves.classList.remove("hidden");box.innerHTML="";return;}
  const ql=q.toLowerCase(),results=[];
  for(const c of CHAPTERS){
    const inTitle=c.title.toLowerCase().includes(ql);
    const body=stripMd(c.md),idx=body.toLowerCase().indexOf(ql);
    if(!inTitle&&idx<0)continue;
    let snip="";
    if(idx>=0){
      const s=Math.max(0,idx-60),e=Math.min(body.length,idx+q.length+90);
      snip=(s>0?"…":"")+body.slice(s,e)+(e<body.length?"…":"");
    }
    results.push({c,snip,rank:inTitle?0:1});
    if(results.length>=60)break;
  }
  results.sort((a,b)=>a.rank-b.rank);
  const hi=s=>esc(s).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"),m=>`<mark>${m}</mark>`);
  let h=`<p class="snone">${results.length?results.length+" matching chapter"+(results.length>1?"s":""):"No matches for “"+esc(q)+"”"}</p>`;
  results.slice(0,50).forEach(r=>{
    const b=BOOKS[r.c.book];
    h+=`<button class="sres" data-ch="${esc(r.c.id)}">
      <div class="b">${esc(b.title)}</div>
      <div class="t">${hi(r.c.title)}</div>
      ${r.snip?`<div class="s">${hi(r.snip)}</div>`:""}</button>`;
  });
  box.innerHTML=h;
  box.classList.remove("hidden");shelves.classList.add("hidden");
  box.querySelectorAll("[data-ch]").forEach(el=>el.addEventListener("click",
    ()=>nav("#c/"+encodeURIComponent(el.dataset.ch))));
}

/* ================= backup / restore (item 5) ================= */
const DATA_KEYS=["settings","progress","last","lastBook","highlights","bookmarks","ttsDict"];
function exportData(){
  const data={};DATA_KEYS.forEach(k=>data[k]=store.get(k,null));
  const blob=new Blob([JSON.stringify({app:"hkr",exported:new Date().toISOString(),data},null,2)],
    {type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="library-backup.json";a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      if(!obj||obj.app!=="hkr"||!obj.data)throw new Error("bad format");
      if(!confirm("Restore this backup? It replaces your current progress, highlights and bookmarks."))return;
      DATA_KEYS.forEach(k=>{if(obj.data[k]!=null)store.set(k,obj.data[k]);});
      S=Object.assign(S,obj.data.settings||{});
      progress=store.get("progress",{});last=store.get("last",null);
      lastByBook=store.get("lastBook",{});highlights=store.get("highlights",{});
      bookmarks=store.get("bookmarks",[]);ttsDict=store.get("ttsDict",{});
      applySettings();renderHome();
    }catch(err){alert("Could not read that backup file.");}
  };
  r.readAsText(f);
  e.target.value="";
}

/* ================= book TOC ================= */
function bookHighlightCount(b){
  return b.chapters.reduce((a,i)=>a+((highlights[CHAPTERS[i].id]||[]).length),0);
}
function renderToc(b){
  const p=bookPct(b);
  const mins=Math.ceil(b.words/230);
  const time=mins>=60?`${Math.round(mins/60*10)/10} h`:`${mins} min`;
  // resume target: this book's own last-read chapter, else first unfinished chapter
  let resume=null;
  const lb=lastByBook[b.id];
  if(lb){const c=CHAPTERS.find(x=>x.id===lb);if(c&&c.book===b.id)resume=c;}
  if(!resume&&last){const c=CHAPTERS.find(x=>x.id===last.id);if(c&&c.book===b.id)resume=c;}
  if(!resume)resume=b.chapters.map(i=>CHAPTERS[i]).find(c=>chPct(c.id)<.95)||CHAPTERS[b.chapters[0]];
  let h=`<div class="lib-top">${share

/* ================= reader core ================= */
function bookOf(c){return BOOKS[c.book];}
function siblingChapter(offset){
  // next/prev chapter within the current book only; null at the edges
  if(share&&share.type==="chapter")return null; // a shared chapter has no siblings
  const c=CHAPTERS[cur],b=bookOf(c);
  const pos=b.chapters.indexOf(cur)+offset;
  return (pos>=0&&pos<b.chapters.length)?b.chapters[pos]:null;
}
function renderChapter(i,fromEnd){
  if(i<0||i>=CHAPTERS.length)return;
  cur=i;const c=CHAPTERS[i],b=bookOf(c);
  if(!htmlCache[c.id])htmlCache[c.id]=mdToHtml(c.md);
  content.style.transition="none";content.innerHTML=htmlCache[c.id];
  ttsWordsFor=-1; // word spans (if any) were just destroyed with the old DOM
  content.querySelectorAll("a[data-int]").forEach(a=>a.addEventListener("click",e=>{
    e.preventDefault();
    if(share&&share.type==="chapter")return; // shared chapter: stay on this chapter
    const f=a.getAttribute("href").split("/").pop();
    // resolve within the same book first, then anywhere in the library
    let j=b.chapters.find(k=>CHAPTERS[k].file===f);
    if(j===undefined&&!share)j=CHAPTERS.findIndex(x=>x.file===f); // share mode never leaves the book
    if(j>=0)nav(chapterHash(CHAPTERS[j]));
  }));
  applyHighlights(c.id);
  $("stTitle").textContent=`${b.title} — ${c.title}`;
  $("barTitle").textContent=c.title;
  const soloCh=!!(share&&share.type==="chapter");
  $("btnToc").style.visibility=soloCh?"hidden":"";
  $("btnPrevCh").style.visibility=$("btnNextCh").style.visibility=soloCh?"hidden":"";
  last={id:c.id};store.set("last",last);
  lastByBook[c.book]=c.id;store.set("lastBook",lastByBook);
  requestAnimationFrame(()=>{
    const saved=progress[c.id];
    let pct=fromEnd?1:(saved?saved.pct:0);
    if(pendingPct!=null){pct=pendingPct;pendingPct=null;}
    paginate();
    goToPct(pct,false);
    restoreAnim();
    if(ttsActive&&!ttsResumeAfterRender){ // same-chapter re-render while listening
      ttsBuildWords();
      if(ttsWords.length)ttsSetWord(Math.min(ttsIdx,ttsWords.length-1));
    }
    if(ttsResumeAfterRender){ttsResumeAfterRender=false;ttsOpen(true);}
  });
}

/* ================= text-to-speech (Listen) =================
   Reads the current chapter aloud, word by word, using the Web Speech API.
   Chapter text is chunked (TTS_CHUNK words/utterance) because some browsers'
   speech engines stall or drop boundary events on very long utterances. */
const TTS_OK="speechSynthesis" in window;
let ttsActive=false, ttsSpeaking=false, ttsWords=[], ttsWordsFor=-1, ttsBreaks=[],
    ttsIdx=0, ttsChunkBase=0, ttsUtter=null, ttsAutoNav=false, ttsResumeAfterRender=false,
    ttsTimer=null, ttsBoundarySeen=false, ttsSeekDragging=false, ttsVoiceList=[];
let ttsDict=store.get("ttsDict",{}); // {word(lowercase): spoken form} — user pronunciation fixes

/* spoken-form preprocessing: the highlight shows the word as written, but the
   engine is fed this transformed text (browsers ignore SSML, so rewriting the
   text is the only pronunciation control there is) */
const TTS_EXPAND={"e.g":"for example","i.e":"that is","etc":"et cetera","vs":"versus","approx":"approximately"};
const TTS_SAY_AS_WORD=new Set(["NASA","JSON","YAML","REST","RAM","ROM","LASER","RADAR","SIM","CRUD","AJAX","DAO","NATO"]);
function ttsSpokenWord(w){
  if(w==="&")return "and";
  const m=w.match(/^([^A-Za-z0-9]*)(.*?)([^A-Za-z0-9]*)$/);
  const pre=m[1],core=m[2],suf=m[3];
  if(!core)return w;
  const lc=core.toLowerCase();
  if(ttsDict[lc])return pre+ttsDict[lc]+suf;
  if(TTS_EXPAND[lc])return pre+TTS_EXPAND[lc]+suf;
  let am=core.match(/^([A-Z]{2,6})(s)?$/);              // UHI -> "U H I"
  if(am&&!TTS_SAY_AS_WORD.has(am[1]))
    return pre+am[1].split("").join(" ")+(am[2]?" s":"")+suf;
  am=core.match(/^v(\d+)$/i);                            // v4 -> "V 4"
  if(am)return pre+"V "+am[1]+suf;
  return w;
}

/* voice list: English voices ranked quality-first (Premium/Enhanced/Natural on
   top, novelty voices last); local voices also fire word-boundary events */
function ttsScoreVoice(v){
  let s=0;
  if(/premium/i.test(v.name))s+=5;
  if(/enhanced/i.test(v.name))s+=4;
  if(/natural|neural/i.test(v.name))s+=4;
  if(/google/i.test(v.name))s+=2;
  if(v.localService)s+=1;
  if(/eloquence|grandma|grandpa|shelley|flo|sandy|reed|rocko|eddy|albert|bad news|bahh|bells|boing|bubbles|cellos|good news|jester|organ|superstar|trinoids|whisper|wobble|zarvox|junior|ralph|fred|kathy/i.test(v.name))s-=8;
  return s;
}
function ttsLoadVoices(){
  if(!TTS_OK)return;
  const all=speechSynthesis.getVoices();
  if(!all.length)return;
  let list=all.filter(v=>/^en/i.test(v.lang));
  if(!list.length)list=all.slice();
  list.sort((a,b)=>ttsScoreVoice(b)-ttsScoreVoice(a)||a.name.localeCompare(b.name));
  ttsVoiceList=list;
  const sel=$("ttsVoice");
  sel.innerHTML=list.map(v=>`<option value="${esc(v.name)}">${esc(v.name)}${v.localService?"":" ☁"}</option>`).join("");
  const cv=ttsCurrentVoice();
  if(cv)sel.value=cv.name;
}
function ttsCurrentVoice(){
  if(!ttsVoiceList.length)ttsLoadVoices();
  if(S.ttsVoice){const v=ttsVoiceList.find(x=>x.name===S.ttsVoice);if(v)return v;}
  return ttsVoiceList[0]||null;
}
if(TTS_OK)speechSynthesis.onvoiceschanged=ttsLoadVoices;

/* estimated tracker for voices that never fire word-boundary events
   (Google/network voices): advance on a timer until a real event shows up */
function ttsStopTimer(){if(ttsTimer){clearTimeout(ttsTimer);ttsTimer=null;}}
function ttsWordMs(w){
  const base=60000/(185*S.ttsRate);            // ~185 wpm at 1×
  return base*Math.min(2.5,Math.max(.6,(w.length+2)/7));
}
function ttsStartFallback(end){
  ttsStopTimer();
  const tick=()=>{
    if(!ttsSpeaking||ttsBoundarySeen)return;
    if(ttsIdx+1>=end)return;                   // chunk edge: wait for onend
    ttsSetWord(ttsIdx+1);
    ttsTimer=setTimeout(tick,ttsWordMs(ttsWords[ttsIdx].textContent));
  };
  ttsTimer=setTimeout(tick,400+ttsWordMs(ttsWords[ttsIdx]?ttsWords[ttsIdx].textContent:""));
}

function ttsBuildWords(){
  ttsWords=[];ttsBreaks=[];
  const blocks=[];
  const walker=document.createTreeWalker(content,NodeFilter.SHOW_TEXT);
  const nodes=[];let n;
  while(n=walker.nextNode()){
    if(!n.nodeValue.trim())continue;
    if(n.parentElement&&n.parentElement.closest("pre"))continue; // don't read code aloud
    nodes.push(n);
  }
  nodes.forEach(node=>{
    const parent=node.parentNode;
    const blk=node.parentElement.closest("p,h1,h2,h3,h4,h5,h6,li,blockquote,td,th")||content;
    const parts=node.nodeValue.split(/(\s+)/);
    const frag=document.createDocumentFragment();
    parts.forEach(p=>{
      if(!p)return;
      if(/^\s+$/.test(p)){frag.appendChild(document.createTextNode(p));return;}
      const span=document.createElement("span");
      span.className="tts-w";span.textContent=p;
      frag.appendChild(span);ttsWords.push(span);blocks.push(blk);
    });
    parent.replaceChild(frag,node);
  });
  // break AFTER word i: 2 = end of block (paragraph/heading/cell), 1 = end of sentence
  ttsBreaks=ttsWords.map((w,i)=>{
    if(i+1<ttsWords.length&&blocks[i+1]!==blocks[i])return 2;
    if(/[.!?…]["')\]]*$/.test(w.textContent))return 1;
    return 0;
  });
  ttsWordsFor=cur;
  $("ttsSeek").max=Math.max(0,ttsWords.length-1);
}
function ttsClearCur(){
  const p=content.querySelector(".tts-w.tts-cur");
  if(p)p.classList.remove("tts-cur");
}
function ttsSetWord(i){
  if(i<0||i>=ttsWords.length)return;
  ttsClearCur();
  ttsIdx=i;
  const el=ttsWords[i];
  el.classList.add("tts-cur");
  if(!ttsSeekDragging)$("ttsSeek").value=i;
  if(S.mode==="scroll"){
    const r=el.getBoundingClientRect(),pr=pages.getBoundingClientRect();
    if(r.top<pr.top+40||r.bottom>pr.bottom-40)el.scrollIntoView({block:"center",behavior:"smooth"});
  }else{
    const p=Math.floor(el.offsetLeft/step());
    if(p!==page)goTo(p,true);
  }
}
function ttsSpeakFrom(i){
  if(!TTS_OK)return;
  ttsStopTimer();
  speechSynthesis.cancel();
  if(speechSynthesis.paused){try{speechSynthesis.resume();}catch(e){}} // un-stick Chrome's paused state
  if(!ttsWords.length||i>=ttsWords.length){ttsChapterEnded();return;}
  ttsChunkBase=i;
  // one utterance = whole sentences up to ~160 chars (hard cap 320), so prosody
  // never breaks mid-sentence and pauses land at sentence/paragraph ends
  let end=i,chars=0;
  while(end<ttsWords.length){
    chars+=ttsWords[end].textContent.length+1;
    end++;
    if(end>=ttsWords.length)break;
    if(ttsBreaks[end-1]&&chars>=160)break;
    if(chars>=320)break;
  }
  const chunk=ttsWords.slice(i,end);
  const spoken=chunk.map((w,k)=>{
    let s=ttsSpokenWord(w.textContent);
    if(ttsBreaks[i+k]===2&&!/[.!?…,;:]$/.test(s))s+=".";  // pause after headings/paragraphs
    return s;
  });
  const starts=[];let pos=0;
  spoken.forEach(s=>{starts.push(pos);pos+=s.length+1;});
  const u=new SpeechSynthesisUtterance(spoken.join(" "));
  u.rate=S.ttsRate;
  const v=ttsCurrentVoice();if(v)u.voice=v;
  ttsBoundarySeen=false;
  u.onboundary=e=>{
    if(ttsUtter!==u)return;
    if(e.name&&e.name!=="word")return;
    ttsBoundarySeen=true;ttsStopTimer();
    let k=0;while(k+1<starts.length&&starts[k+1]<=e.charIndex)k++;
    ttsSetWord(ttsChunkBase+k);
  };
  u.onend=()=>{ttsStopTimer();if(ttsSpeaking&&ttsUtter===u)ttsSpeakFrom(end);};
  u.onerror=e=>{
    if(e.error==="interrupted"||e.error==="canceled")return; // our own cancel()
    if(ttsUtter===u){ttsStopTimer();ttsSpeaking=false;paintTtsPlay();}
  };
  ttsUtter=u;
  ttsSetWord(i);
  speechSynthesis.speak(u);
  ttsStartFallback(end);
}
function ttsChapterEnded(){
  const j=siblingChapter(1);
  if(j!==null){
    ttsAutoNav=true;ttsResumeAfterRender=true;ttsIdx=0;
    nav(chapterHash(CHAPTERS[j]));
  }else{
    ttsSpeaking=false;paintTtsPlay();
  }
}
function paintTtsPlay(){$("ttsPlay").textContent=ttsSpeaking?"⏸":"▶";}
function ttsOpen(autoplay){
  if(!TTS_OK){alert("Reading aloud isn't supported in this browser.");return;}
  ttsActive=true;
  $("btnListen").classList.add("on");
  $("ttsBar").classList.remove("hidden");
  $("botbar").classList.add("hidden");
  content.classList.add("tts-mode");
  if(ttsWordsFor!==cur)ttsBuildWords();
  ttsLoadVoices();
  $("ttsRateSlider").value=S.ttsRate;$("ttsRateVal").textContent=S.ttsRate.toFixed(1)+"×";
  if(autoplay)ttsPlay();
}
function ttsClose(){
  ttsActive=false;ttsSpeaking=false;
  ttsStopTimer();
  if(TTS_OK)speechSynthesis.cancel();
  ttsClearCur();
  $("btnListen").classList.remove("on");
  $("ttsBar").classList.add("hidden");
  $("botbar").classList.remove("hidden");
  content.classList.remove("tts-mode");
  paintTtsPlay();
}
/* pause = cancel + remember the word; resume = speak again from that word.
   The engine's own pause()/resume() is broken on Android and can wedge Chrome. */
function ttsPlay(){
  if(!ttsActive)ttsOpen(false);
  if(ttsWordsFor!==cur)ttsBuildWords();
  if(!ttsWords.length)return;
  ttsSpeaking=true;
  ttsSpeakFrom(Math.min(ttsIdx,ttsWords.length-1));
  paintTtsPlay();
}
function ttsPause(){
  ttsSpeaking=false;
  ttsStopTimer();
  if(TTS_OK)speechSynthesis.cancel();
  paintTtsPlay();
}
function ttsSeekTo(i){
  if(!ttsWords.length)return;
  ttsIdx=Math.max(0,Math.min(ttsWords.length-1,i));
  if(ttsSpeaking)ttsSpeakFrom(ttsIdx);
  else ttsSetWord(ttsIdx);

/* ================= highlights (marking + popup) ================= */
function normWithMap(s){
  // whitespace-collapsed copy of s plus a map from collapsed index -> raw index
  let out="",map=[],ws=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(/\s/.test(c)){if(!ws&&out){out+=" ";map.push(i);}ws=true;}
    else{out+=c;map.push(i);ws=false;}
  }
  return {out,map};
}
function markText(root,text,attrs){
  // wrap the first occurrence of `text` (whitespace-tolerant) in <mark class=hl>
  if(!text)return false;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  const recs=[];let full="",n;
  while(n=walker.nextNode()){recs.push({node:n,start:full.length});full+=n.nodeValue;}
  let idx=full.indexOf(text),len=text.length;
  if(idx<0){
    const nf=normWithMap(full),nt=text.trim().replace(/\s+/g," ");
    const ni=nf.out.indexOf(nt);
    if(ni<0)return false;
    idx=nf.map[ni];len=nf.map[ni+nt.length-1]+1-idx;
  }
  const end=idx+len;
  // collect target slices first: surroundContents splits nodes as we go
  const slices=[];
  for(const rec of recs){
    const ns=rec.start,ne=ns+rec.node.nodeValue.length;
    if(ne<=idx||ns>=end)continue;
    slices.push({node:rec.node,s:Math.max(idx,ns)-ns,e:Math.min(end,ne)-ns});
  }
  for(const sl of slices){
    if(sl.e<=sl.s)continue;
    const range=document.createRange();
    range.setStart(sl.node,sl.s);range.setEnd(sl.node,sl.e);
    const mark=document.createElement("mark");
    mark.className="hl"+(attrs.note?" noted":"");
    mark.dataset.hl=attrs.i;
    if(attrs.note)mark.title=attrs.note;
    try{range.surroundContents(mark);}catch(e){}
  }
  return true;
}
function applyHighlights(chId){
  (highlights[chId]||[]).forEach((hl,i)=>markText(content,hl.text,{i,note:hl.note}));
}
const hlPop=$("hlPop");
function hideHlPop(){hlPop.classList.add("hidden");hlPop.innerHTML="";}
function showHlPop(x,y,buttons){
  hlPop.innerHTML="";
  buttons.forEach(([label,fn])=>{
    const b=document.createElement("button");
    b.textContent=label;
    // pointerdown, not click: a click would first collapse the text selection,
    // whose selectionchange handler hides this popup before the click lands
    b.addEventListener("pointerdown",e=>{e.preventDefault();e.stopPropagation();hideHlPop();fn();});
    hlPop.appendChild(b);
  });
  hlPop.classList.remove("hidden");
  const r=hlPop.getBoundingClientRect();
  hlPop.style.left=Math.max(8,Math.min(innerWidth-r.width-8,x-r.width/2))+"px";
  hlPop.style.top=Math.max(8,(y-r.height-12<8?y+18:y-r.height-12))+"px";
}
function saveHighlight(text,note){
  const c=CHAPTERS[cur];if(!c)return;
  (highlights[c.id]=highlights[c.id]||[]).push(note?{text,note}:{text});
  store.set("highlights",highlights);
  markText(content,text,{i:highlights[c.id].length-1,note});
  const sel=window.getSelection();if(sel)sel.removeAllRanges();
}
function selectionInContent(){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed)return null;
  const t=sel.toString().trim();
  if(t.length<2||t.length>1200)return null;
  const node=sel.anchorNode;
  if(!node||!content.contains(node.nodeType===3?node.parentNode:node))return null;
  return {sel,text:t};
}
function maybeShowSelectionPop(){
  if(reader.classList.contains("hidden"))return;
  const s=selectionInContent();
  if(!s){return;}
  const rect=s.sel.getRangeAt(0).getBoundingClientRect();
  showHlPop(rect.left+rect.width/2,rect.top,[
    ["✎ Highlight",()=>saveHighlight(s.text)],
    ["＋ Note",()=>{
      const note=prompt("Note for this highlight:");
      if(note!=null)saveHighlight(s.text,note.trim()||undefined);
    }],
  ]);
}
function openMarkPop(markEl,x,y){
  const c=CHAPTERS[cur];if(!c)return;
  const i=+markEl.dataset.hl,hl=(highlights[c.id]||[])[i];
  if(!hl)return;
  const btns=[];
  if(hl.note)btns.push(["View note",()=>alert(hl.note)]);
  btns.push([hl.note?"Edit note":"＋ Note",()=>{
    const note=prompt("Note for this highlight:",hl.note||"");
    if(note==null)return;
    if(note.trim())hl.note=note.trim();else delete hl.note;
    store.set("highlights",highlights);
    renderChapter(cur);
  }]);
  btns.push(["Remove",()=>{
    highlights[c.id].splice(i,1);
    if(!highlights[c.id].length)delete highlights[c.id];
    store.set("highlights",highlights);
    renderChapter(cur);
  }]);
  showHlPop(x,y,btns);
}
function restoreAnim(){requestAnimationFrame(()=>{content.style.transition="";});}
function paginate(){
  if(S.mode==="scroll"){pageCount=1;updateStatus();return;}
  const w=pages.clientWidth;
  content.style.setProperty("--pw",w+"px");
  const gap=Math.max(40,Math.round(w*0.12));
  content.style.setProperty("--gap",gap+"px");
  // force reflow then measure
  const step=w+gap;
  pageCount=Math.max(1,Math.ceil(pages.scrollWidth/step));
  $("slider").max=pageCount;
  updateStatus();
}
function step(){const w=pages.clientWidth;const gap=Math.max(40,Math.round(w*0.12));return w+gap;}
function goTo(p,animate=true){
  if(S.mode==="scroll")return;
  p=Math.max(0,Math.min(pageCount-1,p));
  const move=()=>{content.style.transform=`translateX(${-p*step()}px)`;};
  if(!animate||S.anim==="none"){
    content.style.transition="none";move();void content.offsetWidth;content.style.transition="";
  }else if(S.anim==="fade"&&p!==page){
    content.style.opacity=0;
    setTimeout(()=>{content.style.transition="none";move();void content.offsetWidth;
      content.style.transition="";content.style.opacity=1;},160);
  }else{move();}
  page=p;saveProgress();updateStatus();
}
function goToPct(pct,animate){
  if(S.mode==="scroll"){
    requestAnimationFrame(()=>{pages.scrollTop=pct*(pages.scrollHeight-pages.clientHeight);updateStatus();});
    page=0;return;
  }
  goTo(Math.round(pct*(pageCount-1)),animate);
}
function curPct(){
  if(S.mode==="scroll"){
    const m=pages.scrollHeight-pages.clientHeight;
    return m>0?pages.scrollTop/m:1;
  }
  return pageCount>1?page/(pageCount-1):1;
}
function saveProgress(){
  if(cur<0)return;
  progress[CHAPTERS[cur].id]={pct:curPct()};
  store.set("progress",progress);
}
function updateStatus(){
  const c=CHAPTERS[cur];if(!c)return;
  const b=bookOf(c);
  const pct=curPct();
  const minsLeft=Math.max(0,Math.ceil(c.words*(1-pct)/230));
  if(S.mode==="scroll"){
    $("stInfo").textContent=`${Math.round(pct*100)}% · ${minsLeft} min left`;
  }else{
    $("stInfo").textContent=`Page ${page+1} of ${pageCount} · ${Math.round(pct*100)}% · ${minsLeft} min left`;
    $("slider").value=page+1;
  }
  $("sliderLbl").textContent=`${b.title} — chapter ${c.num} of ${b.chapters.length}`;
  paintBookmark();
}
function openSibling(offset,fromEnd){
  const j=siblingChapter(offset);
  if(j!==null)nav(chapterHash(CHAPTERS[j]));
  else if(fromEnd===undefined)backToToc();  // past the last chapter -> book TOC
}
function next(){
  if(S.mode==="scroll"){pages.scrollBy({top:pages.clientHeight*.9,behavior:"smooth"});return;}
  if(page<pageCount-1)goTo(page+1);
  else{const j=siblingChapter(1);if(j!==null)nav(chapterHash(CHAPTERS[j]));}
}
function prev(){
  if(S.mode==="scroll"){pages.scrollBy({top:-pages.clientHeight*.9,behavior:"smooth"});return;}
  if(page>0)goTo(page-1);
  else{const j=siblingChapter(-1);
    if(j!==null){pendingFromEnd=true;nav(chapterHash(CHAPTERS[j]));}}
}
let pendingFromEnd=false;
function backToToc(){
  if(share&&share.type==="chapter")return; // a shared chapter has no TOC to go back to
  const c=CHAPTERS[cur];
  nav(c?bookHash(bookOf(c)):"");
}

/* ================= chrome (bars / panel / theme) ================= */
let barsOn=false;
function showBars(){barsOn=true;$("topbar").classList.remove("off");$("botbar").classList.remove("off");}
function hideBars(){barsOn=false;$("topbar").classList.add("off");$("botbar").classList.add("off");}
function toggleBars(){barsOn?hideBars():showBars();}
function showPanel(){$("aaPanel").classList.remove("hidden");$("scrim").classList.remove("hidden");}
function hidePanel(){$("aaPanel").classList.add("hidden");$("scrim").classList.add("hidden");}
function cycleTheme(){
  S.theme=S.theme==="light"?"sepia":S.theme==="sepia"?"dark":"light";
  applySettings();
}
function reflowKeepingPct(fn){
  const pct=curPct();fn();
  content.style.transition="none";
  requestAnimationFrame(()=>{paginate();goToPct(pct,false);restoreAnim();});
}

/* ================= events ================= */
$("btnToc").addEventListener("click",backToToc);
$("btnShare").addEventListener("click",()=>{
  const c=CHAPTERS[cur];if(!c)return;
  copyShare("#s/c/"+encodeURIComponent(c.id),$("btnShare"));
});
$("btnAa").addEventListener("click",showPanel);
$("btnTheme").addEventListener("click",cycleTheme);
$("scrim").addEventListener("click",hidePanel);
$("btnPrevCh").addEventListener("click",()=>openSibling(-1,false));
$("btnNextCh").addEventListener("click",()=>openSibling(1,false));
$("slider").addEventListener("input",e=>goTo(e.target.value-1,false));

/* Listen (text-to-speech) controls */
$("btnListen").addEventListener("click",()=>{ttsActive?ttsClose():ttsOpen(true);});
$("ttsClose").addEventListener("click",ttsClose);
$("ttsPlay").addEventListener("click",()=>{ttsSpeaking?ttsPause():ttsPlay();});
$("ttsSeek").addEventListener("input",e=>{
  ttsSeekDragging=true; // stop boundary events yanking the thumb mid-drag
  ttsClearCur();
  const el=ttsWords[+e.target.value];
  if(el)el.classList.add("tts-cur");
});
$("ttsSeek").addEventListener("change",e=>{ttsSeekDragging=false;ttsSeekTo(+e.target.value);});
$("ttsSeek").addEventListener("pointerup",()=>{setTimeout(()=>{ttsSeekDragging=false;},60);});
$("ttsRateSlider").addEventListener("input",e=>{
  $("ttsRateVal").textContent=parseFloat(e.target.value).toFixed(1)+"×";
});
$("ttsRateSlider").addEventListener("change",e=>{
  S.ttsRate=parseFloat(e.target.value);store.set("settings",S);
  if(ttsSpeaking)ttsSpeakFrom(ttsIdx);
});
$("ttsVoice").addEventListener("change",e=>{
  S.ttsVoice=e.target.value;store.set("settings",S);
  if(ttsSpeaking)ttsSpeakFrom(ttsIdx);
  else if(TTS_OK){ // quick preview of the newly chosen voice
    const u=new SpeechSynthesisUtterance("This voice will read your books.");
    const v=ttsCurrentVoice();if(v)u.voice=v;
    u.rate=S.ttsRate;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
});
$("ttsDictBtn").addEventListener("click",()=>{
  const curW=ttsWords[ttsIdx]
    ?ttsWords[ttsIdx].textContent.replace(/^[^A-Za-z0-9]+|[^A-Za-z0-9]+$/g,""):"";
  const w=prompt("Fix pronunciation — which word?",curW);
  if(!w||!w.trim())return;
  const lc=w.trim().toLowerCase();
  const p=prompt(`How should “${w.trim()}” be spoken?\nSpell it phonetically (e.g. “Uniswap” → “you-nee-swap”). Leave empty to remove the fix.`,ttsDict[lc]||"");
  if(p==null)return;
  if(p.trim())ttsDict[lc]=p.trim();else delete ttsDict[lc];
  store.set("ttsDict",ttsDict);
  if(ttsSpeaking)ttsSpeakFrom(ttsIdx);
});
if(!TTS_OK)$("btnListen").style.display="none";

$("fsUp").addEventListener("click",()=>{if(S.fs<26){S.fs++;reflowKeepingPct(applySettings);}});
$("fsDown").addEventListener("click",()=>{if(S.fs>13){S.fs--;reflowKeepingPct(applySettings);}});
[["segFont","font"],["segLh","lh"],["segMargin","margin"],["segAnim","anim"],["themeChips","theme"]]
.forEach(([id,key])=>{
  $(id).addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    S[key]=b.dataset.v;reflowKeepingPct(applySettings);
  });
});
$("segMode").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  const pct=curPct();S.mode=b.dataset.v;applySettings();
  content.style.transition="none";
  requestAnimationFrame(()=>{paginate();goToPct(pct,false);restoreAnim();});
});

/* click zones (no overlays, so links stay clickable) */
function guardClick(e){
  if(e.target.closest("a"))return false;
  const sel=window.getSelection();
  if(sel&&sel.toString().length>0)return false;
  return true;
}
$("pageArea").addEventListener("click",e=>{
  if(ttsActive){
    const w=e.target.closest(".tts-w");
    if(w){
      const i=ttsWords.indexOf(w);
      if(i>=0){ttsSpeaking=true;paintTtsPlay();ttsSeekTo(i);}
      return;
    }
  }
  const mk=e.target.closest("mark.hl");
  if(mk){openMarkPop(mk,e.clientX,e.clientY);return;}
  if(!hlPop.classList.contains("hidden")){hideHlPop();return;}
  if(!guardClick(e))return;
  if(!$("aaPanel").classList.contains("hidden")){hidePanel();return;}
  const r=$("pageArea").getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width;
  if(S.mode!=="scroll"&&x<0.3){if(barsOn){hideBars();return;}prev();}
  else if(S.mode!=="scroll"&&x>0.7){if(barsOn){hideBars();return;}next();}
  else toggleBars();
});

/* selection -> highlight popup */
document.addEventListener("pointerup",e=>{
  if(reader.classList.contains("hidden"))return;
  if(e.target instanceof Element&&e.target.closest("#hlPop"))return;
  setTimeout(maybeShowSelectionPop,10);
});
document.addEventListener("selectionchange",()=>{
  // hide the popup when the selection collapses (e.g. tap elsewhere on phone)
  const sel=window.getSelection();
  if((!sel||sel.isCollapsed)&&!hlPop.classList.contains("hidden")&&!hlPop.matches(":hover"))hideHlPop();
});

/* bookmarks */
function bookmarkHere(){
  const c=CHAPTERS[cur];if(!c)return null;
  const pct=curPct();
  return bookmarks.find(m=>m.ch===c.id&&Math.abs(m.pct-pct)<0.03)||null;
}
function toggleBookmark(){
  const c=CHAPTERS[cur];if(!c)return;
  const ex=bookmarkHere();
  if(ex)bookmarks=bookmarks.filter(m=>m!==ex);
  else bookmarks.push({ch:c.id,pct:curPct()});
  store.set("bookmarks",bookmarks);
  paintBookmark();
}
function paintBookmark(){
  const on=!!bookmarkHere();
  $("btnBkm").textContent=on?"⚑":"⚐";
  $("btnBkm").style.color=on?"var(--accent)":"";
}
$("btnBkm").addEventListener("click",toggleBookmark);

/* swipe */
let tx=0,ty=0,tt=0;
$("pageArea").addEventListener("touchstart",e=>{
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();},{passive:true});
$("pageArea").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Date.now()-tt<600&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){
    if(S.mode!=="scroll"){dx<0?next():prev();}
  }},{passive:true});

/* keyboard */
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT")return;
  if(reader.classList.contains("hidden")){
    if(e.key==="Escape"&&!toc.classList.contains("hidden")&&!share)nav("");
    if(e.key==="/"&&!home.classList.contains("hidden")){
      const sb=$("searchBox");if(sb){e.preventDefault();sb.focus();}
    }
    return;
  }
  switch(e.key){
    case "b":case "B":toggleBookmark();break;
    case "ArrowRight":case "PageDown":next();break;
    case "ArrowLeft":case "PageUp":prev();break;
    case " ":e.preventDefault();e.shiftKey?prev():next();break;
    case "Home":goTo(0);break;
    case "End":goTo(pageCount-1);break;
    case "m":case "M":toggleBars();break;
    case "t":case "T":cycleTheme();break;
    case "+":case "=":$("fsUp").click();break;
    case "-":$("fsDown").click();break;
    case "Escape":
      if(!$("aaPanel").classList.contains("hidden"))hidePanel();
      else if(barsOn)hideBars();
      else backToToc();
      break;
  }
});

/* mouse wheel (page mode) */
let wheelLock=0;
document.addEventListener("wheel",e=>{
  if(reader.classList.contains("hidden")||S.mode==="scroll")return;
  if(e.target.closest("#aaPanel")||e.target.closest(".tblwrap"))return;
  e.preventDefault();
  const now=Date.now();if(now-wheelLock<380)return;
  const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
  if(Math.abs(d)<12)return;
  wheelLock=now;d>0?next():prev();
},{passive:false});

/* scroll-mode progress */
let scrollT;
pages.addEventListener("scroll",()=>{
  if(S.mode!=="scroll")return;
  clearTimeout(scrollT);scrollT=setTimeout(()=>{saveProgress();updateStatus();},120);
},{passive:true});

/* resize / rotate */
let rz;
window.addEventListener("resize",()=>{
  if(reader.classList.contains("hidden"))return;
  clearTimeout(rz);
  rz=setTimeout(()=>{reflowKeepingPct(()=>{});},160);
});

/* ================= offline (PWA) =================
   The whole library is embedded in this one document, so caching it makes every
   book readable with no connection. Only meaningful when served over http(s);
   on file:// there's no service worker / Cache API, so the UI stays hidden. */
const OFFLINE_CACHE="library-offline-v3";
const OFFLINE_OK=("serviceWorker" in navigator)&&("caches" in window)&&
  (location.protocol==="https:"||location.protocol==="http:");
let offlineReady=false, offlineBusy=false;

async function offlineCheck(){
  if(!OFFLINE_OK)return false;
  try{
    const c=await caches.open(OFFLINE_CACHE);
    offlineReady=!!(await c.match("./index.html")||await c.match("./")||await c.match(location.href));
  }catch(e){offlineReady=false;}
  return offlineReady;
}
async function offlineSave(){
  if(!OFFLINE_OK||offlineBusy)return;
  offlineBusy=true; paintOffline();
  try{
    const c=await caches.open(OFFLINE_CACHE);
    // {cache:"reload"} bypasses the HTTP cache so we store a fresh copy.
    await Promise.allSettled(["./","./index.html","./manifest.webmanifest"]
      .map(u=>c.add(new Request(u,{cache:"reload"}))));
    offlineReady=true;
  }catch(e){offlineReady=false;}
  offlineBusy=false; paintOffline();
}
function offlineBarHtml(){
  if(!OFFLINE_OK)return "";
  if(offlineBusy)return `<div class="offbar busy"><span class="spin"></span>Saving library for offline…</div>`;
  if(offlineReady)return `<button class="offbar ready" id="offBtn" title="Refresh the offline copy"><span class="dot">✓</span>Available offline · tap to update</button>`;
  return `<button class="offbar" id="offBtn"><span class="dot">⬇</span>Save whole library for offline</button>`;
}
function paintOffline(){
  const el=document.getElementById("offlineBar");
  if(!el)return;
  el.innerHTML=offlineBarHtml();
  const b=document.getElementById("offBtn");
  if(b)b.addEventListener("click",offlineSave);
}
function registerServiceWorker(){
  if(!OFFLINE_OK)return;
  navigator.serviceWorker.register("sw.js").catch(()=>{});
  offlineCheck().then(paintOffline);
}

/* ================= boot ================= */
window.addEventListener("hashchange",()=>{
  if(!tryEnter()){showLocked();return;}
  const fe=pendingFromEnd;pendingFromEnd=false;
  const h=decodeURIComponent(location.hash);
  const id=fe?chapterIdFromHash(h):null;
  if(id!=null){
    const i=CHAPTERS.findIndex(c=>c.id===id);
    if(i>=0){if(cur>=0&&!reader.classList.contains("hidden"))saveProgress();
      if(ttsActive){if(ttsAutoNav)ttsAutoNav=false;else ttsClose();}
      parseShare(h);
      hideBars();hidePanel();hideHlPop();showView("reader");renderChapter(i,true);return;}
  }
  route();
});
$("lockBtn").addEventListener("click",attemptUnlock);
$("lockInput").addEventListener("keydown",e=>{if(e.key==="Enter")attemptUnlock();});
boot();
</script>
